<script id="payload" type="application/json">[{"title": "▶ Dev-Start Gate (open questions)", "file": "DEV_START_GATE.md", "md": "# ProstaCare — Open Questions & Confirmations Required Before Development Starts\n\n> **Who this is for:** clinical, business and legal teams. **No technical background needed.**\n> Any unfamiliar term (*tenant, derived, one-to-one, aggregate…*) is explained in the glossary at the top of\n> **`PROSTACARE_FUNCTIONAL_LOGIC_SPEC.md` §0 — Plain-English glossary**.\n\n\n**Purpose:** one list of everything we need answered before we start building. **Each question comes with our recommended answer**, so in most cases you only need to say *\"confirm\"* or *\"change it to…\"*.\n\n**Three terms used below:** **Tenant** = one hospital's own isolated copy of the system · **De-identified** = no name, ABHA/Aadhaar or phone — only a patient code · **Aggregate** = counts and percentages across many patients, never one person's record.\n\n**Status summary**\n- ✅ **13 decisions already settled** (§1) — no need to revisit.\n- 🔴 **12 blockers (P0)** — must be answered before dev starts (§2).\n- 🟠 **7 items (P1)** — needed within the first sprint (§3).\n- 🟡 **4 items (P2)** — needed before go-live, not before dev (§4).\n- ⚙️ **6 internal decisions** — ours to make, no client input needed (§5).\n\n> Fastest path: a single **90-minute workshop** covering §2, with clinical + business + legal present. Everything in §2 has a recommended default; most should be a \"confirm.\"\n\n---\n\n## 1. Already decided (for reference — not open)\n\n| # | Decision |\n|---|---|\n| 1 | **Tenant = institution** — one schema per hospital; no `institution_id` |\n| 2 | **Clinical access = role-based, tenant-wide** (no department); **HOD = privileged** |\n| 3 | **Ops / quality / pharma sponsor = de-identified aggregate only** (PHI firewall) |\n| 4 | Identifiers **masked-by-default + audited reveal** *(applies only if the identified model is chosen — see B1)* |\n| 5 | **Notifications = email via AWS SES + simple in-app list**; **login identity = email** (no SSE push / auto-task / digest in v1) |\n| 6 | **Cross-tenant aggregation** = in-tenant `sponsor_metric` → Zygo Data Cloud → sponsor (architecture spec'd) |\n| 7 | **8 care-gap rules** specified (conditions/severities) — pending clinical sign-off (B8) |\n| 8 | **Nudge lifecycle** = open → acknowledged → **auto-resolve** (no snooze, no dismiss); engine runs **on-write** (no cron) |\n| 9 | **Roles = Clinician · HOD (privileged) · Admin**; MDT = `is_mdt_member` notify flag; **no department** |\n| 10 | **Record lock:** edit window → auto-lock → **HOD** time-bound unlock (reason required, audited) |\n| 11 | **Deployment model = one tenant per institution, with separation** (per-doctor SaaS tenant `O-DEP` is explicitly **not** the model) |\n| 12 | **Hosting & data residency = AWS Mumbai (`ap-south-1`)**; **THB provides domain, hosting, and infrastructure** (DPDP-compliant India residency) |\n| 13 | **AWS SES is already in place** — verified sender domain + **production access** (out of sandbox). No SES prerequisite work needed. |\n\n---\n\n## 2. 🔴 BLOCKERS — needed before development starts\n\n| ID | Question | Why it blocks dev | Owner | Our recommended default |\n|---|---|---|---|---|\n| **B1** | **Identity model:** does ProstaCare store PHI? (A) de-identified registry — `patient_code` only, identity stays in hospital HIS; (B) identified EMR-lite; (C) de-identified core + optional isolated identity module | Determines the entire schema, consent basis, and compliance surface. **The single biggest decision.** | Clinical + Legal | **A** (or **C** if any site needs bedside identification). Matches the V2 workbook, makes the sponsor firewall near-trivial, lightest DPDP burden. |\n| **B2** | **Multi-user or single console?** Do clinicians/MDT members log in, have a panel and an inbox — or is \"team\" just a notify list? | Determines roles, inbox, and the whole collaboration model | Business | **Multi-user, role-based** (the role-based access decision already implies it) |\n| **B3** | **Roles & MDT (simplified):** confirm **no `department`** — all clinical roles see the institution's patients, **HOD is the privileged role**, and the MDT panel is only a **notification group** (no access implication). Who manages MDT membership? | Determines roles, access model, and the \"notify all\" target | Clinical | **Clinician · HOD (privileged) · Admin** (Coordinator folded into Clinician). MDT = `is_mdt_member` flag, admin-managed. Each patient has one **primary clinician** (attribution, not restriction). |\n| **B3b** | **Record locking:** confirm **edit window = 48 h**, **HOD unlock window = 24 h**, unlock **restricted to HOD** with a mandatory reason. Should Coordinator also unlock? | Determines the lock/unlock workflow + audit model | Clinical + Business | As stated. Append-only tiers need **no** unlock to continue care — unlock exists only to correct mistakes. |\n| **B3c** | **Cardinality confirmation:** every model is either entered on a named screen or derived; **one treatment *plan* (1:1)** vs **many treatment *lines* (1:N)**; duplicates blocked by unique keys | Prevents duplicate/ambiguous rows; confirms no orphan layers | Clinical | Confirm the provenance/cardinality table (`PROSTACARE_FUNCTIONAL_LOGIC_SPEC.md §1.7`) |\n| **B4** | **Patient source of truth:** created in ProstaCare, or **synced from hospital HIS/registry**? If synced — match key (`patient_code`? UHID? ABHA?) and which fields are read-only | Determines onboarding flow, integration scope, and patient entity ownership | Business + IT | **Created in ProstaCare** for v1 (registry), keyed on `patient_code`; HIS sync as a later phase |\n| **B5** | **Disease scope:** prostate only, or the first of several tumour frameworks? | Determines whether we build a shared clinical core + disease overlay, or a single-disease schema | Business | **Prostate first, on a templatable core** (so breast/lung can be added later without rework) |\n| **B6** | **Confirm the v1 scope cuts** (`SIMPLIFICATION_REVIEW.md`): no snooze · no dismiss · **AI Buddy → Phase 2** · no SLA/escalation · no encounter · roles = Clinician·HOD·Admin · comorbidities stay as Yes/No flags | Removes ~7 entities and a whole AI subsystem from v1; nothing in FR/PRD/SCOPE requires them | Clinical + Business | **Confirm all cuts.** Each is unsupported by any stated requirement; each is cheap to add back later. |\n| **B11** | **Clinical pathway gaps** (`CLINICAL_PATHWAY_GAP_ANALYSIS.md`): confirm the **11 gaps** — registration fields (religion/marital/education/occupation/tobacco), a **general lab record** (CBC/RFT/LFT/ALP/testosterone), **surgery** as a treatment line, **Pluvicto / Radium-223 radioligand therapy**, **structured adverse events**, **vital status + date of death** (without which Overall Survival cannot be computed), QoL, bone events, resource use, imaging response, support-service referrals | The registry cannot report OS/PFS/QoL or the sponsor's own therapy without these | Clinical | Add all; they are named registry capture points on the agreed pathway |\n| **B12** | **Follow-up intervals by disease state** (curative q3–6m · mHSPC q3m · mCRPC q1–3m · Pluvicto q6w · survivors annual) — confirm, so the *\"follow-up overdue\"* nudge can be built | Introduces the first **time-based** rule; **restores the nightly check** (reverses T9) | Clinical | Confirm the intervals above |\n| **B7** | **Sponsor:** confirm **NVS = Novartis**; their role (funder / data consumer / both); and the **independent clinical governance** that owns the rule pack (conflict-of-interest control) | Determines the aggregation contract, governance model, and consent basis | Business + Legal | Sponsor receives **de-identified aggregate only**; rule pack owned by an **independent clinical committee** with versioned sign-off; hard firewall |\n| **B8** | **Clinical sign-off on the 8 care-gap rules** — conditions, severities, next-step wording — and the **benchmark targets** (ARSI 60%, PSMA 85%, bone protection 85%, MDT review 95%) | The care-gap engine is the core product; rules cannot be coded unsigned | Clinical | Confirm as specified in `PROSTACARE_FUNCTIONAL_LOGIC_SPEC.md §4`; amend thresholds/wording as needed |\n| **B9** | **Aggregation contract:** confirm the `metric_key` catalogue; **small-cell suppression threshold** (default **11**); institution shown as **anonymised code** vs named | Determines what `sponsor_metric` computes and exports | Clinical + Legal | Catalogue as spec'd; threshold **11**; **anonymised `institution_code`** |\n| **B10** | **Launch institution + user roster + identity source:** which hospital(s) go first, the doctor/coordinator roster (name, specialty, role, email), and **Azure AD SSO vs email/local accounts** | Cannot provision a tenant or onboard users without it. No roster exists in any document today. | Business + IT | Start with **one institution**; SSO if available, else email/local. *(SES is already provisioned — no prerequisite.)* |\n\n---\n\n## 3. 🟠 P1 — needed within the first sprint (dev can start without)\n\n| ID | Question | Owner | Recommended default |\n|---|---|---|---|\n| P1-1 | **Nudge ownership** — who is responsible when a gap fires? | Clinical | The patient's **primary clinician**; visible to all clinicians |\n| P1-2 | *(cut from v1 — see B6)* SLA / escalation / snooze / dismiss | Clinical | **None in v1.** Nudges auto-resolve when the source field changes. Revisit if clinicians ask. |\n| P1-3 | **Notification detail** — which triggers send email vs in-app only; any patient-facing comms? | Business | Send on event (no digest scheduler in v1); clinician-only, no patient-facing comms |\n| P1-4 | **Edit permissions** — is editing gated by specialty? Should \"notify all MDT\" be restricted? | Clinical | **No specialty gating** in v1; restrict \"notify all MDT\" to **HOD** |\n| P1-5 | **Cardinality confirmations** — `pathology` 1-per-patient (re-biopsy → new row), `outcome` 1-per-patient, **supportive-care dated** | Clinical | As recommended (dated supportive-care gives the bone-protection audit trail) |\n| P1-6 | **Data migration** — greenfield, or import an existing registry at the launch site? | Business | Greenfield for v1 |\n| P1-7 | **Rule governance mechanism** — clinicians tune severity/wording/thresholds in config; changing rule *logic shape* is a versioned engineering change. Acceptable? | Clinical | Yes (see `NOVAEDGE_ALIGNMENT_REVIEW.md` G2) |\n\n---\n\n## 4. 🟡 P2 — needed before go-live, not before dev\n\n| ID | Question | Owner |\n|---|---|---|\n| ~~P2-1~~ | ~~SES prerequisites~~ — ✅ **ANSWERED:** THB's existing SES has a verified sender domain and production access | — |\n| P2-2 | **Export mechanism & cadence** to Zygo Data Cloud — S3 push (recommended) vs pull API; nightly compute, weekly/monthly export | Business + Platform |\n| P2-3 | **Consent / legal basis** for aggregate secondary use (DPDP Act; ethics committee if applicable) | Legal |\n| ~~P2-4~~ | ~~Domain/hosting/residency/IP~~ — ✅ **ANSWERED:** **AWS Mumbai (`ap-south-1`)**; **THB provides** domain, hosting, infrastructure | — |\n| P2-5 | **Clinical chart renderers** — PSA line, percentile bands, Kaplan-Meier (frontend work) | Platform |\n| P2-6 | **Enum localisation** per site (RT facilities, referring centres) | Clinical |\n| ~~P2-7~~ | ~~Deployment model~~ — ✅ **ANSWERED:** **one tenant per institution, with separation.** Per-doctor SaaS is not the model. | — |\n\n---\n\n## 5. ⚙️ Internal decisions (ours — no client input needed)\n\n| ID | Item | Resolution |\n|---|---|---|\n| I-1 | Cross-tenant de-identified aggregation layer (the one net-new component) | Build per `CROSS_TENANT_AGGREGATION_SPEC.md` |\n| I-2 | Current-state (\"latest dated row\") encoding | Materialized view + lateral subquery — **not** a computed column |\n| I-3 | Care-gap rule encoding | `guideline_rule` config metadata + one predicate step per rule |\n| I-4 | Workbook flag columns → normalized `patient_condition` rows | Import transform |\n| I-5 | Partitioning (`psa_reading`, `nudge_event`) | RANGE partition + composite PK |\n| I-6 | Audit coverage | Cross-cutting audit subscription on all entities + reveal audit |\n\n---\n\n## 6. What we can start immediately once §2 is answered\n\n| Unblocked by | Work that can start |\n|---|---|\n| **B1 + B2 + B4 + B6** | **P0 Foundation** — tenancy, 3 roles, patient hub, 1:1 entities, record lock, onboarding console |\n| **B1 + B6** | **P1 Longitudinal** — PSA, staging, imaging, treatment lines, supportive care, journey |\n| **B8** | **P2 Care-gap engine** — the 8 rules, nudge lifecycle |\n| **B3 + B10 + P2-1** | **MDT notify** (SES email) + user onboarding |\n| **B7 + B9** | **Aggregation** — `sponsor_metric` + Zygo Data Cloud pipeline |\n| **B5** | Schema core shape (single-disease vs templatable overlay) |\n\n**Critical path:** **B1 (identity model)** gates everything. **B8 (rule sign-off)** gates the care-gap engine. **B10 (roster + auth)** gates the first tenant.\n\n---\n\n*Sources consolidated from: `FLOW-CLARITY-AND-OPEN-QUESTIONS.md`, `PROSTACARE_BUILD_SPEC_V1.md §12`, `PROSTACARE_FUNCTIONAL_LOGIC_SPEC.md §7`, `NOVAEDGE_ALIGNMENT_REVIEW.md §4/§6`, `CROSS_TENANT_AGGREGATION_SPEC.md §6`, `TENANT_ONBOARDING_PLAN.md §6`.*\n"}, {"title": "👤 Patient Data Walkthrough", "file": "PATIENT_JOURNEY_DATA_WALKTHROUGH.md", "md": "# ProstaCare — Complete Patient Data Walkthrough (worked example)\n\n**Purpose:** show, stage by stage with real values, exactly **what a clinician enters**, **what records the system creates**, **which nudges fire or resolve**, and **what is derived**. Two journeys: a **new patient** (onboarding) and an **existing patient** (follow-up → response → progression). Ends with the **complete record summary**, the **derived layer**, and **fill-in examples** so the clinical team can answer the remaining open questions.\n\n**How to read this:**\n- **1:1** = the patient has **exactly one** of these (e.g. one biopsy record).\n- **1:N (dated)** = the patient has **many**, each with its own date, and we **never overwrite** an old one (e.g. every PSA result).\n- **Derived** = the system **works this out itself**; nobody types it.\n- Field names in `code style` are the exact names in the data-entry workbook, so clinical and technical teams are talking about the same box.\n\n---\n\n# PART A — NEW PATIENT ONBOARDING\n\n**Meet `PCR-005`** — 66-year-old man, referred from a government OPD in Uttar Pradesh, PMJAY coverage, newly diagnosed.\n\n```mermaid\nflowchart LR\n  S0[S0 Register] --> S1[S1 Clinical workup]\n  S1 --> S2[S2 Staging + Imaging]\n  S2 --> N1[⚠ 7 nudges fire]\n  N1 --> S3[S3 MDT review]\n  S3 --> S4[S4 Start treatment]\n  S4 --> N2[⚠ ARSI nudge fires · follow-up nudge resolves]\n  S4 --> S5[S5 Supportive care + RT plan]\n```\n\n---\n\n## Stage 0 — Registration (\"Add New Patient\")\n\n**Screen:** *Add New Patient* → Demographics form.\n\n| Field entered | Value |\n|---|---|\n| `patient_code` | **PCR-005** |\n| `registry_enrolment_date` | 2026-07-09 |\n| `age_at_diagnosis_years` | 66 |\n| `diagnosis_date` | 2026-06-28 |\n| `language_preference` | Hindi |\n| `healthcare_coverage` | PMJAY (Ayushman Bharat) |\n| `referring_hospital_centre` | Government General Hospital |\n| `referral_source` | Government Hospital / OPD |\n| `state` | Uttar Pradesh |\n| `travel_distance_km` | 180 |\n| `primary_clinician_id` | Dr. A. Sharma (the logged-in user) |\n| `religion` ⭐ | Hindu |\n| `marital_status` ⭐ | Married |\n| `education_level` ⭐ | Secondary |\n| `occupation` ⭐ | Agriculture |\n| `tobacco_use` ⭐ | Former |\n\n> ⭐ **These five fields are proposed additions, not yet in the workbook.** The demo captured Religion, Marital Status, Occupation and Education; the V2 workbook dropped all four. The care pathway's first registry capture point is *\"patient demographics **& risk factors**\"* — so they belong here. See `CLINICAL_PATHWAY_GAP_ANALYSIS.md` §1.\n\n**Records created**\n```\npatient (1:1)                → 1 row   [PCR-005]\npathology (1:1 shell)        → 1 empty row\ntreatment_plan (1:1 shell)   → 1 empty row\noutcome (1:1 shell)          → 1 empty row\naudit_event                  → \"patient.created\"\nnotification → MDT           → \"New patient registered — PCR-005\" (email via SES)\n```\n**Derived immediately:** cohort count +1 · `new_registrations` for 2026-07 +1.\n**Nudges:** none yet (no clinical data to evaluate).\n\n---\n\n## Stage 1 — Clinical workup (complaint, DRE, biopsy, PSA)\n\n**Screen:** *Clinical Assessment*.\n\n**1a. Presenting complaint & DRE** → written to **`pathology` (1:1)**\n\n| Field | Value |\n|---|---|\n| `primary_complaint` | LUTS (Lower urinary tract symptoms) |\n| `duration` | 6 months |\n| `ipss_score` | 20–35 (Severe) |\n| `bowel_rectal_symptoms` | None |\n| `dre_findings` | Nodule – bilateral |\n| `prostate_volume_cc` | 54 |\n\n**1b. PSA history** → each entry appends a **`psa_reading` (1:N dated)** row\n\n| `psa_date` | `psa_ng_ml` | `free_psa_pct` | `psa_density` |\n|---|---|---|---|\n| 2026-05-10 | 28.4 | 8 | 0.53 |\n| 2026-06-20 | 34.1 | 7 | 0.63 |\n\n**1c. Biopsy** → written to **`pathology` (same 1:1 row)**\n\n| Field | Value |\n|---|---|\n| `biopsy_date` | 2026-07-01 |\n| `biopsy_type` | MRI-targeted / Fusion biopsy |\n| `pi_rads_score` | PI-RADS 5 |\n| `gleason_score` | 4+5=9 |\n| `isup_grade_group` | Grade 5 (≥4+5) |\n| `cores_positive_total` | 9 / 12 |\n| `core_involvement_pct` | 71 |\n| `perineural_invasion` | Present |\n| `ece_extracapsular_extension` | Present (radiological) |\n\n**1d. Comorbidities & family history** → **boolean flags on `pathology`**\n`comorbidity_1` (T2 Diabetes) = **Yes** · `comorbidity_2` (Hypertension) = **Yes** · others No\n`family_history_2` (Breast Ca) = **Yes** · others No\n\n---\n\n## Stage 2 — Staging & imaging (the moment nudges wake up)\n\n**2a. TNM & risk** → appends **`staging_assessment` (1:N dated)** — *row #1*\n\n| Field | Value |\n|---|---|\n| `assessed_on` | 2026-07-05 |\n| `clinical_t_stage` | cT3b |\n| `n_stage` | cN1 |\n| `m_stage` | cM0 |\n| `eau_risk_category` | **Very High / Locally Advanced** |\n| `ecog_performance_status` | 1 – Restricted strenuous activity |\n| `castration_status` | **Not on ADT** *(pre-treatment)* |\n\n**2b. Imaging & molecular** → appends **`imaging_study` (1:N dated)** rows — **only for studies actually performed**\n\n| `study_date` | `modality` | `result` |\n|---|---|---|\n| 2026-06-25 | `mpmri_pelvis` | Done — abnormal |\n| 2026-06-26 | `ct_abdomen_pelvis` | Done — lymphadenopathy |\n\n> **Important:** \"Not done\" is **the absence of a row**, not a row with an empty date.\n> `bone_scan_spect`, `psma_pet_ct`, `dexa_bone_density`, `germline_somatic_testing` have **no rows yet** → the engine reads them as `Not done`:\n> `imaging_status(m) = latest imaging_study row for modality m, else \"Not done\"`\n\n### ⚠ The care-gap engine runs (on save). Current state → 8 rules:\n\n```\ncurrent_risk       = Very High / Locally Advanced      (staging row #1)\ncurrent_castration = Not on ADT                        (staging row #1)\nbone_scan = Not done · psma = Not done · dexa = Not done · germline = Not done\nbone_protection = Not started (no supportive-care row yet)\nnext_follow_up_psa_date = (empty) · phq9 = Not done\n\n1 bone_scan_missing       Not done AND risk∈{High,VeryHigh,M1}   → FIRES  🔴 Urgent\n2 psma_missing            Not done AND risk∈{High,VeryHigh}      → FIRES  🔴 Urgent\n3 bone_protection_missing Not started                            → FIRES  🔴 Urgent\n4 dexa_missing            Not done                               → FIRES  🟠 Warning\n5 genomics_missing        Not done                               → FIRES  🟠 Warning\n6 arsi_readiness          castration ≠ HSPC                      → does NOT fire ✅\n7 followup_psa_missing    date empty                             → FIRES  🔵 Info\n8 psychosocial_prompt     phq9 = Not done                        → FIRES  🔵 Info\n```\n**Result: 7 open nudges** — 3 Urgent · 2 Warning · 2 Info.\n**Records created:** 7 × `nudge` + 7 × `nudge_event(opened)`.\n**Banner:** *\"Urgent: 3 actions require immediate attention.\"* · **Primary focus:** \"Complete bone scan / SPECT\".\n\n> **Note rule 6 gating:** ARSI does not fire yet because the patient is not on ADT. It will fire the moment castration status becomes HSPC (Stage 4). This is why staging is a **dated log**, not a cell.\n\n---\n\n## Stage 3 — MDT review\n\n**Screen:** *Treatment Plan → Intent & MDT* → **`treatment_plan` (1:1)**\n\n| Field | Value |\n|---|---|\n| `treatment_intent` | Disease control (locally advanced) |\n| `mdt_tumour_board_status` | Reviewed — plan agreed |\n| `date_of_mdt_review` | 2026-07-08 |\n| `clinical_trial_eligibility` | Not screened |\n| `treatment_start_date` | 2026-07-10 |\n\n**Derived:** `mdt_review_rate` numerator +1 · `time_to_treatment = 2026-07-10 − 2026-06-28 = 12 days`.\n\n---\n\n## Stage 4 — Treatment starts (and the ARSI nudge wakes)\n\n**4a. Therapy** → appends **`treatment_line` (1:N dated)** rows\n\n| # | `line_type` | `agent` / `formulation_dose` | `start_date` | `status` |\n|---|---|---|---|---|\n| 1 | ADT | LHRH Agonist (Leuprolide / Lupride) · Leuprolide 45 mg depot (6-monthly) | 2026-07-10 | Active |\n| 2 | Anti-androgen | Bicalutamide 50 mg OD (flare cover) | 2026-07-10 | Active (ends 2026-08-07) |\n\n**4b. Castration status changes** → appends **`staging_assessment` — row #2** *(never overwrites row #1)*\n\n| `assessed_on` | `eau_risk_category` | `castration_status` |\n|---|---|---|\n| 2026-07-10 | Very High / Locally Advanced | **Hormone-sensitive (HSPC)** |\n\n**4c. Supportive care** → appends **`supportive_care_event` (1:N dated)** — row #1\n\n| Field | Value |\n|---|---|\n| `bone_protection_therapy` | **Not started** |\n| `calcium_vitamin_d` | Not prescribed |\n| `next_follow_up_psa_date` | **2026-10-10** |\n| `testosterone_monitoring` | Not checked this cycle |\n| `psychosocial_screening_phq9` | Not done |\n| `nutritional_assessment` | Not done |\n\n### ⚠ Engine re-runs — two nudges change state\n```\ncurrent_castration = Hormone-sensitive (HSPC)     ← from staging row #2\nnext_follow_up_psa_date = 2026-10-10              ← from supportive row #1\n\n6 arsi_readiness   HSPC AND risk⊇High AND arsi=Not initiated → FIRES 🟠 Warning  (NEW)\n7 followup_psa_missing   date now present                    → AUTO-RESOLVES ✅\n```\n**Result: 7 open nudges** — 3 Urgent · 3 Warning · 1 Info.\n`nudge_event(opened)` for ARSI · `nudge_event(resolved)` for follow-up. **Nobody clicked \"resolve\"** — the data did it.\n\n---\n\n## Stage 5 — RT plan + journey events\n\n**RT** → appends **`treatment_line`** row #3\n\n| Field | Value |\n|---|---|\n| `line_type` | RT |\n| `rt_indication` | Definitive RT (prostate ± LN) |\n| `rt_status` | Planned |\n| `rt_modality` | IMRT / VMAT |\n| `target_volume` | Prostate + Whole Pelvis |\n| `dose_fractionation` | 78 Gy / 39 fx (conventional) |\n| `rt_facility` | Govt. Regional Cancer Centre |\n| `planned_rt_start_date` | 2026-09-01 |\n| `cghs_preauth_status` | Not required *(PMJAY, not CGHS)* |\n\n**Journey events** → **`journey_event` (1:N dated)**\n`Outpatient Visit` 2026-06-28 · `Lab / PSA` 2026-05-10 · `Imaging` 2026-06-25 · `Biopsy / Procedure` 2026-07-01 · `MDT Review` 2026-07-08 · `Treatment Initiation` 2026-07-10\n\n---\n\n# PART B — EXISTING PATIENT (follow-up → response → progression)\n\n**Meet `PCR-001`** — the workbook's case: 68 y, High risk, HSPC, CGHS, on ADT with **7 open nudges** at the start.\n\n```mermaid\nflowchart LR\n  A[7 open nudges] --> B[Close the workup gaps]\n  B --> C[Start bone protection + ARSI]\n  C --> D[0 open nudges ✅]\n  D --> E[18 months: PSA rises]\n  E --> F[Restage → CRPC]\n  F --> G[New line: chemo]\n```\n\n## B1 — Closing the gaps (each append auto-resolves a nudge)\n\n| Date | Clinician action | Row appended | Nudge effect |\n|---|---|---|---|\n| 2026-08-15 | Bone scan performed | `imaging_study` (Bone Scan, *Done — no metastases*) | 🔴 `bone_scan_missing` → **resolved** |\n| 2026-08-20 | PSMA PET-CT performed | `imaging_study` (PSMA, *Done — pelvic nodal uptake*) | 🔴 `psma_missing` → **resolved** |\n| 2026-09-01 | Bone protection started | `supportive_care_event` (Zoledronic acid 4 mg IV q3m; Calcium+VitD prescribed) | 🔴 `bone_protection_missing` → **resolved** |\n| 2026-09-05 | DEXA done | `imaging_study` (DEXA, *Osteopenia (T −1 to −2.5)*) | 🟠 `dexa_missing` → **resolved** |\n| 2026-09-08 | Germline result | `imaging_study` (Germline, *BRCA1/2 — negative*) | 🟠 `genomics_missing` → **resolved** |\n| 2026-09-10 | ARSI initiated | `treatment_line` (ARSI · Abiraterone + Prednisone) | 🟠 `arsi_readiness` → **resolved** |\n| 2026-09-12 | PHQ-9 completed | `supportive_care_event` (PHQ-9 *Minimal (0–4)*) | 🔵 `psychosocial_prompt` → **resolved** |\n\n**Open nudges: 7 → 0.** Every closure is a `nudge_event(resolved)`; nothing was manually dismissed.\n*(This is why there is no \"dismiss\" button — see `SIMPLIFICATION_REVIEW.md`.)*\n\n## B2 — Response, then progression (append-only shows the whole arc)\n\n**PSA log (`psa_reading`, 1:N):**\n| Date | PSA | Meaning |\n|---|---|---|\n| 2026-08-01 | 42.6 | baseline |\n| 2026-11-01 | 4.2 | responding |\n| 2027-02-01 | **0.6** | **nadir** |\n| 2027-11-01 | 3.4 | rising |\n| 2028-01-10 | 8.1 | rising on castrate testosterone |\n\n**Restaging** → `staging_assessment` **row #3** (rows #1 and #2 untouched)\n| `assessed_on` | `eau_risk_category` | `castration_status` |\n|---|---|---|\n| 2028-01-15 | `M1 – Metastatic HSPC` *(see note)* | **Castration-resistant (CRPC)** |\n\n> ⚠️ **Enum limitation for the clinical team (E3):** the `eauRiskCategory` list has only `M1 – Metastatic HSPC` — there is **no `M1 – CRPC` value**. So a metastatic patient who becomes castration-resistant carries a risk label that still says \"HSPC\", while `castration_status` correctly says CRPC. **Should we add `M1 – Metastatic CRPC` to the risk enum, or is castration_status alone sufficient?**\n\n**New line** → `treatment_line` row #4: `chemo` · Docetaxel 75 mg/m² q3w · start 2028-02-01\n\n**Outcome (1:1) updated:**\n`psa_nadir_value` 0.6 · `psa_nadir_date` 2027-02-01 · `psa_doubling_time_months` 4.8 ·\n`biochemical_recurrence_status` Biochemical recurrence · `crpc_progression_status` **Progressed to CRPC** · `crpc_progression_date` 2028-01-15\n\n**Engine effect:** `arsi_readiness` **cannot re-fire** (castration ≠ HSPC). The HSPC→CRPC transition is preserved as a **dated fact**, which is exactly why staging is a log.\n\n## B3 — Completing the record (the fields the first pass skipped)\n\nThese close every remaining gap against the Field Dictionary. `PCR-001` is **CGHS**, so the pre-auth flow applies.\n\n**CGHS pre-auth for RT** → updates the RT `treatment_line`\n| Field | Value |\n|---|---|\n| `cghs_preauth_status` | Not initiated → **Pending** → **Approved** |\n| `cghs_request_date` | 2026-09-20 |\n| `cghs_approval_date` | 2026-11-06 |\n→ **derived** `cghs_delay = 47 days` (feeds the access-delay chart)\n\n**RT delivered & assessed** → RT `treatment_line` + `outcome`\n| Field | Value |\n|---|---|\n| `rt_status` | Completed |\n| `rt_completion_date` | 2027-01-20 |\n| `rt_outcome_status` | Complete biochemical response |\n\n**Testosterone & toxicity** → `supportive_care_event` + `treatment_line`\n| Field | Value |\n|---|---|\n| `testosterone_level` | 18 ng/dL |\n| `testosterone_monitoring` | Castrate confirmed (<50 ng/dL) |\n| `safety_side_effects` | Grade 1 fatigue; hot flushes — no dose change |\n\n**Chemotherapy detail** (the 2028 line) → `treatment_line` (`line_type` = chemo)\n| Field | Value |\n|---|---|\n| `chemotherapy_regimen` | Docetaxel 75 mg/m² q3w |\n| `number_of_cycles_completed` | 6 |\n| `last_cycle_date` | 2028-06-12 |\n\n**Follow-up & recurrence** → `outcome` (1:1)\n| Field | Value |\n|---|---|\n| `last_follow_up_date` | 2028-06-20 |\n| `best_response` | Biochemical recurrence |\n| `biochemical_recurrence_date` | 2027-11-01 |\n\n> `last_follow_up_date` + `next_follow_up_psa_date` are what drive the **Patient List** segments (Last Visit / Upcoming / Missed-Overdue) — which is why we need **no Encounter entity**.\n\n**PSA remarks** → `psa_reading.context_remarks` — e.g. *\"post-RT, on ADT + abiraterone\"*\n**Journey events** → `journey_event` (`event_type`, `event_date`, `event_notes`) — e.g. `Adverse Event` · 2028-03-04 · *\"Grade 2 neutropenia, cycle delayed 1 week\"*\n**Rx upload** → `document` — `rx_upload` accepts PDF/image; stored with uploader + timestamp, audited.\n\n---\n\n# PART C — THE COMPLETE RECORD (everything we hold on `PCR-001`)\n\n| Record type | One or many? | Entries | What it holds |\n|---|---|---|---|\n| `patient` | 1:1 | 1 | code, age@dx, coverage, geography, referral, enrolment, dx date, primary clinician |\n| `pathology` | 1:1 | 1 | complaint, IPSS, DRE, volume, biopsy, PI-RADS, Gleason, ISUP, cores, PNI, ECE + 15 comorbidity/family flags |\n| `treatment_plan` | 1:1 | 1 | intent, MDT status + date, trial eligibility, treatment start |\n| `outcome` | 1:1 | 1 | best response, nadir + date, PSADT, BCR status/date, CRPC status/date, RT outcome |\n| `psa_reading` | 1:N | **5** | dated PSA, free %, density, remarks |\n| `staging_assessment` | 1:N | **3** | dated cTNM, EAU risk, ECOG, castration status |\n| `imaging_study` | 1:N | **6** | dated mpMRI, bone scan, PSMA, CT, DEXA, germline |\n| `treatment_line` | 1:N | **4** | ADT · anti-androgen · ARSI · chemo (+RT fields when line_type = RT) |\n| `supportive_care_event` | 1:N | **3** | dated bone protection, Ca/VitD, follow-up PSA date, testosterone, PHQ-9, nutrition |\n| `journey_event` | 1:N | **9** | the milestone narrative |\n| `nudge` | 1:N | **7** | all resolved |\n| `nudge_event` | 1:N | **~21** | opened / acknowledged / resolved |\n| `notification` / `discussion_entry` | 1:N | 3 | MDT messages + trail |\n| `document` | 1:N | 2 | Rx uploads |\n| `audit_event` | 1:N | many | every create / edit / unlock / notify |\n\n---\n\n# PART D — WHAT THE SYSTEM CALCULATES FOR YOU (never typed by hand)\n\n## D1 — Today's status = simply the most recent entry in each history\n```\ncurrent_risk        = M1                        ← staging row #3 (2028-01-15)\ncurrent_castration  = Castration-resistant      ← staging row #3\ncurrent_line        = chemo (Docetaxel)         ← treatment_line row #4\nlatest_psa          = 8.1 ng/mL (2028-01-10)    ← psa_reading latest\nbone_protection     = Zoledronic acid 4 mg q3m  ← supportive_care latest\n```\n→ drives the **header badges** and the **rule inputs**.\n\n## D2 — Numbers calculated for this patient\n| Derived | Formula | Value |\n|---|---|---|\n| ADT duration | `today − ADT start` | 19 months |\n| Time to treatment | `treatment_start − diagnosis_date` | 12 days *(PCR-005)* |\n| PSA nadir / PSADT | from `psa_reading` + `outcome` | 0.6 @ 2027-02 · 4.8 mo |\n| Open gap counts | `COUNT(nudge WHERE status=open GROUP BY severity)` | 0 / 0 / 0 |\n| Record completeness | % required fields present per field group | 94% |\n\n## D3 — How this patient counts towards the department's figures\n| Cohort metric | How PCR-001 contributes |\n|---|---|\n| `psma_completion_rate` | numerator **+1**, denominator +1 (high-risk) |\n| `bone_protection_rate` | numerator **+1**, denominator +1 (on ADT) |\n| `arsi_intensification_rate` | numerator **+1**, denominator +1 (HSPC high-risk at the time) |\n| `mdt_review_rate` | numerator +1 |\n| `open_gap_count` | **0** (was 7) |\n| `protocol_adherence_score` | pulls the cohort score **up** |\n\n## D4 — What (and only what) the sponsor ever sees\nOnly the de-identified aggregate row, small-cell suppressed:\n```\ninstitution_code = INST-017 | period_month = 2026-09 | metric_key = bone_protection_rate\ndim1 = risk_group/High     | numerator = 18 | denominator = 62 | patient_n = 62 | suppressed = false\n```\n❌ Never: `patient_code`, names, exact dates, free text, or any cell with `patient_n < 11`.\n\n---\n\n# PART G — From one patient to the whole cohort (how the department numbers are built)\n\nParts A–D followed **one** patient. Every figure on the Home screen and the Population Dashboard is simply **the same data, counted across all patients**. Nothing is typed by hand.\n\n## G1 · How a care-gap **count** becomes a cohort figure\n\nTake the department's 347 patients on the day of the demo.\n\n```\nOpen care gaps = 63\n   ↳ simply: count every nudge whose status is still \"open\", across all patients.\n     PCR-001 contributed 7 of these before the team closed them; it now contributes 0.\n```\n\n## G2 · How a **benchmark percentage** is calculated\n\nEach benchmark is *\"how many patients who should have had this, actually had it.\"*\n\n```\nBone protection on ADT  =  patients on ADT WITH bone protection\n                           ───────────────────────────────────   =  66 / 198  =  33%\n                           all patients on ADT\nNCCN benchmark = 85%      →  gap of 52 percentage points\nClicking the 33% opens the 132 patients on ADT who have no bone protection.\n```\nThe same shape produces the other three benchmarks:\n\n| Benchmark | Numerator (had it) | Denominator (should have had it) | Cohort | Target |\n|---|---|---|---|---|\n| ARSI intensification | ARSI started | HSPC **and** risk ≥ High | 29% | 60% |\n| PSMA PET-CT | PSMA done | risk High / Very High | 46% | 85% |\n| Bone protection | bone protection started | on ADT | 33% | 85% |\n| MDT review | MDT status = *Reviewed* | all patients | 77% | 95% |\n\n> Every one of these is **drillable**: click the percentage → see the exact patients in the denominator who are missing the action → open any patient file. That is the product promise.\n\n## G3 · How the **nudge trend** chart is calculated\n\nThis is the one figure that needs the **lifecycle log** (`nudge_event`), not just today's snapshot.\n\n```\nFor each week (or month):\n   Opened        = count of nudge_event where action = 'opened'\n   Acknowledged  = count of nudge_event where action = 'acknowledged'\n   Resolved      = count of nudge_event where action = 'resolved'\n   Net active    = (all opened so far) − (all resolved so far)      ← the running backlog\n```\nWorked example for `PCR-001`'s month:\n| Week | Opened | Acknowledged | Resolved | Net active |\n|---|---|---|---|---|\n| W1 | 7 | 0 | 0 | 7 |\n| W2 | 0 | 4 | 2 | 5 |\n| W3 | 0 | 3 | 3 | 2 |\n| W4 | 0 | 0 | 2 | **0** |\n\nThis is exactly why a nudge cannot be a simple flag on the patient row — a flag has no history, so the chart could never be drawn.\n\n## G4 · How the **protocol adherence score** is built\n\nTen protocol steps are each scored *\"what % of eligible patients had it\"*, then averaged:\n\n```\nMDT review 77% · Staging complete 71% · PSMA 46% · RT dose/target 88% · ADT duration 82%\nBone Rx 33% · Genetics 62% · PSA monitoring 78% · ARSI intensity 29% · Psych screen 44%\n                       → weighted mean = 73 / 100\nBiggest drags: Bone Rx (33%) and ARSI intensity (29%).\n```\n\n## G5 · How **record completeness** is measured\n\nFor each group of fields (Demographics, PSA, Biopsy, Staging, Imaging, Treatment, Bone health, Outcomes), the system counts how many of the **required** fields have an answer:\n```\ncompleteness(group) = required fields answered ÷ required fields in that group\ncohort completeness = average across patients      → 68% (235 of 347 records complete)\n```\n> ⚠️ **Open question (F5):** the workbook marks only **4 of 108 fields** as required, so we need the clinical team to state which fields are mandatory per group — otherwise this figure has no agreed basis.\n\n## G6 · Supportive care and reporting — where they surface\n\n| Concern | Where it is captured | Where it is reported |\n|---|---|---|\n| **Bone protection, Ca/Vit D, DEXA follow-up** | `supportive_care_event` (dated) — Treatment screen | Bone-health donut · bone-protection benchmark · the largest care gap |\n| **Testosterone monitoring, PHQ-9, nutrition** | `supportive_care_event` (dated) | Protocol score (psych-screen axis) · psychosocial nudge |\n| **Toxicity / side-effects** | `safety_side_effects` on the treatment line | Clinical review; not a cohort chart today |\n| **Follow-up scheduling** | `next_follow_up_psa_date`, `last_follow_up_date` | Patient List timing segments (Upcoming / Missed) |\n| **Access & approvals** | `cghs_preauth_status` + request/approval dates | CGHS delay chart · pending-approvals KPI |\n| **Reporting out** | all of the above | Home KPIs · 6 dashboard sections · printable summary · the de-identified sponsor extract (Part D4) |\n\n## G7 · The full chain, end to end\n\n```mermaid\nflowchart LR\n  E[Clinician saves an entry] --> R[Rules re-checked → nudge opens or closes]\n  R --> L[nudge_event lifecycle log]\n  E --> C[Cohort counts + benchmarks recalculated]\n  L --> T[Nudge trend chart]\n  C --> D[Home KPIs + Population dashboard]\n  D --> DR[Click any figure → the patients behind it]\n  DR --> F[Open a patient file]\n  C --> S[Monthly de-identified summary → sponsor]\n```\n\n---\n\n# PART E — OPEN QUESTIONS, MADE ANSWERABLE (examples for the clinical team)\n\n## E1 — Enum localisation per site *(the concrete ask)*\nThe workbook ships **national default lists**. Each institution may need local values. Please fill in for the launch site:\n\n**RT Facility** — default list: *AIIMS New Delhi · Tata Memorial Centre · RGCI Delhi · Max Cancer Centre · Fortis · Govt. Regional Cancer Centre*\n| Your site's RT facilities (add/remove) |\n|---|\n| e.g. `SGPGI Lucknow — LINAC 1 (VMAT)` |\n| e.g. `SGPGI Lucknow — LINAC 2 (IMRT)` |\n| e.g. `Kalyan Singh Super Speciality Cancer Institute` |\n| ☐ *Or: keep the national list as-is* |\n\n**Referring Hospital / Centre** — default: *AIIMS New Delhi · Tata Memorial · CMC Vellore · PGIMER · RGCI · SGPGI · Government General Hospital · Private Urologist / Clinic*\n| Your site's real referrers |\n|---|\n| e.g. `District Hospital, Barabanki` · `District Hospital, Sitapur` |\n| e.g. `Balrampur Hospital, Lucknow` |\n| ☐ *Or: keep the national list* |\n\n**Healthcare Coverage** — the national schemes are fixed (PMJAY · CGHS · ESIC · Private · Self-pay), but the **State Scheme** name varies:\n| State | State-scheme name to display |\n|---|---|\n| Andhra Pradesh / Telangana | Aarogyasri |\n| Maharashtra | Mahatma Jyotiba Phule Jan Arogya Yojana |\n| Tamil Nadu | CM's Comprehensive Health Insurance Scheme |\n| Rajasthan | Chiranjeevi / Rajya Bima |\n| **Your state** | ______________________ |\n\n**Language preference** — trim the national list to what your site actually needs (e.g. UP site: Hindi, English, Urdu).\n**ADT formulations** — confirm locally stocked brands/doses (e.g. add `Triptorelin 22.5 mg (6-monthly)` if used).\n\n## E2 — Record lock durations *(B3b)*\nPick the scenario that matches your clinic:\n| Scenario | Suggested `EDIT_WINDOW` |\n|---|---|\n| Data entered **live in clinic**, corrected same session | **24 h** |\n| Entered by the clinician **later the same day / next morning** | **48 h** *(our default)* |\n| Batched entry by a registrar **within the week** | **72 h – 7 days** |\n\nAnd: **HOD unlock window** 24 h — enough to fix and re-save? Should a **Coordinator** also unlock? ☐ Yes ☐ No\n\n## E3 — Care-gap rule tuning *(B8)*\nFor each rule, confirm or amend:\n| Rule | Current condition | Amend to…? |\n|---|---|---|\n| `bone_scan_missing` | risk ∈ {High, Very High, M1} | e.g. also Intermediate-Unfavourable? |\n| `psma_missing` | risk ∈ {High, Very High} | e.g. include M1? |\n| `bone_protection_missing` | `= Not started` | should it fire **only if ADT ≥ 3 months**? |\n| `dexa_missing` | `= Not done` | only when on ADT? |\n| `arsi_readiness` | HSPC + High + not initiated | include Very High / M1? |\n| Benchmarks | ARSI 60% · PSMA 85% · Bone 85% · MDT 95% | confirm targets |\n\n> ⚠️ Worth deciding: in Part A the **bone-protection nudge fired before ADT started** (rule is state-only). If that's clinically noisy, add the `ADT ≥ 3 months` guard.\n\n## E4 — Suppression threshold *(B9)* — what it actually does\nWith threshold **11**: an institution reporting `psma_completion_rate` for High-risk in a month with only **6 eligible patients** → the cell is **suppressed** (numerator/denominator nulled). Lower threshold = more data to the sponsor, higher re-identification risk.\n☐ 5 ☐ **11 (default)** ☐ 20\n\n## E5 — Identity model *(B1)* — what a record looks like\n| Option | The patient row contains | Bedside \"who is this?\" |\n|---|---|---|\n| **A. De-identified** *(recommended)* | `PCR-001`, 68, CGHS, Delhi | Look up in the hospital HIS |\n| **B. Identified** | + name, ABHA, Aadhaar, phone (masked, audited reveal) | In ProstaCare |\n| **C. Hybrid** | de-identified core + isolated identity table, role-gated | In ProstaCare, for authorised roles |\n\n## E6 — Other quick confirmations\n- **B4 source of truth:** patients **created in ProstaCare** (v1) vs synced from HIS. If synced — what is the match key?\n- **P1-1 nudge ownership:** the patient's **primary clinician** ☐ or whoever is on shift ☐\n- **P1-4:** restrict *\"notify all MDT\"* to **HOD** ☐ or allow any clinician ☐\n- **O-AGG3/4 export:** **S3 push, nightly compute + monthly export** ☐ or weekly ☐\n\n---\n\n*Companion: `PROSTACARE_FUNCTIONAL_LOGIC_SPEC.md` (models + workflow pseudo-code), `FIELD_DICTIONARY.md` (all 108 fields + value lists), `DEV_START_GATE.md` (the full open-question list), `SIMPLIFICATION_REVIEW.md` (what we cut and why).*\n\n---\n\n# PART F — Every field in the workbook, and where it is captured\n\nAll **108** workbook fields mapped to their canonical entity and the journey stage that captures them. This is the completeness check: **every box in the data-entry pack has a home, and no record type holds a field nobody ever fills in.**\n\n\n### → (linkage key)  *( 6 fields )*\n\n| Field key | Label | Captured at |\n|---|---|---|\n| `patient_code` | Unique Patient Code | every record |\n| `patient_ y: Breast Ca (family) | S1 Clinical workup |\n| `family_history_3` | Family History: Ovarian cancer | S1 Clinical workup |\n| `family_history_4` | Family History: Colon cancer | S1 Clinical workup |\n| `family_history_5` | Family History: Pancreatic cancer | S1 Clinical workup |\n| `family_history_6` | Family History: None known | S1 Clinical workup |\n\n### → `treatment_plan` (1:1)  *( 5 fields )*\n\n| Field key | Label | Captured at |\n|---|---|---|\n| `treatment_intent` | Treatment Intent | S3 MDT review |\n| `mdt_tumour_board_status` | MDT / Tumour Board Status | S3 MDT review |\n| `date_of_mdt_review` | Date of MDT Review | S3 MDT review |\n| `clinical_trial_eligibility` | Clinical Trial Eligibility | S3 MDT review |\n| `treatment_start_date` | Treatment Start Date | S3 MDT review |\n\n### → `treatment_line` (1:N, `line_type`=ADT / anti-androgen / ARSI)  *( 6 fields )*\n\n| Field key | Label | Captured at |\n|---|---|---|\n| `adt_type` | ADT Type | S4 Treatment start |\n| `formulation_dose` | Formulation / Dose | S4 Treatment start |\n| `adt_start_date` | ADT Start Date | S4 Treatment start |\n| `anti_androgen` | Anti-androgen | S4 Treatment start |\n| `arsi_intensification` | ARSI Intensification | S4 Treatment start |\n| `testosterone_level` | Testosterone Level | S4 Treatment start |\n\n### → `treatment_line` (1:N, `line_type`=chemo)  *( 3 fields )*\n\n| Field key | Label | Captured at |\n|---|---|---|\n| `chemotherapy_regimen` | Chemotherapy Regimen | B2 Progression |\n| `number_of_cycles_completed` | Number of Cycles Completed | B2 Progression |\n| `last_cycle_date` | Last Cycle Date | B2 Progression |\n\n### → `treatment_line` (1:N, `line_type`=RT)  *( 11 fields )*\n\n| Field key | Label | Captured at |\n|---|---|---|\n| `rt_indication` | RT Indication | S5 RT plan → B2 RT completion |\n| `rt_status` | RT Status | S5 RT plan → B2 RT completion |\n| `rt_modality` | RT Modality | S5 RT plan → B2 RT completion |\n| `target_volume` | Target Volume | S5 RT pla on |\n| `crpc_progression_status` | CRPC Progression Status | B2 Follow-up / progression |\n| `crpc_progression_date` | CRPC Progression Date | B2 Follow-up / progression |\n| `rt_outcome_status` | RT Outcome Status | B2 Follow-up / progression |\n\n### → `psa_reading` (1:N dated)  *( 5 fields )*\n\n| Field key | Label | Captured at |\n|---|---|---|\n| `psa_date` | Date | S1 / B2 every PSA |\n| `psa_ng_ml` | PSA (ng/mL) | S1 / B2 every PSA |\n| `free_psa_pct` | Free PSA % | S1 / B2 every PSA |\n| `psa_density` | PSA Density | S1 / B2 every PSA |\n| `context_remarks` | Context / Remarks | S1 / B2 every PSA |\n\n### → `journey_event` (1:N dated)  *( 3 fields )*\n\n| Field key | Label | Captured at |\n|---|---|---|\n| `event_type` | Event Type | S5 / throughout |\n| `event_date` | Event Date | S5 / throughout |\n| `event_notes` | Notes | S5 / throughout |\n\n### → `document` (1:N)  *( 1 fields )*\n\n| Field key | Label | Captured at |\n|---|---|---|\n| `rx_upload` | Prescription / Rx Upload | Rx upload (any stage) |\n\n### Key transformations (workbook column → canonical entity)\n| Workbook shape | Canonical shape | Why |\n|---|---|---|\n| 6 imaging columns (`mpmri_pelvis`, `bone_scan_spect`, `psma_pet_ct`, `ct_abdomen_pelvis`, `dexa_bone_density`, `germline_somatic_testing`) | **`imaging_study` rows** (`study_date`, `modality`, `result`) | gives each study a date; \"Not done\" = **no row** |\n| `adt_type` + `formulation_dose` + `adt_start_date` + `anti_androgen` + `arsi_intensification` | **`treatment_line` rows** (`line_type` = ADT / anti-androgen / ARSI) | therapy is sequential |\n| `chemotherapy_regimen` + `number_of_cycles_completed` + `last_cycle_date` | **`treatment_line`** (`line_type` = chemo) | same |\n| All `rt_*` + `cghs_*` fields | **`treatment_line`** (`line_type` = RT) | RT is a line with approval metadata |\n| TNM + risk + ECOG + castration | **`staging_assessment` rows** (dated) | restaging & HSPC→CRPC are dated facts |\n| Bone health + supportive fields | **`supportive_care_event` rows** (dated) | bone-protection start/stop needs an audit trail |\n| 9 comorbidity + 6 family-history columns | **boolean flags on `pathology`** | fixed list; kept exactly as the workbook/UI |\n| `diagnosis_date` (Clinical_Entry) | **moved to `patient`** | it is a patient-level fact |\n\n---\n\n# PART H — Every screen and widget, and the data behind it\n\nThis is the completeness check for the **user interface**: every surface and every widget in the product, and which record type or calculated figure supplies it. If a widget had no data source, it could never be built — none do.\n\n\n## H1 · The product surfaces\n\n| Surface | Its job | Data behind it |\n|---|---|---|\n| **Home** | Start-of-day command centre | `app_user` / `audit_event` |\n| **Patient List** | Operational roster and search | — |\n| **Patient File Shell** | Single-patient command centre | — |\n| **Patient File · Nudges & Alerts** | Make missing steps visible | — |\n| **Patient File · Demographics** | Capture de-identified registry and access context | `patient` |\n| **Visit-wise entry** |  | — |\n| **Patient File · Clinical Assessment** | Capture disease workup and current state | `psa_reading` (dated) |\n| **Patient File · Treatment Plan** | Capture intent and active management | `treatment_line` / `treatment_plan` |\n| **Patient File · Patient Journey** | Show the whole case longitudinally | `journey_event` (dated) |\n| **Team Discussion / Nudge Modal** | Close the loop across the MDT | `nudge_event` (lifecycle log) |\n| **Guidelines Surface** | Keep guideline context close to the case | — |\n| **Population Dashboard** | Read the department or site as a living cohort | — |\n| **AI Buddy** | Guided, stepwise pathway review | ⏸ **AI Buddy — Phase 2** |\n\n## H2 · Home screen widgets\n\n| Widget | What it shows | Data behind it |\n|---|---|---|\n| Doctor welcome + cohort chips | Doctor identity, role, department, hospital, cohort count, active care-gap count | `app_us | `app_user` / `audit_event` |\n| Incomplete records — data entry pending | Patients missing key fields | derived (see §3.5 of Types·Enums·Derived) |\n\n## H3 · Population dashboard widgets\n\n| Section | Chart / KPI | Data behind it | Drill-down |\n|---|---|---|---|\n| Overview | Sidebar snapshot | `nudge` + `nudge_event` | Persistent sidebar state |\n| Overview | Total Patients / High-VH Risk / Median PSA / Active ADT / Protocol Score | `patient` | No chart drilldown; section-level anchors |\n| Overview | Monthly registrations + cumulative cohort | `patient` | Click month to patient list |\n| Overview | Risk distribution | `staging_assessment` (latest) | Click segment to patient list |\n| Overview | Age at diagnosis | `patient` | Click bar to patient list |\n| Overview | Healthcare coverage | `patient` | Legend-only in demo |\n| Overview | Stage at presentation | `staging_assessment` (latest) | Click bar to patient list |\n| Clinical | PSA at diagnosis — distribution | `psa_reading` (dated) | Click band to patient list |\n| Clinical | PSA trend — cohort median + percentile bands | `psa_reading` (dated) | No patient-level drill in demo |\n| Clinical | Gleason / ISUP grade | `pathology` | Click grade to patient list |\n| Clinical | PSA density distribution | `psa_reading` (dated) | No explicit drilldown label in UI |\n| Clinical | Free PSA % — diagnostic distribution | `psa_reading` (dated) | No explicit drilldown label in UI |\n| Clinical | Comorbidity burden across cohort | `pathology` / `staging_assessment` | Click condition to patient list |\n| Clinical | PSA x Gleason heatmap | `psa_reading` (dated) | Visual scan only in demo |\n| Treatment | On ADT / RT Completed-Active / ARSI Intensified / Active Surveillance / CGHS Approval Pending | `pathology` / `staging_assessment` | No explicit drilldown |\n| Treatment | Treatment pathway — patient flow funnel | — | Visual pathway only |\n| Treatment | ADT landscape | `treatment_line` (dated) | No explicit drilldown label in UI |\n| Treatment | RT distribution | `treatment_line` (dated) | Legend-driven |\n| Treatment | ARSI intensification landscape | `treatment_line` (dated) | No explicit drilldown label in UI |\n| Treatment | ADT duration distribution | `treatment_line` (dated) | No explicit drilldown label in UI |\n| Outcomes | Outcome headline cards | `psa_reading` (dated) | No drilldown in the cards |\n| Outcomes | PSA response over time — stratified by treatment | `psa_reading` (dated) | Click line point to patient set |\n| Outcomes | BCR-free survival — Kaplan-Meier by risk group | `outcome` | No direct chart drill documented |\n| Outcomes | Time to PSA nadir | `outcome` | Click bar to patient list |\n| Outcomes | PSA doubling time distribution | `outcome` | Click bar to patient list |\n| Outcomes | Treatment outcome by RT fractionation | `outcome` | No explicit drilldown label in UI |\n| Outcomes | Time from diagnosis to treatment start | `pathology` / `staging_assessment` | Click bar to patient list |\n| Outcomes | PSA response at 6 months — ADT+ARSI vs ADT alone | `psa_reading` (dated) | Click bar to patient list |\n| Quality | Nudges trend analysis | `nudge_event` (lifecycle log) | Section-level drill into quality workflow |\n| Quality | Protocol adherence — cohort vs NCCN benchmark | `nudge` + `nudge_event` | No patient-level drill documented |\n| Quality | Top care gaps — patients affected | `nudge` + `nudge_event` | Visual ranking |\n| Quality | CGHS pre-auth delay — time to approval | `treatment_line` (dated) | No explicit drilldown label in UI |\n| Quality | Bone health gap — ADT cohort | `nudge` + `nudge_event` | Click donut segment to patient list |\n| Quality | Data completeness by field group | — | No explicit drilldown label in UI |\n| Quality | MDT review rate — monthly trend | `treatment_plan` | Click point to patient list |\n| Demographics | Patients by state of origin | `patient` | Visual ranking only |\n| Demographics | Coverage by state | `patient` | No explicit drilldown label in UI |\n| Demographics | Referral source | `patient` | Legend-driven |\n| Demographics | Travel distance to centre | `patient` | No explicit drilldown label in UI |\n| Demographics | Language preference | `patient` | No explicit drilldown label in UI |\n| Demographics | Comorbidity co-occurrence — top pairs | `pathology` / `staging_assessment` | No explicit drilldown label in UI |\n| Demographics | ECOG performance status | `staging_assessment` (latest) | Click donut segment to patient list |"}, {"title": "🩺 Clinical Pathway Gaps", "file": "CLINICAL_PATHWAY_GAP_ANALYSIS.md", "md": "# ProstaCare — Clinical Pathway vs Our Data Model: Gap Analysis\n\n> **Who this is for:** clinical, business and legal teams. **No technical background needed.**\n> Terms are explained in the glossary at the top of `PROSTACARE_FUNCTIONAL_LOGIC_SPEC.md` §0.\n\n**What this is:** the prostate-cancer MDT care pathway (NCCN/EAU, adapted for India) names exactly what a registry must capture. We checked our data model against it, panel by panel. **We found 11 gaps** — one of which reverses an earlier simplification decision.\n\n---\n\n## 1. Registration gap — confirmed ❌\n\nThe demo patient file captured **Religion · Marital Status · Occupation · Education**. The V2 workbook (`Demographics_Entry`) captures **none of them** — verified: 0 of 108 fields.\n\nThe pathway's first registry capture point is **\"Patient demographics & risk factors.\"** So these are not optional nice-to-haves; they are the demographic base of the registry.\n\n**Proposed additions to `patient` (Registration screen):**\n\n| Field key | Label | Type | Suggested options |\n|---|---|---|---|\n| `religion` | Religion | dropdown | Hindu · Muslim · Christian · Sikh · Buddhist · Jain · Other · Prefer not to say |\n| `marital_status` | Marital Status | dropdown | Married · Unmarried · Widowed · Divorced / Separated |\n| `education_level` | Education | dropdown | No formal education · Primary · Secondary · Higher secondary · Graduate · Post-graduate |\n| `occupation` | Occupation | dropdown | Agriculture · Labour · Service / Salaried · Business / Self-employed · Retired · Unemployed · Other |\n| `tobacco_use` *(risk factor)* | Tobacco Use | dropdown | Never · Former · Current |\n| `family_history_prostate` | already exists (`family_history_1`) | — | — |\n\n> ❓ **Clinical question:** the pathway says *\"demographics **& risk factors**\"*. Beyond family history, which risk factors do you want — tobacco, BMI, ethnicity? *(Our proposal: tobacco only, for v1.)*\n\n---\n\n## 2. Pathway → model gap matrix\n\n| # | The pathway requires | We capture today | Verdict |\n|---|---|---|---|\n| **G-a** | Patient demographics **& risk factors** | age, coverage, geography, language, referral | ❌ **Gap** — religion, marital, education, occupation, tobacco (§1) |\n| **G-b** | **Labs: CBC, RFT, LFT, ALP, Testosterone** (serial, and 6-weekly on Pluvicto) | PSA only (`psa_reading`); testosterone as a single text box | ❌ **Gap** — no general lab record. **Proposal:** generalise to a `lab_result` record (test name · value · unit · date), with PSA as one test type. |\n| **G-c** | **Surgery** (radical prostatectomy) as a treatment option | `treatment_line` types = ADT · anti-androgen · ARSI · chemo · RT. Orchidectomy sits oddly inside `adt_type`. `rt_indication` even offers *\"Salvage RT (post-RP)\"* — implying a prostatectomy we never recorded | ❌ **Gap** — add `line_type = surgery` (radical prostatectomy, orchidectomy, TURP) |\n| **G-d** | **Radioligand therapy — Pluvicto (Lu-177 PSMA)**: cycles, dose, adverse events. Also **Radium-223** | Nothing | ❌ **Major gap** — an entire treatment modality, and an explicit registry capture point |\n| **G-e** | **Adverse events & toxicity** (structured) | one free-text box (`safety_side_effects`) | ❌ **Gap** — free text cannot be counted or reported. **Proposal:** `adverse_event` record (term · CTCAE grade 1–5 · onset date · action taken · related line) |\n| **G-f** | **Outcomes: PFS, OS, QoL, bone events** | BCR, CRPC progression, PSA nadir, PSADT, RT outcome | ❌ **Major gap** — **no vital status / date of death**, so **Overall Survival cannot be computed at all**. No QoL instrument. No skeletal-related events. |\n| **G-g** | **Resource utilisation** (hospitalisations, ER visits) | `journey_event` has a *Hospital Admission* type | ⚠️ **Partial** — countable only if entered consistently; no ER-visit type |\n| **G-h** | **Follow-up schedule by disease state** (curative q3–6m → mHSPC q3m → mCRPC q1–3m → Pluvicto q6w → survivors annual) | a single `next_follow_up_psa_date` | ❌ **Gap** — and it **reverses a simplification** (see §4) |\n| **G-i** | **Response assessment (PSA *and* imaging)** | PSA response + `best_response` | ⚠️ **Partial** — no imaging-response record (PCWG3/RECIST) |\n| **G-j** | **Support services**: nursing, dietician, physiotherapy, psychology, social work, **genetic counselling** | PHQ-9 + nutritional assessment | ⚠️ **Partial** — no referral record for physio / social work / genetic counselling |\n| **G-k** | **Key investigations**: PSA, DRE, mpMRI, fusion biopsy, histopath, PSMA PET, CT C/A/P, bone scan, germline (BRCA1/2, **ATM**) | all present except **CT *chest*** and the ATM gene | ✅ **Near-complete** — minor: `ct_abdomen_pelvis` should read *CT Chest/Abdomen/Pelvis*; germline list should include ATM |\n\n**Naming note:** the pathway says **ARPI** (Androgen Receptor Pathway Inhibitor); our schema says **ARSI**. Same class of drug — we should adopt one term. *(Recommend ARPI, matching the pathway.)*\n\n---\n\n## 3. Proposed model additions\n\n| New / changed | Shape | Why |\n|---|---|---|\n| `patient` + 5 fields | religion, marital status, education, occupation, tobacco | §1 |\n| **`lab_result`** (new, dated, many) | `test_name` (PSA · CBC · RFT · LFT · ALP · Testosterone) · `value` · `unit` · `date` | G-b. **`psa_reading` becomes a view over this**, so the PSA chart is unaffected |\n| `treatment_line.line_type` + values | `surgery` · `radioligand` (Pluvicto Lu-177, Radium-223) | G-c, G-d |\n| `treatment_line` + fields | `cycles_completed`, `dose`, for radioligand & chemo | G-d |\n| **`adverse_event`** (new, dated, many) | `term` · `ctcae_grade` · `onset_date` · `action_taken` · `related_line` | G-e |\n| `outcome` + fields | **`vital_status`** (Alive / Died) · **`date_of_death`** · `cause_of_death` · `progression_free_date` | G-f — **required for Overall Survival & PFS** |\n| **`bone_event`** (new, dated) | skeletal-related event: fracture · cord compression · bone RT · bone surgery | G-f |\n| **`qol_assessment`** (new, dated) | instrument (EQ-5D / FACT-P) · score · date | G-f |\n| **`healthcare_contact`** (new, dated) | type: hospitalisation · ER visit · day-care · length of stay | G-g |\n| **`follow_up_plan`** | protocol interval derived from disease state (see §4) | G-h |\n| `imaging_study` + `response` field | PCWG3 / RECIST response at that study | G-i |\n| **`referral`** (new, dated) | service: dietician · physiotherapy · psychology · social work · genetic counselling · palliative | G-j |\n| `ct_abdomen_pelvis` → relabel | *CT Chest / Abdomen / Pelvis* | G-k |\n| `germlineSomaticTesting` + option | `ATM mutation` | G-k |\n\n---\n\n## 4. ⚠️ This reverses one of our simplifications (T9)\n\nWe previously cut the nightly scheduled check, arguing **\"all 8 rules are state-based, not time-based — they only change when someone saves.\"** That was true of the 8 rules **as written**.\n\nThe pathway introduces a rule that **is** time-based:\n\n```\nFollow-up interval by disease state:\n   After curative treatment → PSA every 3–6 months for 2 years, then 6–12 monthly\n   mHSPC                    → every 3 months\n   mCRPC                    → every 1–3 months\n   On Pluvicto              → every 6 weeks (CBC, RFT, LFT, PSA)\n   Long-term survivors      → annual review (comorbidities, bone health, QoL)\n\nRule:  IF today > last_follow_up_date + protocol_interval(disease_state)\n       THEN raise \"Follow-up overdue\" nudge\n```\nThis gap opens **because time passes**, not because anyone saved a record. So **a scheduled (nightly) check is required after all.**\n\n✅ **Correction to `SIMPLIFICATION_REVIEW.md` T9:** keep the on-save check for the 8 state-based rules, **and add a nightly check** for follow-up-interval adherence. This also unlocks the \"Missed / Overdue\" patient-list segment properly.\n\n---\n\n## 5. A governance note (factual)\n\nThe pathway's registry capture points explicitly include **\"Pluvicto therapy details (cycles, dose, AEs)\"**. Pluvicto (Lu-177 PSMA-617) is a **Novartis** product. This corroborates the sponsor inference in `DEV_START_GATE.md` **B7**, and sharpens the point already raised there:\n\n> If the sponsor's own therapy is a named registry capture point, the **independent clinical governance of the care-gap rules** (who may add or amend a rule, and their independence from the sponsor) must be settled **before** build. Capturing the data is entirely legitimate; the control that matters is **who decides what the system nudges clinicians to do.**\n\n---\n\n## 6. Questions for the clinical team\n\n1. **Registration (§1):** confirm religion / marital status / education / occupation, and which **risk factors** beyond family history (tobacco? BMI? ethnicity?).\n2. **Labs (G-b):** confirm the panel to capture serially — CBC, RFT, LFT, ALP, Testosterone. Any others (Hb, PSMA SUV)?\n3. **Outcomes (G-f):** confirm we capture **vital status + date of death** (without it there is no Overall Survival). Which **QoL instrument** — EQ-5D or FACT-P? Which **bone events**?\n4. **Adverse events (G-e):** structured CTCAE grading, or free text as today?\n5. **Radioligand (G-d):** confirm Pluvicto + Radium-223 capture (cycles, dose, AEs) is in v1 scope.\n6. **Surgery (G-c):** confirm radical prostatectomy is recorded as a treatment line.\n7. **Follow-up (G-h/§4):** confirm the protocol intervals above, so the \"overdue\" nudge can be built.\n8. **Terminology:** adopt **ARPI** (pathway) in place of ARSI?\n9. **Support services (G-j):** capture referrals to dietician / physio / psychology / social work / genetic counselling?\n\n---\n\n*Source: the prostate-cancer MDT care pathway (NCCN/EAU, adapted for India) supplied by the client; checked against `ProstaCare_Schema_08072026_V2.xlsx` and our canonical model.*\n"}, {"title": "✂ Simplification Review", "file": "SIMPLIFICATION_REVIEW.md", "md": "# ProstaCare — Simplification Review (are we over-building?)\n\n> **Who this is for:** clinical, business and legal teams. **No technical background needed.**\n> Any unfamiliar term (*tenant, derived, one-to-one, aggregate…*) is explained in the glossary at the top of\n> **`PROSTACARE_FUNCTIONAL_LOGIC_SPEC.md` §0 — Plain-English glossary**.\n\n\n**What this is:** we checked every feature we had designed against what the agreed requirements actually ask for — `FUNCTIONAL_REQUIREMENTS.md` (with its Must / Should / **Future** priorities), `PRD.md`, `SCOPE.md`, `ProstaCare_Nudge_Logic_Handoff.md`, and the V2 workbook. If nothing requires it, it is a candidate to cut or defer.\n\n**Headline:** we had designed **13 things nobody asked for**. Removing them makes the first release smaller, faster and easier to use — **without losing anything the requirements ask for.**\n\n**What this means for the clinical team, in one line each:**\n- **Nudges will have no \"snooze\" and no \"dismiss\" button.** If a step genuinely doesn't apply, you record that in the field itself (*\"Not indicated\"*, *\"Not applicable\"*) and the nudge simply never appears.\n- **AI Buddy is postponed** to a later release — it isn't in the agreed requirements, and it's the single biggest piece of work.\n- **Three roles, not five:** Clinician, HOD (extra powers), Admin.\n- **Comorbidities stay as the familiar Yes/No tick-boxes.**\n- **The system checks the rules when you press Save** — *plus* a nightly check for follow-up appointments that have fallen overdue.\n\n---\n\n## 1. Evidence from the requirement docs\n\n| Check | Result |\n|---|---|\n| \"AI Buddy\" in FR / PRD / SCOPE | **0 mentions** (exists only in the newer workbook) |\n| \"snooze\" / \"SLA\" / \"escalation\" / \"encounter\" in FR / Nudge Handoff | **0 mentions** |\n| FR items explicitly marked **Future** | production auth, cross-device persistence, **rules governance**, real email/messaging, secure doc storage, guideline content governance, audit logs, encryption |\n| Nudge lifecycle in the Handoff | open → (acknowledge routes to team) → **auto-resolves when the source field changes**. No dismiss, no snooze. |\n\n---\n\n## 2. The 13 trims\n\n| # | We specified | Required by? | Verdict | Simpler path |\n|---|---|---|---|---|\n| **T1** | **Nudge `snooze`** | Nothing | ❌ **Cut** | Not in demo, FR, or Handoff. Drop entirely. |\n| **T2** | **Nudge `dismissed` state** | Nothing | ❌ **Cut** | Clinical non-applicability is **already expressed in the data**: `bone_protection = \"Not indicated\"`, `mdt_status = \"Not applicable\"`, `germline = \"Pending\"`. The rules simply don't fire. No dismiss action needed. *(Cheap to add later if clinicians ask.)* |\n| **T3** | **SLA / escalation** for unactioned urgent nudges | Nothing | ⏸ **Defer** | No requirement. Add when clinicians ask for it. |\n| **T4** | **`encounter` entity** (even optional) | Nothing | ⏸ **Defer** | Visit timing already comes from `next_follow_up_psa_date` + `last_follow_up_date`. Don't build it in v1; document as future (HIS appointment sync). |\n| **T5** | **Splitting big tables into date-partitions** (a database speed trick) | Nothing | ❌ **Cut** | Pointless at a few hundred patients, and it introduces awkward side-effects. Revisit only at very large scale. |\n| **T6** | **`patient_condition`** normalized table (+ import transform) | Nothing | ❌ **Cut** | The workbook and the UI both use **Yes/No flag columns** (9 comorbidities, 6 family-history). Keep them as boolean columns. Removes an entity **and** gap **G6** (the pivot transform). The list is fixed; the comorbidity/pair charts are trivial SQL over booleans. |\n| **T7** | **`mdt_panel` / `mdt_panel_member` table** | Nothing | ❌ **Cut** | Since MDT is only a *notification group* (no access implication), make it a boolean **`user.is_mdt_member`**. One less table and join. |\n| **T8** | **5 roles** (Clinician, HOD, Coordinator, Ops/Quality, Admin) | FR implies few | ✂️ **Trim to 3** | **Clinician · HOD (privileged) · Admin.** Coordinator = a Clinician. Add **Ops/Quality** only if in-product de-identified dashboards are needed (sponsor reads Data Cloud anyway). |\n| **T9** | Checking the rules **both when you save *and* every night** | ⚠️ **REVERSED** | ↩️ **Restored** | The 8 original rules are state-based, so on-save was sufficient. **But the clinical care pathway adds a follow-up-interval rule** (*\"PSA every 3 months in mHSPC\"*) that fires **because time passes**, not because anyone saved. **A nightly check is required after all.** See `CLINICAL_PATHWAY_GAP_ANALYSIS.md` §4. |\n| **T10** | `nudge_event` actions: opened / **viewed** / acted / **routed** / resolved | FR-022 (Should) | ✂️ **Trim to 3** | Keep **opened · acknowledged · resolved** (enough for the trend chart and audit). \"Viewed\" is per-user telemetry; \"routed\" is inferable from the `notification` row. |\n| **T11** | Notifications: in-app inbox **+ SES email + live SSE push + task creation + digest** | FR-070..075 (Must/Should), FR-076 (Future) | ✂️ **Trim** | v1 = **SES email + a simple in-app notification list**. Drop live SSE push, auto-task creation, and the digest scheduler. |\n| **T12** | **AI Buddy** (ADK agent, 4 lenses, `evidence_pack` / `guideline_pack`) | **0 mentions in FR/PRD/SCOPE** | ⏸ **Defer to Phase 2** | The largest single build in the spec, required by nothing in the agreed requirements. Ship the registry + care-gap engine + dashboards first. |\n| **T13** | **Rule-builder UI + versioned sign-off workflow** | FR-064 = **Future** | ✂️ **Trim** | Seed the 8 rules as config (`guideline_rule`: rule_id, severity, next_step, active, version). Edit via admin/JSON. **No rule-editor UI in v1.** |\n\n---\n\n## 3. What we keep (and why)\n\n| Kept | Justification |\n|---|---|\n| **Dated `staging_assessment`** | Restaging + HSPC→CRPC drives the ARSI rule. Overwriting loses the transition. Non-negotiable. |\n| **Dated `treatment_line`** | Therapy is sequential (ADT → ARSI → chemo → RT). One row can't express it. |\n| **Dated `imaging_study`** | Same shape as `psa_reading`; gives study dates the monthly sponsor metrics need. Cheap. |\n| **Dated `supportive_care_event`** | Bone protection is the largest care gap; start/stop needs an audit trail. |\n| **`nudge` + `nudge_event`** | The trend chart (FR-022) and closure audit are impossible from snapshot rows — the workbook says so itself. |\n| **Record lock + HOD unlock** | Explicitly requested. Kept as **one** mechanism (no separate amendment/void concept). |\n| **`sponsor_metric` + Data Cloud** | Explicitly requested; the only cross-tenant path. |\n| **4 × 1:1 tables** (patient, pathology, treatment_plan, outcome) | They map 1:1 to the four entry screens and to the **completeness-by-field-group** requirement. Not folded into one wide table. |\n\n---\n\n## 4. The simplified v1 model\n\n**Record types (down from ~22 to ~15):**\n```\nConfig/users : app_user (role, email, is_mdt_member) · guideline_rule\n1:1 per pt   : patient · pathology (+comorbidity/family flags) · treatment_plan · outcome\n1:N dated    : psa_reading · staging_assessment · imaging_study ·\n               treatment_line · supportive_care_event · journey_event\nSystem       : nudge · nudge_event · notification/discussion_entry · document · audit_event\nDerived      : current_state · dashboards · sponsor_metric\n```\n**Removed from v1:** `department`, `care_team_member`, `mdt_panel`, `patient_condition`, `encounter`, `evidence_pack`, `guideline_pack`, partitioning, the daily cron, snooze, dismiss, SLA/escalation, SSE push, digest, rule-builder UI, AI Buddy.\n\n**Simplified nudge lifecycle:**\n```mermaid\nstateDiagram-v2\n  [*] --> Open : rule fires (on write)\n  Open --> Acknowledged : clinician acknowledges → routes to MDT\n  Open --> Resolved : source field changes → rule stops firing (auto)\n  Acknowledged --> Resolved : source field changes (auto)\n  Resolved --> Open : condition recurs\n  Resolved --> [*]\n```\n*(No Dismissed. No Snoozed. Resolution is data-driven — exactly what the Nudge Handoff describes.)*\n\n---\n\n## 5. Impact\n\n| Benefit | Detail |\n|---|---|\n| **Fewer moving parts** | −7 record types, −2 nudge states, −1 partition scheme, −1 import transform *(the nightly job is restored — see T9)* |\n| **Gaps closed for free** | **G5** (partition PK/lookback) and **G6** (flag→row transform) disappear entirely |\n| **Smaller v1 scope** | AI Buddy (the biggest subsystem) moves to Phase 2 |\n| **Fewer client questions** | T3/T4/T12 remove three items from the dev-start gate |\n| **Nothing lost** | Every trim is unsupported by FR / PRD / SCOPE / Handoff |\n\n---\n\n## 6. Recommended phasing after the trim\n\n| Phase | Scope |\n|---|---|\n| **P0** | Tenancy + roles (3) + patient hub + 1:1 entities + record lock |\n| **P1** | Dated tiers (PSA, staging, imaging, treatment lines, supportive care, journey) |\n| **P2** | Care-gap engine (8 rules, on-write) + nudge lifecycle + MDT notify (SES) |\n| **P3** | Dashboards + `sponsor_metric` + Data Cloud pipeline |\n| **P4** | *(later)* AI Buddy, encounter/HIS sync, SLA/escalation, rule-editor UI, partitioning |\n\n---\n\n## 7. Ask the client to confirm the cuts\n1. **Nudge lifecycle** = open → acknowledged → auto-resolve. **No snooze, no dismiss** — non-applicability is captured in the field value (\"Not indicated\" / \"Not applicable\"). OK?\n2. **AI Buddy deferred to Phase 2** (absent from the agreed functional requirements). OK?\n3. **Roles = Clinician · HOD · Admin** (Coordinator folded into Clinician). OK?\n4. **No SLA/escalation, no encounter** in v1. OK?\n5. Comorbidity/family history stay as **Yes/No flags** (as in the workbook/UI). OK?\n\n---\n\n*Cross-checked against: `FUNCTIONAL_REQUIREMENTS.md` (Must/Should/Future), `PRD.md`, `SCOPE.md`, `ProstaCare_Nudge_Logic_Handoff.md`, `ProstaCare_Schema_08072026_V2.xlsx`.*\n"}, {"title": "Functional & Logic Spec", "file": "PROSTACARE_FUNCTIONAL_LOGIC_SPEC.md", "md": "# ProstaCare — Functional & Logic Specification (Clinical Sign-off Draft)\n\n**Who this is for:** the clinical team, product owners, and engineers — together. It describes, in plain language plus pseudo-code, **what data we capture, how the data relates, and how every workflow runs** (inputs → logic → outputs → derived data). It is written to be **signed off at the pseudo-code level** before build.\n\n**How to read it:**\n- **§1 Data models** — what we capture about each thing, its variables, an example, and how it links to others.\n- **§2 The one core idea** — \"current state\" vs \"history,\" with a worked example.\n- **§3 Workflows** — each flow as a visual diagram + inputs/logic/outputs pseudo-code.\n- **§4 Care-gap rules** — the 8 rules in full, with a worked patient example.\n- **§5 Derived data** — every computed number and its formula.\n- **§6 Visual master flow** + **§7 sign-off checklist**.\n\n> Naming note: field keys (e.g. `psma_pet_ct`) match the workbook `Field_Dictionary` exactly, so this spec and the data-entry pack stay in lockstep.\n\n---\n\n## 0. Plain-English glossary (read this first)\n\nThis document is written for **clinicians and engineers together**. Wherever a technical word appears, here is what it actually means.\n\n| Term you'll see | What it means, plainly |\n|---|---|\n| **Record type** (also \"entity\" / \"data model\") | A *kind* of information we store — a PSA reading, a staging assessment, a treatment line |\n| **Cardinality** | Simply: **how many of these a patient can have** |\n| **1:1 (\"one-to-one\")** | The patient has **exactly one** — e.g. one demographics record, one biopsy record |\n| **1:N (\"one-to-many\")** | The patient can have **many**, each with its own date — e.g. many PSA readings over time |\n| **Dated log / \"append-only\"** | Each time something changes we **add a new dated entry**; we never overwrite the old one. History is preserved. |\n| **Current state** | The **most recent** dated entry — the patient's status *today* |\n| **Derived / calculated** | A number the system **works out by itself** from what you entered. Never typed by hand. |\n| **Fixed list of choices** (technically an \"enum\") | A dropdown where only the listed options are allowed — e.g. *Not done · Done — abnormal · Done — normal* |\n| **A rule \"fires\"** | The system spots a care gap and raises a nudge |\n| **Auto-resolve** | The nudge closes **by itself** once the underlying field changes. Nobody clicks \"done\". |\n| **Trigger** | The moment the system runs something — nearly always *\"when you press Save\"* |\n| **Audit trail** | A permanent record of who changed what, and when |\n| **Record lock** | After an editing window, a saved record becomes read-only (the HOD can reopen it briefly) |\n| **Tenant** | One hospital's own separate, isolated copy of the system |\n| **De-identified** | No name, no ABHA/Aadhaar, no phone — only a patient code |\n| **Aggregate** | A summary count or percentage across many patients — never one person's data |\n| **Pseudo-code** | A step-by-step recipe of the logic, written so engineers build exactly what you signed off. **You do not need to read the code blocks** — each one has a plain-English summary above it. |\n\n**The single most useful idea in this document:**\n> *One-to-one* means the fact can only be true once at a time — a patient has **one treatment plan**.\n> *One-to-many* means the fact repeats over time — a patient has **many treatment lines** (first ADT, later ARSI, later chemotherapy).\n> Getting this right is what stops duplicate and contradictory records.\n\n---\n\n## 1. What the platform captures\n\n\nEach box below is one **record type**. The \"How many per patient\" column tells you whether a patient has exactly one of these, or many dated entries over time.\n\n### 1.1 Who uses it (roles) — *simplified: no department*\n> **Tenant = institution.** Each onboarded hospital is its own tenant, so **no `institution_id` is stored**. There is **no `department` entity**: all clinical users see that institution's patients, and access differs by **role**, not by department. \"Teams\" (the MDT panel) are a **notification group, not an access boundary**. Cross-*institution* reporting is a separate **de-identified aggregation layer above tenants**.\n\n| Record type | How many per patient | What it holds | Plain meaning |\n|---|---|---|---|\n| **User** | many per tenant | `user_id`, name, **`email` (login identity)**, specialty, `role` | Anyone who logs in |\n| **Role** | config | **Clinician · HOD (privileged) · Admin** *(Ops/Quality optional)* | What you may do |\n| **MDT membership** | flag on User | `is_mdt_member` (boolean) | The \"notify all MDT\" group — **no access implication, no separate table** |\n| **Primary clinician** | 1 per patient | `patient.primary_clinician_id` | The treating clinician (attribution, not restriction) |\n\n**Access by role (the whole model):**\n| Role | Sees | May do |\n|---|---|---|\n| **Clinician** | all patients in the institution | enter/edit clinical data **within the edit window** (§1.8); act on nudges; notify a member |\n| **HOD** | all patients | everything a Clinician can **+ privileged:** **unlock a locked record** (time-bound), notify all MDT, view audit, manage roster/MDT flags |\n| **Ops / Quality** | **de-identified aggregates only** | dashboards; no patient records |\n| **Admin** | no clinical data | users, roles, rules, config |\n\n### 1.2 The patient and their current clinical state\n*(exactly one of each per patient)*\n| Record type | How many per patient | What it holds | Example |\n|---|---|---|---|\n| **Patient** (hub) | 1 per patient | `patient_code`, `age_at_diagnosis_years`, `healthcare_coverage`, `state`, `referral_source`, `registry_enrolment_date`, `diagnosis_date` | `PCR-001`, 68, CGHS, Delhi, Govt OPD |\n| **Pathology** | 1 per patient | `gleason_score`, `isup_grade_group`, `biopsy_type`, `pi_rads_score`, `cores_positive_total`, `perineural_invasion`, `ece`, `dre_findings`, `ipss_score`, `prostate_volume_cc` | Gleason 4+4=8, ISUP 4, MRI-fusion |\n| **Comorbidity / family history** | **flags on Pathology** | 9 comorbidity + 6 family-history Yes/No columns | Diabetes = Yes; Breast Ca (family) = Yes *(no separate table)* |\n| **Treatment plan** | 1 per patient | `treatment_intent`, `mdt_tumour_board_status`, `date_of_mdt_review`, `clinical_trial_eligibility`, `treatment_start_date` | Disease control; MDT reviewed 2026-06-20 |\n| **Outcome** | 1 per patient | `best_response`, `psa_nadir_value/date`, `psa_doubling_time_months`, `biochemical_recurrence_status/date`, `crpc_progression_status/date`, `rt_outcome_status` | Nadir 0.8 @ 2026-05, no recurrence |\n\n### 1.3 The dated histories — *many entries per patient, never overwritten*\n| Record type | How many per patient | What it holds | Why we keep a dated history instead of one box |\n|---|---|---|---|\n| **PSA reading** | many (dated) | `psa_date`, `psa_ng_ml`, `free_psa_pct`, `psa_density`, `context_remarks` | PSA moves over time; drives the trend chart |\n| **Staging assessment** | many (dated) | `assessed_on`, `clinical_t_stage`, `n_stage`, `m_stage`, `eau_risk_category`, `ecog_performance_status`, `castration_status` | Restaging & HSPC→CRPC are dated facts, not overwrites |\n| **Imaging study** | many (dated) | `study_date`, `modality` (mpMRI/bone scan/PSMA/CT/DEXA/germline), `result` | \"Is PSMA done, and how recently\" is time-sensitive |\n| **Treatment line** | many (dated) | `line_type` (ADT/anti-androgen/ARSI
