ging become dated events. |\n| `PSA_History` | `psa_reading` | Structurally correct already; partition on date; **the Patient-File chart binds to this table** (closes the decoupled-chart bug). |\n| `Treatment_Entry` | `treatment_line` (1:N dated, **NEW**) + `treatment_plan` (1:1 header) + `supportive_care_event` (1:N dated) | One mashed row ‚Üí dated therapy lines + a small current-state header + dated supportive care. |\n| `Outcomes_Entry` | `outcome` (1:1, milestone dates inline) | Keep 1:1; milestone dates already present. |\n| `Journey_Events` | `journey_event` | Keep. Role narrows to milestone narrative (staging/treatment now have their own history). Wire the \"Add to Timeline\" action. |\n| `Care_Gap_Tracker` | `nudge` + `nudge_event` (**NEW**) + derived read-model | Flag sheet ‚Üí lifecycle. All counts/severity become **derived** over `nudge`. |\n| `Home_/Population_Dashboard`, `Dashboard_Derived`, `Dashboard_Coverage` | Tier-3 materialized views | Inventory ‚Üí mat-view specs (¬ß7). |\n| *(none)* | `app_user` (+`is_mdt_member`), `role`, `notification`/`discussion_entry`, `document`, `audit_event`, `guideline_rule`, `sponsor_metric` | Net-new ‚Äî the workbook has no home for these (the signal it's an entry surface, not the system of record). *(No `institution`, `department`, `care_team`, `mdt_panel`, `patient_condition`, or `encounter` entities ‚Äî see `SIMPLIFICATION_REVIEW.md`.)* |\n\n### 5.5 Bugs that close as a consequence of the migration\n| Demo bug (PRODUCT-PRD ¬ß6) | Root cause | Closes because |\n|---|---|---|\n| Decoupled PSA chart (¬ß6.6) | chart read hardcoded points | chart binds to `psa_reading` |\n| Static-vs-computed KPI drift (¬ß6.5) | hand-typed metrics | Tier-3 is derived-only (R-X-5) |\n| Nudge-trend needs history | one-row snapshot | `nudge_event` exists |\n| Restaging / HSPC‚ÜíCRPC not expressible | staging overwrites | `staging_assessment` is dated |\n| Sequential therapy not expressible | one mashed treatment row | `treatment_line` is dated |\n\n---\n\n## 6. Care-gap rules engine (config-owned, 8 rules)\n\nThe 8 rules are fully specified (workbook `Care_Gap_Tracker` + `ProstaCare_Nudge_Logic_Handoff.md`). Each becomes one `guideline_rule` config row + a condition in a parameterized evaluation workflow. Inputs read from **current-state projections** of Tier-2 (latest staging/imaging/treatment/supportive-care).\n\n| rule_id | Condition (against current state) | Severity |\n|---|---|---|\n| bone_scan_missing | `bone_scan=Not done` AND risk ‚àà {High, Very High, M1} | Urgent |\n| psma_missing | `psma_pet_ct=Not done` AND risk ‚àà {High, Very High} | Urgent |\n| bone_protection_missing | `bone_protection_therapy=Not started` | Urgent |\n| dexa_missing | `dexa=Not done` | Warning |\n| genomics_missing | `germline_somatic=Not done` | Warning |\n| arsi_readiness | `castration=HSPC` AND risk ‚äá High AND `arsi=Not initiated` | Warning |\n| followup_psa_missing | `next_follow_up_psa_date` empty | Info |\n| psychosocial_prompt | `phq9` blank or Not done | Info |\n\n**Evaluation:** workflow `sql_exec` scan `INSERT‚Ä¶SELECT‚Ä¶WHERE <rule> AND NOT EXISTS(open nudge)` (idempotent) bound to (a) `on-write` subscriptions of staging/imaging/treatment/supportive entities and (b) a daily `policies` cron. **Auto-resolve** when the source condition clears (matches the demo semantic: acknowledge ‚âÝ resolve). Rules are **versioned + clinically signed-off**; the sponsor never edits them (governance ¬ß8/¬ß10).\n\n---\n\n## 7. Analytics & derived layer (dashboard inventory ‚Üí mat-views)\n\nThe workbook's `Population_Dashboard` (36 widgets across Overview/Clinical/Treatment/Outcomes/Quality/Demographics) + `Home_Dashboard` (23 widgets) map to RLS-scoped materialized views. `Dashboard_Derived` (22 derived fields) and `Dashboard_Coverage` (covered/partial/not) are the authoritative derivation list. Highlights:\n\n- **Covered by the canonical model:** registration trends, age histogram, referral donut, travel bands, risk/coverage/stage mixes, Gleason/ISUP, comorbidity pivot, ADT/RT/ARSI landscapes, CGHS delay, time-to-treatment, outcome cards, KM survival, bone-health donut, completeness, MDT rate.\n- **Previously \"not representable\" ‚Äî now solved by Tier-2:** **nudge-trend lifecycle** (via `nudge_event`), and per-user **recently-viewed** (via `audit_event`). The workbook explicitly listed these as impossible on snapshot rows.\n- **Drill-to-patient everywhere:** every widget resolves to the underlying `patient_code` set (the core product promise). For non-clinical/sponsor roles the drill lands on **de-identified/masked** rows (¬ß10).\n- **Chart types:** NOVA Edge chart subtype is a free-form string (line/percentile-band/KM not precluded); confirm/extend the frontend renderers for the PSA line, percentile bands, and Kaplan-Meier (the one custom viz). See NOVA-EDGE-FEASIBILITY ¬ß7.1/G1.\n\n---\n\n## 8. Governed Intelligence ‚Äî AI Buddy (‚è∏ **DEFERRED TO PHASE 2**)\n\n> **Scope decision:** AI Buddy appears **zero times** in `FUNCTIONAL_REQUIREMENTS.md`, `PRD.md`, or `SCOPE.md` ‚Äî it exists only in the newer workbook. It is the single largest subsystem in this spec and is **not required for v1**. Ship registry + care-gap engine + dashboards first. The design below stands for Phase 2. *(`SIMPLIFICATION_REVIEW.md` T12.)*\n\nThe workbook's `Governed_Intelligence` tab defines a strict boundary: AI Buddy is **stepwise, evidence-anchored, and must not free-generate, invent gaps, claim autonomous decisions, or imply drug access the config denies.** Mapping to NOVA Edge:\n\n- **AI Buddy** ‚Üí an ADK `agent` in `chat`/stepwise mode, tools limited to **read** entities + report tools + the care-gap engine; **no unbounded generation**.\n- **Brain = configured packs only:** `evidence_pack` / `guideline_pack` / access-rule config / retrospective aggregates ‚Äî no external free-text.\n- **Four lenses** (pathway review, progression branch, access/affordability, trial/new-drug) ‚Üí distinct tool-scoped prompts, each grounded in config + patient state.\n- **Guardrails:** `require_human_approval` on any write; `sanitize` on inputs; PII kept out of prompts via `context_mask` (moot under the de-identified model ¬ß3-A). Every AI step is audited.\n- **Governance/COI:** because a pharma sponsor may have commercial interest in flagged therapies, the evidence/guideline packs and the 8 rules are owned by an **independent clinical committee** with versioned sign-off; AI Buddy can only surface what those packs contain.\n\n---\n\n## 9. Multi-institution onboarding & provisioning\n\nSince the workbook has no tenancy layer, onboarding is net-new. Because **tenant = institution**, onboarding a hospital = provisioning its tenant, then setting up its users:\n\n```\nPlatform admin ‚Üí PROVISION institution tenant (new schema, seed preset, theme)\nInstitution admin (in-tenant) ‚Üí onboard app_users (clinicians / HOD / admin)\n      ‚Üí assign role (Clinician ¬∑ HOD ¬∑ Admin) + set is_mdt_member\n      ‚Üí (per patient) set primary_clinician\nPatient registry entry (Add New Patient) ‚Üí appears in that institution's cohort\n```\nCross-institution rollup (sponsor/registry) reads the **de-identified aggregation layer** above tenants, never the tenants directly.\n\n- **Identity source (`O-ONB4`, open):** hospital SSO (Azure AD ‚Äî NOVA Edge supports it) or platform-local accounts; confirm per institution.\n- **Onboarding roster (`O-ONB`, open):** no predefined doctor-team list exists in any doc ‚Äî must be supplied per launch institution.\n- **Provisioning mechanism:** admin console (NOVA Edge `pages.json` + entity CRUD) for v1; bulk import / HIS-directory sync later.\n- **Patient onboarding:** created in ProstaCare (registry) OR synced from HIS (`O-S1`, open) ‚Äî under the de-identified model, sync carries `patient_code` + clinical data only.\n\n---\n\n## 10. Access, privacy & the pharma firewall (NOVA Edge encoding)\n\n| Layer | Decision | NOVA Edge mechanism |\n|---|---|---|\n| Operational visibility | **Tenant-wide for clinical roles** (no department scoping); HOD is the privileged role | role grants only; the tenant *is* the boundary ‚Äî no row-level scopes needed |\n| Record immutability | Edit window ‚Üí auto-lock ‚Üí **HOD-only, time-bound unlock** (reason required, audited) | lock fields + scheduled `auto_lock` workflow + `unlock` workflow gated on role |\n| Non-clinical / ops / sponsor | De-identified aggregate only | Exposed **only** to RLS-scoped, **de-identified** materialized views; no entity-row access |\n| Identifiers (if ¬ß3-B/C) | Masked-by-default + audited reveal | isolated `patient_identity`; column `read_roles` + `context_mask`; reveal ‚Üí `audit_event` |\n| Rules/AI governance | Independent clinical sign-off; sponsor can't edit | `guideline_rule`/`evidence_pack` write-restricted to Admin+clinical-committee role |\n| Data residency / consent | India (DPDP) | India-region hosting; consent basis per ¬ß3 decision (de-identified ‚áí lightest) |\n\nCapability √ó role matrix is in `FLOW-CLARITY-AND-OPEN-QUESTIONS.md ¬ß5` (straw-man, pending confirmation).\n\n---\n\n## 11. NOVA Edge build mapping & phasing\n\n**Preset deliverable** (`presets/prostate_cancer/`): `schemas.json` (all Tier-0/1/2 entities + partitioning on `psa_reading`), `workflows.json` (nudge evaluation + MDT notify + onboarding + outcome derivations), `tools.json`/`agents.json`/`agent-tools.json` (AI Buddy + evidence packs), `pages.json` + `ui/schema_ui.json` (Home, Patient List, Patient File detail, Population Dashboard, admin console), `mat_views.json` (Tier-3 + dashboard inventory), `reports.json`, `roles.json`, `config.json`, `app_theme.json` (Visual Language palette), `sample-data.json` (the workbook's de-identified sample rows).\n\n**Reuse:** fork `novahub_v2` (care-gap/clinical) for the entity+care-gap spine; `b2b_account` detail-page pattern for the Patient File; canonical `patients` extension for the hub.\n\n**Phasing:**\n| Phase | Scope | NOVA Edge |\n|---|---|---|\n| **P0 Foundation** | Tenancy + patient hub + Tier-1 current-state + de-identified access | schemas + scopes + roles + onboarding console |\n| **P1 Longitudinal** | PSA, staging, imaging, treatment-line, journey, supportive-care | Tier-2 entities + partitioning + current-state projections |\n| **P2 Care-gap engine** | 8 rules (**on-write only, no cron**) + nudge/nudge_event lifecycle + MDT notify (SES) | `guideline_rule` + evaluation workflow + notify workflow |\n| **P3 Analytics** | Home + Population dashboards, benchmarks, protocol score | mat-views + `pages.json`; confirm line/KM renderers (G1) |\n| **P4 Governed AI** *(Phase 2)* | AI Buddy bounded agent + evidence packs | ADK agent + packs + guardrails |\n| **P5 Integrations** | HIS/registry sync, FHIR read, (later) ABHA/ABDM | adapters/remote entities (net-new, see feasibility ¬ß4) |\n\n---\n\n## 12. Open decisions for NOVA Edge sign-off (the gate)\n\n**P0 ‚Äî settle before P0 build:**\n1. **Identity model (¬ß3):** de-identified registry (A) / identified (B) / de-identified + optional identity module (C). *Recommend A or C.*\n2. **`O-A1` multi-user vs single console** ‚Äî the role-based access model implies multi-user; confirm.\n3. **`O-T*` roles & MDT (simplified)** ‚Äî confirm roles = Clinician ¬∑ HOD ¬∑ Admin, MDT = `is_mdt_member` notify flag, no department, no care-team table.\n4. **`O-S1` patient source of truth** ‚Äî created in ProstaCare vs synced from HIS (key = `patient_code`?).\n5. **`O-PH1/2/3` pharma** ‚Äî confirm sponsor (NVS = Novartis?), data model (de-identified aggregate), and independent rule-governance/COI.\n6. **`O-TMPL1` disease scope** ‚Äî prostate-only vs templatable core (recommend: prostate on a shared oncology core).\n\n**P1 ‚Äî needed during build:**\n7. `O-ONB` onboarding roster + `O-ONB4` identity source (SSO vs local) per launch institution.\n8. `O-N*`/`O-CH*` nudge ownership, SLA/escalation, snooze; notification channels (in-app/email/‚Ä¶).\n9. Supportive-care & pathology cardinality: keep `pathology` 1:1 (re-biopsy rare) ‚úÖ recommended; make `supportive_care` **dated** ‚úÖ recommended (bone-protection audit).\n\n**P2 ‚Äî refinement:**\n10. `O-REP*` reporting grain/destination + de-identified export cadence for the sponsor.\n11. `O-DOM*` domain/hosting/IP; chart-renderer scope (G1); FHIR/ABHA/ABDM connector timing (feasibility ¬ß4).\n\n---\n\n## 13. Why this is easier to build and manage\n\n- **One canonical schema, three tiers** ‚Äî snapshot for current-state, dated events for history, derived for everything shown. No hand-typed metrics, no snapshot/longitudinal contradictions.\n- **The workbook stays useful** ‚Äî as a de-identified *entry/seed surface* and the authoritative *field dictionary + value lists*, mapping cleanly onto the canonical entities (¬ß5).\n- **Tenancy is explicit** ‚Äî institutions/doctors onboard into org-units + scopes; cross-reporting native; PHI firewall structural.\n- **Rules & intelligence are config** ‚Äî versioned, signed-off, sponsor-safe; the engine is data, not code.\n- **Everything traces to `patient_code`** ‚Äî so the core promise (drill any signal to a patient, explain any gap) holds structurally.\n\n---\n\n*Authoritative sources: `ProstaCare_Schema_08072026_V2.xlsx` (Field_Dictionary, Value_Lists, dashboard inventory, Care_Gap_Tracker). Companion specs in this folder: `NOVA-EDGE-FEASIBILITY.md`, `FLOW-CLARITY-AND-OPEN-QUESTIONS.md`, `PRODUCT-PRD.md`, `ProstaCare_Nudge_Logic_Handoff.md`. This document is the consolidated build spec for NOVA Edge internal approval; the preset build begins once ¬ß12 P0 items are signed off.*\n"}, {"title": "Cross-Tenant Aggregation", "file": "CROSS_TENANT_AGGREGATION_SPEC.md", "md": "# ProstaCare ‚Äî Cross-Tenant Data Aggregation Spec (Sponsor / Zygo Data Cloud)\n\n**Purpose:** define how **de-identified summary data** from each institution tenant is aggregated across institutions for the **sponsor** (project funder ‚Äî inferred **Novartis/NVS**, to confirm), via **Zygo Data Cloud**. This closes gap **G3** in `NOVAEDGE_ALIGNMENT_REVIEW.md` (cross-institution reporting is not native because tenant = institution) and is the surface referenced in `PROSTACARE_BUILD_SPEC_V1.md ¬ß10`.\n\n**Golden rule:** **only de-identified aggregates ever leave a tenant.** No `patient_code`, no PHI, no free text, no exact dates, no small cells. The sponsor reads **Zygo Data Cloud only** ‚Äî never a tenant.\n\n---\n\n## 1. Architecture ‚Äî the two-hop model\n\n```mermaid\nflowchart LR\n  subgraph T1[Institution A tenant]\n    A1[Patient + event data] --> A2[De-identified mat-views]\n    A2 --> A3[sponsor_metric table<br/>aggregated + small-cell suppressed]\n  end\n  subgraph T2[Institution B tenant]\n    B1[...] --> B2[...] --> B3[sponsor_metric table]\n  end\n  A3 --> P[Zygo Data Cloud pull pipeline]\n  B3 --> P\n  P --> X[Cross-tenant registry<br/>+ institution_code + network benchmarks]\n  X --> S[Sponsor dashboards / RWE]\n```\n\n- **Hop 1 ‚Äî in-tenant aggregation (inside each institution):** a scheduled workflow rolls the de-identified mat-views into a single **`sponsor_metric`** table, applies **small-cell suppression**, and stamps the tenant's anonymised `institution_code`. Data stays in the tenant.\n- **Hop 2 ‚Äî Zygo Data Cloud pull:** Data Cloud pulls each tenant's `sponsor_metric` on a cadence, **unions** them, computes **network-level benchmarks** (this institution vs the network), and serves the sponsor. Tenants remain isolated; only the aggregate table is exported.\n\n**Why in-tenant first:** it keeps the privacy boundary and suppression logic *inside* the tenant (governed, auditable), so nothing leaves until it is already de-identified and suppressed. Data Cloud only ever sees safe aggregates.\n\n---\n\n## 2. The in-tenant aggregate table ‚Äî `sponsor_metric`\n\nOne long-format fact table per tenant (easy to export, flexible to extend):\n\n| Column | Meaning | Example |\n|---|---|---|\n| `institution_code` | Anonymised institution id (governed) | `INST-017` |\n| `period_month` | Month bucket (never exact dates) | `2026-06` |\n| `metric_key` | The measure | `arsi_intensification_rate` |\n| `dim1_name` / `dim1_value` | Optional breakdown dimension | `risk_group` / `High` |\n| `dim2_name` / `dim2_value` | Optional 2nd dimension | `coverage` / `CGHS` |\n| `numerator` | Count meeting the measure | `18` |\n| `denominator` | Eligible population | `62` |\n| `patient_n` | Distinct patients in the cell | `62` |\n| `suppressed` | TRUE if `patient_n` < threshold ‚Üí num/den nulled | `false` |\n| `computed_at` | Aggregation run timestamp | `2026-06-30` |\n\n**Small-cell suppression:** if `patient_n < THRESHOLD` (default **11**, configurable by governance), `numerator`/`denominator` are set null and `suppressed = true`. Prevents re-identification from thin cells. Applied **in-tenant**, before export.\n\n**Encoding on NOVA Edge:** `sponsor_metric` is a normal entity; a scheduled workflow (`policies` cron, e.g. nightly) runs `sql_exec INSERT ‚Ä¶ SELECT ‚Ä¶ FROM <de-identified mat-views> ‚Ä¶` with the suppression `CASE`. It reads only the RLS-scoped, de-identified views ‚Äî never patient rows.\n\n---\n\n## 3. The data contract ‚Äî what MAY be aggregated (and what may not)\n\n### 3.1 Allowed measures (`metric_key` catalogue)\nAll are counts/rates over month buckets, de-identified, suppressible.\n\n| Family | Example metric_keys | Dimensions allowed |\n|---|---|---|\n| **Cohort volume** | `patient_count`, `new_registrations` | risk_group, coverage, state, age_band |\n| **Risk & staging** | `risk_mix`, `stage_at_presentation`, `staging_completeness_rate` | risk_group, stage_group |\n| **Care gaps** | `open_gap_count`, `gap_rate` (by type: bone_scan/psma/bone_protection/dexa/genomics/arsi/followup/psychosocial) | gap_type, risk_group |\n| **Benchmarks** | `arsi_intensification_rate`, `psma_completion_rate`, `bone_protection_rate`, `mdt_review_rate` | risk_group |\n| **Treatment uptake** | `adt_rate`, `rt_completed_rate`, `arsi_rate`, `active_surveillance_rate` | risk_group, coverage |\n| **Access** | `cghs_delay_days_dist`, `time_to_treatment_days_dist` | coverage |\n| **Outcomes** | `psa_lt_0_2_at_12m_rate`, `bcr_at_24m_rate`, `crpc_progression_at_36m_rate` | risk_group, treatment_group |\n| **Protocol** | `protocol_adherence_score` | ‚Äî |\n| **Demographics** | `coverage_mix`, `referral_source_mix`, `geography_mix` | ‚Äî |\n\n### 3.2 Never exported (hard exclusions)\n- `patient_code` or any identifier; any `patient_identity` field (name/ABHA/Aadhaar/phone).\n- Free text: `safety_side_effects`, `context_remarks`, journey/discussion notes, documents.\n- **Exact dates** ‚Äî only `period_month` buckets leave the tenant.\n- Any cell with `patient_n < THRESHOLD` (suppressed).\n- Row-level patient records of any kind ‚Äî **only aggregates**.\n\n### 3.3 Governance\nThe `metric_key` catalogue (¬ß3.1) is the **approved contract**: an independent clinical + DPO sign-off defines it; the sponsor receives only what is in it. Changes are versioned. Suppression threshold and `institution_code` naming (anonymised vs named) are governance decisions (¬ß6).\n\n---\n\n## 4. Zygo Data Cloud ‚Äî the pull pipeline (Hop 2)\n\n```mermaid\nflowchart TD\n  subgraph Tenant\n    M[sponsor_metric table] --> E{Export mechanism}\n  end\n  E -->|A: pull via export API| DC[Zygo Data Cloud ingest]\n  E -->|B: push to S3 landing zone| L[(S3 landing)] --> DC\n  DC --> U[Union all tenants + tag institution_code]\n  U --> BM[Network benchmarks<br/>institution vs network median]\n  BM --> W[Sponsor warehouse / dashboards / RWE feed]\n```\n\n- **Export mechanism (decision `O-AGG3`):**\n  - **A ‚Äî pull:** Data Cloud calls a per-tenant **export endpoint** (reports/SQL over `sponsor_metric`) on a schedule.\n  - **B ‚Äî push:** each tenant writes `sponsor_metric` to a **secure S3 landing zone** (per-tenant prefix) that Data Cloud ingests. *(Recommended ‚Äî simplest, one-directional, auditable; reuses the AWS/S3 setup already in place.)*\n- **Cadence (`O-AGG4`):** in-tenant compute nightly; Data Cloud pull **weekly or monthly** (sponsor reporting cadence).\n- **Cross-tenant build:** Data Cloud unions tenant extracts, attaches `institution_code` + region, computes **network benchmarks** (each institution vs network median), and publishes the sponsor dataset. Data Cloud is the *only* place cross-institution data exists.\n\n---\n\n## 5. Privacy & compliance controls (summary)\n\n| Control | Where | Rule |\n|---|---|---|\n| De-identification | in-tenant | only aggregates; no PHI/identifiers ever in `sponsor_metric` |\n| Small-cell suppression | in-tenant | `patient_n < THRESHOLD` ‚Üí nulled + `suppressed=true` |\n| Date generalisation | in-tenant | month buckets only |\n| Institution anonymisation | in-tenant / Data Cloud | `institution_code`, not hospital name (unless governance permits) |\n| Contract enforcement | governance | sponsor gets only the approved `metric_key` catalogue |\n| One-directional flow | pipeline | tenant ‚Üí Data Cloud ‚Üí sponsor; sponsor never touches a tenant |\n| Audit | both hops | every aggregation run + every export logged |\n| Data residency | both | India region (DPDP) |\n\n---\n\n## 6. Open decisions (`O-AGG`)\n1. **`O-AGG1` metric catalogue** ‚Äî confirm/extend ¬ß3.1; sign-off owner (clinical + DPO).\n2. **`O-AGG2` suppression threshold** ‚Äî default 11; confirm.\n3. **`O-AGG3` export mechanism** ‚Äî S3 push (recommended) vs pull API.\n4. **`O-AGG4` cadence** ‚Äî nightly compute; weekly/monthly export.\n5. **`O-AGG5` institution identity** ‚Äî anonymised `institution_code` vs named; who holds the code map.\n6. **`O-AGG6` sponsor confirmation** ‚Äî confirm NVS = Novartis and the exact reporting deliverables (dashboards vs raw RWE feed).\n7. **`O-AGG7` consent/legal basis** ‚Äî for aggregate secondary use (DPDP; ethics committee if applicable).\n\n---\n\n## 7. Build tasks\n- In-tenant: `sponsor_metric` entity + nightly aggregation workflow (reads de-identified mat-views, applies suppression, stamps `institution_code`).\n- Export: S3 landing writer (per-tenant prefix) **or** export endpoint.\n- Zygo Data Cloud: ingest + union + institution tagging + network-benchmark model + sponsor dashboards.\n- Governance: version the metric catalogue + suppression config; audit both hops.\n\n---\n\n*Companion: `NOVAEDGE_ALIGNMENT_REVIEW.md` (G3), `PROSTACARE_BUILD_SPEC_V1.md ¬ß10`, `TENANT_ONBOARDING_PLAN.md` (provisions the in-tenant aggregation as part of the preset).*\n"}, {"title": "Tenant Onboarding Plan", "file": "TENANT_ONBOARDING_PLAN.md", "md": "# ProstaCare ‚Äî Tenant Onboarding Plan (Institution Provisioning)\n\n**Purpose:** define how a new **institution** (= one tenant) is onboarded from a **golden preset blueprint** of schemas, workflows, rules, dashboards, and roles ‚Äî so each hospital goes live in **1‚Äì2 days** with **config + user setup only, no code**.\n\n**Model recap:** tenant = institution (one Postgres schema per hospital). Everything clinical is identical across institutions (the golden preset); only institution-specific config and the user roster vary. Cross-institution reporting flows through Zygo Data Cloud (`CROSS_TENANT_AGGREGATION_SPEC.md`).\n\n---\n\n## 1. The golden preset blueprint ‚Äî identical for every institution\n\n`presets/prostate_cancer/` is provisioned as-is into each new tenant. It contains:\n\n| Preset file | What it seeds (same for all institutions) |\n|---|---|\n| `schemas.json` | All entities ‚Äî patient hub, pathology (incl. comorbidity/family flags), staging_assessment, imaging_study, treatment_line, supportive_care_event, psa_reading, outcome, journey_event, nudge + nudge_event, notification/discussion, document, guideline_rule, app_user (+`is_mdt_member`)/role, `sponsor_metric`. *(No department/care_team/mdt_panel/patient_condition/encounter; no partitioning.)* |\n| `workflows.json` | Care-gap engine (8 rules, **on-write**), MDT notify (SES), patient onboarding, **record auto-lock / HOD unlock**, outcome derivations, **nightly `sponsor_metric` aggregation** |\n| `guideline_rule` seed | The 8 versioned, signed-off care-gap rules |\n| `mat_views.json` | Current-state projections + Home/Population dashboards + de-identified sponsor views |\n| `pages.json` + `ui/schema_ui.json` | Home, Patient List, Patient File (detail), Population Dashboard, Admin console |\n| ~~`agents.json` + `evidence_pack`~~ | **AI Buddy ‚Äî Phase 2** (not in the v1 preset) |\n| `roles.json` | **Clinician ¬∑ HOD (privileged) ¬∑ Admin** (Ops/Quality optional) |\n| `Value_Lists` / enums | All dropdown option sets (from the workbook) |\n| `app_theme.json` | ProstaCare palette (Visual Language) |\n\n**Key point:** because the clinical logic, rules, and dashboards are all in the blueprint, per-institution onboarding never touches schemas or workflows ‚Äî it is **configuration + users only**.\n\n---\n\n## 2. What varies per institution (the intake)\n\nCollected **before** provisioning (intake form):\n\n| Item | Example | Used for |\n|---|---|---|\n| Institution profile | name, city, state, logo | `config.json`, theme (optional) |\n| `institution_code` (anonymised) | `INST-017` | cross-tenant aggregation |\n| **User roster** | clinicians/HOD/admin: name, specialty, role, email | `app_user` + role |\n| MDT members | subset of the roster | `is_mdt_member` ‚Äî \"notify all MDT\" target |\n| Identity source | Azure AD SSO **or** platform-local accounts | auth setup |\n| Facility/enum overrides | local RT facilities, referring centres | dropdown localisation (optional) |\n| Governance sign-offs | identity model (de-identified vs identified), rule-pack version, aggregation contract | go-live gate |\n| Data load | start empty vs seed/migrate existing registry | initial cohort |\n\n---\n\n## 3. Onboarding runbook ‚Äî 1‚Äì2 days\n\n```mermaid\nflowchart LR\n  D0[Day 0 ¬∑ Intake & sign-off] --> D1[Day 1 ¬∑ Provision + configure]\n  D1 --> D1b[Day 1 PM ¬∑ Users + smoke test]\n  D1b --> D2[Day 2 ¬∑ UAT + go-live]\n```\n\n### Day 0 (pre-work, async) ‚Äî Intake & sign-off\n- Collect the ¬ß2 intake form; confirm governance sign-offs (identity model, rule pack, aggregation contract, suppression threshold).\n- Assign `institution_code`; confirm SSO details or local-account plan.\n- **Gate:** intake complete + sign-offs in hand.\n\n### Day 1 AM ‚Äî Provision the tenant\n1. `POST /bootstrap/system` ‚Üí create the institution's tenant (schema, canonical entities, roles).\n2. Seed the golden preset: `seed-preset.py prostate_cancer` ‚Üí all entities, workflows, rules, mat-views, dashboards, theme.\n3. Configure institution: `config.json` (name/branding), `institution_code`, facility/enum overrides.\n4. Wire aggregation: enable the nightly `sponsor_metric` job + S3 export prefix for this tenant.\n5. Configure auth: Azure AD SSO **or** local accounts.\n- **Gate:** tenant up; preset seeded; login works.\n\n### Day 1 PM ‚Äî Users & smoke test\n6. Onboard `app_user` roster ‚Üí assign role (Clinician/HOD/Admin) + set `is_mdt_member`.\n7. Load initial data (empty, or seed/migrate existing registry).\n8. **Smoke test the golden path:** create a patient ‚Üí enter staging/imaging/treatment ‚Üí **8 nudges fire correctly** ‚Üí acknowledge ‚Üí **MDT notify** delivers ‚Üí **dashboards populate** ‚Üí **`sponsor_metric` row computes** (de-identified, suppressed).\n- **Gate:** end-to-end path green.\n\n### Day 2 ‚Äî UAT & go-live\n9. Walkthrough with the clinical lead (roster review, roles, nudges, MDT flow, record lock/unlock, dashboards).\n10. Fix any config/roster tweaks; confirm access (role-based; HOD unlock; ops/sponsor de-identified).\n11. Confirm first aggregation export reaches Zygo Data Cloud.\n12. **Go-live**; handover admin console + support contact.\n- **Gate:** clinical sign-off ‚Üí live.\n\n> Institutions with **existing data to migrate** or **custom SSO** may extend into a 2nd day; a greenfield site can complete in **~1 day**.\n\n---\n\n## 4. Onboarding checklist\n\n```\nINTAKE (Day 0)\n  [ ] Institution profile + logo\n  [ ] institution_code assigned\n  [ ] User roster (name/specialty/role/email)\n  [ ] MDT panel members\n  [ ] Identity source (SSO / local) confirmed\n  [ ] Facility/enum overrides (if any)\n  [ ] Governance sign-offs: identity model ¬∑ rule pack ¬∑ aggregation contract ¬∑ suppression threshold\n\nPROVISION (Day 1)\n  [ ] Tenant bootstrapped\n  [ ] Golden preset seeded (schemas/workflows/rules/mat-views/dashboards)\n  [ ] config.json + institution_code + facilities set\n  [ ] sponsor_metric nightly job + S3 export prefix enabled\n  [ ] Auth (SSO/local) configured\n  [ ] Users onboarded (role + is_mdt_member)\n  [ ] Initial data loaded (empty / seeded / migrated)\n\nVERIFY (Day 1 PM ‚Äì Day 2)\n  [ ] Smoke test: patient ‚Üí nudges (8 rules) ‚Üí MDT notify ‚Üí dashboards ‚Üí sponsor_metric\n  [ ] Access verified (role-based; de-identified for ops/sponsor)\n  [ ] Clinical-lead UAT walkthrough\n  [ ] First aggregation export reaches Zygo Data Cloud\n  [ ] Go-live + admin handover\n```\n\n---\n\n## 5. Why 1‚Äì2 days is realistic\n- **No build per institution** ‚Äî schemas, workflows, the 8 rules, and dashboards are all in the golden preset; provisioning is a seed + config.\n- **Config, not code** ‚Äî institution profile, facilities, users, roles, and the aggregation hook are all JSON/console settings.\n- **Repeatable & idempotent** ‚Äî `bootstrap` + `seed-preset` are idempotent; the runbook is a checklist.\n- **The only variable work** is the **user roster + SSO** and **optional data migration**, which is what can push a complex site toward the 2-day end.\n\n---\n\n## 6. Open decisions (`O-ONB`, extends `FLOW-CLARITY`)\n1. **Provisioning owner** ‚Äî platform team provisions tenants; institution admin manages users thereafter?\n2. **Identity source per site** ‚Äî Azure AD SSO vs platform-local (affects Day-1 auth step).\n3. **Data migration** ‚Äî greenfield vs import existing registry (affects timeline).\n4. **Self-serve vs white-glove** ‚Äî v1 is white-glove (admin-provisioned); self-serve is future (ties to `O-DEP`).\n5. **Enum localisation** ‚Äî keep the national value-lists as-is, or localise facilities/referring-centres per site.\n\n---\n\n*Companion: `PROSTACARE_BUILD_SPEC_V1.md` (preset contents + phasing), `CROSS_TENANT_AGGREGATION_SPEC.md` (the aggregation the onboarding wires up), `FLOW-CLARITY-AND-OPEN-QUESTIONS.md` (O-ONB decisions).*\n"}, {"title": "Field Dictionary", "file": "FIELD_DICTIONARY.md", "md": "# ProstaCare Field Dictionary (from workbook V2)\n\nEvery UI field mapped to its control, data type, requiredness, and allowed values. Field keys match the canonical schema exactly. Source: `ProstaCare_Schema_08072026_V2.xlsx` ¬∑ `Field_Dictionary`.\n\n\n## Demographics_Entry\n\n| Section | Field Key | Label | Control | Type | UI Req | Allowed Options / List | Notes |\n|---|---|---|---|---|---|---|---|\n| Registry Linkage | `patient_code` | Unique Patient Code | text | text | No |  | Only patient-level identifier permitted in this workbook. Reuse the same code across all sheets. |\n| Registry Linkage | `registry_enrolment_date` | Registry Enrolment Date | date | date | No | yyyy-mm-dd | Needed for monthly registration trends on the home and population dashboards. |\n| De-identified Demographics | `age_at_diagnosis_years` | Age at Diagnosis (years) | number | whole number | No | Years | Enter numeric age at diagnosis. Do not capture date of birth. |\n| De-identified Demographics | `language_preference` | Language Preference | dropdown | categorical | No | Hindi  /  English  /  Tamil  /  Telugu  /  Bengali  /  Marathi  /  Kannada  /  Malayalam  /  Gujarati  /  Punjabi  /  Odia |  |\n| Coverage & Access | `healthcare_coverage` | Healthcare Coverage | dropdown | categorical | Yes | PMJAY (Ayushman Bharat)  /  CGHS  /  ESIC  /  State Scheme (Rajya Bima / Aarogyasri)  /  Private Insurance  /  Self-pay |  |\n| Coverage & Access | `referring_hospital_centre` tipation  /  Blood in stool  /  Tenesmus |  |\n| Digital Rectal Examination (DRE) | `dre_findings` | DRE Findings | single-select chip group | categorical | Yes | Normal  /  Enlarged (BPH)  /  Nodule ‚Äì unilateral  /  Nodule ‚Äì bilateral  /  Induration / fixity  /  Seminal vesicle ext. |  |\n| Digital Rectal Examination (DRE) | `prostate_volume_cc` | Prostate Volume (TRUS / MRI cc) | text | decimal number | No | cc | Workbook expects numeric cc value. |\n| Biopsy Details | `biopsy_date` | Biopsy Date | date | date | No | yyyy-mm-dd |  |\n| Biopsy Details | `biopsy_type` | Biopsy Type | dropdown | categorical | No | 12-core TRUS biopsy  /  MRI-targeted / Fusion biopsy  /  Cognitive targeted  /  Transperineal biopsy  /  TURP chips |  |\n| Biopsy Details | `pi_rads_score` | PI-RADS Score (mpMRI) | dropdown | categorical | No | PI-RADS 1  /  PI-RADS 2  /  PI-RADS 3  /  PI-RADS 4  /  PI-RADS 5  /  Not done |  |\n| Biopsy Details | `gleason_score` | Gleason Score | dropdown | categorical | No | 3+3=6  /  3+4=7  /  4+3=7  /  4+4=8  /  4+5=9  /  5+4=9  /  5+5=10 | gs |\n| Biopsy Details | `isup_grade_group` | ISUP Grade Group | dropdown | categorical | No | Grade 1 (3+3)  /  Grade 2 (3+4)  /  Grade 3 (4+3)  /  Grade 4 (4+4)  /  Grade 5 (‚â•4+5) |  |\n| Biopsy Details | `cores_positive_total` | Cores Positive / Total | text | text | No |  | UI stores as free text, e.g. 10 / 12. |\n| Biopsy Details | `core_involvement_pct` | % Core Involvement | text | decimal number | No | % | Workbook expects percent as whole number, e.g. 83. |\n| Biopsy Details | `perineural_invasion` | Perineural Invasion | dropdown | categorical | No | Not assessed  /  Absent  /  Present |  |\n| Biopsy Details | `ece_extracapsular_extension` | ECE (Extracapsular Extension) | dropdown | categorical | No | Not assessed  /  Absent  /  Present (radiological) |  |\n| TNM Staging & Risk Classification | `clinical_t_stage` | Clinical T Stage | dropdown | categorical | Yes | cT1a  /  cT1b  /  cT1c  /  cT2a  /  "file": "FLOW-CLARITY-AND-OPEN-QUESTIONS.md", "md": "# ProstaCare ‚Äî Flow Clarity, Boundaries & Open Questions (Pre-Build Discovery)\n\n**Status: BLOCKING gate before any NOVA Edge preset work.**\nWe will not start the `prostate_cancer` preset until the team model, data boundaries, permission boundaries, and end-to-end flows are signed off by the business/clinical team.\n\n**Purpose.** The repo demo and the requirement docs (`PRD.md`, `FUNCTIONAL_REQUIREMENTS.md`, `SCOPE.md`, `ProstaCare_Nudge_Logic_Handoff.md`) describe a **single-user prototype**. They do not define the multi-user reality the real product needs. This document (a) maps every end-to-end flow, (b) marks exactly where each flow hits an **undefined boundary**, (c) lists the **blocking questions** for the business team, and (d) proposes a **straw-man default** for each so the business team can react/confirm rather than design from scratch.\n\n---\n\n## 1. Headline ‚Äî what we actually have vs what we need\n\n| Area | What the demo / docs define | What is undefined (and blocks the build) |\n|---|---|---|\n| **Users** | One persona: HOD, always logged in | Are clinicians, MDT members, coordinators, ops real **logins**? Is this multi-user at all? |\n| **\"Team\"** | A hardcoded 5-name MDT directory used as notify targets | What *is* a team? Global vs per-facility vs per-patient? Who manages membership? Team = MDT = tumour board, or distinct? |\n| **Accessing the team** | \"Send to a member\" / \"send to all MDT\" (one-directional) | How does the **inbound** side work ‚Äî does a member log in, get an inbox, act, reply? Is discussion two-way? |\n| **Patient visibility (data boundary)** | HOD sees the whole department (filters 8 of 10 by department) | Who sees which patients? Own-panel vs department vs care-team vs shared? Is there patient \"ownership\"? |\n| **Permissions (action boundary)** | Everything is open (single user) | Who can edit which sections, resolve nudges, register patients, send to all-MDT, configure rules, see identified analytics? |\n| **Nudge lifecycle** | Rules fire; \"acknowledge\" logs but never resolves | Who **owns** a nudge? Who can resolve/dismiss? SLA/escalation? Snooze? |\n| **Source of truth** | Patients are local sample records | Are patients **created** in ProstaCare or **synced** from HIS/registry? What's the match key (UHID/ABHA)? |\n| **Org / tenancy** | Single site (AIIMS) | One hospital or a multi-site network? One department or Urology + Radiation Oncology as separate units? |\n\n**Bottom line:** the demo answers \"what screens exist,\" not \"who can do what to whose data, and how the team actually collaborates.\" Those are exactly the things a NOVA Edge preset has to encode (entities, scopes, roles, workflows) ‚Äî so they must be resolved first.\n\n### Decisions log (live)\n| ID | Decision | Status |\n|---|---|---|\n| O-TEN | **Tenant = institution** (one schema per hospital; no `institution_id`). Within-institution cross-doctor/dept reporting is native; cross-institution = de-identified aggregation layer above tenants. *(Supersedes the earlier \"single shared tenant\" note.)* | ‚úÖ DECIDED (updated) |\n| O-DEP | Deployment model: institutional single tenant **vs** per-doctor SaaS tenant (\"tenant-C\", internet self-serve) | ‚¨ú OPEN (P0) |\n| O-ONB | Predefined doctor-teams to onboard? **None found in docs/scope** | ‚¨ú OPEN (P0) |\n| O-ACC (A) | **Simplified (supersedes department-scoping):** **no `department` entity**; all clinical roles see the institution's patients (tenant is the boundary); **HOD = privileged role** (unlock, notify-all-MDT, audit). MDT panel = notification group, not access. | ‚úÖ DECIDED (updated) |\n| O-LOCK | **Record edit window ‚Üí auto-lock ‚Üí HOD time-bound unlock** (defaults 48 h / 24 h, reason required, audited). Append-only tiers need no unlock to continue care. | ‚úÖ DECIDED (durations to confirm) |\n| O-CARD | Every model is **entered on a named screen or derived** (no orphan layers); 1:1 vs 1:N marked per model (one treatment *plan*, many treatment *lines*); duplicates blocked by unique keys | ‚úÖ DECIDED |\n| O-ACC (B) | Non-clinical / ops / quality / **pharma sponsor = de-identified aggregate only** (PHI firewall) | ‚úÖ DECIDED |\n| O-ACC (C) | Identifiers **masked-by-default + audited reveal** | ‚úÖ DECIDED |\n| O-A1 | Multi-user vs single console | ‚¨ú OPEN (P0) |\n| O-T1/T2 | \"Team\" model + care-team vs tumour-board | ‚¨ú OPEN (P0) |\n| O-S1 | Patients created here vs synced from HIS (match key) | ‚¨ú OPEN (P0) |\n| O-TMPL1 | Single-disease vs templatable multi-disease core | ‚¨ú OPEN (P0) |\n| O-PH1/2/3 | Pharma role (NVS=Novartis?), data model, rule governance/COI | ‚¨ú OPEN (P0) |\n| O-CH | Notification channels = **in-app inbox + email via AWS SES** (login identity = email); SMS/WhatsApp future | ‚úÖ DECIDED |\n| O-N* | Nudge ownership + SLA/escalation + snooze | ‚¨ú OPEN (P1) |\n| O-AGG | Cross-tenant aggregation via Zygo Data Cloud (de-identified `sponsor_metric` ‚Üí pull ‚Üí sponsor) | üü° SPEC'D ‚Äî see `CROSS_TENANT_AGGREGATION_SPEC.md` |\n| O-REP* | Reporting grain & destination | ‚¨ú OPEN (P1) |\n| O-DOM* | Domain / hosting / data-residency / IP | ‚¨ú OPEN (P2) |\n\n---\n\n## 2. Actors ‚Äî intended vs defined\n\nPRD ¬ß3 names six user types but the demo implements only the first as a real session:\n\n| Actor (PRD ¬ß3) | In the demo? | Needs definition |\n|---|---|---|\n| Urologist | ‚ùå (only HOD persona) | Own-panel? Edit which sections? |\n| Radiation oncologist | ‚ùå | RT-plan authorship? MDT role? |\n| Medical oncologist | ‚ùå | Systemic-therapy/ARSI authorship? |\n| MDT coordinator | ‚ùå | Triage nudges? Manage tumour-board? Assign actions? |\n| Clinical ops / quality | ‚ùå | Identified or aggregate-only access? |\n| Demo stakeholder | ‚úÖ (HOD login) | ‚Äî |\n| **MDT directory members** (5 clinicians) | ‚öÝÔ∏è as *notify targets only*, not users | Are these the same people as the actors above, with logins? |\n\n**Open question O-A1:** Is ProstaCare **multi-user** (each clinician logs in, has a panel and an inbox), or a **single-coordinator console** (one user drives everything, \"team\" is just a notify list)? *This single answer reshapes the entire data/permission model.*\n**Straw-man:** Multi-user. Each clinician has a login, a patient scope, and an inbox; \"send to team\" creates real items others act on.\n\n---\n\n## 3. The \"Team\" concept ‚Äî deep dive (the core of the question)\n\nThe demo's \"team\" is a static array of 5 clinicians (Radiation Oncology, Medical Oncology, Onco-radiology, Nuclear Medicine, Nurse Specialist). It is used **only** as the recipient list for a notification. There is no membership management, no per-patient team, no inbound participation. We need the business team to pick a model:\n\n| Candidate model | What it means | Implication |\n|---|---|---|\n| **(a) One global department MDT** | A fixed roster for the whole unit; every patient's \"team\" is this panel | Simplest; \"team\" = a config list; notify = broadcast to the panel |\n| **(b) Per-facility MDT** | Each hospital/site has its own MDT roster | Needs org-unit model; team scoped to facility |\n| **(c) Per-patient care team** | Each patient has a specific set of involved clinicians (treating urologist + assigned RT onc + ‚Ä¶) | Needs `care_team_member` per patient; visibility can follow team membership |\n| **(d) Named tumour boards** | A patient is *presented to* one or more tumour-board sessions; membership per board | Needs `tumour_board` + `board_session` + presentation flow |\n\n**Open questions:**\n- **O-T1:** Which model (a/b/c/d) ‚Äî or a combination (e.g. a global MDT panel **plus** a per-patient treating clinician)?\n- **O-T2:** Are \"care team\" (who manages this patient day-to-day) and \"tumour board / MDT\" (who reviews the case formally) **the same concept or two different things**? Clinically they usually differ.\n- **O-T3:** Who **manages team membership** ‚Äî an admin, the HOD, or self-serve? Does it change over time (and do we keep history)?\n- **O-T4:** Can a patient belong to **more than one** team/board? Can a clinician belong to multiple teams?\n- **O-T5:** Are **referring / external** clinicians part of the team (read-only? notified?) or out of scope?\n- **O-T6:** Does \"send to all MDT\" mean *this patient's* team, or the *whole department* MDT?\n\n**Straw-man:** (a)+(c) hybrid ‚Äî a **global department MDT panel** (config roster, the default \"all MDT\" target) **plus** a per-patient **treating clinician** and an optional small **care team**. Tumour-board = the MDT panel reviewing a case (a review event), distinct from the care team. Membership managed by an admin/coordinator, with history retained.\n\n---\n\n## 4. Data boundary ‚Äî patient visibility (who sees whom)\n\nThe demo shows the HOD seeing the whole department and filtering two out-of-department patients. That's the *only* signal. Real visibility must be a rule.\n\n| Candidate visibility model | Who sees a patient |\n|---|---|\n| **Department-wide** | Any clinician in the department sees all department patients (‚âà demo) |\n| **Own-panel** | A clinician sees only patients where they are the treating/owning clinician |\n| **Care-team** | A clinician sees a patient only if they're on that patient's care team / tumour board |\n| **Role-tiered** | Clinicians see identified records in scope; ops/quality see **aggregate/de-identified** cohort with drill to limited fields |\n\n**Open questions:**\n- **O-D1:** What is the default visibility ‚Äî department-wide, own-panel, or care-team? (The HOD likely sees all; what about a treating urologist or a nuclear-medicine member?)\n- **O-D2:** Is there a notion of **patient ownership / primary clinician**, and how is it assigned (at registration? by coordinator? by referral)?\n- **O-D3:** Is **department** the hard boundary (as the demo implies), and how is \"department\" defined when Urology and Radiation Oncology are combined?\n- **O-D4:** Do **ops/quality** users get identified patient data or aggregate-only? (PHI-minimisation matters for sign-off.)\n- **O-D5:** Is ProstaCare ever **launched from a hospital EMR for one patient** (single-patient caged session, like the platform's Bayanaty pattern)? If yes, that's a distinct, code-level visibility mode.\n\n**Straw-man:** Default **department-wide** read for clinical roles (matches the HOD-centric demo and tumour-board reality), **own-panel emphasis** on the home screen (\"my patients\" first), **aggregate-first** for ops/quality with drill limited to clinically necessary fields, and **no external single-patient launch** in v1 (revisit if an EMR-embed is required).\n\n---\n\n## 5. Permission boundary ‚Äî capability √ó role (all UNKNOWN today)\n\nNothing in the demo restricts actions (one user does everything). We need a capability matrix. Below is our **straw-man** ‚Äî every cell needs business confirmation.\n\n| Capability | HOD | Treating clinician | MDT member | Coordinator | Ops/Quality | Admin |\n|---|:--:|:--:|:--:|:--:|:--:|:--:|\n| View patient (in scope) | ‚úÖ | ‚úÖ | ‚úÖ (care-team) | ‚úÖ | aggregate | ‚úÖ |\n| Edit demographics/IDs | ‚úÖ | ‚úÖ | ‚Äî | ‚úÖ | ‚Äî | ‚úÖ |\n| Edit **clinical** (PSA/staging/biopsy) | ‚úÖ | ‚úÖ | üî∏ own-specialty | ‚Äî | ‚Äî | ‚úÖ |\n| Edit **treatment** (ADT/RT/ARSI) | ‚úÖ | ‚úÖ | üî∏ own-specialty | ‚Äî | ‚Äî | ‚úÖ |\n| Resolve / dismiss a nudge | ‚úÖ | ‚úÖ | üî∏ | üî∏ | ‚Äî | ‚úÖ |\n| Send to a member | ‚úÖ | ‚úÖ | ‚úÖ | ‚úÖ | ‚Äî | ‚úÖ |\n| Send to **all MDT** | ‚úÖ | ‚úÖ | üî∏ | ‚úÖ | ‚Äî | ‚úÖ |\n| Register a patient | ‚úÖ | ‚úÖ | ‚Äî | ‚úÖ | ‚Äî | ‚úÖ |\n| Upload Rx/documents | ‚úÖ | ‚úÖ | üî∏ | ‚úÖ | ‚Äî | ‚úÖ |\n| View population analytics (identified) | ‚úÖ | üî∏ own-panel | ‚Äî | ‚úÖ | aggregate | ‚úÖ |\n| Configure guideline rules | ‚Äî | ‚Äî | ‚Äî | ‚Äî | ‚Äî | ‚úÖ (+ clinical sign-off) |\n| Manage team / directory / facilities | ‚Äî | ‚Äî | ‚Äî | üî∏ | ‚Äî | ‚úÖ |\n\n‚úÖ full ¬∑ üî∏ limited/conditional ¬∑ ‚Äî none\n\n**Open questions:**\n- **O-P1:** Is record editing **section-gated by specialty** (e.g. only Radiation Oncology edits the RT plan), or can any clinician in scope edit anything?\n- **O-P2:** Who may **resolve/dismiss** a nudge ‚Äî only the responsible role, or anyone in scope? Does dismissal require a reason (audited)?\n- **O-P3:** Should \"send to **all MDT**\" be restricted (it's high-noise) ‚Äî e.g. HOD/coordinator only?\n- **O-P4:** Who configures **guideline rules**, and what is the **clinical sign-off** workflow before a rule goes live?\n\n---\n\n## 6. End-to-end flow map (with boundary + clarity status)\n\nLegend: üü¢ clear ¬∑ üü° partial ¬∑ üî¥ blocked (needs business answer).\n\n| # | Flow | Actor(s) | What the demo shows | Boundary question | Status |\n|---|---|---|---|---|---|\n| 1 | Login & landing | any | One HOD login | Roles? Per-role home screen? (O-A1) | üî¥ |\n| 2 | Cohort review | HOD/ops | Whole-department KPIs | Whose cohort? Identified vs aggregate? (O-D4) | üü° |\n| 3 | \"My panel\" review | treating clinician | ‚Äî (absent) | Does own-panel view exist? (O-A1, O-D2) | üî¥ |\n| 4 | Open patient file | clinician | Anyone opens anyone | Visibility rule (O-D1) | üî¥ |\n| 5 | Edit record | clinician | All sections editable | Section gating by specialty? (O-P1) | üî¥ |\n| 6 | Nudge generation | system | 8 rules fire (well-specified) | Who **owns** the nudge? | üü° |\n| 7 | Act on / resolve nudge | clinician | \"Acknowledge\" logs, never resolves | Who resolves/dismisses? SLA? Snooze? (O-P2, O-N1..3) | üî¥ |\n| 8 | **Access / notify the team** | clinician | Send to member / all (one-way) | Team model + recipient scope (O-T1, O-T6) | üî¥ |\n| 9 | MDT member **receives & responds** | MDT member | ‚Äî (no inbound side) | Inbox? Act-from-notification? Reply? (O-A1, O-N4) | üî¥ |\n| 10 | Discussion thread | team | Per-patient log (one-way) | One-way log vs threaded conversation? | üî¥ |\n| 11 | New patient onboarding | clinician/coord | Modal create + notify preview | Created here vs synced from HIS? Match key? Who may register? (O-S1..3) | üî¥ |\n| 12 | Rx / document upload | clinician/staff | Browser-local upload | Who uploads? Retention/access? (O-P, future) | üü° |\n| 13 | Population analytics | ops/HOD | 6 dashboards + drilldown | Identified vs aggregate per role; whose cohort (O-D4) | üü° |\n| 14 | Guideline reference + rule governance | clinician/admin | Static reference content | Who owns/approves/versions rules? (O-P4, O-G1) | üî¥ |\n| 15 | External single-patient launch | external EMR | ‚Äî | Does an EMR-embed/caged session exist? (O-D5) | üî¥ |\n\n**Read-out:** the *clinical record* flows (4‚Äì6, 12, 13) are mostly understood; the **collaboration, identity, and boundary** flows (1, 3, 7‚Äì11, 14, 15) ‚Äî i.e. everything that makes it a *team product* ‚Äî are blocked.\n\n---\n\n## 7. Blockers ‚Äî questions to pose to the business team (prioritised)\n\n**P0 ‚Äî cannot model entities/scopes/roles without these:**\n1. **O-A1** Multi-user or single-console? (Do clinicians/MDT members log in and act, or is \"team\" just a notify list?)\n2. **O-T1/O-T2** What is a \"team\"? Global department MDT vs per-facility vs per-patient care team vs named tumour boards ‚Äî and is care-team distinct from tumour-board?\n3. **O-D1/O-D2** Default patient visibility (department / own-panel / care-team) and is there a primary-clinician/ownership concept?\n4. **O-S1** Source of truth: are patients **created** in ProstaCare or **synced** from a hospital HIS/registry? If synced, match key (UHID/ABHA) and which fields are read-only?\n5. **O-O1** Org/tenancy: single hospital or multi-site network? Is \"Urology & Radiation Oncology\" one unit or two?\n\n**P1 ‚Äî shapes the flows and screens:**\n6. **O-T3/O-T4** Who manages team membership; can a patient be on multiple teams/boards; history retained?\n7. **O-N1** Nudge ownership: when a nudge fires, who is responsible (treating clinician / relevant specialist / coordinator)?\n8. **O-N2/O-N3** Resolve/dismiss rules, dismissal reason+audit, **SLA/escalation** for unactioned urgent nudges, and **snooze**?\n9. **O-N4** Notification channel (email / in-app inbox / SMS / WhatsApp) and whether a recipient can **act/reply from** the notification (does it create a task for them)?\n10. **O-P1/O-P3** Section-level edit gating by specialty; restrict \"send to all MDT\"?\n\n**P2 ‚Äî governance & refinement:**\n11. **O-P4/O-G1** Who owns/approves/versions the guideline rules (clinical governance), global vs per-facility?\n12. **O-D4** Identified vs aggregate analytics access for ops/quality (PHI minimisation).\n13. **O-D5** Any external single-patient EMR-launch (caged session) requirement?\n14. **O-H1** Are NCCN/benchmark targets configurable, and who sets them?\n\n---\n\n## 8. Our straw-man \"to-be\" model (for the business team to react to)\n\nSo the discussion starts from a position, not a blank page, here is what we would build **unless told otherwise** (each maps to a blocker above):\n\n- **Multi-user**, role-based: HOD, Treating Clinician, MDT Member, Coordinator, Ops/Quality, Admin.\n- **Team = a global department MDT panel** (config roster, default \"all-MDT\" target) **+ a per-patient treating clinician** and optional small **care team**. **Tumour-board review** is an *event* where the MDT reviews a case (distinct from care team).\n- **Visibility:** department-wide read for clinical roles, \"my patients\" emphasised on the home screen; ops/quality **aggregate-first**.\n- **Patients synced from HIS/registry** as source of truth (ABHA/UHID match), ProstaCare authoritative for the oncology overlay (nudges, MDT, journey); manual registration allowed as fallback.\n- **Nudge ownership** = the patient's treating clinician, with coordinator visibility; **resolve** when the source field changes (auto) or via explicit dismiss-with-reason; **urgent nudges escalate** to HOD/coordinator after an SLA.\n- **Notifications** = in-app inbox + email; a notification **creates an actionable item** in the recipient's inbox; discussion is a **threaded** per-patient log.\n- **Rules** authored as config (`guideline_rule`), **versioned with clinical sign-off**, admin-managed.\n- **Single hospital, single department** in v1; org-unit model ready for multi-site later. No external EMR-embed in v1.\n\n---\n\n## 9. Round-2 dimensions (tenancy, templates, reporting, channels, pharma, domain)\n\nThese were raised after the first pass and several are **P0** ‚Äî they change the entity/tenancy model itself.\n\n### 9.1 Tenancy & isolation model ‚Äî `O-TEN` ‚úÖ DECIDED: SINGLE TENANT\n**Decision (confirmed):** a **single tenant** for the whole product, chosen because **cross-reporting across doctors/departments is a core need**. On NOVA Edge this is one Postgres schema, so cohort analytics span all users natively ‚Äî no cross-tenant aggregation layer required.\n\n**Key consequence ‚Äî single-tenant ‚âÝ open access.** The privacy boundary is enforced *inside* the tenant by two independent mechanisms, so cross-reporting and least-privilege coexist:\n- **Operational reads** (identified patient records) ‚Üí **row-level scopes** (`row_policies`/`scopes`) per user / role / team, plus **field-level** `read_roles` for sensitive columns.\n- **Reporting reads** (cohort) ‚Üí **RLS-scoped materialized views**, which can be authored **de-identified** so ops / quality / sponsor users see aggregates with no PHI.\n\n‚û°Ô∏è The remaining live decision is **¬ß9.1a ‚Äî where we draw the access-boundary lines** (below).\n\n### 9.1a Data access boundary inside the single tenant ‚Äî `O-ACC` ‚úÖ DECIDED\n**Decisions (confirmed):**\n- **(A) Operational/clinical visibility = Department/team-scoped.** A clinical user sees identified patients in their department/team; HOD/coordinator roles may be granted tenant-wide. Cross-department insight comes from the de-identified reporting layer, not raw record access.\n- **(B) Non-clinical / ops / quality / pharma sponsor = De-identified aggregate only.** Hard firewall from PHI ‚Äî cohort stats + drill to masked rows. (Satisfies DPDP least-privilege and removes sponsor conflict-of-interest risk.)\n- **(C) Identifiers masked-by-default** (name, ABHA/Aadhaar, phone) with **audited reveal** for in-scope clinical users.\n\n‚û°Ô∏è NOVA Edge encoding: department/team `row_policies` + role grants for HOD/coordinator; column `read_roles`/`context_mask` for identifiers; **de-identified, RLS-scoped materialized views** as the only surface exposed to ops/quality/sponsor roles.\n\n_Original option analysis retained below for the record:_\n\n**(A) Operational/clinical visibility ‚Äî who sees which *identified* patients:**\n| Option | Who sees a patient (identified) | Trade-off |\n|---|---|---|\n| **Tenant-wide clinical** | Every clinical user sees all patients | Simplest, max collaboration (‚âà demo HOD view); weakest PHI least-privilege |\n| **Department/team-scoped** | Clinical user sees patients in their dept/team | Balanced; cross-dept still served via de-identified reporting layer |\n| **Own-panel + care-team** | Clinician sees own patients + those whose care-team/tumour-board they're on | Tightest PHI control; needs care-team membership upkeep |\n\n**(B) Reporting/non-clinical boundary ‚Äî what ops / quality / sponsor see:**\n| Option | What they see |\n|---|---|\n| **De-identified aggregate only** (recommended) | Cohort stats + drill to **masked** rows; hard firewall from PHI |\n| Identified in scope | Full records within their scope (only if a clinical/governance need is proven) |\n\n- **O-ACC1:** Operational default = tenant-wide / department-scoped / own-panel? (Can differ by role ‚Äî e.g. HOD tenant-wide, treating clinician own-panel-first.)\n- **O-ACC2:** Confirm non-clinical/sponsor users are **de-identified aggregate only** (the firewall), regardless of (A).\n- **O-ACC3:** Field-level masking ‚Äî which columns are always masked unless explicitly revealed (names, ABHA/Aadhaar, phone), and is every reveal audited?\n- **Straw-man:** Role-tiered ‚Äî **clinical roles get broad (tenant-wide/department) identified access** for collaboration + cross-reporting, with the *ability* to tighten to own-panel via scopes; **all non-clinical/sponsor access is de-identified aggregate**; identifiers masked-by-default with audited reveal.\n\n### 9.1b Deployment / go-to-market model ‚Äî `O-DEP` (P0, OPEN ‚Äî revisits O-TEN)\nSeparate from *isolation*, this is *how the product is sold/run*. A second model is on the table: a **public-internet SaaS where each doctor (or doctor + team) self-onboards into their own dedicated tenant** ‚Äî i.e. the \"per-doctor tenant\" / \"tenant-C\" option ‚Äî rather than one institutional deployment.\n\n| Model | Shape | Cross-reporting | Onboarding |\n|---|---|---|---|\n| **Institutional single tenant** (current decision) | One shared tenant for an institution; doctors = scopes | ‚úÖ Native (one schema) | Admin provisions doctors/teams |\n| **Per-doctor SaaS tenant** (`O-DEP`, internet) | Each doctor/team gets a dedicated isolated tenant; self-serve sign-up | ‚ùå Not native ‚Äî needs a **separate de-identified registry/aggregation layer above tenants** to report across doctors | Self-onboarding flow + per-tenant bootstrap |\n\n- **O-DEP1:** Is the target an **institutional deployment** (single tenant) **or** an **internet SaaS with a dedicated tenant per doctor/team** ‚Äî or **both** (institutional now, SaaS later)?\n- **O-DEP2:** If per-doctor tenants are in scope, cross-reporting requires a **registry aggregation layer** (de-identified) above the tenants. Is that layer in scope, and who owns it (us / sponsor / network)?\n- **O-DEP3:** Self-serve sign-up implies public auth, billing, per-tenant provisioning/bootstrap, and tenant-level data-isolation guarantees ‚Äî confirm these are wanted.\n- **Tension to resolve:** the current **single-tenant decision (O-TEN)** is optimised for cross-reporting; a per-doctor-tenant SaaS is optimised for isolation/self-serve and **breaks native cross-reporting**. The only way to have both is single-tenant-with-scopes **or** per-doctor-tenants **plus** a registry layer. The business must pick the primary model.\n- **Straw-man:** Institutional single tenant for v1 (matches O-TEN); design the schema/scoping so a future per-doctor-tenant SaaS + de-identified registry layer remains possible, but do **not** build the SaaS multi-tenant control plane in v1.\n\n### 9.2 Template / framework variation ‚Äî `O-TMPL` (P0/P1)\n- **O-TMPL1 (single vs multi-disease):** Is this **only prostate cancer**, or the **first of several disease frameworks** (breast, lung, ‚Ä¶)? \"Template variation per framework\" suggests a reusable platform, which changes how we model the core.\n- **O-TMPL2 (per-department):** Do **Urology / Radiation Onc / Medical Onc** need different record templates, nudge sets, and dashboards ‚Äî or one shared template with role views?\n- **O-TMPL3 (overlay strategy):** If multi-disease: a **shared clinical core + disease-specific overlay**, or fully separate builds?\n- **Straw-man:** Prostate first, but **schema designed as shared clinical core + disease overlay** so other cancers template later. Per-department differences handled as **role/department-scoped layouts + tagged nudge-rule subsets**, not separate schemas. (NOVA Edge supports this via per-role `ui/schema_ui.json` layouts + per-vertical presets.)\n\n### 9.3 Reporting & data-structure expectations ‚Äî `O-REP` (P1)\n\"How should data be structured to be usable for end-user reporting/queries?\" ‚Äî needs the analytics contract defined up front, because it dictates the grain we model at.\n- **O-REP1 (grain):** Which reporting grains are needed ‚Äî patient, encounter/visit, **treatment-line**, **nudge-event**, lab-observation?\n- **O-REP2 (destination):** In-product dashboards only, or must data **export to a warehouse / BI (Power BI/Tableau)** or to the pharma sponsor?\n- **O-REP3 (questions):** Confirm/extend the KPI list the model must answer (the 347-cohort dashboards are the starting set: protocol adherence, care-gap closure, time-to-treatment, outcomes/survival).\n- **O-REP4 (identified vs de-identified + cadence):** Per audience, and refresh real-time vs daily/periodic?\n- **O-REP5 (longitudinal):** Confirm PSA series / treatment timelines / survival need time-series + event modeling.\n- **Straw-man:** Model **fine-grained event/observation tables** (PSA, staging, treatment-line, nudge-event) so any rollup is possible ‚Üí curated **RLS-scoped materialized views** for the known dashboards ‚Üí a **de-identified export feed** for pharma/BI; daily refresh.\n\n### 9.4 Communication channels for nudges ‚Äî `O-CH` (P1)\n- **O-CH1:** Are nudges **portal-only (in-app alerts)**, or also **email / SMS / WhatsApp**?\n- **O-CH2:** Inbound ‚Äî does a notified member get an **inbox item / email they can act on**, and does it create a **task** for them?\n- **O-CH3:** **Digest vs real-time** (e.g. daily care-gap digest per clinician + immediate for urgent)?\n- **O-CH4:** Any **patient-facing** communication (reminders), or clinician-only?\n- **Straw-man:** In-app inbox primary; **email digest** for clinicians + immediate email for urgent; **clinician-only** (no patient-facing) in v1; WhatsApp later. (All are config workflow comms steps in NOVA Edge; channel choice drives the provider integration.)\n\n### 9.5 Pharma role, data access & governance ‚Äî `O-PH` (P0, sensitive) ‚öÝÔ∏è\n**Context we must confirm:** the demo watermark says *\"THB Sample Prostate Ca Screens prepared for **NVS** Team.\"* We infer **NVS = Novartis** (its stock ticker) ‚Äî i.e. a **pharma sponsor/audience**. The care gaps the product foregrounds (**ARSI intensification, PSMA PET-CT, bone protection**) are areas of direct pharma commercial interest. This must be clarified because it drives **data governance, consent, and access boundaries**, and a potential **conflict-of-interest** concern.\n- **O-PH1:** Is pharma (Novartis?) the **sponsor/funder**, a **data consumer**, both, or neither? What's the commercial model?\n- **O-PH2:** What data does pharma receive ‚Äî **none / aggregate de-identified / patient-level de-identified (RWE) / identified (consent-only)**?\n- **O-PH3 (governance/COI):** If a sponsor has commercial interest in a recommended therapy, what **independent clinical governance + versioned sign-off** ensures nudges are **guideline-driven, not promotional**? *(Essential for clinician trust and compliance.)*\n- **O-PH4 (consent/legal):** Consent basis for any secondary (pharma/research) use ‚Äî India **DPDP Act**, ICMR, ethics-committee approval?\n- **O-PH5 (firewall):** Is there a hard separation between the **identified care-delivery** product and any **pharma-facing analytics/RWE** layer?\n- **Straw-man:** Pharma receives **de-identified aggregate** care-gap/cohort reporting only, via a **separate registry/RWE layer** with its own consent basis; clinical nudge rules governed by an **independent clinical committee** (versioned sign-off); **hard firewall** between identified care data and pharma outputs. **Flag for legal/ethics review before build.**\n\n### 9.6 Domain, hosting, data residency & ownership ‚Äî `O-DOM` (P2)\n- **O-DOM1:** Product **domain/URL** ‚Äî decided? Is domain procurement/ownership **our scope** or the client's?\n- **O-DOM2:** **Hosting/deployment** ownership (our managed NOVA Edge vs client infra vs cloud) and **India data-residency** requirement?\n- **O-DOM3:** **Data & IP ownership** ‚Äî hospital, pharma sponsor, or us?\n- **Straw-man:** Client/sponsor owns domain + data; we host NOVA Edge in an **India region**; IP/ownership pinned in the contract.\n\n### 9.7 Onboarding cohort ‚Äî predefined doctor-teams? ‚Äî `O-ONB` (P0, OPEN)\n**Finding (checked):** no predefined set of doctor-teams or institutions to onboard exists in the docs or scope. The only \"team\" anywhere is the demo's **single illustrative directory** ‚Äî Dr. Anand Sharma (HOD) + 5 MDT members (Radiation Onc, Medical Onc, Onco-radiology, Nuclear Medicine, Nurse Specialist), one department (\"Urology & Radiation Oncology\"), AIIMS ‚Äî plus a few sample treating-doctor names inside patient records. `SCOPE.md` mentions an \"Admin console for team directory\" only as a **future** capability; it lists no actual roster. So we have **no clarity** on who is onboarded at launch.\n\n- **O-ONB1:** Is there a **predefined list of doctor-teams / departments / institutions** to onboard at launch, or is onboarding open/admin-driven over time?\n- **O-ONB2:** If predefined ‚Äî please provide the roster (names, specialty, department, email/identity source) so we can seed roles, team membership, and scopes.\n- **O-ONB3:** What is the **onboarding mechanism** ‚Äî admin-provisioned, bulk import, HIS/HR-directory sync, or self-serve (links to O-DEP3)?\n- **O-ONB4:** What is the **identity source** for clinician logins ‚Äî hospital SSO (Azure AD), email/OTP, or platform-local accounts?\n- **O-ONB5:** How are clinicians **mapped to departments/teams and patient scopes** at onboarding (drives the O-ACC department/team boundary)?\n- **Straw-man:** A small **predefined pilot roster** (one department, one institution) is admin-provisioned for v1, identity via hospital SSO if available else platform-local; team membership and department scope set at onboarding. Confirm the actual roster.\n\n### 9.8 Round-2 additions to the gate\nNew **P0** (join ¬ß7's P0 list ‚Äî preset cannot start without them): **O-TEN1/O-TEN2** (tenancy/isolation), **O-TMPL1** (single vs multi-disease), **O-PH1/O-PH2/O-PH3** (pharma role, data access, governance).\nNew **P1:** O-TMPL2, O-REP1/O-REP2, O-CH1/O-CH2. New **P2:** O-DOM1‚Äì3, O-REP4, O-CH3/O-CH4.\n\n---\n\n## 10. Process ‚Äî how we get to sign-off\n\n1. **Review this doc with the business/clinical team**; get the P0/P1 answers (a 60‚Äì90 min working session would clear most).\n2. We update this doc with confirmed decisions ‚Üí it becomes the **agreed flow + boundary spec**.\n3. We then produce **\"our version\"**: the to-be end-to-end flows (swimlane diagrams per role) + the entity/scope/role model ‚Äî for **sign-off**.\n4. **Only then** do we start the NOVA Edge `prostate_cancer` preset, encoding the signed-off model (entities + `scopes`/`row_policies` + `roles` + nudge `guideline_rule` workflow + MDT/notify flows).\n\n> **Gate:** no preset work begins until ¬ß7 P0 (and ideally P1) are answered and ¬ß8 is confirmed or amended.\n\n---\n\n*Companion docs: `PRODUCT-PRD.md` / `FEATURE-PRD.md` / `FLOW-PRD.md` (intended product), `NOVA-EDGE-FEASIBILITY.md` (platform mapping), and the upstream `PRD.md` / `FUNCTIONAL_REQUIREMENTS.md` / `SCOPE.md` / `ProstaCare_Nudge_Logic_Handoff.md` (demo requirements). This doc is the discovery gate that must close before the preset build.*\n"}]</script>
<script>
 const DOCS = JSON.parse(document.getElementById('payload').textContent);
 mermaid.initialize({startOnLoad:false, theme:'base', securityLevel:'loose',
   themeVariables:{primaryColor:'#EAF4FF',primaryBorderColor:'#2E92FF',primaryTextColor:'#1D4F91',lineColor:'#2E92FF',fontFamily:'DM Sans, sans-serif'}});
 const tabs=document.getElementById('tabs'), main=document.getElementById('main');
 DOCS.forEach((d,i)=>{
   const b=document.createElement('button'); b.textContent=d.title; b.onclick=()=>show(i);
   if(i===0)b.classList.add('active'); tabs.appendChild(b);
   const sec=document.createElement('section'); sec.className='doc md'; sec.id='doc-'+i;
   sec.style.display=i===0?'block':'none'; sec.innerHTML=marked.parse(d.md); main.appendChild(sec);
 });
 function renderMermaidIn(sec){
   sec.querySelectorAll('code.language-mermaid').forEach(code=>{
     const pre=code.closest('pre')||code; const div=document.createElement('div');
     div.className='mermaid'; div.textContent=code.textContent; pre.replaceWith(div);
   });
   try{ mermaid.run({nodes:sec.querySelectorAll('.mermaid')}); }catch(e){ console.error(e); }
 }
 const rendered=new Set();
 function show(i){
   DOCS.forEach((_,j)=>document.getElementById('doc-'+j).style.display=j===i?'block':'none');
   [...tabs.children].forEach((b,j)=>b.classList.toggle('active',j===i));
   if(!rendered.has(i)){rendered.add(i);renderMermaidIn(document.getElementById('doc-'+i));}
   window.scrollTo(0,0);
 }
 rendered.add(0); renderMermaidIn(document.getElementById('doc-0'));
</script>
