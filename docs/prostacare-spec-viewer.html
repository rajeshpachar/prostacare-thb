<script id="payload" type="application/json">[{"title": "‚ñ∂ Dev-Start Gate (open questions)", "file": "DEV_START_GATE.md", "md": "# ProstaCare ‚Äî Open Questions & Confirmations Required Before Development Starts\n\n**Purpose:** one consolidated list of everything we need from the client (business / clinical / legal) before, and shortly after, development begins. Every item carries a **recommended default** so the client can simply **confirm or amend** rather than design from scratch.\n\n**Status summary**\n- ‚úÖ **10 decisions already settled** (¬ß1) ‚Äî no need to revisit.\n- üî¥ **10 blockers (P0)** ‚Äî must be answered before dev starts (¬ß2).\n- üüÝ **7 items (P1)** ‚Äî needed within the first sprint (¬ß3).\n- üü° **7 items (P2)** ‚Äî needed before go-live, not before dev (¬ß4).\n- ‚öôÔ∏è **6 internal decisions** ‚Äî ours to make, no client input needed (¬ß5).\n\n> Fastest path: a single **90-minute workshop** covering ¬ß2, with clinical + business + legal present. Everything in ¬ß2 has a recommended default; most should be a \"confirm.\"\n\n---\n\n## 1. Already decided (for reference ‚Äî not open)\n\n| # | Decision |\n|---|---|\n| 1 | **Tenant = institution** ‚Äî one schema per hospital; no `institution_id` |\n| 2 | **Clinical access = department/team scoped** (HOD/coordinator may be tenant-wide) |\n| 3 | **Ops / quality / pharma sponsor = de-identified aggregate only** (PHI firewall) |\n| 4 | Identifiers **masked-by-default + audited reveal** *(applies only if the identified model is chosen ‚Äî see B1)* |\n| 5 | **Notifications = in-app inbox + email via AWS SES**; **login identity = email** |\n| 6 | **Cross-tenant aggregation** = in-tenant `sponsor_metric` ‚Üí Zygo Data Cloud ‚Üí sponsor (architecture spec'd) |\n| 7 | **8 care-gap rules** specified (conditions/severities) ‚Äî pending clinical sign-off (B8) |\n| 8 | **Nudge lifecycle** = open ‚Üí acknowledged ‚Üí **auto-resolve** (no snooze, no dismiss); engine runs **on-write** (no cron) |\n| 9 | **Roles = Clinician ¬∑ HOD (privileged) ¬∑ Admin**; MDT = `is_mdt_member` notify flag; **no department** |\n| 10 | **Record lock:** edit window ‚Üí auto-lock ‚Üí **HOD** time-bound unlock (reason required, audited) |\n\n---\n\n## 2. üî¥ BLOCKERS ‚Äî needed before development starts\n\n| ID | Question | Why it blocks dev | Owner | Our recommended default |\n|---|---|---|---|---|\n| **B1** | **Identity model:** does ProstaCare store PHI? (A) de-identified registry ‚Äî `patient_code` only, identity stays in hospital HIS; (B) identified EMR-lite; (C) de-identified core + optional isolated identity module | Determines the entire schema, consent basis, and compliance surface. **The single biggest decision.** | Clinical + Legal | **A** (or **C** if any site needs bedside identification). Matches the V2 workbook, makes the sponsor firewall near-trivial, lightest DPDP burden. |\n| **B2** | **Multi-user or single console?** Do clinicians/MDT members log in, have a panel and an inbox ‚Äî or is \"team\" just a notify list? | Determines roles, scopes, inbox, and the whole collaboration model | Business | **Multi-user, role-based** (the department-scoped access decision already implies it) |\n| **B3** | **Roles & MDT (simplified):** confirm **no `department`** ‚Äî all clinical roles see the institution's patients, **HOD is the privileged role**, and the MDT panel is only a **notification group** (no access implication). Who manages MDT membership? | Determines roles, access model, and the \"notify all\" target | Clinical | Clinician ¬∑ **HOD (privileged)** ¬∑ Coordinator ¬∑ Ops/Quality ¬∑ Admin. MDT panel = notify group, admin-managed. Each patient has one **primary clinician** (attribution, not restriction). |\n| **B3b** | **Record locking:** confirm **edit window = 48 h**, **HOD unlock window = 24 h**, unlock **restricted to HOD** with a mandatory reason. Should Coordinator also unlock? | Determines the lock/unlock workflow + audit model | Clinical + Business | As stated. Append-only ersioned sign-off; hard firewall |\n| **B8** | **Clinical sign-off on the 8 care-gap rules** ‚Äî conditions, severities, next-step wording ‚Äî and the **benchmark targets** (ARSI 60%, PSMA 85%, bone protection 85%, MDT review 95%) | The care-gap engine is the core product; rules cannot be coded unsigned | Clinical | Confirm as specified in `PROSTACARE_FUNCTIONAL_LOGIC_SPEC.md ¬ß4`; amend thresholds/wording as needed |\n| **B9** | **Aggregation contract:** confirm the `metric_key` catalogue; **small-cell suppression threshold** (default **11**); institution shown as **anonymised code** vs named | Determines what `sponsor_metric` computes and exports | Clinical + Legal | Catalogue as spec'd; threshold **11**; **anonymised `institution_code`** |\n| **B10** | **Launch institution + user roster + identity source:** which hospital(s) go first, the doctor/coordinator roster (name, specialty, role, email), and **Azure AD SSO vs email/local accounts** | Cannot provision a tenant or onboard users without it. No roster exists in any document today. | Business + IT | Start with **one department at one institution**; SSO if available, else email/local. Also needs an **SES verified sender domain + SES production access** (see P1-9). |\n\n---\n\n## 3. üüÝ P1 ‚Äî needed within the first sprint (dev can start without)\n\n| ID | Question | Owner | Recommended default |\n|---|---|---|---|\n| P1-1 | **Nudge ownership** ‚Äî who is responsible when a gap fires (treating clinician / relevant specialist / coordinator)? | Clinical | Treating clinician, with coordinator visibility |\n| P1-2 | **SLA / escalation / snooze** ‚Äî do unactioned urgent nudges escalate? After how long, to whom? Is \"snooze\" allowed? Does dismissal need a reason? | Clinical | Escalate urgent to HOD/coordinator after N days; dismissal requires an audited reason; no snooze in v1 |\n| P1-3 | **Notification detail** ‚Äî digest vs real-time; which triggers email vs in-app only; any patient-facing comms? | Business | Real-time for urgent, **daily digest** otherwise; clinician-only (no patient-facing) in v1 |\n| P1-4 | **Edit permissions** ‚Äî is record editing gated by specialty (e.g. only Radiation Onc edits the RT plan)? Should \"notify all MDT\" be restricted? | Clinical | No specialty gating in v1; restrict \"notify all MDT\" to HOD/coordinator |\n| P1-5 | **Cardinality confirmations** ‚Äî `pathology` 1-per-patient (re-biopsy ‚Üí new row), `outcome` 1-per-patient, **supportive-care dated** | Clinical | As recommended (dated supportive-care gives the bone-protection audit trail) |\n| P1-6 | **Data migration** ‚Äî greenfield, or import an existing registry at the launch site? | Business | Greenfield for v1 |\n| P1-7 | **Rule governance mechanism** ‚Äî clinicians tune severity/wording/thresholds in config; changing rule *logic shape* is a versioned engineering change. Acceptable? | Clinical | Yes (see `NOVAEDGE_ALIGNMENT_REVIEW.md` G2) |\n\n---\n\n## 4. üü° P2 ‚Äî needed before go-live, not before dev\n\n| ID | Question | Owner |\n|---|---|---|\n| P2-1 | **SES prerequisites** ‚Äî verified sender domain/address + SES **production access** (out of sandbox) | IT |\n| P2-2 | **Export mechanism & cadence** to Zygo Data Cloud ‚Äî S3 push (recommended) vs pull API; nightly compute, weekly/monthly export | Business + Platform |\n| P2-3 | **Consent / legal basis** for aggregate secondary use (DPDP Act; ethics committee if applicable) | Legal |\n| P2-4 | **Domain, hosting, data residency, IP ownership** | Business + Legal |\n| P2-5 | **Clinical chart renderers** ‚Äî PSA line, percentile bands, Kaplan-Meier (frontend work) | Platform |\n| P2-6 | **Enum localisation** per site (RT facilities, referring centres) | Clinical |\n| P2-7 | **Deployment model** ‚Äî per-doctor SaaS tenant (`O-DEP`) is *not* v1; confirm it stays out of scope | Business |\n\n---\n\n## 5. ‚öôÔ∏è Internal decisions (ours ‚Äî no client input needed)\n\n| ID | Item | Resolution |\n|---|---|---|\n| I-1 | Cross-tenant de-identified aggregation layer (the one net-new component) | Build per `CROSS_TENANT_AGGREGATION_SPEC.md` |\n| I-2 | Current-state (\"latest dated row\") encoding | Materialized view + lateral subquery ‚Äî **not** a computed column |\n| I-3 | Care-gap rule encoding | `guideline_rule` config metadata + one predicate step per rule |\n| I-4 | Workbook flag columns ‚Üí normalized `patient_condition` rows | Import transform |\n| I-5 | Partitioning (`psa_reading`, `nudge_event`) | RANGE partition + composite PK |\n| I-6 | Audit coverage | Cross-cutting audit subscription on all entities + reveal audit |\n\n---\n\n## 6. What we can start immediately once ¬ß2 is answered\n\n| Unblocked by | Work that can start |\n|---|---|\n| **B1 + B2 + B4 + B6** | **P0 Foundation** ‚Äî tenancy, roles/scopes, patient hub, Tier-1 current-state entities, onboarding console |\n| **B1 + B6** | **P1 Longitudinal** ‚Äî PSA, staging, imaging, treatment lines, supportive care, journey |\n| **B8** | **P2 Care-gap engine** ‚Äî the 8 rules, nudge lifecycle |\n| **B3 + B10 + P2-1** | **MDT notify** (SES) + user onboarding |\n| **B7 + B9** | **Aggregation** ‚Äî `sponsor_metric` + Zygo Data Cloud pipeline |\n| **B5** | Schema core shape (single-disease vs templatable overlay) |\n\n**Critical path:** **B1 (identity model)** gates everything. **B8 (rule sign-off)** gates the care-gap engine. **B10 (roster + auth)** gates the first tenant.\n\n---\n\n*Sources consolidated from: `FLOW-CLARITY-AND-OPEN-QUESTIONS.md`, `PROSTACARE_BUILD_SPEC_V1.md ¬ß12`, `PROSTACARE_FUNCTIONAL_LOGIC_SPEC.md ¬ß7`, `NOVAEDGE_ALIGNMENT_REVIEW.md ¬ß4/¬ß6`, `CROSS_TENANT_AGGREGATION_SPEC.md ¬ß6`, `TENANT_ONBOARDING_PLAN.md ¬ß6`.*\n"}, {"title": "‚úÇ Simplification Review", "file": "SIMPLIFICATION_REVIEW.md", "md": "# ProstaCare ‚Äî Simplification Review (are we over-building?)\n\n**Method:** every construct we have specified, cross-checked against what the requirements actually ask for ‚Äî `FUNCTIONAL_REQUIREMENTS.md` (with its Must / Should / **Future** priorities), `PRD.md`, `SCOPE.md`, `ProstaCare_Nudge_Logic_Handoff.md`, and the V2 workbook. If nothing requires it, it is a candidate to cut or defer.\n\n**Headline:** we were over-building in **13 places**. Cutting them removes ~1 entity, ~1 background job, 2 nudge states, a partition scheme, an import transform, and a whole AI subsystem from v1 ‚Äî with **no loss against any stated requirement**.\n\n---\n\n## 1. Evidence from the requirement docs\n\n| Check | Result |\n|---|---|\n| \"AI Buddy\" in FR / PRD / SCOPE | **0 mentions** (exists only in the newer workbook) |\n| \"snooze\" / \"SLA\" / \"escalation\" / \"encounter\" in FR / Nudge Handoff | **0 mentions** |\n| FR items explicitly marked **Future** | production auth, cross-device persistence, **rules governance**, real email/messaging, secure doc storage, guideline content governance, audit logs, encryption |\n| Nudge lifecycle in the Handoff | open ‚Üí (acknowledge routes to team) ‚Üí **auto-resolves when the source field changes**. No dismiss, no snooze. |\n\n---\n\n## 2. The 13 trims\n\n| # | We specified | Required by? | Verdict | Simpler path |\n|---|---|---|---|---|\n| **T1** | **Nudge `snooze`** | Nothing | ‚ùå **Cut** | Not in demo, FR, or Handoff. Drop entirely. |\n| **T2** | **Nudge `dismissed` state** | Nothing | ‚ùå **Cut** | Clinical non-applicability is **already expressed in the data**: `bone_protection = \"Not indicated\"`, `mdt_status = \"Not applicable\"`, `germline = \"Pending\"`. The rules simply don't fire. No dismiss action needed. *(Cheap to add later if clinicians ask.)* |\n| **T3** | **SLA / escalation** for unactioned urgent nudges | Nothing | ‚è∏ **Defer** | No requirement. Add when clinicians ask for it. |\n| **T4** | **`encounter` entity** (even optional) | Nothing | ‚è∏ **Defer** | Visit timing already comes from `next_follow_up_psa_date` + `last_follow_up_date`. Don't build it in v1; document as future (HIS appointment sync). |\n| **T5** | **Table partitioning** on `psa_reading` / `nudge_event` | Nothing | ‚ùå **Cut** | At ~347 patients / a few thousand rows this is pure overhead ‚Äî and it forces a composite PK + a lookback gotcha. Plain indexed tables. Revisit at 6-figure volumes. |\n| **T6** | **`patient_condition`** normalized table (+ import transform) | Nothing | ‚ùå **Cut** | The workbook and the UI both use **Yes/No flag columns** (9 comorbidities, 6 family-history). Keep them as boolean columns. Removes an entity **and** gap **G6** (the pivot transform). The list is fixed; the comorbidity/pair charts are trivial SQL over booleans. |\n| **T7** | **`mdt_panel` / `mdt_panel_member` table** | Nothing | ‚ùå **Cut** | Since MDT is only a *notification group* (no access implication), make it a boolean **`user.is_mdt_member`**. One less table and join. |\n| **T8** | **5 roles** (Clinician, HOD, Coordinator, Ops/Quality, Admin) | FR implies few | ‚úÇÔ∏è **Trim to 3** | **Clinician ¬∑ HOD (privileged) ¬∑ Admin.** Coordinator = a Clinician. Add **Ops/Quality** only if in-product de-identified dashboards are needed (sponsor reads Data Cloud anyway). |\n| **T9** | Care-gap engine on **write-subscriptions *and* a daily cron** | Nothing | ‚úÇÔ∏è **Trim** | All 8 rules are **state-based, not time-based** ‚Äî they only change when data changes. **On-write is sufficient.** Add the cron only when a time-based rule appears (e.g. \"DEXA older than 2 years\"). |\n| **T10** | `nudge_event` actions: opened / **viewed** / acted / **routed** / resolved | FR-022 (Should) | ‚úÇÔ∏è **Trim to 3** | Keep **opened ¬∑ acknowledged ¬∑ resolved** (enough for the trend chart and audit). \"Viewed\" is per-user telemetry; \"routed\" is inferable from the `notification` row. |\n| **T11** | Notifications: in-app inbox **+ SES email + live SSE push + task creation + digest** | FR-070..075 (Must/Should), FR-076 (Future) | ‚úÇÔ∏è **Trim** | v1 = **SES email + a simple in-app notification list**. Drop live SSE push, auto-task creation, and the digest scheduler. |\n| **T12** | **AI Buddy** (ADK agent, 4 lenses, `evidence_pack` / `guideline_pack`) | **0 mentions in FR/PRD/SCOPE** | ‚è∏ **Defer to Phase 2** | The largest single build in the spec, required by nothing in the agreed requirements. Ship the registry + care-gap engine + dashboards first. |\n| **T13** | **Rule-builder UI + versioned sign-off workflow** | FR-064 = **Future** | ‚úÇÔ∏è **Trim** | Seed the 8 rules as config (`guideline_rule`: rule_id, severity, next_step, active, version). Edit via admin/JSON. **No rule-editor UI in v1.** |\n\n---\n\n## 3. What we keep (and why)\n\n| Kept | Justification |\n|---|---|\n| **Dated `staging_assessment`** | Restaging + HSPC‚ÜíCRPC drives the ARSI rule. Overwriting loses the transition. Non-negotiable. |\n| **Dated `treatment_line`** | Therapy is sequential (ADT ‚Üí ARSI ‚Üí chemo ‚Üí RT). One row can't express it. |\n| **Dated `imaging_study`** | Same shape as `psa_reading`; gives study dates the monthly sponsor metrics need. Cheap. |\n| **Dated `supportive_care_event`** | Bone protection is the largest care gap; start/stop needs an audit trail. |\n| **`nudge` + `nudge_event`** | The trend chart (FR-022) and closure audit are impossible from snapshot rows ‚Äî the workbook says so itself. |\n| **Record lock + HOD unlock** | Explicitly requested. Kept as **one** mechanism (no separate amendment/void concept). |\n| **`sponsor_metric` + Data Cloud** | Explicitly requested; the only cross-tenant path. |\n| **4 √ó 1:1 tables** (patient, pathology, treatment_plan, outcome) | They map 1:1 to the four entry screens and to the **completeness-by-field-group** requirement. Not folded into one wide table. |\n\n---\n\n## 4. The simplified v1 model\n\n**Entities (down from ~22 to ~15):**\n```\nConfig/users : app_user (role, email, is_mdt_member) ¬∑ guideline_rule\n1:1 per pt   : patient ¬∑ pathology (+comorbidity/family flags) ¬∑ treatment_plan ¬∑ outcome\n1:N dated    : psa_reading ¬∑ staging_assessment ¬∑ imaging_study ¬∑\n               treatment_line ¬∑ supportive_care_event ¬∑ journey_event\nSystem       : nudge ¬∑ nudge_event ¬∑ notification/discussion_entry ¬∑ document ¬∑ audit_event\nDerived      : current_state ¬∑ dashboards ¬∑ sponsor_metric\n```\n**Removed from v1:** `department`, `care_team_member`, `mdt_panel`, `patient_condition`, `encounter`, `evidence_pack`, `guideline_pack`, partitioning, the daily cron, snooze, dismiss, SLA/escalation, SSE push, digest, rule-builder UI, AI Buddy.\n\n**Simplified nudge lifecycle:**\n```mermaid\nstateDiagram-v2\n  [*] --> Open : rule fires (on write)\n  Open --> Acknowledged : clinician acknowledges ‚Üí routes to MDT\n  Open --> Resolved : source field changes ‚Üí rule stops firing (auto)\n  Acknowledged --> Resolved : source field changes (auto)\n  Resolved --> Open : condition recurs\n  Resolved --> [*]\n```\n*(No Dismissed. No Snoozed. Resolution is data-driven ‚Äî exactly what the Nudge Handoff describes.)*\n\n---\n\n## 5. Impact\n\n| Benefit | Detail |\n|---|---|\n| **Fewer moving parts** | ‚àí7 entities, ‚àí1 background job, ‚àí2 nudge states, ‚àí1 partition scheme, ‚àí1 import transform |\n| **Gaps closed for free** | **G5** (partition PK/lookback) and **G6** (flag‚Üírow transform) disappear entirely |\n| **Smaller v1 scope** | AI Buddy (the biggest subsystem) moves to Phase 2 |\n| **Fewer client questions** | T3/T4/T12 remove three items from the dev-start gate |\n| **Nothing lost** | Every trim is unsupported by FR / PRD / SCOPE / Handoff |\n\n---\n\n## 6. Recommended phasing after the trim\n\n| Phase | Scope |\n|---|---|\n| **P0** | Tenancy + roles (3) + patient hub + 1:1 entities + record lock |\n| **P1** | Dated tiers (PSA, staging, imaging, treatment lines, supportive care, journey) |\n| **P2** | Care-gap engine (8 rules, on-write) + nudge lifecycle + MDT notify (SES) |\n| **P3** | Dashboards + `sponsor_metric` + Data Cloud pipeline |\n| **P4** | *(later)* AI Buddy, encounter/HIS sync, SLA/escalation, rule-editor UI, partitioning |\n\n---\n\n## 7. Ask the client to confirm the cuts\n1. **Nudge lifecycle** = open ‚Üí acknowledged ‚Üí auto-resolve. **No snooze, no dismiss** ‚Äî non-applicability is captured in the field value (\"Not indicated\" / \"Not applicable\"). OK?\n2. **AI Buddy deferred to Phase 2** (absent from the agreed functional requirements). OK?\n3. **Roles = Clinician ¬∑ HOD ¬∑ Admin** (Coordinator folded into Clinician). OK?\n4. **No SLA/escalation, no encounter** in v1. OK?\n5. Comorbidity/family history stay as **Yes/No flags** (as in the workbook/UI). OK?\n\n---\n\n*Cross-checked against: `FUNCTIONAL_REQUIREMENTS.md` (Must/Should/Future), `PRD.md`, `SCOPE.md`, `ProstaCare_Nudge_Logic_Handoff.md`, `ProstaCare_Schema_08072026_V2.xlsx`.*\n"}, {"title": "Functional & Logic Spec", "file": "PROSTACARE_FUNCTIONAL_LOGIC_SPEC.md", "md": "# ProstaCare ‚Äî Functional & Logic Specification (Clinical Sign-off Draft)\n\n**Who this is for:** the clinical team, product owners, and engineers ‚Äî together. It describes, in plain language plus pseudo-code, **what data we capture, how the data relates, and how every workflow runs** (inputs ‚Üí logic ‚Üí outputs ‚Üí derived data). It is written to be **signed off at the pseudo-code level** before build.\n\n**How to read it:**\n- **¬ß1 Data models** ‚Äî what we capture about each thing, its variables, an example, and how it links to others.\n- **¬ß2 The one core idea** ‚Äî \"current state\" vs \"history,\" with a worked example.\n- **¬ß3 Workflows** ‚Äî each flow as a visual diagram + inputs/logic/outputs pseudo-code.\n- **¬ß4 Care-gap rules** ‚Äî the 8 rules in full, with a worked patient example.\n- **¬ß5 Derived data** ‚Äî every computed number and its formula.\n- **¬ß6 Visual master flow** + **¬ß7 sign-off checklist**.\n\n> Naming note: field keys (e.g. `psma_pet_ct`) match the workbook `Field_Dictionary` exactly, so this spec and the data-entry pack stay in lockstep.\n\n---\n\n## 1. Data models ‚Äî what the platform captures\n\nEach box below is one \"data model\" (a table of records). **Cardinality** tells you how many rows exist per patient:\n`1 per patient` = current state ¬∑ `many (dated)` = a history log ¬∑ `derived` = calculated, never typed.\n\n### 1.1 Who uses it (roles) ‚Äî *simplified: no department*\n> **Tenant = institution.** Each onboarded hospital is its own tenant, so **no `institution_id` is stored**. There is **no `department` entity**: all clinical users see that institution's patients, and access differs by **role**, not by department. \"Teams\" (the MDT panel) are a **notification group, not an access boundary**. Cross-*institution* reporting is a separate **de-identified aggregation layer above tenants**.\n\n| Model | Cardinality | Key variables | Plain meaning |\n|---|---|---|---|\n| **User** | many per tenant | `user_id`, name, **`email` (login identity)**, specialty, `role` | Anyone who logs in |\n| **Role** | config | Clinician ¬∑ **HOD (privileged)** ¬∑ Coordinator ¬∑ Ops/Quality ¬∑ Admin | What you may do |\n| **MDT panel member** | many | `user_id` | The \"notify all MDT\" group ‚Äî **no access implication** |\n| **Primary clinician** | 1 per patient | `patient.primary_clinician_id` | The treating clinician (attribution, not restriction) |\n\n**Access by role (the whole model):**\n| Role | Sees | May do |\n|---|---|---|\n| **Clinician** | all patients in the institution | enter/edit clinical data **within the edit window** (¬ß1.8); act on nudges; notify a member |\n| **HOD** | all patients | everything a Clinician can **+ privileged:** **unlock a locked record** (time-bound), notify all MDT, view audit |\n| **Coordinator** | all patients | clinical entry + manage roster / MDT panel |\n| **Ops / Quality** | **de-identified aggregates only** | dashboards; no patient records |\n| **Admin** | no clinical data | users, roles, rules, config |\n\n### 1.2 The patient & current clinical state\n| Model | Cardinality | Key variables | Example |\n|---|---|---|---|\n| **Patient** (hub) | 1 per patient | `patient_code`, `age_at_diagnosis_years`, `healthcare_coverage`, `state`, `referral_source`, `registry_enrolment_date`, `diagnosis_date` | `PCR-001`, 68, CGHS, Delhi, Govt OPD |\n| **Pathology** | 1 per patient | `gleason_score`, `isup_grade_group`, `biopsy_type`, `pi_rads_score`, `cores_positive_total`, `perineural_invasion`, `ece`, `dre_findings`, `ipss_score`, `prostate_volume_cc` | Gleason 4+4=8, ISUP 4, MRI-fusion |\n| **Patient condition** | many | `type` (comorbidity/family), `condition`, `present` | Diabetes = Yes; Breast Ca (family) = Yes |\n| **Treatment plan** | 1 per patient | `treatment_intent`, `mdt_tumour_board_status`, `date_of_mdt_review`, `clinical_trial_eligibility`, `treatment_start_date` | Disease control; MDT reviewed 2026-06-20 |\n| **Outcome** | 1 per patient | `best_response`, `psa_nadir_value/date`, `psa_doubling_time_months`, `biochemical_recurrence_status/date`, `crpc_progression_status/date`, `rt_outcome_status` | Nadir 0.8 @ 2026-05, no recurrence |\n\n### 1.3 History logs (the longitudinal tiers) ‚Äî *dated, many rows per patient*\n| Model | Cardinality | Key variables | Why it's a log, not a cell |\n|---|---|---|---|\n| **PSA reading** | many (dated) | `psa_date`, `psa_ng_ml`, `free_psa_pct`, `psa_density`, `context_remarks` | PSA moves over time; drives the trend chart |\n| **Staging assessment** | many (dated) | `assessed_on`, `clinical_t_stage`, `n_stage`, `m_stage`, `eau_risk_category`, `ecog_performance_status`, `castration_status` | Restaging & HSPC‚ÜíCRPC are dated facts, not overwrites |\n| **Imaging study** | many (dated) | `study_date`, `modality` (mpMRI/bone scan/PSMA/CT/DEXA/germline), `result` | \"Is PSMA done, and how recently\" is time-sensitive |\n| **Treatment line** | many (dated) | `line_type` (ADT/anti-androgen/ARSI/chemo/RT), `agent`, `start_date`, `end_date`, `status` (+ RT & CGHS fields) | Therapy is sequential: ADT ‚Üí ARSI ‚Üí chemo |\n| **Supportive-care event** | many (dated) | `at`, `bone_protection_therapy`, `calcium_vitamin_d`, `next_follow_up_psa_date`, `testosterone_monitoring`, `phq9`, `nutrition` | Bone-protection start/stop needs an audit trail |\n| **Journey event** | many (dated) | `event_type`, `event_date`, `event_notes` | The human-readable milestone story |\n\n### 1.4 Care gaps, collaboration, evidence\n| Model | Cardinality | Key variables | Plain meaning |\n|---|---|---|---|\n| **Nudge** | many | `nudge_id`, `rule_id`, `severity`, `current_status`, `opened_at`, `resolved_at` | One open care gap for one patient |\n| **Nudge event** | many | `nudge_id`, `at`, `action` (opened/viewed/acknowledged/routed/resolved), `actor` | The lifecycle log behind trend charts + audit |\n| **Notification / discussion** | many | sender, recipients, reason, subject, note, delivery, `at` | An MDT message + the per-patient discussion trail |\n| **Document** | many | file ref, type, size, uploader, `at` | Rx / report uploads |\n| **Guideline rule** | config | `rule_id`, condition, `severity`, version, sign-off | The 8 care-gap rules as governed config |\n| **Audit event** | many | actor, action, target, `at` | Who did what, when (incl. identity reveal) |\n\n### 1.5 How the models relate (visual)\n```mermaid\nerDiagram\n  USER ||--o{ PATIENT : \"primary clinician (1:N)\"\n  USER ||--o{ MDT_PANEL_MEMBER : \"notify group\"\n  PATIENT ||--|| PATHOLOGY : \"1:1\"\n  PATIENT ||--|| TREATMENT_PLAN : \"1:1\"\n  PATIENT ||--|| OUTCOME : \"1:1\"\n  PATIENT ||--o{ PATIENT_CONDITION : has\n  PATIENT ||--o{ PSA_READING : \"dated log\"\n  PATIENT ||--o{ STAGING_ASSESSMENT : \"dated log\"\n  PATIENT ||--o{ IMAGING_STUDY : \"dated log\"\n  PATIENT ||--o{ TREATMENT_LINE : \"dated log\"\n  PATIENT ||--o{ SUPPORTIVE_CARE_EVENT : \"dated log\"\n  PATIENT ||--o{ JOURNEY_EVENT : \"dated log\"\n  PATIENT ||--o{ NUDGE : \"care gaps\"\n  NUDGE ||--o{ NUDGE_EVENT : \"lifecycle log\"\n  PATIENT ||--o{ NOTIFICATION : \"MDT trail\"\n  GUIDELINE_RULE ||--o{ NUDGE : \"produces\"\n```\n\n### 1.6 Do we need a Visit / Encounter concept? (design decision)\n\n**Short answer: not as a *mandatory container* in v1 ‚Äî but an *optional* Encounter is worth adding as a context layer.** ProstaCare is a **registry**, so it is organised by **clinical event date** (each PSA, staging, imaging, treatment line, supportive-care entry carries its own date). That is lower-burden than a full EMR and is exactly what the care-gap engine and cohort analytics need. Forcing every entry inside a visit would add data-entry friction and doesn't help the current-state or rules logic.\n\n**What still needs \"visit timing\":** the Patient List segments (Last Visit / Upcoming / Missed-Overdue). These can be driven **today, without a full Encounter entity**, from existing date fields ‚Äî `last_follow_up_date` (Outcome) and `next_follow_up_psa_date` (Supportive-care):\n```\nvisit_status(patient):\n   IF next_follow_up_psa_date in future        ‚Üí \"Upcoming\"\n   ELSE IF next_follow_up_psa_date in past      ‚Üí \"Missed / Overdue\"\n   ELSE                                         ‚Üí \"Last Visit\" (use last_follow_up_date)\n```\n\n**Two models to choose between:**\n| Model | What it means | When to pick |\n|---|---|---|\n| **Registry-by-event** (recommended v1) | Every clinical fact keyed by its own date; **no mandatory encounter**; visit-timing from follow-up-date fields | Registry + care-gap + analytics use case (this product) |\n| **EMR-by-encounter** | Every entry tied to a visit/encounter; richer visit grouping | Only if the product must reflect exact visit boundaries, scheduling, or billing |\n\n**Recommended (hybrid, low-cost):** add an **optional `Encounter`** ‚Äî `encounter_id`, `encounter_date`, `type` (OPD / review / procedure / MDT), `clinician` ‚Äî and a **nullable `encounter_id`** on each dated event. Events may reference an encounter (to group \"everything done at the 2026-06-15 visit\") but are **not required** to (registry backfill has no clean visits). Turn it on per-site when visit grouping or HIS-appointment sync is needed. This maps cleanly to the platform's appointment/encounter model later without reworking the event tiers.\n\n> **Sign-off question (added to ¬ß7):** confirm registry-by-event for v1 with an optional Encounter, or require encounter-bound entry.\n\n---\n\n### 1.7 Cardinality & provenance ‚Äî every model, how it is populated\n\n**The two rules that keep the model honest:**\n1. **Nothing exists that isn't either *entered on a named screen* or *derived*.** No orphan tables, no invisible layers.\n2. **1:1 when the fact can only be true once at a time** (current state) ¬∑ **1:N when the fact recurs over time** (history). This is what prevents duplicate rows.\n\n| Model | Per patient | How it is populated (UX flow) | Or derived from | Editable? |\n|---|---|---|---|---|\n| **Patient** (hub) | **1:1** | *Add New Patient* ‚Üí Demographics form | ‚Äî | edit window ‚Üí lock |\n| **Pathology** | **1:1** | *Clinical Assessment* ‚Üí Complaint / DRE / Biopsy | ‚Äî | edit window ‚Üí lock |\n| **Treatment plan** (intent, MDT status/date, trial) | **1:1** | *Treatment Plan* ‚Üí Intent & MDT | ‚Äî | edit window ‚Üí lock |\n| **Outcome** | **1:1** | *Outcomes* form | ‚Äî | edit window ‚Üí lock |\n| **Patient condition** (comorbidity / family hx) | **1:N** | *Clinical Assessment* ‚Üí chip groups | ‚Äî | edit window ‚Üí lock |\n| **PSA reading** | **1:N dated** | *Clinical Assessment* ‚Üí ‚Äú+ Add PSA Entry‚Äù | ‚Äî | append-only |\n| **Staging assessment** | **1:N dated** | *Clinical Assessment* ‚Üí TNM & Risk (each save = new dated row) | ‚Äî | append-only |\n| **Imaging study** | **1:N dated** | *Clinical Assessment* ‚Üí Imaging & Molecular | ‚Äî | append-only |\n| **Treatment line** | **1:N dated** | *Treatment Plan* ‚Üí ADT / Anti-androgen / ARSI / Chemo / RT | ‚Äî | append-only |\n| **Supportive-care event** | **1:N dated** | *Treatment Plan* ‚Üí Bone Health & Supportive Care | ‚Äî | append-only |\n| **Journey event** | **1:N dated** | *Patient Journey* ‚Üí Add Event | ‚Äî | append-only |\n| **Encounter** *(optional)* | **1:N dated** | Visit entry (optional) | ‚Äî | append-only |\n| **Notification / discussion** | **1:N** | *Team modal* ‚Üí Send | ‚Äî | immutable |\n| **Document (Rx)** | **1:N** | *Upload Rx* | ‚Äî | immutable (removal audited) |\n| **Nudge** | **1:N** | ‚ùå never entered | care-gap rules over current state | system |\n| **Nudge event** | **1:N** | ‚ùå never entered | lifecycle actions | system |\n| **Audit event** | **1:N** | ‚ùå never entered | every action | system |\n| **Current state** (stage / line / castration / latest PSA) | derived | ‚ùå never entered | latest dated row per model (¬ß2) | derived |\n| **Dashboards, protocol score, completeness, benchmarks** | derived | ‚ùå never entered | aggregates | derived |\n| **`sponsor_metric`** | derived | ‚ùå never entered | de-identified aggregates + suppression | derived |\n| **Guideline rule** | config | *Admin* ‚Üí Rules console | ‚Äî | versioned config |\n| **User / Role / MDT panel** | config | *Admin* ‚Üí Users console | ‚Äî | config |\n\n**Worked answer to the cardinality question:**\n```\nA patient has ONE treatment PLAN  (intent + MDT status)          ‚Üí 1:1\nA patient has MANY treatment LINES (ADT ‚Üí ARSI ‚Üí chemo ‚Üí RT)      ‚Üí 1:N\n  ...because prostate therapy is sequential: the patient is on ADT,\n     later ARSI is added, later chemo. Each is its own dated line.\n     Collapsing them into one row would make sequence unrepresentable.\n```\n\n**Duplicate prevention (enforced in the database):**\n- 1:1 models ‚Üí **unique key on `patient_code`** (a patient cannot have two Pathology rows).\n- 1:N dated models ‚Üí **unique key on `(patient_code, <date>, <type>)`** (e.g. one `imaging_study` per modality per date; one `psa_reading` per date) ‚Äî accidental double-entry is rejected, genuine repeats are distinguished by date/type.\n\n---\n\n### 1.8 Record edit window, lock & HOD unlock *(new requirement)*\n\nOnce data is entered it should not stay editable forever ‚Äî the record must become audit-grade. But clinicians need a correction path.\n\n| Concept | Rule (all values configurable) |\n|---|---|\n| **Edit window** | A record is editable for **`EDIT_WINDOW`** after creation (default **48 h**) |\n| **Auto-lock** | After the window it **locks** (immutable) |\n| **HOD unlock** | An **HOD** may unlock a specific record for **`UNLOCK_WINDOW`** (default **24 h**) with a **mandatory reason**; it then re-locks automatically |\n| **Audit** | Every edit, lock, unlock (with reason), and removal is written to `audit_event` |\n| **No hard delete** | Corrections never destroy data |\n\n**Why locking is safe here (important):** the longitudinal tiers are **append-only**. Clinical progress never needs an unlock ‚Äî if bone protection is started, you **append a new `supportive_care_event`**; if the patient is restaged, you **append a new `staging_assessment`**. The nudge auto-resolves from the *new* row. So the lock only prevents **rewriting history**; it never blocks care. An unlock is needed only to **correct a mistake** in a 1:1 current-state record (demographics, pathology, treatment plan, outcome) or a mistyped dated row.\n\nFields carried on every entered record: `created_at`, `created_by`, `last_edited_at`, `locked`, `locked_at`, `unlocked_until`, `unlock_reason`.\n\n---\n\n## 2. The one core idea ‚Äî \"current state\" is computed from history\n\nEverything the header shows (\"current stage,\" \"current line,\" \"current castration status\") is **the latest dated row**, not a stored cell. This is the single most important design rule, so a worked example:\n\n```\nSTAGING history for PCR-001:\n  Row A  assessed_on = 2026-01-10   risk = High             castration = HSPC\n  Row B  assessed_on = 2026-06-15   risk = Very High        castration = HSPC\n\nCURRENT STAGE  = latest row by assessed_on  = Row B (Very High, HSPC)\n‚Üí Header badge shows \"Very High ¬∑ HSPC\"\n‚Üí Care-gap engine reads risk = Very High   (Row B), not High (Row A)\n‚Üí When the patient later progresses, a Row C (castration = CRPC) is ADDED,\n  never overwriting Row B ‚Äî so the HSPC‚ÜíCRPC transition date is preserved.\n```\n\nPseudo-code used everywhere current-state is needed:\n```\nFUNCTION current(model, patient):\n    RETURN newest row in `model` WHERE patient_code = patient  ORDER BY <date> DESC  LIMIT 1\n```\n\n---\n\n## 3. Workflows ‚Äî inputs, logic, outputs (pseudo-code + visuals)\n\nEach workflow states: **Trigger ‚Üí Inputs ‚Üí Logic (pseudo-code) ‚Üí Outputs ‚Üí Derived data touched.**\n\n### W1 ¬∑ Patient onboarding\n```mermaid\nflowchart LR\n  A[Add New Patient] --> B{Valid + not duplicate?}\n  B -- no --> A\n  B -- yes --> C[Create Patient hub row]\n  C --> D[Attach to institution/department + primary clinician]\n  D --> E[Notify MDT: new patient]\n  C --> F[Appears in roster + cohort counts]\n```\n```\nTRIGGER: user submits Add-New-Patient\nINPUTS : patient_code, age_at_diagnosis, coverage, state, referral_source,\n         department_id, primary_clinician_id            // institution = the tenant (implicit)\nLOGIC  :\n  IF patient_code already exists within this tenant ‚Üí reject \"duplicate code\"\n  ELSE create Patient(hub) with inputs; set registry_enrolment_date = today\n       create empty Pathology, Treatment_plan shells\n       route MDT new-patient notification (see W7)\nOUTPUT : new Patient visible in roster; cohort counts +1\nDERIVED: registrations-this-month, cohort volume recompute\n```\n\n### W2 ¬∑ Clinical workup & staging\n```mermaid\nflowchart LR\n  A[Enter biopsy/DRE/complaint] --> P[Save Pathology 1:1]\n  B[Enter TNM + risk + castration] --> S[Add Staging assessment - dated]\n  C[Enter imaging results] --> I[Add Imaging study rows - dated]\n  S --> R[Recompute current stage/risk]\n  I --> R\n  R --> N[Run care-gap engine ‚Üí W5]\n```\n```\nTRIGGER: clinician saves clinical assessment\nINPUTS : pathology fields; staging fields (assessed_on defaults today);\n         imaging modality+result rows\nLOGIC  :\n  Save Pathology (1:1, upsert)\n  APPEND Staging_assessment row (never overwrite)\n  FOR EACH imaging modality entered ‚Üí APPEND Imaging_study row\n  current_risk       = current(Staging, patient).eau_risk_category\n  current_castration = current(Staging, patient).castration_status\n  imaging_status(m)  = current(Imaging WHERE modality=m, patient).result  (else \"Not done\")\nOUTPUT : updated current-state; header badges refresh\nDERIVED: triggers W5 (care-gap re-evaluation)\n```\n\n### W3 ¬∑ PSA capture & trend\n```mermaid\nflowchart LR\n  A[Add PSA row: date + value] --> L[Append PSA_reading - dated]\n  L --> T[PSA trend chart reads this table]\n  L --> D[Cohort PSA median/percentile recompute]\n```\n```\nTRIGGER: clinician adds a PSA entry\nINPUTS : psa_date, psa_ng_ml, free_psa_pct?, psa_density?\nLOGIC  : APPEND PSA_reading row (dated)\n         latest_psa = current(PSA_reading, patient).psa_ng_ml\nOUTPUT : patient trend chart (bound to PSA_reading, not hardcoded points)\nDERIVED: cohort PSA median, percentile bands, diagnostic-PSA distribution\n```\n\n### W4 ¬∑ Treatment planning & lines\n```mermaid\nflowchart LR\n  A[Agree pathway] --> P[Update Treatment_plan 1:1: intent, MDT, start]\n  B[Start/refresh a therapy] --> L[Add Treatment_line - dated]\n  C[Bone health / follow-up] --> S[Add Supportive-care event - dated]\n  L --> N[Run care-gap engine ‚Üí W5]\n  S --> N\n```\n```\nTRIGGER: team records/updates treatment\nINPUTS : plan header (intent, mdt_status, mdt_date, treatment_start_date);\n         one Treatment_line (line_type, agent, start_date, status, +RT/CGHS fields);\n         one Supportive_care_event (bone_protection, dexa follow-up, phq9, follow-up PSA date)\nLOGIC  : upsert Treatment_plan; APPEND Treatment_line; APPEND Supportive_care_event\n         current_arsi = current(Treatment_line WHERE line_type=ARSI).status (else \"Not initiated\")\n         current_bone_protection = current(Supportive_care_event).bone_protection_therapy\nOUTPUT : treatment state auditable; cohort treatment analytics update\nDERIVED: ADT duration, time-to-treatment, CGHS delay, ARSI uptake ‚Üí W5 + ¬ß5\n```\n\n### W5 ¬∑ Care-gap (nudge) engine ‚Äî the heart of the product\n```mermaid\nflowchart TD\n  T1[On clinical/treatment save] --> E[Evaluate 8 rules on CURRENT state]\n  T2[Daily scheduled re-scan] --> E\n  E --> C{Rule condition true?}\n  C -- yes, no open nudge --> O[Open Nudge + log 'opened' event]\n  C -- yes, already open --> K[Keep existing nudge]\n  C -- no, but nudge open --> R[Auto-resolve + log 'resolved' event]\n  O --> B[Recount severity + refresh badges/banner]\n  R --> B\n```\n```\nTRIGGER: any staging/imaging/treatment/supportive save  (on-write only ‚Äî\n         all 8 rules are state-based, not time-based, so no daily cron is\n         needed in v1; add one when a time-based rule appears)\nINPUTS (current state per patient):\n  risk = current(Staging).eau_risk_category\n  castration = current(Staging).castration_status\n  bone_scan  = imaging_status(bone_scan);   psma = imaging_status(psma_pet_ct)\n  dexa = imaging_status(dexa);              germline = imaging_status(germline)\n  bone_protection = current(Supportive).bone_protection_therapy\n  arsi = current(Treatment_line WHERE ARSI).status\n  next_follow_up_psa_date = current(Supportive).next_follow_up_psa_date\n  phq9 = current(Supportive).phq9\nLOGIC:\n  FOR EACH rule IN guideline_rules(active):\n     fired = evaluate(rule.condition, current_state)\n     IF fired AND no open nudge with this rule_id:\n         create Nudge(rule_id, severity, status=open); log Nudge_event(opened)\n     IF (NOT fired) AND open nudge with this rule_id exists:\n         set nudge.status = resolved; log Nudge_event(resolved)   // auto-resolve\nOUTPUT: the patient's live nudge list (severity-coded, explainable)\nDERIVED: urgent/warning/info counts, highest severity, primary focus,\n         cohort gap counts, protocol score, nudge-trend (from Nudge_event)\nNOTE  : \"Acknowledge\" (W6) does NOT resolve a nudge ‚Äî only a changed source field does.\n```\n\n### W6 ¬∑ Nudge lifecycle (acknowledge ‚Üí route ‚Üí resolve)\n```mermaid\nstateDiagram-v2\n  [*] --> Open : rule fires (on write)\n  Open --> Acknowledged : acknowledge & route to MDT (W7)\n  Acknowledged --> Resolved : source field changed ‚Üí rule stops firing (W5, auto)\n  Open --> Resolved : source field changed (auto)\n  Resolved --> Open : condition recurs\n  Resolved --> [*]\n```\n> **No `snoozed` or `dismissed` state.** Clinical non-applicability is already expressed **in the data** ‚Äî `bone_protection = \"Not indicated\"`, `mdt_status = \"Not applicable\"`, `germline = \"Pending\"` ‚Äî so the rule simply never fires. Resolution is always data-driven. *(See `SIMPLIFICATION_REVIEW.md` T1/T2.)*\n```\nTRIGGER: clinician clicks Acknowledge & log on a nudge\nINPUTS : nudge_id, actor\nLOGIC  : log Nudge_event(acknowledged); open Team modal prefilled (W7)\n         (status stays 'open'/'logged' ‚Äî resolution is data-driven, not a click)\nOUTPUT : nudge shows \"Logged with team\"; discussion trail entry\nDERIVED: nudge-trend \"acted\" count increments\n```\n\n### W7 ¬∑ MDT notify & discussion (explicit steps + email via AWS SES)\n```mermaid\nflowchart LR\n  A[From nudge or patient] --> M{Recipient?}\n  M -- specific --> M1[Pick MDT member]\n  M -- all --> M2[Whole MDT panel]\n  M1 --> F[Reason + subject + note]\n  M2 --> F\n  F --> P[Preview message]\n  P --> Q[Create Notification queued]\n  Q --> IN[In-app inbox item + task]\n  Q --> EM[Send email via AWS SES]\n  EM --> DS[Record delivery status: sent / bounced / failed]\n  IN --> L[Append discussion_entry]\n  DS --> L\n```\n```\nTRIGGER: acknowledge-from-nudge (W6)  OR  \"Discuss with Team\"  OR  new-patient (W1)\nINPUTS : recipient_mode, recipient(s), reason, subject, note, patient_code\nLOGIC (explicit steps):\n  1. RESOLVE recipients:\n        IF mode = member ‚Üí [selected app_user]\n        IF mode = all    ‚Üí mdt_panel(department) members\n     recipient_emails = [u.email for u in recipients]        // email = the login identity\n  2. RENDER template(reason, subject, note, patient_code, de-identified summary link)\n  3. CREATE Notification(status = queued, recipients, body, at = now)\n  4. FOR EACH recipient:\n        a. CREATE in_app_notification  ‚Üí inbox item (+ optional task) + live push (sse)\n        b. SEND email via AWS SES      ‚Üí from = configured verified sender,\n                                          to  = recipient.email\n        c. ON SES accept  ‚Üí delivery_status = sent (store SES messageId)\n           ON SES failure ‚Üí delivery_status = failed ‚Üí retry (transient) / flag (hard bounce)\n  5. APPEND discussion_entry to the patient's discussion trail\n  6. IF source = nudge ‚Üí LOG Nudge_event(routed_to_mdt)\nOUTPUT : MDT informed (inbox + email); per-patient discussion log; per-recipient delivery status; toast\nDERIVED: MDT-review-rate, collaboration audit, notification delivery metrics\n```\n\n**Notification triggers ¬∑ channels ¬∑ delivery (covers the whole notification surface):**\n| Trigger | Fires from | Channel |\n|---|---|---|\n| Care-gap routed to MDT | W6 acknowledge | in-app + **email (SES)** |\n| New patient registered | W1 | in-app + email (SES) to MDT panel |\n| MDT review request / case discussion | Patient File \"Discuss with Team\" | in-app + email (SES) |\n| Urgent escalation *(if SLA enabled)* | unactioned urgent nudge after N days | in-app + email (SES) to HOD/coordinator |\n\n- **Email transport = AWS SES.** Users log in with their **email ID** (the identity), and every configured notification is delivered to that email via SES. Sender is a verified SES domain/address; `messageId` + status (sent / bounced / complaint / failed) are stored on `Notification` for audit and delivery metrics; transient failures retry, hard bounces are flagged.\n- **In-app inbox** is the primary channel (each notification creates an inbox item and, where relevant, a task); **email (SES)** mirrors it so nothing is missed. SMS / WhatsApp are future channels behind the same `Notification` record.\n\n### W8 ¬∑ Cohort analytics (derivation)\n```mermaid\nflowchart LR\n  A[All patient + event data] --> V[Nightly/On-write derivations]\n  V --> K[KPIs + benchmarks + protocol score]\n  V --> N[Nudge trend from Nudge_event]\n  K --> D[Dashboards]\n  N --> D\n  D --> P[Drill any chart ‚Üí patient list]\n```\n```\nTRIGGER: on-write + scheduled refresh\nINPUTS : every model in ¬ß1\nLOGIC  : compute derived metrics (¬ß5) as views; apply de-identification for\n         non-clinical/sponsor roles\nOUTPUT : Home + Population dashboards; every widget drillable to patient_code\nDERIVED: see ¬ß5 (all of it)\n```\n\n### W9 ¬∑ AI Buddy (governed, stepwise)\n```mermaid\nflowchart LR\n  A[Open AI Buddy on a case] --> S1[Step: pathway review]\n  S1 --> S2[Step: progression branch]\n  S2 --> S3[Step: access/affordability]\n  S3 --> S4[Step: trials]\n  S4 --> J[Jump back to patient file]\n```\n```\nTRIGGER: user opens AI Buddy\nINPUTS : structured record (read-only) + approved evidence/guideline packs\n         + access-rule config\nLOGIC  : stepwise review bounded to configured brain; NO free generation,\n         NO inventing gaps, NO autonomous decisions, NO unlisted drug access\nOUTPUT : explainable, step-by-step next-path view; links back to the file\nDERIVED: none (read-only); every step audited\n```\n\n### W10 ¬∑ Record edit window, lock & HOD unlock\n```mermaid\nstateDiagram-v2\n  [*] --> Editable : record created\n  Editable --> Locked : EDIT_WINDOW elapses (auto)\n  Locked --> Unlocked : HOD unlocks (reason required, audited)\n  Unlocked --> Locked : UNLOCK_WINDOW elapses (auto re-lock)\n  Editable --> Editable : edit by clinician (audited)\n  Unlocked --> Unlocked : corrective edit (audited)\n```\n```\nCONFIG : EDIT_WINDOW = 48h        // editable after creation\n         UNLOCK_WINDOW = 24h      // HOD-granted correction window\n         UNLOCK_ROLES = [HOD]\n\nFUNCTION can_edit(record, actor):\n    IF record.locked = false AND now < record.created_at + EDIT_WINDOW      ‚Üí TRUE\n    IF record.unlocked_until IS NOT NULL AND now < record.unlocked_until    ‚Üí TRUE\n    ELSE                                                                    ‚Üí FALSE\n\nWORKFLOW auto_lock  (scheduled, hourly):\n    FOR EACH record WHERE locked = false AND now >= created_at + EDIT_WINDOW:\n        SET locked = true, locked_at = now\n    FOR EACH record WHERE unlocked_until IS NOT NULL AND now >= unlocked_until:\n        SET locked = true, unlocked_until = null          // auto re-lock\n\nWORKFLOW unlock  (HOD only):\n    INPUTS : record_id, reason (mandatory), actor\n    IF actor.role NOT IN UNLOCK_ROLES        ‚Üí deny (403)\n    IF reason is empty                       ‚Üí deny (reason required)\n    SET locked = false, unlocked_until = now + UNLOCK_WINDOW, unlock_reason = reason\n    LOG audit_event(action = 'unlock', record, actor, reason, at = now)\n    OUTPUT: record editable until unlocked_until, then auto re-locks\n\nON EDIT (any record):\n    IF NOT can_edit(record, actor) ‚Üí deny \"record locked ‚Äî request HOD unlock\"\n    ELSE apply change; LOG audit_event(action='edit', old‚Üínew, actor)\n\nNOTE: append-only tiers (PSA, staging, imaging, treatment_line, supportive_care,\n      journey) never require an unlock to record clinical progress ‚Äî you APPEND a\n      new dated row. Unlock exists to correct mistakes, not to continue care.\n```\n\n---\n\n## 4. The 8 care-gap rules (full) + worked example\n\nInputs are always **current state** (latest dated rows). Each rule = one `guideline_rule` config row (versioned, clinically signed-off).\n\n| # | rule_id | Condition | Severity | Next step (shown to user) |\n|---|---|---|---|---|\n| 1 | `bone_scan_missing` | `bone_scan = Not done` AND risk ‚àà {High, Very High, M1} | **Urgent** | Complete bone scan / SPECT |\n| 2 | `psma_missing` | `psma = Not done` AND risk ‚àà {High, Very High} | **Urgent** | Complete PSMA PET-CT |\n| 3 | `bone_protection_missing` | `bone_protection = Not started` | **Urgent** | Start bone protection plan |\n| 4 | `dexa_missing` | `dexa = Not done` | **Warning** | Order DEXA baseline |\n| 5 | `genomics_missing` | `germline = Not done` | **Warning** | Order germline/somatic testing |\n| 6 | `arsi_readiness` | `castration = HSPC` AND risk ‚äá High AND `arsi = Not initiated` | **Warning** | Review ARSI intensification |\n| 7 | `followup_psa_missing` | `next_follow_up_psa_date` is empty | **Info** | Schedule follow-up PSA |\n| 8 | `psychosocial_prompt` | `phq9` blank or \"Not done\" | **Info** | Complete PHQ-9 screening |\n\n**Worked example ‚Äî patient `PCR-001`** (values from the workbook sample):\n```\nCURRENT STATE:\n  risk = High         castration = HSPC\n  bone_scan = Not done   psma = Not done   bone_protection = Not started\n  dexa = Not done        germline = Not done   arsi = Not initiated\n  next_follow_up_psa_date = 2026-07-18 (present)   phq9 = Not done\n\nEVALUATE:\n  1 bone_scan_missing      ‚Üí Not done AND High           ‚Üí FIRES  (Urgent)\n  2 psma_missing           ‚Üí Not done AND High           ‚Üí FIRES  (Urgent)\n  3 bone_protection_missing‚Üí Not started                 ‚Üí FIRES  (Urgent)\n  4 dexa_missing           ‚Üí Not done                    ‚Üí FIRES  (Warning)\n  5 genomics_missing       ‚Üí Not done                    ‚Üí FIRES  (Warning)\n  6 arsi_readiness         ‚Üí HSPC AND High AND Not init   ‚Üí FIRES  (Warning)\n  7 followup_psa_missing   ‚Üí date present                ‚Üí does not fire\n  8 psychosocial_prompt    ‚Üí phq9 = Not done             ‚Üí FIRES  (Info)\n\nRESULT: 7 open nudges ‚Üí Urgent 3 ¬∑ Warning 3 ¬∑ Info 1\n        Highest severity = Urgent ; Primary focus = \"Complete bone scan / SPECT\"\n        Header banner = \"Urgent: 3 actions require attention\"\n\nLATER: clinician records bone_scan = \"Done ‚Äî no metastases\" and saves.\n  ‚Üí W5 re-runs ‚Üí rule 1 no longer fires ‚Üí nudge #1 AUTO-RESOLVES\n  ‚Üí counts become Urgent 2 ¬∑ Warning 3 ¬∑ Info 1 (no manual \"close\" needed).\n```\n\n---\n\n## 5. Derived data ‚Äî every computed number + its formula\n\nNothing here is typed; all is computed from ¬ß1 (pseudo-code).\n\n| Derived value | Formula (pseudo-code) | Feeds |\n|---|---|---|\n| current_stage / risk / castration | `current(Staging).<field>` | Header badges, rule inputs |\n| latest_psa | `current(PSA_reading).psa_ng_ml` | Header, cohort median |\n| ADT duration | `today ‚àí current(Treatment_line WHERE ADT).start_date` | Treatment dashboard, bone-gap logic |\n| time-to-treatment | `treatment_start_date ‚àí diagnosis_date` | Access/delay analytics |\n| CGHS delay | `(cghs_approval_date OR today) ‚àí cghs_request_date` | Access analytics |\n| gap counts | `COUNT(Nudge WHERE status=open GROUP BY severity)` | Home KPIs, banner |\n| protocol score | `weighted % of rule-families passing across cohort` | Home + Quality dashboard |\n| record completeness | `% required fields present per field-group` | Home, incomplete-records list |\n| benchmark deltas | `cohort % vs NCCN target` for ARSI/PSMA/bone/MDT | Benchmark cards |\n| nudge trend | `COUNT(Nudge_event GROUP BY action, period)` | Nudge-trend chart |\n| KM survival | `survival(risk_group, recurrence dates)` | Outcomes dashboard |\n| registrations/month | `COUNT(Patient GROUP BY month(registry_enrolment_date))` | Home + Overview |\n\n**Access rule on all derived data:** clinical roles see identified/in-scope; **ops/quality/sponsor see de-identified aggregate only** (masked drill rows).\n\n---\n\n## 6. Visual master flow (end-to-end)\n```mermaid\nflowchart TD\n  ON[Onboard institution + doctors] --> ADD[Register patient - W1]\n  ADD --> WU[Workup + staging - W2]\n  ADD --> PSA[PSA history - W3]\n  ADD --> TX[Treatment lines - W4]\n  WU --> ENG[Care-gap engine - W5]\n  TX --> ENG\n  ENG --> NUD[Nudges on patient file]\n  NUD --> ACK[Acknowledge - W6]\n  ACK --> MDT[MDT notify + discussion - W7]\n  MDT --> FIX[Clinician acts ‚Üí source field changes]\n  FIX --> ENG\n  ENG --> ANA[Cohort analytics - W8]\n  ANA --> DRILL[Drill chart ‚Üí patient ‚Üí file]\n  DRILL --> NUD\n  NUD --> AIB[AI Buddy review - W9]\n```\n\n---\n\n## 7. Sign-off checklist (for the clinical team)\n\nPlease confirm, amend, or reject each:\n1. **Data models (¬ß1)** ‚Äî are the variables per model complete and correctly named for clinical use? Any field missing (e.g. additional comorbidity, biomarker, toxicity grade)?\n2. **Current-state rule (¬ß2)** ‚Äî agreed that \"current stage/line/castration\" = latest dated entry, and that restaging/progression is a **new** row (never an overwrite)?\n3. **Cardinality calls** ‚Äî `Pathology` and `Outcome` as 1-per-patient (re-biopsy ‚Üí new row); `Supportive-care` as a **dated** log (bone-protection audit) ‚Äî agreed?\n4. **The 8 rules (¬ß4)** ‚Äî conditions, severities, and next-step wording clinically correct? Any rule to add/remove/retune (e.g. thresholds, risk sets)?\n5. **Auto-resolve semantic (¬ß3 W5/W6)** ‚Äî agreed that acknowledging routes to MDT but only a changed source field resolves a nudge?\n6. **Derived metrics (¬ß5)** ‚Äî formulas acceptable; benchmark targets (ARSI 60%, PSMA 85%, bone 85%, MDT 95%) confirmed by clinical governance?\n7. **Governance** ‚Äî who signs off the rule pack + evidence packs (independent of any sponsor)?\n8. **Identity model** ‚Äî de-identified registry (recommended) vs identified ‚Äî confirm (drives everything downstream).\n9. **Visit / Encounter (¬ß1.6)** ‚Äî confirm **registry-by-event with an optional Encounter** for v1 (recommended), or require every entry to be encounter-bound.\n10. **Tenancy** ‚Äî confirmed **tenant = institution** (no `institution_id`); cross-institution reporting via a de-identified aggregation layer ‚Äî agreed?\n11. **Roles & access (¬ß1.1)** ‚Äî **no department**; every clinician sees that institution's patients; **HOD is the privileged role** (unlock, notify-all-MDT, audit); Ops/Quality see de-identified aggregates only. Agreed?\n12. **Record locking (¬ß1.8)** ‚Äî confirm **`EDIT_WINDOW` = 48 h**, **`UNLOCK_WINDOW` = 24 h**, **unlock restricted to HOD** with a mandatory reason. Do these durations suit clinic practice? Should Coordinator also unlock?\n13. **Cardinality & provenance (¬ß1.7)** ‚Äî confirm every model is either entered on a named screen or derived, and the 1:1 / 1:N calls ‚Äî in particular **one treatment *plan* (1:1) vs many treatment *lines* (1:N)**.\n\nOnce ¬ß7 is signed, this spec becomes the build contract; engineering maps it to the platform per `PROSTACARE_BUILD_SPEC_V1.md` / `NOVA-EDGE-FEASIBILITY.md`.\n\n---\n\n*Companion docs: `PROSTACARE_BUILD_SPEC_V1.md` (platform/NOVA Edge mapping), `FLOW-CLARITY-AND-OPEN-QUESTIONS.md` (decisions & open questions), `ProstaCare_Nudge_Logic_Handoff.md` (source of the 8 rules), and the `ProstaCare_Schema_08072026_V2.xlsx` workbook (authoritative field dictionary + value lists).*\n"}, {"title": "NOVA Edge Alignment Review", "file": "NOVAEDGE_ALIGNMENT_REVIEW.md", "md": "# ProstaCare ‚Üî NOVA Edge ‚Äî Architecture Alignment & Gap Review\n\n**Purpose:** verify the ProstaCare canonical model + workflows (`PROSTACARE_FUNCTIONAL_LOGIC_SPEC.md`, `PROSTACARE_BUILD_SPEC_V1.md`) map **seamlessly** onto NOVA Edge primitives (schemas, scopes, workflows, subscriptions/cron, materialized views, ADK agents), and to surface every gap before the preset build.\n\n**Verdict:** **Strongly aligned.** Every entity maps to a NOVA Edge schema and every workflow to existing operators/triggers ‚Äî no new platform primitive is required. There are **two items that need an explicit design decision/component** before it is truly \"seamless\" (cross-institution aggregation; rule-config encoding) and **three \"encode-it-this-way\" notes** (down from six after the `SIMPLIFICATION_REVIEW.md` trims closed G5/G6). All are called out below with resolutions. None is a blocker.\n\n---\n\n## 1. Entity ‚Üí NOVA Edge schema mapping\n\nField types available: `string/text/integer/number/float/boolean/datetime/date/json/enum(enumValues)/uuid/phone/email/file/tags` + per-field `required/unique/indexed/default/references`. Enums ‚Üí `enumValues`; FKs ‚Üí `references`. *(Partitioning available but **not used in v1**.)* (Platform gotcha: use `datetime` not `date`.)\n\n| Canonical entity | NOVA Edge construct | Notes / field-type mapping | Status |\n|---|---|---|---|\n| `app_user` (+`is_mdt_member`), `role` | entities + `roles.json` | 3 roles: Clinician ¬∑ HOD ¬∑ Admin. **No `department`/`care_team`/`mdt_panel`** ‚Äî role-based access; tenant is the boundary | ‚úÖ aligned |\n| `patient` (hub) | canonical `patients` **extension** via PATCH | de-identified; enums for coverage/state/referral; **no `institution_id`** (tenant = institution) | ‚úÖ aligned |\n| `pathology` (1:1) | entity, FK‚Üípatient | enums (gleason/isup/pi-rads/dre); text for cores | ‚úÖ aligned |\n| comorbidity / family history | **15 boolean columns on `pathology`** | as in the workbook + chip-group UI; no separate table, no import transform | ‚úÖ aligned |\n| `treatment_plan` (1:1) | entity | enums + dates | ‚úÖ aligned |\n| `outcome` (1:1) | entity | enums + milestone dates | ‚úÖ aligned |\n| `psa_reading` (dated) | entity, indexed on `(patient_code, psa_date)` | **no partitioning in v1** (unnecessary at this scale) | ‚úÖ aligned |\n| `staging_assessment` (dated) | entity | enums (T/N/M/risk/ecog/castration) + `assessed_on` | ‚úÖ aligned |\n| `imaging_study` (dated) | entity | `modality` enum + `result` enum + `study_date` | ‚úÖ aligned |\n| `treatment_line` (dated) | entity | `line_type` enum; RT + CGHS fields on the RT line | ‚úÖ aligned |\n| `supportive_care_event` (dated) | entity | bone/dexa/phq9/follow-up + `at` | ‚úÖ aligned |\n| `journey_event` (dated) | entity | `event_type` enum | ‚úÖ aligned |\n| `nudge` | entity | `rule_id`, `severity`, `current_status`, dates | ‚úÖ aligned |\n| `nudge_event` | entity | lifecycle log (opened ¬∑ acknowledged ¬∑ resolved) for trend + audit | ‚úÖ aligned |\n| `notification` / `discussion_entry` | entities | recipients (json), delivery status | ‚úÖ aligned |\n| `document` | `file` field + attachment entity + object storage | S3/MinIO per `communication.json` | ‚úÖ aligned |\n| `guideline_rule` | **config entity** | `version` + `signed_off_by/at` + `active` (G2) | ‚úÖ aligned |\n| ~~`evidence_pack` / `guideline_pack`~~ | config entities | **Phase 2** (with AI Buddy) | ‚è∏ deferred |\n| ~~`encounter`~~ | ‚Äî | **not in v1**; visit timing derives from follow-up dates | ‚è∏ deferred |\n| `audit_event` | platform `activity` + subscriptions | ensure full coverage (G7) | ‚úÖ aligned |\n| `patient_identity` *(only if identified model)* | isolated entity + `read_roles`/`context_mask` | audited reveal | ‚úÖ aligned |\n\n---\n\n## 2. Workflow ‚Üí NOVA Edge mechanism mapping\n\nTriggers: API run ¬∑ entity `subscriptions` (on_create/update) ¬∑ schema `policies` (cron) ¬∑ webhook. Step types used: `create/upsert/query/sql_exec/branch/for_each/email/in_app_notification`. *(No `sse_publish`/`llm` in v1.)*\n\n| Workflow | Trigger | Steps used | Status |\n|---|---|---|---|\n| W1 onboarding | Add-patient API ‚Üí `on_create` sub | `create` + notify workflow (W7) | ‚úÖ aligned |\n| W2 workup/staging | save ‚Üí `on_create` sub on staging/imaging | `upsert`(pathology) + `create`(dated) + fire W5 | ‚úÖ aligned |\n| W3 PSA capture | save ‚Üí `on_create` sub | `create`; scheduled mat-view refresh | ‚úÖ aligned |\n| W4 treatment | save ‚Üí `on_create` sub | `create`(line/supportive) + fire W5 | ‚úÖ aligned |\n| **W5 care-gap engine** | `on_write` subs (staging/imaging/treatment/supportive) ‚Äî **no cron in v1** (all 8 rules are state-based) | `sql_exec` `INSERT‚Ä¶SELECT‚Ä¶WHERE <rule> AND NOT EXISTS(open)` + `sql_exec` auto-resolve `UPDATE` | ‚úÖ aligned ‚Äî see G2 (rule encoding) + G4 (current-state) |\n| W6 nudge lifecycle | Acknowledge API | `create`(nudge_event) + open W7 | ‚úÖ aligned |\n| W7 MDT notify | from nudge/patient | `query`(users WHERE is_mdt_member) + `for_each` + `email` (SES) + `in_app_notification` + `create`(discussion_entry). *No `sse_publish`, no auto-task, no digest in v1.* | ‚úÖ aligned |\n| W8 analytics | on-write + cron refresh | **materialized views** (RLS-scoped) + `reports` | ‚úÖ aligned ‚Äî see G1 (charts) + G3 (cross-tenant) |\n| ~~W9 AI Buddy~~ | user opens | ADK `agent` + read tools + evidence packs | ‚è∏ **Phase 2** (absent from functional requirements) |\n\n---\n\n## 3. Current-state derivation ‚Äî the key encoding note (G4)\n\n\"Current stage / line / castration = latest dated row\" is **cross-row**, which NOVA Edge **computed columns cannot do** (the `compute` DSL is string-composition only ‚Äî no rollups). So current-state must be encoded as **either**:\n- a **materialized view** `current_state` (one row/patient with the latest values), refreshed on write/cron ‚Äî best for dashboards & header badges; **or**\n- an **inline subquery** inside the care-gap engine's `sql_exec` (`‚Ä¶ JOIN LATERAL (SELECT ‚Ä¶ ORDER BY assessed_on DESC LIMIT 1) ‚Ä¶`) ‚Äî best for the rules pass.\n\n**Resolution:** use both ‚Äî a `current_state` mat-view for UI/analytics, and lateral subqueries inside W5 for evaluation. Do **not** model current-state as a stored/computed column. *(Spec ¬ß2/¬ß5 already treat it as derived; this pins the platform encoding.)*\n\n---\n\n## 4. Gaps & resolutions\n\n| # | Gap | Why it matters | Resolution |\n|---|---|---|---|\n| **G1** | Chart renderers for **PSA line / percentile bands / Kaplan-Meier** | NOVA Edge chart subtype is a free string, but the concrete renderer lives in the frontend repo (`metadata-auto-ui`), unaudited | Confirm line/area exist; build KM as a custom renderer. Data/aggregation side is fully supported. **Frontend task, not a data-model gap.** |\n| **G2** | `guideline_rule` as **data-driven config** vs one `sql_exec` per rule | Clinical team wants to edit rules without code | Recommended: `guideline_rule` config holds **metadata** (rule_id, severity, next_step, inputs, version, sign-off, active); the engine workflow holds **one predicate step per rule (8)**, gated by `active`. Clinicians tune severity/wording/thresholds in config; changing the *logic shape* is a versioned workflow edit. (Fully dynamic predicate-from-config is possible via stored SQL fragments + `tables` allowlist, but adds risk ‚Äî defer.) |\n| **G3** | **Cross-institution** de-identified reporting is **not native** (tenants are isolated schemas) | Sponsor/registry benchmarking spans hospitals | **Net-new component:** a cross-tenant **de-identified aggregation layer** (scheduled export of each tenant's de-identified cohort metrics ‚Üí a registry store the sponsor reads). This is the one piece that isn't in-tenant config. Owner + cadence = open decision (`O-REP`). |\n| **G4** | Current-state = latest row (cross-row) | Header badges + rule inputs | Mat-view + lateral subquery (see ¬ß3). Not a computed column. |\n| ~~**G5**~~ | ~~Partitioning composite PK + lookback~~ | ‚Äî | ‚úÖ **CLOSED** ‚Äî partitioning dropped from v1 (unnecessary at this scale). Gap was self-inflicted. |\n| ~~**G6**~~ | ~~flag columns ‚Üí normalized rows import transform~~ | ‚Äî | ‚úÖ **CLOSED** ‚Äî comorbidity/family stay as boolean columns. Transform no longer exists. |\n| **G7** | **Audit coverage** must be complete | R-AUTH-3; identity reveal | Cross-cutting `audit_event` subscription on all entities + explicit reveal audit on `patient_identity`. |\n\n**None blocks the build.** G3 is the only genuinely net-new *component*; the rest are encode-it-this-way notes or a frontend task.\n\n---\n\n## 5. Alignment checklist\n\n| Dimension | Status |\n|---|---|\n| Every entity ‚Üí a NOVA Edge schema | üü¢ |\n| Field types / enums / FKs / partitioning expressible | üü¢ |\n| Tenancy = institution = one tenant schema | üü¢ |\n| Department/role scopes (`row_policies` + `$user.department`) | üü¢ |\n| De-identified analytics via RLS-scoped mat-views | üü¢ |\n| Care-gap engine via `sql_exec` + on-write subs (no cron) | üü¢ (encode per G2/G4) |\n| Nudge lifecycle + trend from `nudge_event` | üü¢ |\n| MDT notify via comms steps | üü¢ |\n| AI Buddy via bounded ADK agent | ‚è∏ Phase 2 |\n| Onboarding = provision tenant per institution + seed preset | üü¢ |\n| Cross-institution de-identified rollup | üü° net-new component (G3) |\n| Clinical chart renderers (line/KM) | üü° frontend confirm (G1) |\n\n---\n\n## 6. What must exist before/around the preset build\n\n1. **Decide G2 encoding** (config metadata + per-rule predicate steps ‚Äî recommended) so the clinical team's rule-governance need is met.\n2. **Scope G3** (cross-tenant de-identified aggregation layer) ‚Äî owner, store, cadence; it is the sponsor surface too.\n3. **Confirm G1** (frontend line/KM renderers).\n4. Pin **G4** current-state as mat-view + lateral subquery in the schema/workflow design.\n5. Include **G7** audit subscription in the preset from day one. *(G5 and G6 are closed ‚Äî see `SIMPLIFICATION_REVIEW.md`.)*\n\nEverything else is standard NOVA Edge configuration: fork `novahub_v2`, add the entities (¬ß1), the workflows (¬ß2), the mat-views (¬ß5/W8), the ADK agent (W9), scopes + roles, and the theme.\n\n---\n\n*Reviewed against: `NOVA-EDGE-FEASIBILITY.md` (platform capability findings), the `novahub_v2`/`sakra` presets, and platform docs (workflow-reference, materialized-views, column-compute-derivations, partitioning, rbac). Companion: `PROSTACARE_FUNCTIONAL_LOGIC_SPEC.md`, `PROSTACARE_BUILD_SPEC_V1.md`.*\n"}, {"title": "Build Spec (v1)", "file": "PROSTACARE_BUILD_SPEC_V1.md", "md": "# ProstaCare ‚Äî Canonical Schema & NOVA Edge Build Spec (v1, for internal approval)\n\n**Audience:** ProstaCare product/clinical leads + the NOVA Edge (NOVAGE) platform team, for internal sign-off **before** preset build starts.\n**Derived from:** `ProstaCare_Schema_08072026_V2.xlsx` (the \"Platform Bible\" workbook ‚Äî product narrative, 110-field dictionary, value lists, 46-widget dashboard inventory, care-gap tracker) + the prior discovery/feasibility docs in this folder (`FLOW-CLARITY-AND-OPEN-QUESTIONS.md`, `NOVA-EDGE-FEASIBILITY.md`, `PRODUCT-PRD.md`, `ProstaCare_Nudge_Logic_Handoff.md`).\n**Goal:** define the *canonical data model, tenancy/onboarding model, rules/analytics/intelligence layers, and NOVA Edge mapping* ‚Äî structured so it is easy to build and manage, with the workbook as one entry surface that maps onto the canonical schema (not the system of record).\n\n---\n\n## 1. Framing ‚Äî what changed, and the one principle\n\nThe workbook is a **platform bible first, data-entry pack second** (its own words). It commits the product to a registry + patient command-centre + care-gap engine + cohort analytics + governed AI (\"AI Buddy\"), with a **core promise**: *every cohort signal drillable to a patient; every patient gap an explainable next action.*\n\nThat promise is only structurally possible if the data model is **longitudinal, computed, and tenant-aware** ‚Äî which the workbook itself is not (it is a flat, de-identified, single-institution snapshot). So this spec does three things the workbook does not:\n\n1. **Adds the tenancy/identity layer** (institution = tenant; users + roles inside it) so institutions and doctors can be onboarded.\n2. **Promotes snapshot columns to longitudinal event tiers** (staging, imaging, treatment lines, nudges) so restaging, sequential therapy, and nudge-trend history become expressible.\n3. **Makes every displayed number derived** (Tier 3), never typed ‚Äî the workbook already flags this need in `Dashboard_Derived`/`Dashboard_Coverage`.\n\n**Guiding principle (carried from PRODUCT-PRD R-X-5):** snapshot storage where the domain is longitudinal is the root cause of the demo's known bugs. The canonical model fixes them structurally (see ¬ß5.5).\n\n---\n\n## 2. Terminology ‚Äî tenancy model (updated): **tenant = institution**\n\n**Decision (confirmed): each onboarded institution is its own NOVA Edge tenant** (one Postgres schema per hospital). Therefore **no `institution_id` column is stored anywhere** ‚Äî the tenant boundary *is* the institution, and every row already belongs to that institution. Inside a tenant there is **no department** ‚Äî all clinical users see that institution's patients and access differs by **role** (Clinician ¬∑ HOD ¬∑ Admin).\n\n| Reporting need | How it works under tenant-per-institution |\n|---|---|\n| Cross-**doctor** cohort reporting (within a hospital) | **Native** ‚Äî one schema per institution |\n| Cross-**institution** reporting (sponsor / registry / benchmarking) | A separate **de-identified aggregation layer above the tenants** ‚Äî pushes de-identified cohort metrics up; matches \"sponsor sees de-identified aggregate only\" |\n| \"Each doctor/team isolated\" (within a hospital) | **Not required** ‚Äî all clinicians share access; HOD is the privileged role |\n| Per-**doctor** dedicated tenant (internet SaaS, `O-DEP`) | Different again ‚Äî not chosen; would isolate each doctor and needs the same de-identified layer to report across them |\n\n> Net: cross-reporting splits into two ‚Äî **within-institution** (native, in-tenant) and **cross-institution** (de-identified aggregation layer). The de-identified layer is also exactly the sponsor/pharma surface (¬ß10), so it does double duty.\n\n---\n\n## 3. Foundational decisions (locked) + the one big open decision\n\n**Locked (from prior discovery):**\n- **Tenant = institution** (one schema per hospital); no `institution_id`, **no `department`**.\n- Clinical operational visibility = **tenant-wide for clinical roles**; **HOD = privileged** (unlock, notify-all-MDT, audit).\n- **Record lock:** edit window ‚Üí auto-lock ‚Üí HOD time-bound unlock.\n- Non-clinical / ops / quality / **pharma sponsor = de-identified aggregate only** (PHI firewall).\n- Care-gap rules = **config-owned, versioned, clinically signed-off**; 8 rules specified.\n\n**üî¥ The one decision to settle before build ‚Äî identity model:**\nThe V2 workbook is **fully de-identified** (`patient_code` is \"the only patient-level identifier permitted\"; age-at-diagnosis not DOB; no name/ABHA/Aadhaar). The earlier demo patient-file was **identified** (names, ABHA, Aadhaar, masked-with-reveal). These are two different products. Pick one:\n\n| Option | What it means | Consequence |\n|---|---|---|\n| **A. De-identified registry (recommended)** | ProstaCare stores **no PHI** ‚Äî only `patient_code` + clinical data. Identity (name/ABHA) stays in the hospital HIS, linked externally by `patient_code`. | Massively simpler DPDP/consent; pharma firewall becomes near-trivial; matches V2 workbook. Bedside \"who is this\" needs the HIS. |\n| **B. Identified EMR-lite** | ProstaCare stores identifiers, masked-by-default + audited reveal. | Full bedside usability; heavy PHI/consent/audit burden; contradicts the V2 workbook. |\n| **C. De-identified core + optional identity module** | De-identified registry by default; an optional, separately-scoped `patient_identity` entity (name/ABHA) available only to in-scope clinical roles at an institution that needs it. | Best of both; slightly more design. **Fallback recommendation if B is wanted anywhere.** |\n\n**Recommendation: A (or C if any site needs bedside identification).** Everything below is written so that identifiers, if kept, live in **one** isolated `patient_identity` entity ‚Äî the rest of the model stays de-identified regardless.\n\n---\n\n## 4. Canonical data model (three tiers + tenancy + cross-cutting)\n\nLegend for cardinality: **1:1** = one row per patient (current-state) ¬∑ **1:N dated** = many dated rows per patient (longitudinal) ¬∑ **derived** = computed, never typed.\n\n### 4.0 Tier 0 ‚Äî Tenancy & identity (NEW; absent from workbook)\n> **Tenant = institution.** The institution is the tenant boundary, so there is **no `institution` entity and no `institution_id`**. **There is also no `department` entity** ‚Äî access differs by **role**, not department; all clinical users see that institution's patients. The MDT panel is a **notification group, not an access boundary**.\n\n| Entity | Cardinality | Key fields | Notes |\n|---|---|---|---|\n| `app_user` | ‚Äî | id, display_name, **email (login identity)**, specialty, role‚Üí, status | Clinician / HOD / Coordinator / Ops / Admin |\n| **record-lock fields** | on every entered entity | `created_at`, `created_by`, `last_edited_at`, `locked`, `locked_at`, `unlocked_until`, `unlock_reason` | Edit window ‚Üí auto-lock ‚Üí HOD time-bound unlock (functional spec ¬ß1.8 / W10) |\n| `role` | config | **Clinician ¬∑ HOD (privileged) ¬∑ Admin** *(+ Ops/Quality only if in-product de-identified dashboards are needed)* | Drives capability matrix (¬ß10) |\n| MDT membership | **flag on `app_user`** | `is_mdt_member` (boolean) | Notify-all target. *No `mdt_panel` table* ‚Äî MDT is a notification group, not an access boundary. |\n| Primary clinician | field on `patient` | `primary_clinician_id‚Üí` | Attribution, not restriction. *No `care_team_member` table in v1.* |\n| `patient_identity` *(only if ¬ß3-B/C)* | 1:1, isolated | patient_code‚Üí, name, abha, aadhaar_masked, phone | The **only** PHI table; column `read_roles`+`context_mask`; audited reveal |\n\n### 4.1 Tier 1 ‚Äî Patient hub & current-state (1:1 per patient)\n| Entity | Source sheet/section | Key fields (from Field_Dictionary) |\n|---|---|---|\n| `patient` (hub) | Demographics_Entry + `diagnosis_date` moved here | patient_code (PK), primary_clinician_id‚Üí, registry_enrolment_date, age_at_diagnosis_years, language_preference, healthcare_coverage, referring_hospital_centre, referral_source, state, travel_distance_km, diagnosis_date *(no institution_id ‚Äî tenant = institution)* |\n| `pathology` | Clinical_Entry ¬∑ Presenting Complaint + DRE + Biopsy | primary_complaint, duration, ipss_score, bowel_rectal_symptoms, dre_findings, prostate_volume_cc, biopsy_date, biopsy_type, pi_rads_score, gleason_score, isup_grade_group, cores_positive_total, core_involvement_pct, perineural_invasion, ece_extracapsular_extension ‚Äî **1:1** (re-biopsy ‚Üí new row + journey event) |\n| comorbidity / family history | Clinical_Entry ¬∑ comorbidity_1..9 + family_history_1..6 | **Kept as 15 boolean flag columns on `pathology`** (exactly as the workbook and the chip-group UI). *No `patient_condition` table* ‚Äî the list is fixed and the cohort pivots are trivial SQL over booleans. |\n| `treatment_plan` | Treatment_Entry ¬∑ Intent & MDT | treatment_intent, mdt_tumour_board_status, date_of_mdt_review, clinical_trial_eligibility, treatment_start_date ‚Äî **1:1** header |\n| `outcome` | Outcomes_Entry | last_follow_up_date, best_response, psa_nadir_value, psa_nadir_date, psa_doubling_time_months, biochemical_recurrence_status/date, crpc_progression_status/date, rt_outcome_status ‚Äî **1:1** (milestone dates inline) |\n\n### 4.2 Tier 2 ‚Äî Longitudinal events/observations (1:N dated)\n| Entity | Source | Key fields | Why longitudinal |\n|---|---|---|---|\n| `psa_reading` | PSA_History (already correct) | psa_date, psa_ng_ml, free_psa_pct, psa_density, context_remarks | Trend/response curves; **partition on `psa_date`** |\n| `staging_assessment` **(NEW)** | Clinical_Entry ¬∑ TNM Staging & Risk | **assessed_on**, clinical_t_stage, n_stage, m_stage, eau_risk_category, ecog_performance_status, castration_status | Restaging + HSPC‚ÜíCRPC transition as dated facts; \"current stage\" = latest by `assessed_on` |\n| `imaging_study` **(NEW)** | Clinical_Entry ¬∑ Imaging & Molecular | **study_date**, modality {mpMRI, bone_scan, psma_pet_ct, ct_ap, dexa, germline_somatic}, result | \"is PSMA done / is DEXA current\" is time-sensitive (feeds care-gap engine) |\n| `treatment_line` **(NEW)** | Treatment_Entry ¬∑ ADT + Chemo + RT | line_type {ADT, anti_androgen, ARSI, chemo, RT}, agent, formulation_dose, start_date, end_date, status; + RT: rt_indication/status/modality, target_volume, dose_fractionation, rt_facility, planned_rt_start_date, rt_completion_date, cghs_preauth_status/request_date/approval_date; + testosterone_level, safety_side_effects | Expresses **sequential therapy** (ADT ‚Üí progression ‚Üí ARSI ‚Üí chemo) the flat sheet can't |\n| `supportive_care_event` | Treatment_Entry ¬∑ Bone Health & Supportive Care | **at**, bone_protection_therapy, calcium_vitamin_d, next_follow_up_psa_date, testosterone_monitoring, psychosocial_screening_phq9, nutritional_assessment | Dated so bone-protection start/stop has an audit trail (largest care gap) |\n| `journey_event` | Journey_Events (already correct) | event_type, event_date, event_notes | Human-readable milestone narrative (no longer the system of record for clinical state) |\n| `nudge` **(NEW)** | Care_Gap_Tracker (restructured) | nudge_id, patient_code‚Üí, rule_id, severity, current_status {open/logged/resolved/dismissed}, guideline_ref, opened_at, resolved_at | A gap is a lifecycle object, not a flag |\n| `nudge_event` **(NEW)** | ‚Äî | nudge_id‚Üí, at, action {opened/viewed/acknowledged/routed_to_mdt/resolved}, actor‚Üí | The event log that makes nudge-trend + closure audit computable (workbook flags this as impossible without it) |\n\n### 4.3 Tier 3 ‚Äî Derived / analytics (computed, never typed)\nMaterialized, RLS-scoped; refresh on cron. Covers the whole `Home_Dashboard` + `Population_Dashboard` inventory (see ¬ß7) plus:\n- `current_stage` / `current_line` / `current_castration_status` (latest-row projections for header badges)\n- `protocol_score`, `record_completeness`, benchmark deltas (ARSI/PSMA/bone/MDT), gap counts & severity rollups\n- `nudge_trend` (opened/viewed/acted/resolved/net-active) from `nudge_event`\n- All 22 derived fields enumerated in the workbook's `Dashboard_Derived` tab\n\n### 4.4 Cross-cutting\n| Entity | Source | Purpose |\n|---|---|---|\n| `notification` / `discussion_entry` | Team modal + workflow | MDT notify + per-patient discussion log; sender, recipients, reason, body, delivery status, audit |\n| `document` | Rx upload workflow | Prescription/report blobs ‚Üí secure object storage refs + metadata + audit |\n| `audit_event` | cross-cutting | Every view/edit/reveal/nudge-action/notification (R-AUTH-3) |\n| `guideline_rule` | config | The 8 care-gap rules as versioned, signed-off config (¬ß6) |\n| ~~`evidence_pack` / `guideline_pack`~~ | config | **Deferred to Phase 2 with AI Buddy** (absent from the agreed functional requirements) |\n\n**Notifications & email (AWS SES).** Identity = **email** (users log in with their email ID). The MDT-notify workflow (functional spec W7) sends every configured notification via **AWS SES**: resolve recipients ‚Üí in-app inbox item (+task) ‚Üí **SES email** to `recipient.email` ‚Üí store SES `messageId` + delivery status (sent/bounced/complaint/failed) on `Notification` ‚Üí append discussion log. NOVA Edge encoding: the workflow `email` step is backed by an **SES integration** (verified sender domain; credentials in `system_integrations`); in-app via `in_app_notification` + `sse_publish`. SMS/WhatsApp are future channels behind the same `Notification` record. Triggers covered: care-gap‚ÜíMDT, new patient, discuss-with-team, urgent escalation.\n\n---\n\n## 5. Sheet ‚Üí entity migration map\n\n| Workbook sheet | Target entity(ies) | What moves / changes |\n|---|---|---|\n| `Demographics_Entry` | `patient` (hub) | Keep 1:1. Make `patient_code` a real PK with FK integrity. Move `diagnosis_date` here. Add `primary_clinician_id` FK. *(No institution/department FKs ‚Äî tenant = institution.)* |\n| `Clinical_Entry` | **splits into** `pathology` (1:1, incl. comorbidity/family flags) + `staging_assessment` (1:N dated, **NEW**) + `imaging_study` (1:N dated, **NEW**) | The single sheet holding several lifecycles is decomposed by lifecycle. Staging & ima
