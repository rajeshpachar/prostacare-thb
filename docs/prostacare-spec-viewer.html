<script id="payload" type="application/json">[{"title": "Functional & Logic Spec", "file": "PROSTACARE_FUNCTIONAL_LOGIC_SPEC.md", "md": "# ProstaCare — Functional & Logic Specification (Clinical Sign-off Draft)\n\n**Who this is for:** the clinical team, product owners, and engineers — together. It describes, in plain language plus pseudo-code, **what data we capture, how the data relates, and how every workflow runs** (inputs → logic → outputs → derived data). It is written to be **signed off at the pseudo-code level** before build.\n\n**How to read it:**\n- **§1 Data models** — what we capture about each thing, its variables, an example, and how it links to others.\n- **§2 The one core idea** — \"current state\" vs \"history,\" with a worked example.\n- **§3 Workflows** — each flow as a visual diagram + inputs/logic/outputs pseudo-code.\n- **§4 Care-gap rules** — the 8 rules in full, with a worked patient example.\n- **§5 Derived data** — every computed number and its formula.\n- **§6 Visual master flow** + **§7 sign-off checklist**.\n\n> Naming note: field keys (e.g. `psma_pet_ct`) match the workbook `Field_Dictionary` exactly, so this spec and the data-entry pack stay in lockstep.\n\n---\n\n## 1. Data models — what the platform captures\n\nEach box below is one \"data model\" (a table of records). **Cardinality** tells you how many rows exist per patient:\n`1 per patient` = current state · `many (dated)` = a history log · `derived` = calculated, never typed.\n\n### 1.1 Who & where (organisation) — *added for multi-institution onboarding*\n> **Tenant = institution.** Each onboarded hospital is its own tenant, so **no `institution_id` is stored** — the tenant boundary already scopes every row to one hospital. Cross-doctor/department reporting is native inside a tenant; cross-*institution* (sponsor/registry) reporting is a separate **de-identified aggregation layer above tenants** (see §5 access rule).\n\n| Model | Cardinality | Key variables | Plain meaning |\n|---|---|---|---|\n| **Department** | org | `department_id`, name | e.g. \"Urology & Radiation Oncology\" — the visibility boundary within the institution |\n| **Doctor / User** | org | `user_id`, name, specialty, role, department | A clinician/coordinator/admin who logs in |\n| **Care team** | link | patient ↔ user, relation, dates | Who looks after this patient |\n| **MDT panel** | link | department ↔ users | The tumour-board roster (the \"notify all MDT\" target) |\n\n### 1.2 The patient & current clinical state\n| Model | Cardinality | Key variables | Example |\n|---|---|---|---|\n| **Patient** (hub) | 1 per patient | `patient_code`, `age_at_diagnosis_years`, `healthcare_coverage`, `state`, `referral_source`, `registry_enrolment_date`, `diagnosis_date` | `PCR-001`, 68, CGHS, Delhi, Govt OPD |\n| **Pathology** | 1 per patient | `gleason_score`, `isup_grade_group`, `biopsy_type`, `pi_rads_score`, `cores_positive_total`, `perineural_invasion`, `ece`, `dre_findings`, `ipss_score`, `prostate_volume_cc` | Gleason 4+4=8, ISUP 4, MRI-fusion |\n| **Patient condition** | many | `type` (comorbidity/family), `condition`, `present` | Diabetes = Yes; Breast Ca (family) = Yes |\n| **Treatment plan** | 1 per patient | `treatment_intent`, `mdt_tumour_board_status`, `date_of_mdt_review`, `clinical_trial_eligibility`, `treatment_start_date` | Disease control; MDT reviewed 2026-06-20 |\n| **Outcome** | 1 per patient | `best_response`, `psa_nadir_value/date`, `psa_doubling_time_months`, `biochemical_recurrence_status/date`, `crpc_progression_status/date`, `rt_outcome_status` | Nadir 0.8 @ 2026-05, no recurrence |\n\n### 1.3 History logs (the longitudinal tiers) — *dated, many rows per patient*\n| Model | Cardinality | Key variables | Why it's a log, not a cell |\n|---|---|---|---|\n| **PSA reading** | many (dated) | `psa_date`, `psa_ng_ml`, `free_psa_pct`, `psa_density`, `context_remarks` | PSA moves over time; drives the trend chart |\n| **Staging assessment** | many (dated) | `assessed_on`, `clinical_t_stage`, `n_stage`, `m_stage`, `eau_risk_category`, `ecog_performance_status`, `castration_status` | Restaging & HSPC→CRPC are dated facts, not overwrites |\n| **Imaging study** | many (dated) | `study_date`, `modality` (mpMRI/bone scan/PSMA/CT/DEXA/germline), `result` | \"Is PSMA done, and how recently\" is time-sensitive |\n| **Treatment line** | many (dated) | `line_type` (ADT/anti-androgen/ARSI/chemo/RT), `agent`, `start_date`, `end_date`, `status` (+ RT & CGHS fields) | Therapy is sequential: ADT → ARSI → chemo |\n| **Supportive-care event** | many (dated) | `at`, `bone_protection_therapy`, `calcium_vitamin_d`, `next_follow_up_psa_date`, `testosterone_monitoring`, `phq9`, `nutrition` | Bone-protection start/stop needs an audit trail |\n| **Journey event** | many (dated) | `event_type`, `event_date`, `event_notes` | The human-readable milestone story |\n\n### 1.4 Care gaps, collaboration, evidence\n| Model | Cardinality | Key variables | Plain meaning |\n|---|---|---|---|\n| **Nudge** | many | `nudge_id`, `rule_id`, `severity`, `current_status`, `opened_at`, `resolved_at` | One open care gap for one patient |\n| **Nudge event** | many | `nudge_id`, `at`, `action` (opened/viewed/acknowledged/routed/resolved), `actor` | The lifecycle log behind trend charts + audit |\n| **Notification / discussion** | many | sender, recipients, reason, subject, note, delivery, `at` | An MDT message + the per-patient discussion trail |\n| **Document** | many | file ref, type, size, uploader, `at` | Rx / report uploads |\n| **Guideline rule** | config | `rule_id`, condition, `severity`, version, sign-off | The 8 care-gap rules as governed config |\n| **Audit event** | many | actor, action, target, `at` | Who did what, when (incl. identity reveal) |\n\n### 1.5 How the models relate (visual)\n```mermaid\nerDiagram\n  DEPARTMENT ||--o{ USER : staffs\n  DEPARTMENT ||--o{ PATIENT : registers\n  USER ||--o{ CARE_TEAM : \"member of\"\n  PATIENT ||--o{ CARE_TEAM : \"cared by\"\n  PATIENT ||--|| PATHOLOGY : \"1:1\"\n  PATIENT ||--|| TREATMENT_PLAN : \"1:1\"\n  PATIENT ||--|| OUTCOME : \"1:1\"\n  PATIENT ||--o{ PATIENT_CONDITION : has\n  PATIENT ||--o{ PSA_READING : \"dated log\"\n  PATIENT ||--o{ STAGING_ASSESSMENT : \"dated log\"\n  PATIENT ||--o{ IMAGING_STUDY : \"dated log\"\n  PATIENT ||--o{ TREATMENT_LINE : \"dated log\"\n  PATIENT ||--o{ SUPPORTIVE_CARE_EVENT : \"dated log\"\n  PATIENT ||--o{ JOURNEY_EVENT : \"dated log\"\n  PATIENT ||--o{ NUDGE : \"care gaps\"\n  NUDGE ||--o{ NUDGE_EVENT : \"lifecycle log\"\n  PATIENT ||--o{ NOTIFICATION : \"MDT trail\"\n  GUIDELINE_RULE ||--o{ NUDGE : \"produces\"\n```\n\n### 1.6 Do we need a Visit / Encounter concept? (design decision)\n\n**Short answer: not as a *mandatory container* in v1 — but an *optional* Encounter is worth adding as a context layer.** ProstaCare is a **registry**, so it is organised by **clinical event date** (each PSA, staging, imaging, treatment line, supportive-care entry carries its own date). That is lower-burden than a full EMR and is exactly what the care-gap engine and cohort analytics need. Forcing every entry inside a visit would add data-entry friction and doesn't help the current-state or rules logic.\n\n**What still needs \"visit timing\":** the Patient List segments (Last Visit / Upcoming / Missed-Overdue). These can be driven **today, without a full Encounter entity**, from existing date fields — `last_follow_up_date` (Outcome) and `next_follow_up_psa_date` (Supportive-care):\n```\nvisit_status(patient):\n   IF next_follow_up_psa_date in future        → \"Upcoming\"\n   ELSE IF next_follow_up_psa_date in past      → \"Missed / Overdue\"\n   ELSE                                         → \"Last Visit\" (use last_follow_up_date)\n```\n\n**Two models to choose between:**\n| Model | What it means | When to pick |\n|---|---|---|\n| **Registry-by-event** (recommended v1) | Every clinical fact keyed by its own date; **no mandatory encounter**; visit-timing from follow-up-date fields | Registry + care-gap + analytics use case (this product) |\n| **EMR-by-encounter** | Every entry tied to a visit/encounter; richer visit grouping | Only if the product must reflect exact visit boundaries, scheduling, or billing |\n\n**Recommended (hybrid, low-cost):** add an **optional `Encounter`** — `encounter_id`, `encounter_date`, `type` (OPD / review / procedure / MDT), `clinician` — and a **nullable `encounter_id`** on each dated event. Events may reference an encounter (to group \"everything done at the 2026-06-15 visit\") but are **not required** to (registry backfill has no clean visits). Turn it on per-site when visit grouping or HIS-appointment sync is needed. This maps cleanly to the platform's appointment/encounter model later without reworking the event tiers.\n\n> **Sign-off question (added to §7):** confirm registry-by-event for v1 with an optional Encounter, or require encounter-bound entry.\n\n---\n\n## 2. The one core idea — \"current state\" is computed from history\n\nEverything the header shows (\"current stage,\" \"current line,\" \"current castration status\") is **the latest dated row**, not a stored cell. This is the single most important design rule, so a worked example:\n\n```\nSTAGING history for PCR-001:\n  Row A  assessed_on = 2026-01-10   risk = High             castration = HSPC\n  Row B  assessed_on = 2026-06-15   risk = Very High        castration = HSPC\n\nCURRENT STAGE  = latest row by assessed_on  = Row B (Very High, HSPC)\n→ Header badge shows \"Very High · HSPC\"\n→ Care-gap engine reads risk = Very High   (Row B), not High (Row A)\n→ When the patient later progresses, a Row C (castration = CRPC) is ADDED,\n  never overwriting Row B — so the HSPC→CRPC transition date is preserved.\n```\n\nPseudo-code used everywhere current-state is needed:\n```\nFUNCTION current(model, patient):\n    RETURN newest row in `model` WHERE patient_code = patient  ORDER BY <date> DESC  LIMIT 1\n```\n\n---\n\n## 3. Workflows — inputs, logic, outputs (pseudo-code + visuals)\n\nEach workflow states: **Trigger → Inputs → Logic (pseudo-code) → Outputs → Derived data touched.**\n\n### W1 · Patient onboarding\n```mermaid\nflowchart LR\n  A[Add New Patient] --> B{Valid + not duplicate?}\n  B -- no --> A\n  B -- yes --> C[Create Patient hub row]\n  C --> D[Attach to institution/department + primary clinician]\n  D --> E[Notify MDT: new patient]\n  C --> F[Appears in roster + cohort counts]\n```\n```\nTRIGGER: user submits Add-New-Patient\nINPUTS : patient_code, age_at_diagnosis, coverage, state, referral_source,\n         department_id, primary_clinician_id            // institution = the tenant (implicit)\nLOGIC  :\n  IF patient_code already exists within this tenant → reject \"duplicate code\"\n  ELSE create Patient(hub) with inputs; set registry_enrolment_date = today\n       create empty Pathology, Treatment_plan shells\n       route MDT new-patient notification (see W7)\nOUTPUT : new Patient visible in roster; cohort counts +1\nDERIVED: registrations-this-month, cohort volume recompute\n```\n\n### W2 · Clinical workup & staging\n```mermaid\nflowchart LR\n  A[Enter biopsy/DRE/complaint] --> P[Save Pathology 1:1]\n  B[Enter TNM + risk + castration] --> S[Add Staging assessment - dated]\n  C[Enter imaging results] --> I[Add Imaging study rows - dated]\n  S --> R[Recompute current stage/risk]\n  I --> R\n  R --> N[Run care-gap engine → W5]\n```\n```\nTRIGGER: clinician saves clinical assessment\nINPUTS : pathology fields; staging fields (assessed_on defaults today);\n         imaging modality+result rows\nLOGIC  :\n  Save Pathology (1:1, upsert)\n  APPEND Staging_assessment row (never overwrite)\n  FOR EACH imaging modality entered → APPEND Imaging_study row\n  current_risk       = current(Staging, patient).eau_risk_category\n  current_castration = current(Staging, patient).castration_status\n  imaging_status(m)  = current(Imaging WHERE modality=m, patient).result  (else \"Not done\")\nOUTPUT : updated current-state; header badges refresh\nDERIVED: triggers W5 (care-gap re-evaluation)\n```\n\n### W3 · PSA capture & trend\n```mermaid\nflowchart LR\n  A[Add PSA row: date + value] --> L[Append PSA_reading - dated]\n  L --> T[PSA trend chart reads this table]\n  L --> D[Cohort PSA median/percentile recompute]\n```\n```\nTRIGGER: clinician adds a PSA entry\nINPUTS : psa_date, psa_ng_ml, free_psa_pct?, psa_density?\nLOGIC  : APPEND PSA_reading row (dated)\n         latest_psa = current(PSA_reading, patient).psa_ng_ml\nOUTPUT : patient trend chart (bound to PSA_reading, not hardcoded points)\nDERIVED: cohort PSA median, percentile bands, diagnostic-PSA distribution\n```\n\n### W4 · Treatment planning & lines\n```mermaid\nflowchart LR\n  A[Agree pathway] --> P[Update Treatment_plan 1:1: intent, MDT, start]\n  B[Start/refresh a therapy] --> L[Add Treatment_line - dated]\n  C[Bone health / follow-up] --> S[Add Supportive-care event - dated]\n  L --> N[Run care-gap engine → W5]\n  S --> N\n```\n```\nTRIGGER: team records/updates treatment\nINPUTS : plan header (intent, mdt_status, mdt_date, treatment_start_date);\n         one Treatment_line (line_type, agent, start_date, status, +RT/CGHS fields);\n         one Supportive_care_event (bone_protection, dexa follow-up, phq9, follow-up PSA date)\nLOGIC  : upsert Treatment_plan; APPEND Treatment_line; APPEND Supportive_care_event\n         current_arsi = current(Treatment_line WHERE line_type=ARSI).status (else \"Not initiated\")\n         current_bone_protection = current(Supportive_care_event).bone_protection_therapy\nOUTPUT : treatment state auditable; cohort treatment analytics update\nDERIVED: ADT duration, time-to-treatment, CGHS delay, ARSI uptake → W5 + §5\n```\n\n### W5 · Care-gap (nudge) engine — the heart of the product\n```mermaid\nflowchart TD\n  T1[On clinical/treatment save] --> E[Evaluate 8 rules on CURRENT state]\n  T2[Daily scheduled re-scan] --> E\n  E --> C{Rule condition true?}\n  C -- yes, no open nudge --> O[Open Nudge + log 'opened' event]\n  C -- yes, already open --> K[Keep existing nudge]\n  C -- no, but nudge open --> R[Auto-resolve + log 'resolved' event]\n  O --> B[Recount severity + refresh badges/banner]\n  R --> B\n```\n```\nTRIGGER: (a) any staging/imaging/treatment/supportive save  (b) daily cron\nINPUTS (current state per patient):\n  risk = current(Staging).eau_risk_category\n  castration = current(Staging).castration_status\n  bone_scan  = imaging_status(bone_scan);   psma = imaging_status(psma_pet_ct)\n  dexa = imaging_status(dexa);              germline = imaging_status(germline)\n  bone_protection = current(Supportive).bone_protection_therapy\n  arsi = current(Treatment_line WHERE ARSI).status\n  next_follow_up_psa_date = current(Supportive).next_follow_up_psa_date\n  phq9 = current(Supportive).phq9\nLOGIC:\n  FOR EACH rule IN guideline_rules(active):\n     fired = evaluate(rule.condition, current_state)\n     IF fired AND no open nudge with this rule_id:\n         create Nudge(rule_id, severity, status=open); log Nudge_event(opened)\n     IF (NOT fired) AND open nudge with this rule_id exists:\n         set nudge.status = resolved; log Nudge_event(resolved)   // auto-resolve\nOUTPUT: the patient's live nudge list (severity-coded, explainable)\nDERIVED: urgent/warning/info counts, highest severity, primary focus,\n         cohort gap counts, protocol score, nudge-trend (from Nudge_event)\nNOTE  : \"Acknowledge\" (W6) does NOT resolve a nudge — only a changed source field does.\n```\n\n### W6 · Nudge lifecycle (acknowledge → route → resolve)\n```mermaid\nstateDiagram-v2\n  [*] --> Open : rule fires\n  Open --> Logged : acknowledge & route to MDT (W7)\n  Logged --> Resolved : source field changed → rule no longer fires (W5)\n  Open --> Resolved : source field changed\n  Open --> Dismissed : clinically not applicable (reason, audited)\n  Resolved --> Open : condition recurs\n  Resolved --> [*]\n```\n```\nTRIGGER: clinician clicks Acknowledge & log on a nudge\nINPUTS : nudge_id, actor\nLOGIC  : log Nudge_event(acknowledged); open Team modal prefilled (W7)\n         (status stays 'open'/'logged' — resolution is data-driven, not a click)\nOUTPUT : nudge shows \"Logged with team\"; discussion trail entry\nDERIVED: nudge-trend \"acted\" count increments\n```\n\n### W7 · MDT notify & discussion\n```mermaid\nflowchart LR\n  A[From nudge or patient] --> M{Recipient?}\n  M -- specific --> M1[Pick MDT member]\n  M -- all --> M2[Whole MDT panel]\n  M1 --> F[Reason + subject + note]\n  M2 --> F\n  F --> P[Preview message]\n  P --> S[Send in-app + email]\n  S --> L[Append discussion_entry + delivery status]\n```\n```\nTRIGGER: acknowledge-from-nudge (W6) OR \"Discuss with Team\"\nINPUTS : recipient_mode, recipient(s), reason, subject, note, patient_code\nLOGIC  : resolve recipients (member OR mdt_panel of department)\n         create Notification(reason, body, recipients); send via channel(s)\n         APPEND discussion_entry to patient trail; record delivery status\nOUTPUT : MDT informed; per-patient discussion log updated; toast\nDERIVED: MDT-review-rate, collaboration audit\n```\n\n### W8 · Cohort analytics (derivation)\n```mermaid\nflowchart LR\n  A[All patient + event data] --> V[Nightly/On-write derivations]\n  V --> K[KPIs + benchmarks + protocol score]\n  V --> N[Nudge trend from Nudge_event]\n  K --> D[Dashboards]\n  N --> D\n  D --> P[Drill any chart → patient list]\n```\n```\nTRIGGER: on-write + scheduled refresh\nINPUTS : every model in §1\nLOGIC  : compute derived metrics (§5) as views; apply de-identification for\n         non-clinical/sponsor roles\nOUTPUT : Home + Population dashboards; every widget drillable to patient_code\nDERIVED: see §5 (all of it)\n```\n\n### W9 · AI Buddy (governed, stepwise)\n```mermaid\nflowchart LR\n  A[Open AI Buddy on a case] --> S1[Step: pathway review]\n  S1 --> S2[Step: progression branch]\n  S2 --> S3[Step: access/affordability]\n  S3 --> S4[Step: trials]\n  S4 --> J[Jump back to patient file]\n```\n```\nTRIGGER: user opens AI Buddy\nINPUTS : structured record (read-only) + approved evidence/guideline packs\n         + access-rule config\nLOGIC  : stepwise review bounded to configured brain; NO free generation,\n         NO inventing gaps, NO autonomous decisions, NO unlisted drug access\nOUTPUT : explainable, step-by-step next-path view; links back to the file\nDERIVED: none (read-only); every step audited\n```\n\n---\n\n## 4. The 8 care-gap rules (full) + worked example\n\nInputs are always **current state** (latest dated rows). Each rule = one `guideline_rule` config row (versioned, clinically signed-off).\n\n| # | rule_id | Condition | Severity | Next step (shown to user) |\n|---|---|---|---|---|\n| 1 | `bone_scan_missing` | `bone_scan = Not done` AND risk ∈ {High, Very High, M1} | **Urgent** | Complete bone scan / SPECT |\n| 2 | `psma_missing` | `psma = Not done` AND risk ∈ {High, Very High} | **Urgent** | Complete PSMA PET-CT |\n| 3 | `bone_protection_missing` | `bone_protection = Not started` | **Urgent** | Start bone protection plan |\n| 4 | `dexa_missing` | `dexa = Not done` | **Warning** | Order DEXA baseline |\n| 5 | `genomics_missing` | `germline = Not done` | **Warning** | Order germline/somatic testing |\n| 6 | `arsi_readiness` | `castration = HSPC` AND risk ⊇ High AND `arsi = Not initiated` | **Warning** | Review ARSI intensification |\n| 7 | `followup_psa_missing` | `next_follow_up_psa_date` is empty | **Info** | Schedule follow-up PSA |\n| 8 | `psychosocial_prompt` | `phq9` blank or \"Not done\" | **Info** | Complete PHQ-9 screening |\n\n**Worked example — patient `PCR-001`** (values from the workbook sample):\n```\nCURRENT STATE:\n  risk = High         castration = HSPC\n  bone_scan = Not done   psma = Not done   bone_protection = Not started\n  dexa = Not done        germline = Not done   arsi = Not initiated\n  next_follow_up_psa_date = 2026-07-18 (present)   phq9 = Not done\n\nEVALUATE:\n  1 bone_scan_missing      → Not done AND High           → FIRES  (Urgent)\n  2 psma_missing           → Not done AND High           → FIRES  (Urgent)\n  3 bone_protection_missing→ Not started                 → FIRES  (Urgent)\n  4 dexa_missing           → Not done                    → FIRES  (Warning)\n  5 genomics_missing       → Not done                    → FIRES  (Warning)\n  6 arsi_readiness         → HSPC AND High AND Not init   → FIRES  (Warning)\n  7 followup_psa_missing   → date present                → does not fire\n  8 psychosocial_prompt    → phq9 = Not done             → FIRES  (Info)\n\nRESULT: 7 open nudges → Urgent 3 · Warning 3 · Info 1\n        Highest severity = Urgent ; Primary focus = \"Complete bone scan / SPECT\"\n        Header banner = \"Urgent: 3 actions require attention\"\n\nLATER: clinician records bone_scan = \"Done — no metastases\" and saves.\n  → W5 re-runs → rule 1 no longer fires → nudge #1 AUTO-RESOLVES\n  → counts become Urgent 2 · Warning 3 · Info 1 (no manual \"close\" needed).\n```\n\n---\n\n## 5. Derived data — every computed number + its formula\n\nNothing here is typed; all is computed from §1 (pseudo-code).\n\n| Derived value | Formula (pseudo-code) | Feeds |\n|---|---|---|\n| current_stage / risk / castration | `current(Staging).<field>` | Header badges, rule inputs |\n| latest_psa | `current(PSA_reading).psa_ng_ml` | Header, cohort median |\n| ADT duration | `today − current(Treatment_line WHERE ADT).start_date` | Treatment dashboard, bone-gap logic |\n| time-to-treatment | `treatment_start_date − diagnosis_date` | Access/delay analytics |\n| CGHS delay | `(cghs_approval_date OR today) − cghs_request_date` | Access analytics |\n| gap counts | `COUNT(Nudge WHERE status=open GROUP BY severity)` | Home KPIs, banner |\n| protocol score | `weighted % of rule-families passing across cohort` | Home + Quality dashboard |\n| record completeness | `% required fields present per field-group` | Home, incomplete-records list |\n| benchmark deltas | `cohort % vs NCCN target` for ARSI/PSMA/bone/MDT | Benchmark cards |\n| nudge trend | `COUNT(Nudge_event GROUP BY action, period)` | Nudge-trend chart |\n| KM survival | `survival(risk_group, recurrence dates)` | Outcomes dashboard |\n| registrations/month | `COUNT(Patient GROUP BY month(registry_enrolment_date))` | Home + Overview |\n\n**Access rule on all derived data:** clinical roles see identified/in-scope; **ops/quality/sponsor see de-identified aggregate only** (masked drill rows).\n\n---\n\n## 6. Visual master flow (end-to-end)\n```mermaid\nflowchart TD\n  ON[Onboard institution + doctors] --> ADD[Register patient - W1]\n  ADD --> WU[Workup + staging - W2]\n  ADD --> PSA[PSA history - W3]\n  ADD --> TX[Treatment lines - W4]\n  WU --> ENG[Care-gap engine - W5]\n  TX --> ENG\n  ENG --> NUD[Nudges on patient file]\n  NUD --> ACK[Acknowledge - W6]\n  ACK --> MDT[MDT notify + discussion - W7]\n  MDT --> FIX[Clinician acts → source field changes]\n  FIX --> ENG\n  ENG --> ANA[Cohort analytics - W8]\n  ANA --> DRILL[Drill chart → patient → file]\n  DRILL --> NUD\n  NUD --> AIB[AI Buddy review - W9]\n```\n\n---\n\n## 7. Sign-off checklist (for the clinical team)\n\nPlease confirm, amend, or reject each:\n1. **Data models (§1)** — are the variables per model complete and correctly named for clinical use? Any field missing (e.g. additional comorbidity, biomarker, toxicity grade)?\n2. **Current-state rule (§2)** — agreed that \"current stage/line/castration\" = latest dated entry, and that restaging/progression is a **new** row (never an overwrite)?\n3. **Cardinality calls** — `Pathology` and `Outcome` as 1-per-patient (re-biopsy → new row); `Supportive-care` as a **dated** log (bone-protection audit) — agreed?\n4. **The 8 rules (§4)** — conditions, severities, and next-step wording clinically correct? Any rule to add/remove/retune (e.g. thresholds, risk sets)?\n5. **Auto-resolve semantic (§3 W5/W6)** — agreed that acknowledging routes to MDT but only a changed source field resolves a nudge?\n6. **Derived metrics (§5)** — formulas acceptable; benchmark targets (ARSI 60%, PSMA 85%, bone 85%, MDT 95%) confirmed by clinical governance?\n7. **Governance** — who signs off the rule pack + evidence packs (independent of any sponsor)?\n8. **Identity model** — de-identified registry (recommended) vs identified — confirm (drives everything downstream).\n9. **Visit / Encounter (§1.6)** — confirm **registry-by-event with an optional Encounter** for v1 (recommended), or require every entry to be encounter-bound.\n10. **Tenancy** — confirmed **tenant = institution** (no `institution_id`); cross-institution reporting via a de-identified aggregation layer — agreed?\n\nOnce §7 is signed, this spec becomes the build contract; engineering maps it to the platform per `PROSTACARE_BUILD_SPEC_V1.md` / `NOVA-EDGE-FEASIBILITY.md`.\n\n---\n\n*Companion docs: `PROSTACARE_BUILD_SPEC_V1.md` (platform/NOVA Edge mapping), `FLOW-CLARITY-AND-OPEN-QUESTIONS.md` (decisions & open questions), `ProstaCare_Nudge_Logic_Handoff.md` (source of the 8 rules), and the `ProstaCare_Schema_08072026_V2.xlsx` workbook (authoritative field dictionary + value lists).*\n"}, {"title": "NOVA Edge Alignment Review", "file": "NOVAEDGE_ALIGNMENT_REVIEW.md", "md": "# ProstaCare ↔ NOVA Edge — Architecture Alignment & Gap Review\n\n**Purpose:** verify the ProstaCare canonical model + workflows (`PROSTACARE_FUNCTIONAL_LOGIC_SPEC.md`, `PROSTACARE_BUILD_SPEC_V1.md`) map **seamlessly** onto NOVA Edge primitives (schemas, scopes, workflows, subscriptions/cron, materialized views, ADK agents), and to surface every gap before the preset build.\n\n**Verdict:** **Strongly aligned.** Every entity maps to a NOVA Edge schema and every workflow to existing operators/triggers — no new platform primitive is required. There are **two items that need an explicit design decision/component** before it is truly \"seamless\" (cross-institution aggregation; rule-config encoding) and **six \"encode-it-this-way\" notes**. All are called out below with resolutions. None is a blocker.\n\n---\n\n## 1. Entity → NOVA Edge schema mapping\n\nField types available: `string/text/integer/number/float/boolean/datetime/date/json/enum(enumValues)/uuid/phone/email/file/tags` + per-field `required/unique/indexed/default/references`. Enums → `enumValues`; FKs → `references`; time-series → `PartitionConfig`. (Platform gotcha: use `datetime` not `date`.)\n\n| Canonical entity | NOVA Edge construct | Notes / field-type mapping | Status |\n|---|---|---|---|\n| `department`, `app_user`, `role`, `care_team_member`, `mdt_panel` | entities + `roles.json` + org-units | app_user carries `department` for scopes | ✅ aligned |\n| `patient` (hub) | canonical `patients` **extension** via PATCH | de-identified; enums for coverage/state/referral; **no `institution_id`** (tenant = institution) | ✅ aligned |\n| `pathology` (1:1) | entity, FK→patient | enums (gleason/isup/pi-rads/dre); text for cores | ✅ aligned |\n| `patient_condition` (normalized) | entity, FK→patient | **import transform** pivots workbook flag columns → rows (see G6) | ✅ aligned |\n| `treatment_plan` (1:1) | entity | enums + dates | ✅ aligned |\n| `outcome` (1:1) | entity | enums + milestone dates | ✅ aligned |\n| `psa_reading` (dated) | entity + **RANGE partition** on `psa_date` | composite PK `(id, psa_date)`; lookback caveat (G5) | ✅ aligned |\n| `staging_assessment` (dated) | entity | enums (T/N/M/risk/ecog/castration) + `assessed_on` | ✅ aligned |\n| `imaging_study` (dated) | entity | `modality` enum + `result` enum + `study_date` | ✅ aligned |\n| `treatment_line` (dated) | entity | `line_type` enum; RT + CGHS fields on the RT line | ✅ aligned |\n| `supportive_care_event` (dated) | entity | bone/dexa/phq9/follow-up + `at` | ✅ aligned |\n| `journey_event` (dated) | entity | `event_type` enum | ✅ aligned |\n| `nudge` | entity | `rule_id`, `severity`, `current_status`, dates | ✅ aligned |\n| `nudge_event` | entity (optionally partitioned) | lifecycle log for trend + audit | ✅ aligned |\n| `notification` / `discussion_entry` | entities | recipients (json), delivery status | ✅ aligned |\n| `document` | `file` field + attachment entity + object storage | S3/MinIO per `communication.json` | ✅ aligned |\n| `guideline_rule` | **config entity** | `version` + `signed_off_by/at` + `active` (G2) | ✅ aligned |\n| `evidence_pack` / `guideline_pack` | config entities | bounded brain for AI Buddy | ✅ aligned |\n| `encounter` (optional) | entity + **nullable** `encounter_id` on events | maps to platform appointment/encounter later | ✅ aligned |\n| `audit_event` | platform `activity` + subscriptions | ensure full coverage (G7) | ✅ aligned |\n| `patient_identity` *(only if identified model)* | isolated entity + `read_roles`/`context_mask` | audited reveal | ✅ aligned |\n\n---\n\n## 2. Workflow → NOVA Edge mechanism mapping\n\nTriggers: API run · entity `subscriptions` (on_create/update) · schema `policies` (cron) · webhook. Step types used: `create/upsert/query/sql_exec/branch/for_each/email/in_app_notification/sse_publish/llm/api_call`.\n\n| Workflow | Trigger | Steps used | Status |\n|---|---|---|---|\n| W1 onboarding | Add-patient API → `on_create` sub | `create` + notify workflow (W7) | ✅ aligned |\n| W2 workup/staging | save → `on_create` sub on staging/imaging | `upsert`(pathology) + `create`(dated) + fire W5 | ✅ aligned |\n| W3 PSA capture | save → `on_create` sub | `create`; scheduled mat-view refresh | ✅ aligned |\n| W4 treatment | save → `on_create` sub | `create`(line/supportive) + fire W5 | ✅ aligned |\n| **W5 care-gap engine** | `on_write` subs (staging/imaging/treatment/supportive) **+** daily `policies` cron | `sql_exec` `INSERT…SELECT…WHERE <rule> AND NOT EXISTS(open)` + `sql_exec` auto-resolve `UPDATE` | ✅ aligned — see G2 (rule encoding) + G4 (current-state) |\n| W6 nudge lifecycle | Acknowledge API | `create`(nudge_event) + open W7 | ✅ aligned |\n| W7 MDT notify | from nudge/patient | `query`(resolve mdt_panel) + `for_each` + `email`+`in_app_notification`+`sse_publish` + `create`(discussion_entry) | ✅ aligned |\n| W8 analytics | on-write + cron refresh | **materialized views** (RLS-scoped) + `reports` | ✅ aligned — see G1 (charts) + G3 (cross-tenant) |\n| W9 AI Buddy | user opens | ADK `agent` (chat) + read tools + evidence packs + `require_human_approval` | ✅ aligned |\n\n---\n\n## 3. Current-state derivation — the key encoding note (G4)\n\n\"Current stage / line / castration = latest dated row\" is **cross-row**, which NOVA Edge **computed columns cannot do** (the `compute` DSL is string-composition only — no rollups). So current-state must be encoded as **either**:\n- a **materialized view** `current_state` (one row/patient with the latest values), refreshed on write/cron — best for dashboards & header badges; **or**\n- an **inline subquery** inside the care-gap engine's `sql_exec` (`… JOIN LATERAL (SELECT … ORDER BY assessed_on DESC LIMIT 1) …`) — best for the rules pass.\n\n**Resolution:** use both — a `current_state` mat-view for UI/analytics, and lateral subqueries inside W5 for evaluation. Do **not** model current-state as a stored/computed column. *(Spec §2/§5 already treat it as derived; this pins the platform encoding.)*\n\n---\n\n## 4. Gaps & resolutions\n\n| # | Gap | Why it matters | Resolution |\n|---|---|---|---|\n| **G1** | Chart renderers for **PSA line / percentile bands / Kaplan-Meier** | NOVA Edge chart subtype is a free string, but the concrete renderer lives in the frontend repo (`metadata-auto-ui`), unaudited | Confirm line/area exist; build KM as a custom renderer. Data/aggregation side is fully supported. **Frontend task, not a data-model gap.** |\n| **G2** | `guideline_rule` as **data-driven config** vs one `sql_exec` per rule | Clinical team wants to edit rules without code | Recommended: `guideline_rule` config holds **metadata** (rule_id, severity, next_step, inputs, version, sign-off, active); the engine workflow holds **one predicate step per rule (8)**, gated by `active`. Clinicians tune severity/wording/thresholds in config; changing the *logic shape* is a versioned workflow edit. (Fully dynamic predicate-from-config is possible via stored SQL fragments + `tables` allowlist, but adds risk — defer.) |\n| **G3** | **Cross-institution** de-identified reporting is **not native** (tenants are isolated schemas) | Sponsor/registry benchmarking spans hospitals | **Net-new component:** a cross-tenant **de-identified aggregation layer** (scheduled export of each tenant's de-identified cohort metrics → a registry store the sponsor reads). This is the one piece that isn't in-tenant config. Owner + cadence = open decision (`O-REP`). |\n| **G4** | Current-state = latest row (cross-row) | Header badges + rule inputs | Mat-view + lateral subquery (see §3). Not a computed column. |\n| **G5** | Partitioned `psa_reading`/`nudge_event` need composite PK + lookback | Old rows can drop from plain ID lookups | Composite PK `(id, <date>)`; queries use the date range; acceptable for time-series reads. |\n| **G6** | Workbook comorbidity/family **flag columns** → normalized `patient_condition` rows | Entry pack uses one Yes/No column per condition | One-time/import **transform** pivots the 15 flags into rows on ingest; UI keeps chip-group control. |\n| **G7** | **Audit coverage** must be complete | R-AUTH-3; identity reveal | Cross-cutting `audit_event` subscription on all entities + explicit reveal audit on `patient_identity`. |\n\n**None blocks the build.** G3 is the only genuinely net-new *component*; the rest are encode-it-this-way notes or a frontend task.\n\n---\n\n## 5. Alignment checklist\n\n| Dimension | Status |\n|---|---|\n| Every entity → a NOVA Edge schema | 🟢 |\n| Field types / enums / FKs / partitioning expressible | 🟢 |\n| Tenancy = institution = one tenant schema | 🟢 |\n| Department/role scopes (`row_policies` + `$user.department`) | 🟢 |\n| De-identified analytics via RLS-scoped mat-views | 🟢 |\n| Care-gap engine via `sql_exec` + subs + cron | 🟢 (encode per G2/G4) |\n| Nudge lifecycle + trend from `nudge_event` | 🟢 |\n| MDT notify via comms steps | 🟢 |\n| AI Buddy via bounded ADK agent | 🟢 |\n| Onboarding = provision tenant per institution + seed preset | 🟢 |\n| Cross-institution de-identified rollup | 🟡 net-new component (G3) |\n| Clinical chart renderers (line/KM) | 🟡 frontend confirm (G1) |\n\n---\n\n## 6. What must exist before/around the preset build\n\n1. **Decide G2 encoding** (config metadata + per-rule predicate steps — recommended) so the clinical team's rule-governance need is met.\n2. **Scope G3** (cross-tenant de-identified aggregation layer) — owner, store, cadence; it is the sponsor surface too.\n3. **Confirm G1** (frontend line/KM renderers).\n4. Pin **G4** current-state as mat-view + lateral subquery in the schema/workflow design.\n5. Include **G6** import transform + **G7** audit subscription in the preset from day one.\n\nEverything else is standard NOVA Edge configuration: fork `novahub_v2`, add the entities (§1), the workflows (§2), the mat-views (§5/W8), the ADK agent (W9), scopes + roles, and the theme.\n\n---\n\n*Reviewed against: `NOVA-EDGE-FEASIBILITY.md` (platform capability findings), the `novahub_v2`/`sakra` presets, and platform docs (workflow-reference, materialized-views, column-compute-derivations, partitioning, rbac). Companion: `PROSTACARE_FUNCTIONAL_LOGIC_SPEC.md`, `PROSTACARE_BUILD_SPEC_V1.md`.*\n"}, {"title": "Build Spec (v1)", "file": "PROSTACARE_BUILD_SPEC_V1.md", "md": "# ProstaCare — Canonical Schema & NOVA Edge Build Spec (v1, for internal approval)\n\n**Audience:** ProstaCare product/clinical leads + the NOVA Edge (NOVAGE) platform team, for internal sign-off **before** preset build starts.\n**Derived from:** `ProstaCare_Schema_08072026_V2.xlsx` (the \"Platform Bible\" workbook — product narrative, 110-field dictionary, value lists, 46-widget dashboard inventory, care-gap tracker) + the prior discovery/feasibility docs in this folder (`FLOW-CLARITY-AND-OPEN-QUESTIONS.md`, `NOVA-EDGE-FEASIBILITY.md`, `PRODUCT-PRD.md`, `ProstaCare_Nudge_Logic_Handoff.md`).\n**Goal:** define the *canonical data model, tenancy/onboarding model, rules/analytics/intelligence layers, and NOVA Edge mapping* — structured so it is easy to build and manage, with the workbook as one entry surface that maps onto the canonical schema (not the system of record).\n\n---\n\n## 1. Framing — what changed, and the one principle\n\nThe workbook is a **platform bible first, data-entry pack second** (its own words). It commits the product to a registry + patient command-centre + care-gap engine + cohort analytics + governed AI (\"AI Buddy\"), with a **core promise**: *every cohort signal drillable to a patient; every patient gap an explainable next action.*\n\nThat promise is only structurally possible if the data model is **longitudinal, computed, and tenant-aware** — which the workbook itself is not (it is a flat, de-identified, single-institution snapshot). So this spec does three things the workbook does not:\n\n1. **Adds the tenancy/identity layer** (institution → department → doctor/user → role → scope) so institutions and doctors can be onboarded.\n2. **Promotes snapshot columns to longitudinal event tiers** (staging, imaging, treatment lines, nudges) so restaging, sequential therapy, and nudge-trend history become expressible.\n3. **Makes every displayed number derived** (Tier 3), never typed — the workbook already flags this need in `Dashboard_Derived`/`Dashboard_Coverage`.\n\n**Guiding principle (carried from PRODUCT-PRD R-X-5):** snapshot storage where the domain is longitudinal is the root cause of the demo's known bugs. The canonical model fixes them structurally (see §5.5).\n\n---\n\n## 2. Terminology — tenancy model (updated): **tenant = institution**\n\n**Decision (confirmed): each onboarded institution is its own NOVA Edge tenant** (one Postgres schema per hospital). Therefore **no `institution_id` column is stored anywhere** — the tenant boundary *is* the institution, and every row already belongs to that institution. Inside a tenant, **department / doctor / role** are modelled as org-units + row-level scopes to enforce the department-scoped access boundary.\n\n| Reporting need | How it works under tenant-per-institution |\n|---|---|\n| Cross-**doctor** / cross-**department** cohort reporting (within a hospital) | **Native** — one schema per institution; scopes control who sees what |\n| Cross-**institution** reporting (sponsor / registry / benchmarking) | A separate **de-identified aggregation layer above the tenants** — pushes de-identified cohort metrics up; matches \"sponsor sees de-identified aggregate only\" |\n| \"Each doctor/team isolated\" (within a hospital) | Row-level `scopes` inside the institution's tenant |\n| Per-**doctor** dedicated tenant (internet SaaS, `O-DEP`) | Different again — not chosen; would isolate each doctor and needs the same de-identified layer to report across them |\n\n> Net: cross-reporting splits into two — **within-institution** (native, in-tenant) and **cross-institution** (de-identified aggregation layer). The de-identified layer is also exactly the sponsor/pharma surface (§10), so it does double duty.\n\n---\n\n## 3. Foundational decisions (locked) + the one big open decision\n\n**Locked (from prior discovery):**\n- Single NOVA Edge tenant; institution/department/doctor = org-units + scopes.\n- Clinical operational visibility = **department/team-scoped** (HOD/coordinator may be tenant-wide).\n- Non-clinical / ops / quality / **pharma sponsor = de-identified aggregate only** (PHI firewall).\n- Care-gap rules = **config-owned, versioned, clinically signed-off**; 8 rules specified.\n\n**🔴 The one decision to settle before build — identity model:**\nThe V2 workbook is **fully de-identified** (`patient_code` is \"the only patient-level identifier permitted\"; age-at-diagnosis not DOB; no name/ABHA/Aadhaar). The earlier demo patient-file was **identified** (names, ABHA, Aadhaar, masked-with-reveal). These are two different products. Pick one:\n\n| Option | What it means | Consequence |\n|---|---|---|\n| **A. De-identified registry (recommended)** | ProstaCare stores **no PHI** — only `patient_code` + clinical data. Identity (name/ABHA) stays in the hospital HIS, linked externally by `patient_code`. | Massively simpler DPDP/consent; pharma firewall becomes near-trivial; matches V2 workbook. Bedside \"who is this\" needs the HIS. |\n| **B. Identified EMR-lite** | ProstaCare stores identifiers, masked-by-default + audited reveal. | Full bedside usability; heavy PHI/consent/audit burden; contradicts the V2 workbook. |\n| **C. De-identified core + optional identity module** | De-identified registry by default; an optional, separately-scoped `patient_identity` entity (name/ABHA) available only to in-scope clinical roles at an institution that needs it. | Best of both; slightly more design. **Fallback recommendation if B is wanted anywhere.** |\n\n**Recommendation: A (or C if any site needs bedside identification).** Everything below is written so that identifiers, if kept, live in **one** isolated `patient_identity` entity — the rest of the model stays de-identified regardless.\n\n---\n\n## 4. Canonical data model (three tiers + tenancy + cross-cutting)\n\nLegend for cardinality: **1:1** = one row per patient (current-state) · **1:N dated** = many dated rows per patient (longitudinal) · **derived** = computed, never typed.\n\n### 4.0 Tier 0 — Tenancy & identity (NEW; absent from workbook)\n> **Tenant = institution.** The institution is the tenant boundary, so there is **no `institution` entity and no `institution_id`** inside the schema — the tenant provides it. The entities below live inside each institution's tenant.\n\n| Entity | Cardinality | Key fields | Notes |\n|---|---|---|---|\n| `department` | org-unit | id, name (e.g. \"Urology & Radiation Oncology\") | Scope boundary for clinical visibility |\n| `app_user` | — | id, department_id→, display_name, specialty, role→, identity_ref, status | Doctor/coordinator/ops/admin login |\n| `role` | config | HOD, Treating Clinician, MDT Member, Coordinator, Ops/Quality, Admin | Drives capability matrix (§10) |\n| `care_team_member` | link | patient_code→, app_user→, relation (treating/primary/member), from, to | Per-patient care team (O-T, design-ready) |\n| `mdt_panel` / `mdt_panel_member` | config/link | department_id→, app_user→ | The department MDT roster (notify-all target) |\n| `patient_identity` *(only if §3-B/C)* | 1:1, isolated | patient_code→, name, abha, aadhaar_masked, phone | The **only** PHI table; column `read_roles`+`context_mask`; audited reveal |\n\n### 4.1 Tier 1 — Patient hub & current-state (1:1 per patient)\n| Entity | Source sheet/section | Key fields (from Field_Dictionary) |\n|---|---|---|\n| `patient` (hub) | Demographics_Entry + `diagnosis_date` moved here | patient_code (PK), department_id→, primary_clinician_id→, registry_enrolment_date, age_at_diagnosis_years, language_preference, healthcare_coverage, referring_hospital_centre, referral_source, state, travel_distance_km, diagnosis_date *(no institution_id — tenant = institution)* |\n| `pathology` | Clinical_Entry · Presenting Complaint + DRE + Biopsy | primary_complaint, duration, ipss_score, bowel_rectal_symptoms, dre_findings, prostate_volume_cc, biopsy_date, biopsy_type, pi_rads_score, gleason_score, isup_grade_group, cores_positive_total, core_involvement_pct, perineural_invasion, ece_extracapsular_extension — **1:1** (re-biopsy → new row + journey event) |\n| `patient_condition` | Clinical_Entry · comorbidity_1..9 + family_history_1..6 | type (comorbidity\\|family_history), condition, present — **normalized** (replaces 15 flag columns; enables clean cohort pivots) |\n| `treatment_plan` | Treatment_Entry · Intent & MDT | treatment_intent, mdt_tumour_board_status, date_of_mdt_review, clinical_trial_eligibility, treatment_start_date — **1:1** header |\n| `outcome` | Outcomes_Entry | last_follow_up_date, best_response, psa_nadir_value, psa_nadir_date, psa_doubling_time_months, biochemical_recurrence_status/date, crpc_progression_status/date, rt_outcome_status — **1:1** (milestone dates inline) |\n\n### 4.2 Tier 2 — Longitudinal events/observations (1:N dated)\n| Entity | Source | Key fields | Why longitudinal |\n|---|---|---|---|\n| `psa_reading` | PSA_History (already correct) | psa_date, psa_ng_ml, free_psa_pct, psa_density, context_remarks | Trend/response curves; **partition on `psa_date`** |\n| `staging_assessment` **(NEW)** | Clinical_Entry · TNM Staging & Risk | **assessed_on**, clinical_t_stage, n_stage, m_stage, eau_risk_category, ecog_performance_status, castration_status | Restaging + HSPC→CRPC transition as dated facts; \"current stage\" = latest by `assessed_on` |\n| `imaging_study` **(NEW)** | Clinical_Entry · Imaging & Molecular | **study_date**, modality {mpMRI, bone_scan, psma_pet_ct, ct_ap, dexa, germline_somatic}, result | \"is PSMA done / is DEXA current\" is time-sensitive (feeds care-gap engine) |\n| `treatment_line` **(NEW)** | Treatment_Entry · ADT + Chemo + RT | line_type {ADT, anti_androgen, ARSI, chemo, RT}, agent, formulation_dose, start_date, end_date, status; + RT: rt_indication/status/modality, target_volume, dose_fractionation, rt_facility, planned_rt_start_date, rt_completion_date, cghs_preauth_status/request_date/approval_date; + testosterone_level, safety_side_effects | Expresses **sequential therapy** (ADT → progression → ARSI → chemo) the flat sheet can't |\n| `supportive_care_event` | Treatment_Entry · Bone Health & Supportive Care | **at**, bone_protection_therapy, calcium_vitamin_d, next_follow_up_psa_date, testosterone_monitoring, psychosocial_screening_phq9, nutritional_assessment | Dated so bone-protection start/stop has an audit trail (largest care gap) |\n| `journey_event` | Journey_Events (already correct) | event_type, event_date, event_notes | Human-readable milestone narrative (no longer the system of record for clinical state) |\n| `nudge` **(NEW)** | Care_Gap_Tracker (restructured) | nudge_id, patient_code→, rule_id, severity, current_status {open/logged/resolved/dismissed}, guideline_ref, opened_at, resolved_at | A gap is a lifecycle object, not a flag |\n| `nudge_event` **(NEW)** | — | nudge_id→, at, action {opened/viewed/acknowledged/routed_to_mdt/resolved}, actor→ | The event log that makes nudge-trend + closure audit computable (workbook flags this as impossible without it) |\n\n### 4.3 Tier 3 — Derived / analytics (computed, never typed)\nMaterialized, RLS-scoped; refresh on cron. Covers the whole `Home_Dashboard` + `Population_Dashboard` inventory (see §7) plus:\n- `current_stage` / `current_line` / `current_castration_status` (latest-row projections for header badges)\n- `protocol_score`, `record_completeness`, benchmark deltas (ARSI/PSMA/bone/MDT), gap counts & severity rollups\n- `nudge_trend` (opened/viewed/acted/resolved/net-active) from `nudge_event`\n- All 22 derived fields enumerated in the workbook's `Dashboard_Derived` tab\n\n### 4.4 Cross-cutting\n| Entity | Source | Purpose |\n|---|---|---|\n| `notification` / `discussion_entry` | Team modal + workflow | MDT notify + per-patient discussion log; sender, recipients, reason, body, delivery status, audit |\n| `document` | Rx upload workflow | Prescription/report blobs → secure object storage refs + metadata + audit |\n| `audit_event` | cross-cutting | Every view/edit/reveal/nudge-action/notification (R-AUTH-3) |\n| `guideline_rule` | config | The 8 care-gap rules as versioned, signed-off config (§6) |\n| `evidence_pack` / `guideline_pack` | config | The bounded \"brain\" for AI Buddy (§8) |\n\n---\n\n## 5. Sheet → entity migration map\n\n| Workbook sheet | Target entity(ies) | What moves / changes |\n|---|---|---|\n| `Demographics_Entry` | `patient` (hub) | Keep 1:1. Make `patient_code` a real PK with FK integrity. Move `diagnosis_date` here. Add tenancy FKs (institution/department/primary_clinician). |\n| `Clinical_Entry` | **splits into** `pathology` (1:1) + `staging_assessment` (1:N dated, **NEW**) + `imaging_study` (1:N dated, **NEW**) + `patient_condition` (normalized) | The single sheet holding four lifecycles is decomposed by lifecycle. Staging & imaging become dated events. |\n| `PSA_History` | `psa_reading` | Structurally correct already; partition on date; **the Patient-File chart binds to this table** (closes the decoupled-chart bug). |\n| `Treatment_Entry` | `treatment_line` (1:N dated, **NEW**) + `treatment_plan` (1:1 header) + `supportive_care_event` (1:N dated) | One mashed row → dated therapy lines + a small current-state header + dated supportive care. |\n| `Outcomes_Entry` | `outcome` (1:1, milestone dates inline) | Keep 1:1; milestone dates already present. |\n| `Journey_Events` | `journey_event` | Keep. Role narrows to milestone narrative (staging/treatment now have their own history). Wire the \"Add to Timeline\" action. |\n| `Care_Gap_Tracker` | `nudge` + `nudge_event` (**NEW**) + derived read-model | Flag sheet → lifecycle. All counts/severity become **derived** over `nudge`. |\n| `Home_/Population_Dashboard`, `Dashboard_Derived`, `Dashboard_Coverage` | Tier-3 materialized views | Inventory → mat-view specs (§7). |\n| *(none)* | `department`, `app_user`, `role`, `care_team_member`, `mdt_panel`, `notification`, `document`, `audit_event`, `guideline_rule`, `evidence_pack` | Net-new — the workbook has no home for these (which is the signal it's an entry surface, not the system of record). *(No `institution` entity — the institution is the tenant.)* |\n\n### 5.5 Bugs that close as a consequence of the migration\n| Demo bug (PRODUCT-PRD §6) | Root cause | Closes because |\n|---|---|---|\n| Decoupled PSA chart (§6.6) | chart read hardcoded points | chart binds to `psa_reading` |\n| Static-vs-computed KPI drift (§6.5) | hand-typed metrics | Tier-3 is derived-only (R-X-5) |\n| Nudge-trend needs history | one-row snapshot | `nudge_event` exists |\n| Restaging / HSPC→CRPC not expressible | staging overwrites | `staging_assessment` is dated |\n| Sequential therapy not expressible | one mashed treatment row | `treatment_line` is dated |\n\n---\n\n## 6. Care-gap rules engine (config-owned, 8 rules)\n\nThe 8 rules are fully specified (workbook `Care_Gap_Tracker` + `ProstaCare_Nudge_Logic_Handoff.md`). Each becomes one `guideline_rule` config row + a condition in a parameterized evaluation workflow. Inputs read from **current-state projections** of Tier-2 (latest staging/imaging/treatment/supportive-care).\n\n| rule_id | Condition (against current state) | Severity |\n|---|---|---|\n| bone_scan_missing | `bone_scan=Not done` AND risk ∈ {High, Very High, M1} | Urgent |\n| psma_missing | `psma_pet_ct=Not done` AND risk ∈ {High, Very High} | Urgent |\n| bone_protection_missing | `bone_protection_therapy=Not started` | Urgent |\n| dexa_missing | `dexa=Not done` | Warning |\n| genomics_missing | `germline_somatic=Not done` | Warning |\n| arsi_readiness | `castration=HSPC` AND risk ⊇ High AND `arsi=Not initiated` | Warning |\n| followup_psa_missing | `next_follow_up_psa_date` empty | Info |\n| psychosocial_prompt | `phq9` blank or Not done | Info |\n\n**Evaluation:** workflow `sql_exec` scan `INSERT…SELECT…WHERE <rule> AND NOT EXISTS(open nudge)` (idempotent) bound to (a) `on-write` subscriptions of staging/imaging/treatment/supportive entities and (b) a daily `policies` cron. **Auto-resolve** when the source condition clears (matches the demo semantic: acknowledge ≠ resolve). Rules are **versioned + clinically signed-off**; the sponsor never edits them (governance §8/§10).\n\n---\n\n## 7. Analytics & derived layer (dashboard inventory → mat-views)\n\nThe workbook's `Population_Dashboard` (36 widgets across Overview/Clinical/Treatment/Outcomes/Quality/Demographics) + `Home_Dashboard` (23 widgets) map to RLS-scoped materialized views. `Dashboard_Derived` (22 derived fields) and `Dashboard_Coverage` (covered/partial/not) are the authoritative derivation list. Highlights:\n\n- **Covered by the canonical model:** registration trends, age histogram, referral donut, travel bands, risk/coverage/stage mixes, Gleason/ISUP, comorbidity pivot, ADT/RT/ARSI landscapes, CGHS delay, time-to-treatment, outcome cards, KM survival, bone-health donut, completeness, MDT rate.\n- **Previously \"not representable\" — now solved by Tier-2:** **nudge-trend lifecycle** (via `nudge_event`), and per-user **recently-viewed** (via `audit_event`). The workbook explicitly listed these as impossible on snapshot rows.\n- **Drill-to-patient everywhere:** every widget resolves to the underlying `patient_code` set (the core product promise). For non-clinical/sponsor roles the drill lands on **de-identified/masked** rows (§10).\n- **Chart types:** NOVA Edge chart subtype is a free-form string (line/percentile-band/KM not precluded); confirm/extend the frontend renderers for the PSA line, percentile bands, and Kaplan-Meier (the one custom viz). See NOVA-EDGE-FEASIBILITY §7.1/G1.\n\n---\n\n## 8. Governed Intelligence — AI Buddy as a bounded ADK agent\n\nThe workbook's `Governed_Intelligence` tab defines a strict boundary: AI Buddy is **stepwise, evidence-anchored, and must not free-generate, invent gaps, claim autonomous decisions, or imply drug access the config denies.** Mapping to NOVA Edge:\n\n- **AI Buddy** → an ADK `agent` in `chat`/stepwise mode, tools limited to **read** entities + report tools + the care-gap engine; **no unbounded generation**.\n- **Brain = configured packs only:** `evidence_pack` / `guideline_pack` / access-rule config / retrospective aggregates — no external free-text.\n- **Four lenses** (pathway review, progression branch, access/affordability, trial/new-drug) → distinct tool-scoped prompts, each grounded in config + patient state.\n- **Guardrails:** `require_human_approval` on any write; `sanitize` on inputs; PII kept out of prompts via `context_mask` (moot under the de-identified model §3-A). Every AI step is audited.\n- **Governance/COI:** because a pharma sponsor may have commercial interest in flagged therapies, the evidence/guideline packs and the 8 rules are owned by an **independent clinical committee** with versioned sign-off; AI Buddy can only surface what those packs contain.\n\n---\n\n## 9. Multi-institution onboarding & provisioning\n\nSince the workbook has no tenancy layer, onboarding is net-new. Because **tenant = institution**, onboarding a hospital = provisioning its tenant, then setting up departments and doctors inside it:\n\n```\nPlatform admin → PROVISION institution tenant (new schema, seed preset, theme)\nInstitution admin (in-tenant) → create department(s) → onboard app_users (doctors/coordinators/ops)\n      → assign role + department scope + MDT-panel membership\n      → (per patient) set primary_clinician + care-team\nPatient registry entry (Add New Patient) → scoped to department → appears in that institution's cohort\n```\nCross-institution rollup (sponsor/registry) reads the **de-identified aggregation layer** above tenants, never the tenants directly.\n\n- **Identity source (`O-ONB4`, open):** hospital SSO (Azure AD — NOVA Edge supports it) or platform-local accounts; confirm per institution.\n- **Onboarding roster (`O-ONB`, open):** no predefined doctor-team list exists in any doc — must be supplied per launch institution.\n- **Provisioning mechanism:** admin console (NOVA Edge `pages.json` + entity CRUD) for v1; bulk import / HIS-directory sync later.\n- **Patient onboarding:** created in ProstaCare (registry) OR synced from HIS (`O-S1`, open) — under the de-identified model, sync carries `patient_code` + clinical data only.\n\n---\n\n## 10. Access, privacy & the pharma firewall (NOVA Edge encoding)\n\n| Layer | Decision | NOVA Edge mechanism |\n|---|---|---|\n| Operational visibility | Department/team-scoped; HOD/coordinator tenant-wide | `row_policies`/`scopes` with `$user.department`/`$user.teams`; role grants |\n| Non-clinical / ops / sponsor | De-identified aggregate only | Exposed **only** to RLS-scoped, **de-identified** materialized views; no entity-row access |\n| Identifiers (if §3-B/C) | Masked-by-default + audited reveal | isolated `patient_identity`; column `read_roles` + `context_mask`; reveal → `audit_event` |\n| Rules/AI governance | Independent clinical sign-off; sponsor can't edit | `guideline_rule`/`evidence_pack` write-restricted to Admin+clinical-committee role |\n| Data residency / consent | India (DPDP) | India-region hosting; consent basis per §3 decision (de-identified ⇒ lightest) |\n\nCapability × role matrix is in `FLOW-CLARITY-AND-OPEN-QUESTIONS.md §5` (straw-man, pending confirmation).\n\n---\n\n## 11. NOVA Edge build mapping & phasing\n\n**Preset deliverable** (`presets/prostate_cancer/`): `schemas.json` (all Tier-0/1/2 entities + partitioning on `psa_reading`), `workflows.json` (nudge evaluation + MDT notify + onboarding + outcome derivations), `tools.json`/`agents.json`/`agent-tools.json` (AI Buddy + evidence packs), `pages.json` + `ui/schema_ui.json` (Home, Patient List, Patient File detail, Population Dashboard, admin console), `mat_views.json` (Tier-3 + dashboard inventory), `reports.json`, `roles.json`, `config.json`, `app_theme.json` (Visual Language palette), `sample-data.json` (the workbook's de-identified sample rows).\n\n**Reuse:** fork `novahub_v2` (care-gap/clinical) for the entity+care-gap spine; `b2b_account` detail-page pattern for the Patient File; canonical `patients` extension for the hub.\n\n**Phasing:**\n| Phase | Scope | NOVA Edge |\n|---|---|---|\n| **P0 Foundation** | Tenancy + patient hub + Tier-1 current-state + de-identified access | schemas + scopes + roles + onboarding console |\n| **P1 Longitudinal** | PSA, staging, imaging, treatment-line, journey, supportive-care | Tier-2 entities + partitioning + current-state projections |\n| **P2 Care-gap engine** | 8 rules + nudge/nudge_event lifecycle + MDT notify | `guideline_rule` + evaluation workflow + notify workflow |\n| **P3 Analytics** | Home + Population dashboards, benchmarks, protocol score | mat-views + `pages.json`; confirm line/KM renderers (G1) |\n| **P4 Governed AI** | AI Buddy bounded agent + evidence packs | ADK agent + packs + guardrails |\n| **P5 Integrations** | HIS/registry sync, FHIR read, (later) ABHA/ABDM | adapters/remote entities (net-new, see feasibility §4) |\n\n---\n\n## 12. Open decisions for NOVA Edge sign-off (the gate)\n\n**P0 — settle before P0 build:**\n1. **Identity model (§3):** de-identified registry (A) / identified (B) / de-identified + optional identity module (C). *Recommend A or C.*\n2. **`O-A1` multi-user vs single console** — the department-scoped access decision implies multi-user; confirm.\n3. **`O-T1/T2` team model** — care-team (per-patient) vs department MDT panel vs both; care-team ≠ tumour-board?\n4. **`O-S1` patient source of truth** — created in ProstaCare vs synced from HIS (key = `patient_code`?).\n5. **`O-PH1/2/3` pharma** — confirm sponsor (NVS = Novartis?), data model (de-identified aggregate), and independent rule-governance/COI.\n6. **`O-TMPL1` disease scope** — prostate-only vs templatable core (recommend: prostate on a shared oncology core).\n\n**P1 — needed during build:**\n7. `O-ONB` onboarding roster + `O-ONB4` identity source (SSO vs local) per launch institution.\n8. `O-N*`/`O-CH*` nudge ownership, SLA/escalation, snooze; notification channels (in-app/email/…).\n9. Supportive-care & pathology cardinality: keep `pathology` 1:1 (re-biopsy rare) ✅ recommended; make `supportive_care` **dated** ✅ recommended (bone-protection audit).\n\n**P2 — refinement:**\n10. `O-REP*` reporting grain/destination + de-identified export cadence for the sponsor.\n11. `O-DOM*` domain/hosting/IP; chart-renderer scope (G1); FHIR/ABHA/ABDM connector timing (feasibility §4).\n\n---\n\n## 13. Why this is easier to build and manage\n\n- **One canonical schema, three tiers** — snapshot for current-state, dated events for history, derived for everything shown. No hand-typed metrics, no snapshot/longitudinal contradictions.\n- **The workbook stays useful** — as a de-identified *entry/seed surface* and the authoritative *field dictionary + value lists*, mapping cleanly onto the canonical entities (§5).\n- **Tenancy is explicit** — institutions/doctors onboard into org-units + scopes; cross-reporting native; PHI firewall structural.\n- **Rules & intelligence are config** — versioned, signed-off, sponsor-safe; the engine is data, not code.\n- **Everything traces to `patient_code`** — so the core promise (drill any signal to a patient, explain any gap) holds structurally.\n\n---\n\n*Authoritative sources: `ProstaCare_Schema_08072026_V2.xlsx` (Field_Dictionary, Value_Lists, dashboard inventory, Care_Gap_Tracker). Companion specs in this folder: `NOVA-EDGE-FEASIBILITY.md`, `FLOW-CLARITY-AND-OPEN-QUESTIONS.md`, `PRODUCT-PRD.md`, `ProstaCare_Nudge_Logic_Handoff.md`. This document is the consolidated build spec for NOVA Edge internal approval; the preset build begins once §12 P0 items are signed off.*\n"}, {"title": "Field Dictionary", "file": "FIELD_DICTIONARY.md", "md": "# ProstaCare Field Dictionary (from workbook V2)\n\nEvery UI field mapped to its control, data type, requiredness, and allowed values. Field keys match the canonical schema exactly. Source: `ProstaCare_Schema_08072026_V2.xlsx` · `Field_Dictionary`.\n\n\n## Demographics_Entry\n\n| Section | Field Key | Label | Control | Type | UI Req | Allowed Options / List | Notes |\n|---|---|---|---|---|---|---|---|\n| Registry Linkage | `patient_code` | Unique Patient Code | text | text | No |  | Only patient-level identifier permitted in this workbook. Reuse the same code across all sheets. |\n| Registry Linkage | `registry_enrolment_date` | Registry Enrolment Date | date | date | No | yyyy-mm-dd | Needed for monthly registration trends on the home an
