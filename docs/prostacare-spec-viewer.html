/chemo/RT), `agent`, `start_date`, `end_date`, `status` (+ RT & CGHS fields) | Therapy is sequential: ADT → ARSI → chemo |\n| **Supportive-care event** | many (dated) | `at`, `bone_protection_therapy`, `calcium_vitamin_d`, `next_follow_up_psa_date`, `testosterone_monitoring`, `phq9`, `nutrition` | Bone-protection start/stop needs an audit trail |\n| **Journey event** | many (dated) | `event_type`, `event_date`, `event_notes` | The human-readable milestone story |\n\n### 1.4 Care gaps, team messages, documents\n| Record type | How many per patient | What it holds | Plain meaning |\n|---|---|---|---|\n| **Nudge** | many | `nudge_id`, `rule_id`, `severity`, `current_status`, `opened_at`, `resolved_at` | One open care gap for one patient |\n| **Nudge event** | many | `nudge_id`, `at`, `action` (**opened · acknowledged · resolved**), `actor` | The lifecycle log behind trend charts + audit |\n| **Notification / discussion** | many | sender, recipients, reason, subject, note, delivery, `at` | An MDT message + the per-patient discussion trail |\n| **Document** | many | file ref, type, size, uploader, `at` | Rx / report uploads |\n| **Guideline rule** | config | `rule_id`, condition, `severity`, version, sign-off | The 8 care-gap rules as governed config |\n| **Audit event** | many | actor, action, target, `at` | Who did what, when (incl. identity reveal) |\n\n### 1.5 How everything links together\n```mermaid\nerDiagram\n  USER ||--o{ PATIENT : \"primary clinician (1:N)\"\n  PATIENT ||--|| PATHOLOGY : \"1:1\"\n  PATIENT ||--|| TREATMENT_PLAN : \"1:1\"\n  PATIENT ||--|| OUTCOME : \"1:1\"\n  PATIENT ||--o{ PSA_READING : \"dated log\"\n  PATIENT ||--o{ STAGING_ASSESSMENT : \"dated log\"\n  PATIENT ||--o{ IMAGING_STUDY : \"dated log\"\n  PATIENT ||--o{ TREATMENT_LINE : \"dated log\"\n  PATIENT ||--o{ SUPPORTIVE_CARE_EVENT : \"dated log\"\n  PATIENT ||--o{ JOURNEY_EVENT : \"dated log\"\n  PATIENT ||--o{ NUDGE : \"care gaps\"\n  NUDGE ||--o{ NUDGE_EVENT : \"lifecycle log\"\n  PATIENT ||--o{ NOTIFICATION : \"MDT trail\"\n  GUIDELINE_RULE ||--o{ NUDGE : \"produces\"\n```\n\n### 1.6 Do we need a Visit / Encounter concept? (design decision)\n\n**Short answer: NOT IN v1 — deferred (`SIMPLIFICATION_REVIEW.md` T4).** ProstaCare is a **registry**, so it is organised by **clinical event date** (each PSA, staging, imaging, treatment line, supportive-care entry carries its own date). That is lower-burden than a full EMR and is exactly what the care-gap engine and cohort analytics need. Forcing every entry inside a visit would add data-entry friction and doesn't help the current-state or rules logic.\n\n**What still needs \"visit timing\":** the Patient List segments (Last Visit / Upcoming / Missed-Overdue). These can be driven **today, without a full Encounter entity**, from existing date fields — `last_follow_up_date` (Outcome) and `next_follow_up_psa_date` (Supportive-care):\n```\nvisit_status(patient):\n   IF next_follow_up_psa_date in future        → \"Upcoming\"\n   ELSE IF next_follow_up_psa_date in past      → \"Missed / Overdue\"\n   ELSE                                         → \"Last Visit\" (use last_follow_up_date)\n```\n\n**Two models to choose between:**\n| Model | What it means | When to pick |\n|---|---|---|\n| **Registry-by-event** (recommended v1) | Every clinical fact keyed by its own date; **no mandatory encounter**; visit-timing from follow-up-date fields | Registry + care-gap + analytics use case (this product) |\n| **EMR-by-encounter** | Every entry tied to a visit/encounter; richer visit grouping | Only if the product must reflect exact visit boundaries, scheduling, or billing |\n\n**Deferred design (Phase 2, if HIS-appointment sync is needed):** an optional `Encounter` — `encounter_id`, `encounter_date`, `type` (OPD / review / procedure / MDT), `clinician` — and a **nullable `encounter_id`** on each dated event. Events may reference an encounter (to group \"everything done at the 2026-06-15 visit\") but are **not required** to (registry backfill has no clean visits). **Not built in v1.** It maps cleanly onto the platform's appointment model later without reworking the event tiers.\n\n> **Sign-off question (§7):** confirm **registry-by-event, no Encounter entity in v1**.\n\n---\n\n### 1.7 Where every piece of information comes from\n*(and how many of each a patient can have)*\n\n**Two rules keep the record honest:**\n1. **Every piece of information is either typed on a named screen, or calculated by the system.** Nothing is hidden or unexplained.\n2. **One-to-one** when the fact can only be true once at a time · **one-to-many** when it repeats over time. This is what prevents duplicate and contradictory entries.\n\n| Record type | How many per patient | Where the clinician enters it | Or calculated from | Can it be edited? |\n|---|---|---|---|---|\n| **Patient** (hub) | **1:1** | *Add New Patient* → Demographics form | — | edit window → lock |\n| **Pathology** | **1:1** | *Clinical Assessment* → Complaint / DRE / Biopsy | — | edit window → lock |\n| **Treatment plan** (intent, MDT status/date, trial) | **1:1** | *Treatment Plan* → Intent & MDT | — | edit window → lock |\n| **Outcome** | **1:1** | *Outcomes* form | — | edit window → lock |\n| **Comorbidity / family history** | **flags on `pathology`** | *Clinical Assessment* → chip groups | — | edit window → lock |\n| **PSA reading** | **1:N dated** | *Clinical Assessment* → “+ Add PSA Entry” | — | append-only |\n| **Staging assessment** | **1:N dated** | *Clinical Assessment* → TNM & Risk (each save = new dated row) | — | append-only |\n| **Imaging study** | **1:N dated** | *Clinical Assessment* → Imaging & Molecular | — | append-only |\n| **Treatment line** | **1:N dated** | *Treatment Plan* → ADT / Anti-androgen / ARSI / Chemo / RT | — | append-only |\n| **Supportive-care event** | **1:N dated** | *Treatment Plan* → Bone Health & Supportive Care | — | append-only |\n| **Journey event** | **1:N dated** | *Patient Journey* → Add Event | — | append-only |\n| **Notification / discussion** | **1:N** | *Team modal* → Send | — | immutable |\n| **Document (Rx)** | **1:N** | *Upload Rx* | — | immutable (removal audited) |\n| **Nudge** | **1:N** | ❌ never entered | care-gap rules over current state | system |\n| **Nudge event** | **1:N** | ❌ never entered | lifecycle actions | system |\n| **Audit event** | **1:N** | ❌ never entered | every action | system |\n| **Current state** (stage / line / castration / latest PSA) | derived | ❌ never entered | latest dated row per model (§2) | derived |\n| **Dashboards, protocol score, completeness, benchmarks** | derived | ❌ never entered | aggregates | derived |\n| **`sponsor_metric`** | derived | ❌ never entered | de-identified aggregates + suppression | derived |\n| **Guideline rule** | config | *Admin* → Rules console | — | versioned config |\n| **User / Role / MDT panel** | config | *Admin* → Users console | — | config |\n\n**Worked answer to the cardinality question:**\n```\nA patient has ONE treatment PLAN  (intent + MDT status)          → 1:1\nA patient has MANY treatment LINES (ADT → ARSI → chemo → RT)      → 1:N\n  ...because prostate therapy is sequential: the patient is on ADT,\n     later ARSI is added, later chemo. Each is its own dated line.\n     Collapsing them into one row would make sequence unrepresentable.\n```\n\n**Duplicate prevention (enforced in the database):**\n- 1:1 models → **unique key on `patient_code`** (a patient cannot have two Pathology rows).\n- 1:N dated models → **unique key on `(patient_code, <date>, <type>)`** (e.g. one `imaging_study` per modality per date; one `psa_reading` per date) — accidental double-entry is rejected, genuine repeats are distinguished by date/type.\n\n---\n\n### 1.8 How long data stays editable (record lock)\n\nOnce data is entered it should not stay editable forever — the record has to become trustworthy for audit. But clinicians still need a way to correct genuine mistakes.\n\n| Concept | Rule (all values configurable) |\n|---|---|\n| **Edit window** | A record is editable for **`EDIT_WINDOW`** after creation (default **48 h**) |\n| **Auto-lock** | After the window it **locks** (immutable) |\n| **HOD unlock** | An **HOD** may unlock a specific record for **`UNLOCK_WINDOW`** (default **24 h**) with a **mandatory reason**; it then re-locks automatically |\n| **Audit** | Every edit, lock, unlock (with reason), and removal is written to `audit_event` |\n| **No hard delete** | Corrections never destroy data |\n\n**Why locking is safe here (important):** the longitudinal tiers are **append-only**. Clinical progress never needs an unlock — if bone protection is started, you **append a new `supportive_care_event`**; if the patient is restaged, you **append a new `staging_assessment`**. The nudge auto-resolves from the *new* row. So the lock only prevents **rewriting history**; it never blocks care. An unlock is needed only to **correct a mistake** in a 1:1 current-state record (demographics, pathology, treatment plan, outcome) or a mistyped dated row.\n\nFields carried on every entered record: `created_at`, `created_by`, `last_edited_at`, `locked`, `locked_at`, `unlocked_until`, `unlock_reason`.\n\n---\n\n## 2. The one core idea — today's status is read from the history\n\nEverything the patient header shows — current stage, current treatment, current castration status — is simply **the most recent dated entry**. We never store a separate \"current\" box that could go stale. A worked example:\n\n```\nSTAGING history for PCR-001:\n  Row A  assessed_on = 2026-01-10   risk = High             castration = HSPC\n  Row B  assessed_on = 2026-06-15   risk = Very High        castration = HSPC\n\nCURRENT STAGE  = latest row by assessed_on  = Row B (Very High, HSPC)\n→ Header badge shows \"Very High · HSPC\"\n→ Care-gap engine reads risk = Very High   (Row B), not High (Row A)\n→ When the patient later progresses, a Row C (castration = CRPC) is ADDED,\n  never overwriting Row B — so the HSPC→CRPC transition date is preserved.\n```\n\n**🔧 For engineers** — the rule, stated precisely:\n```\nFUNCTION current(model, patient):\n    RETURN newest row in `model` WHERE patient_code = patient  ORDER BY <date> DESC  LIMIT 1\n```\n\n---\n\n## 3. Workflows — inputs, logic, outputs (pseudo-code + visuals)\n\nEach workflow states: **Trigger → Inputs → Logic (pseudo-code) → Outputs → Derived data touched.**\n\n### W1 · Patient onboarding\n**In plain terms:** you register a new patient. The system creates their record, links them to you as treating clinician, and emails the MDT that a new patient has joined.\n\n```mermaid\nflowchart LR\n  A[Add New Patient] --> B{Valid + not duplicate?}\n  B -- no --> A\n  B -- yes --> C[Create Patient hub row]\n  C --> D[Attach to institution/department + primary clinician]\n  D --> E[Notify MDT: new patient]\n  C --> F[Appears in roster + cohort counts]\n```\n**🔧 For engineers — the exact logic** *(clinicians can skip this box; the plain summary is above)*\n```\nTRIGGER: user submits Add-New-Patient\nINPUTS : patient_code, age_at_diagnosis, coverage, state, referral_source,\n         department_id, primary_clinician_id            // institution = the tenant (implicit)\nLOGIC  :\n  IF patient_code already exists within this tenant → reject \"duplicate code\"\n  ELSE create Patient(hub) with inputs; set registry_enrolment_date = today\n       create empty Pathology, Treatment_plan, Outcome shells\n       route MDT new-patient notification (see W7)\nOUTPUT : new Patient visible in roster; cohort counts +1\nDERIVED: registrations-this-month, cohort volume recompute\n```\n\n### W2 · Clinical workup & staging\n**In plain terms:** you enter the biopsy, staging and imaging. Staging and imaging are saved as **new dated entries** (so restaging never erases the old stage). Saving immediately re-checks the care-gap rules.\n\n```mermaid\nflowchart LR\n  A[Enter biopsy/DRE/complaint] --> P[Save Pathology 1:1]\n  B[Enter TNM + risk + castration] --> S[Add Staging assessment - dated]\n  C[Enter imaging results] --> I[Add Imaging study rows - dated]\n  S --> R[Recompute current stage/risk]\n  I --> R\n  R --> N[Run care-gap engine → W5]\n```\n**🔧 For engineers — the exact logic** *(clinicians can skip this box; the plain summary is above)*\n```\nTRIGGER: clinician saves clinical assessment\nINPUTS : pathology fields; staging fields (assessed_on defaults today);\n         imaging modality+result rows\nLOGIC  :\n  Save Pathology (1:1, upsert)\n  APPEND Staging_assessment row (never overwrite)\n  FOR EACH imaging modality entered → APPEND Imaging_study row\n  current_risk       = current(Staging, patient).eau_risk_category\n  current_castration = current(Staging, patient).castration_status\n  imaging_status(m)  = current(Imaging WHERE modality=m, patient).result  (else \"Not done\")\nOUTPUT : updated current-state; header badges refresh\nDERIVED: triggers W5 (care-gap re-evaluation)\n```\n\n### W3 · PSA capture & trend\n**In plain terms:** each PSA you add is a new dated entry. The trend chart is drawn straight from these entries — nothing is duplicated or typed twice.\n\n```mermaid\nflowchart LR\n  A[Add PSA row: date + value] --> L[Append PSA_reading - dated]\n  L --> T[PSA trend chart reads this table]\n  L --> D[Cohort PSA median/percentile recompute]\n```\n**🔧 For engineers — the exact logic** *(clinicians can skip this box; the plain summary is above)*\n```\nTRIGGER: clinician adds a PSA entry\nINPUTS : psa_date, psa_ng_ml, free_psa_pct?, psa_density?\nLOGIC  : APPEND PSA_reading row (dated)\n         latest_psa = current(PSA_reading, patient).psa_ng_ml\nOUTPUT : patient trend chart (bound to PSA_reading, not hardcoded points)\nDERIVED: cohort PSA median, percentile bands, diagnostic-PSA distribution\n```\n\n### W4 · Treatment planning & lines\n**In plain terms:** the agreed plan (intent, MDT status) is stored once. Each therapy you start — ADT, then ARSI, then chemotherapy — is added as its own dated treatment line, so the sequence is preserved.\n\n```mermaid\nflowchart LR\n  A[Agree pathway] --> P[Update Treatment_plan 1:1: intent, MDT, start]\n  B[Start/refresh a therapy] --> L[Add Treatment_line - dated]\n  C[Bone health / follow-up] --> S[Add Supportive-care event - dated]\n  L --> N[Run care-gap engine → W5]\n  S --> N\n```\n**🔧 For engineers — the exact logic** *(clinicians can skip this box; the plain summary is above)*\n```\nTRIGGER: team records/updates treatment\nINPUTS : plan header (intent, mdt_status, mdt_date, treatment_start_date);\n         one Treatment_line (line_type, agent, start_date, status, +RT/CGHS fields);\n         one Supportive_care_event (bone_protection, dexa follow-up, phq9, follow-up PSA date)\nLOGIC  : upsert Treatment_plan; APPEND Treatment_line; APPEND Supportive_care_event\n         current_arsi = current(Treatment_line WHERE line_type=ARSI).status (else \"Not initiated\")\n         current_bone_protection = current(Supportive_care_event).bone_protection_therapy\nOUTPUT : treatment state auditable; cohort treatment analytics update\nDERIVED: ADT duration, time-to-treatment, CGHS delay, ARSI uptake → W5 + §5\n```\n\n### W5 · Care-gap (nudge) engine — the heart of the product\n**In plain terms:** every time you save, the system re-reads the patient's *current* status and checks the 8 agreed rules. A gap that now applies opens a nudge; a gap that no longer applies **closes itself**. Nobody has to tick anything off.\n\n```mermaid\nflowchart TD\n  T1[On clinical/treatment save] --> E[Evaluate 8 rules on CURRENT state]\n  T2[Daily scheduled re-scan] --> E\n  E --> C{Rule condition true?}\n  C -- yes, no open nudge --> O[Open Nudge + log 'opened' event]\n  C -- yes, already open --> K[Keep existing nudge]\n  C -- no, but nudge open --> R[Auto-resolve + log 'resolved' event]\n  O --> B[Recount severity + refresh badges/banner]\n  R --> B\n```\n**🔧 For engineers — the exact logic** *(clinicians can skip this box; the plain summary is above)*\n```\nTRIGGER: any staging/imaging/treatment/supportive save  (on-write only —\n         all 8 rules are state-based, not time-based, so no daily cron is\n         needed in v1; add one when a time-based rule appears)\nINPUTS (current state per patient):\n  risk = current(Staging).eau_risk_category\n  castration = current(Staging).castration_status\n  bone_scan  = imaging_status(bone_scan);   psma = imaging_status(psma_pet_ct)\n  dexa = imaging_status(dexa);              germline = imaging_status(germline)\n  bone_protection = current(Supportive).bone_protection_therapy\n  arsi = current(Treatment_line WHERE ARSI).status\n  next_follow_up_psa_date = current(Supportive).next_follow_up_psa_date\n  phq9 = current(Supportive).phq9\nLOGIC:\n  FOR EACH rule IN guideline_rules(active):\n     fired = evaluate(rule.condition, current_state)\n     IF fired AND no open nudge with this rule_id:\n         create Nudge(rule_id, severity, status=open); log Nudge_event(opened)\n     IF (NOT fired) AND open nudge with this rule_id exists:\n         set nudge.status = resolved; log Nudge_event(resolved)   // auto-resolve\nOUTPUT: the patient's live nudge list (severity-coded, explainable)\nDERIVED: urgent/warning/info counts, highest severity, primary focus,\n         cohort gap counts, protocol score, nudge-trend (from Nudge_event)\nNOTE  : \"Acknowledge\" (W6) does NOT resolve a nudge — only a changed source field does.\n```\n\n### W6 · Nudge lifecycle (acknowledge → route → resolve)\n**In plain terms:** acknowledging a nudge records that you saw it and opens the message to the team. It does **not** close the nudge — only changing the underlying clinical field does that.\n\n```mermaid\nstateDiagram-v2\n  [*] --> Open : rule fires (on write)\n  Open --> Acknowledged : acknowledge & route to MDT (W7)\n  Acknowledged --> Resolved : source field changed → rule stops firing (W5, auto)\n  Open --> Resolved : source field changed (auto)\n  Resolved --> Open : condition recurs\n  Resolved --> [*]\n```\n> **No `snoozed` or `dismissed` state.** Clinical non-applicability is already expressed **in the data** — `bone_protection = \"Not indicated\"`, `mdt_status = \"Not applicable\"`, `germline = \"Pending\"` — so the rule simply never fires. Resolution is always data-driven. *(See `SIMPLIFICATION_REVIEW.md` T1/T2.)*\n**🔧 For engineers — the exact logic** *(clinicians can skip this box; the plain summary is above)*\n```\nTRIGGER: clinician clicks Acknowledge & log on a nudge\nINPUTS : nudge_id, actor\nLOGIC  : log Nudge_event(acknowledged); open Team modal prefilled (W7)\n         (status stays 'open'/'logged' — resolution is data-driven, not a click)\nOUTPUT : nudge shows \"Logged with team\"; discussion trail entry\nDERIVED: nudge-trend \"acted\" count increments\n```\n\n### W7 · MDT notify & discussion (explicit steps + email via AWS SES)\n**In plain terms:** you pick one colleague or the whole MDT, write the reason and note, preview it, and send. Each recipient gets an inbox item and an email. Everything is kept in the patient's discussion trail.\n\n```mermaid\nflowchart LR\n  A[From nudge or patient] --> M{Recipient?}\n  M -- specific --> M1[Pick MDT member]\n  M -- all --> M2[Whole MDT panel]\n  M1 --> F[Reason + subject + note]\n  M2 --> F\n  F --> P[Preview message]\n  P --> Q[Create Notification queued]\n  Q --> IN[In-app inbox item + task]\n  Q --> EM[Send email via AWS SES]\n  EM --> DS[Record delivery status: sent / bounced / failed]\n  IN --> L[Append discussion_entry]\n  DS --> L\n```\n**🔧 For engineers — the exact logic** *(clinicians can skip this box; the plain summary is above)*\n```\nTRIGGER: acknowledge-from-nudge (W6)  OR  \"Discuss with Team\"  OR  new-patient (W1)\nINPUTS : recipient_mode, recipient(s), reason, subject, note, patient_code\nLOGIC (explicit steps):\n  1. RESOLVE recipients:\n        IF mode = member → [selected app_user]\n        IF mode = all    → all users WHERE is_mdt_member = true\n     recipient_emails = [u.email for u in recipients]        // email = the login identity\n  2. RENDER template(reason, subject, note, patient_code, de-identified summary link)\n  3. CREATE Notification(status = queued, recipients, body, at = now)\n  4. FOR EACH recipient:\n        a. CREATE in_app_notification  → inbox item (+ optional task) + live push (sse)\n        b. SEND email via AWS SES      → from = configured verified sender,\n                                          to  = recipient.email\n        c. ON SES accept  → delivery_status = sent (store SES messageId)\n           ON SES failure → delivery_status = failed → retry (transient) / flag (hard bounce)\n  5. APPEND discussion_entry to the patient's discussion trail\n  6. IF source = nudge → LOG Nudge_event(acknowledged)   // 'routed' is inferable from the notification row\nOUTPUT : MDT informed (inbox + email); per-patient discussion log; per-recipient delivery status; toast\nDERIVED: MDT-review-rate, collaboration audit, notification delivery metrics\n```\n\n**Notification triggers · channels · delivery (covers the whole notification surface):**\n| Trigger | Fires from | Channel |\n|---|---|---|\n| Care-gap routed to MDT | W6 acknowledge | in-app + **email (SES)** |\n| New patient registered | W1 | in-app + email (SES) to MDT panel |\n| MDT review request / case discussion | Patient File \"Discuss with Team\" | in-app + email (SES) |\n| ~~Urgent escalation (SLA)~~ | — | **Not in v1** (`SIMPLIFICATION_REVIEW.md` T3) |\n\n- **Email transport = AWS SES.** Users log in with their **email ID** (the identity), and every configured notification is delivered to that email via SES. Sender is a verified SES domain/address; `messageId` + status (sent / bounced / complaint / failed) are stored on `Notification` for audit and delivery metrics; transient failures retry, hard bounces are flagged.\n- **In-app inbox** is the primary channel (each notification creates an inbox item and, where relevant, a task); **email (SES)** mirrors it so nothing is missed. SMS / WhatsApp are future channels behind the same `Notification` record.\n\n### W8 · Cohort analytics (derivation)\n**In plain terms:** all the dashboard numbers are calculated from the entries above — none are typed by hand. Every chart can be clicked through to the patients behind it.\n\n```mermaid\nflowchart LR\n  A[All patient + event data] --> V[Nightly/On-write derivations]\n  V --> K[KPIs + benchmarks + protocol score]\n  V --> N[Nudge trend from Nudge_event]\n  K --> D[Dashboards]\n  N --> D\n  D --> P[Drill any chart → patient list]\n```\n**🔧 For engineers — the exact logic** *(clinicians can skip this box; the plain summary is above)*\n```\nTRIGGER: on-write + scheduled refresh\nINPUTS : every model in §1\nLOGIC  : compute derived metrics (§5) as views; apply de-identification for\n         non-clinical/sponsor roles\nOUTPUT : Home + Population dashboards; every widget drillable to patient_code\nDERIVED: see §5 (all of it)\n```\n\n### W9 · AI Buddy (governed, stepwise)\n```mermaid\nflowchart LR\n  A[Open AI Buddy on a case] --> S1[Step: pathway review]\n  S1 --> S2[Step: progression branch]\n  S2 --> S3[Step: access/affordability]\n  S3 --> S4[Step: trials]\n  S4 --> J[Jump back to patient file]\n```\n**🔧 For engineers — the exact logic** *(clinicians can skip this box; the plain summary is above)*\n```\nTRIGGER: user opens AI Buddy\nINPUTS : structured record (read-only) + approved evidence/guideline packs\n         + access-rule config\nLOGIC  : stepwise review bounded to configured brain; NO free generation,\n         NO inventing gaps, NO autonomous decisions, NO unlisted drug access\nOUTPUT : explainable, step-by-step next-path view; links back to the file\nDERIVED: none (read-only); every step audited\n```\n\n### W10 · Record edit window, lock & HOD unlock\n**In plain terms:** a record you save stays editable for a couple of days, then locks. If a genuine mistake needs fixing later, the HOD can reopen it for 24 hours with a stated reason, and that is recorded.\n\n```mermaid\nstateDiagram-v2\n  [*] --> Editable : record created\n  Editable --> Locked : EDIT_WINDOW elapses (auto)\n  Locked --> Unlocked : HOD unlocks (reason required, audited)\n  Unlocked --> Locked : UNLOCK_WINDOW elapses (auto re-lock)\n  Editable --> Editable : edit by clinician (audited)\n  Unlocked --> Unlocked : corrective edit (audited)\n```\n**🔧 For engineers — the exact logic** *(clinicians can skip this box)*\n```\nCONFIG : EDIT_WINDOW = 48h        // editable after creation\n         UNLOCK_WINDOW = 24h      // HOD-granted correction window\n         UNLOCK_ROLES = [HOD]\n\nFUNCTION can_edit(record, actor):\n    IF record.locked = false AND now < record.created_at + EDIT_WINDOW      → TRUE\n    IF record.unlocked_until IS NOT NULL AND now < record.unlocked_until    → TRUE\n    ELSE                                                                    → FALSE\n\nWORKFLOW auto_lock  (scheduled, hourly):\n    FOR EACH record WHERE locked = false AND now >= created_at + EDIT_WINDOW:\n        SET locked = true, locked_at = now\n    FOR EACH record WHERE unlocked_until IS NOT NULL AND now >= unlocked_until:\n        SET locked = true, unlocked_until = null          // auto re-lock\n\nWORKFLOW unlock  (HOD only):\n    INPUTS : record_id, reason (mandatory), actor\n    IF actor.role NOT IN UNLOCK_ROLES        → deny (403)\n    IF reason is empty                       → deny (reason required)\n    SET locked = false, unlocked_until = now + UNLOCK_WINDOW, unlock_reason = reason\n    LOG audit_event(action = 'unlock', record, actor, reason, at = now)\n    OUTPUT: record editable until unlocked_until, then auto re-locks\n\nON EDIT (any record):\n    IF NOT can_edit(record, actor) → deny \"record locked — request HOD unlock\"\n    ELSE apply change; LOG audit_event(action='edit', old→new, actor)\n\nNOTE: append-only tiers (PSA, staging, imaging, treatment_line, supportive_care,\n      journey) never require an unlock to record clinical progress — you APPEND a\n      new dated row. Unlock exists to correct mistakes, not to continue care.\n```\n\n---\n\n## 4. The 8 care-gap rules (full) + worked example\n\nInputs are always **current state** (latest dated rows). Each rule = one `guideline_rule` config row (versioned, clinically signed-off).\n\n| # | rule_id | Condition | Severity | Next step (shown to user) |\n|---|---|---|---|---|\n| 1 | `bone_scan_missing` | `bone_scan = Not done` AND risk ∈ {High, Very High, M1} | **Urgent** | Complete bone scan / SPECT |\n| 2 | `psma_missing` | `psma = Not done` AND risk ∈ {High, Very High} | **Urgent** | Complete PSMA PET-CT |\n| 3 | `bone_protection_missing` | `bone_protection = Not started` | **Urgent** | Start bone protection plan |\n| 4 | `dexa_missing` | `dexa = Not done` | **Warning** | Order DEXA baseline |\n| 5 | `genomics_missing` | `germline = Not done` | **Warning** | Order germline/somatic testing |\n| 6 | `arsi_readiness` | `castration = HSPC` AND risk ⊇ High AND `arsi = Not initiated` | **Warning** | Review ARSI intensification |\n| 7 | `followup_psa_missing` | `next_follow_up_psa_date` is empty | **Info** | Schedule follow-up PSA |\n| 8 | `psychosocial_prompt` | `phq9` blank or \"Not done\" | **Info** | Complete PHQ-9 screening |\n\n**Worked example — patient `PCR-001`** (values from the workbook sample):\n```\nCURRENT STATE:\n  risk = High         castration = HSPC\n  bone_scan = Not done   psma = Not done   bone_protection = Not started\n  dexa = Not done        germline = Not done   arsi = Not initiated\n  next_follow_up_psa_date = 2026-07-18 (present)   phq9 = Not done\n\nEVALUATE:\n  1 bone_scan_missing      → Not done AND High           → FIRES  (Urgent)\n  2 psma_missing           → Not done AND High           → FIRES  (Urgent)\n  3 bone_protection_missing→ Not started                 → FIRES  (Urgent)\n  4 dexa_missing           → Not done                    → FIRES  (Warning)\n  5 genomics_missing       → Not done                    → FIRES  (Warning)\n  6 arsi_readiness         → HSPC AND High AND Not init   → FIRES  (Warning)\n  7 followup_psa_missing   → date present                → does not fire\n  8 psychosocial_prompt    → phq9 = Not done             → FIRES  (Info)\n\nRESULT: 7 open nudges → Urgent 3 · Warning 3 · Info 1\n        Highest severity = Urgent ; Primary focus = \"Complete bone scan / SPECT\"\n        Header banner = \"Urgent: 3 actions require attention\"\n\nLATER: clinician records bone_scan = \"Done — no metastases\" and saves.\n  → W5 re-runs → rule 1 no longer fires → nudge #1 AUTO-RESOLVES\n  → counts become Urgent 2 · Warning 3 · Info 1 (no manual \"close\" needed).\n```\n\n---\n\n## 5. Derived data — every computed number + its formula\n\n> **Full catalogue:** all **22** workbook derived fields (plus platform-derived current-state and cohort metrics), with explicit formulas and **band edges**, live in **`DATA_TYPES_ENUMS_AND_DERIVED_FIELDS.md`**. The table below is the summary.\n\nNothing here is typed; all is computed from §1 (pseudo-code).\n\n| Derived value | Formula (pseudo-code) | Feeds |\n|---|---|---|\n| current_stage / risk / castration | `current(Staging).<field>` | Header badges, rule inputs |\n| latest_psa | `current(PSA_reading).psa_ng_ml` | Header, cohort median |\n| ADT duration | `today − current(Treatment_line WHERE ADT).start_date` | Treatment dashboard, bone-gap logic |\n| time-to-treatment | `treatment_start_date − diagnosis_date` | Access/delay analytics |\n| CGHS delay | `(cghs_approval_date OR today) − cghs_request_date` | Access analytics |\n| gap counts | `COUNT(Nudge WHERE status=open GROUP BY severity)` | Home KPIs, banner |\n| protocol score | `weighted % of rule-families passing across cohort` | Home + Quality dashboard |\n| record completeness | `% required fields present per field-group` | Home, incomplete-records list |\n| benchmark deltas | `cohort % vs NCCN target` for ARSI/PSMA/bone/MDT | Benchmark cards |\n| nudge trend | `COUNT(Nudge_event GROUP BY action, period)` | Nudge-trend chart |\n| KM survival | `survival(risk_group, recurrence dates)` | Outcomes dashboard |\n| registrations/month | `COUNT(Patient GROUP BY month(registry_enrolment_date))` | Home + Overview |\n\n**Access rule on all derived data:** clinical roles see identified/in-scope; **ops/quality/sponsor see de-identified aggregate only** (masked drill rows).\n\n---\n\n## 6. Visual master flow (end-to-end)\n```mermaid\nflowchart TD\n  ON[Onboard institution + doctors] --> ADD[Register patient - W1]\n  ADD --> WU[Workup + staging - W2]\n  ADD --> PSA[PSA history - W3]\n  ADD --> TX[Treatment lines - W4]\n  WU --> ENG[Care-gap engine - W5]\n  TX --> ENG\n  ENG --> NUD[Nudges on patient file]\n  NUD --> ACK[Acknowledge - W6]\n  ACK --> MDT[MDT notify + discussion - W7]\n  MDT --> FIX[Clinician acts → source field changes]\n  FIX --> ENG\n  ENG --> ANA[Cohort analytics - W8]\n  ANA --> DRILL[Drill chart → patient → file]\n  DRILL --> NUD\n  NUD --> AIB[AI Buddy review - W9]\n```\n\n---\n\n## 7. Sign-off checklist (for the clinical team)\n\nPlease confirm, amend, or reject each:\n1. **Data models (§1)** — are the variables per model complete and correctly named for clinical use? Any field missing (e.g. additional comorbidity, biomarker, toxicity grade)?\n2. **Current-state rule (§2)** — agreed that \"current stage/line/castration\" = latest dated entry, and that restaging/progression is a **new** row (never an overwrite)?\n3. **Cardinality calls** — `Pathology` and `Outcome` as 1-per-patient (re-biopsy → new row); `Supportive-care` as a **dated** log (bone-protection audit) — agreed?\n4. **The 8 rules (§4)** — conditions, severities, and next-step wording clinically correct? Any rule to add/remove/retune (e.g. thresholds, risk sets)?\n5. **Auto-resolve semantic (§3 W5/W6)** — agreed that acknowledging routes to MDT but only a changed source field resolves a nudge?\n6. **Derived metrics (§5)** — formulas acceptable; benchmark targets (ARSI 60%, PSMA 85%, bone 85%, MDT 95%) confirmed by clinical governance?\n7. **Governance** — who signs off the rule pack + evidence packs (independent of any sponsor)?\n8. **Identity model** — de-identified registry (recommended) vs identified — confirm (drives everything downstream).\n9. **Visit / Encounter (§1.6)** — confirm **registry-by-event, no `Encounter` entity in v1** (deferred to Phase 2).\n10. **Tenancy** — confirmed **tenant = institution** (no `institution_id`); cross-institution reporting via a de-identified aggregation layer — agreed?\n11. **Roles & access (§1.1)** — **no department**; every clinician sees that institution's patients; **HOD is the privileged role** (unlock, notify-all-MDT, audit); Ops/Quality see de-identified aggregates only. Agreed?\n12. **Record locking (§1.8)** — confirm **`EDIT_WINDOW` = 48 h**, **`UNLOCK_WINDOW` = 24 h**, **unlock restricted to HOD** with a mandatory reason. Do these durations suit clinic practice? Should any other role be allowed to unlock?\n13. **Cardinality & provenance (§1.7)** — confirm every model is either entered on a named screen or derived, and the 1:1 / 1:N calls — in particular **one treatment *plan* (1:1) vs many treatment *lines* (1:N)**.\n\nOnce §7 is signed, this spec becomes the build contract; engineering maps it to the platform per `PROSTACARE_BUILD_SPEC_V1.md` / `NOVA-EDGE-FEASIBILITY.md`.\n\n---\n\n*Companion docs: `PROSTACARE_BUILD_SPEC_V1.md` (platform/NOVA Edge mapping), `FLOW-CLARITY-AND-OPEN-QUESTIONS.md` (decisions & open questions), `ProstaCare_Nudge_Logic_Handoff.md` (source of the 8 rules), and the `ProstaCare_Schema_08072026_V2.xlsx` workbook (authoritative field dictionary + value lists).*\n"}, {"title": "NOVA Edge Alignment Review", "file": "NOVAEDGE_ALIGNMENT_REVIEW.md", "md": "# ProstaCare ↔ NOVA Edge — Architecture Alignment & Gap Review\n\n> **Who this is for:** the NOVA Edge platform / engineering team. **Clinicians do not need to read this document.**\n> The clinical content lives in **Functional & Logic Spec** and the **Patient Data Walkthrough**.\n\n\n**Purpose:** verify the ProstaCare canonical model + workflows (`PROSTACARE_FUNCTIONAL_LOGIC_SPEC.md`, `PROSTACARE_BUILD_SPEC_V1.md`) map **seamlessly** onto NOVA Edge primitives (schemas, scopes, workflows, subscriptions/cron, materialized views, ADK agents), and to surface every gap before the preset build.\n\n**Verdict:** **Strongly aligned.** Every entity maps to a NOVA Edge schema and every workflow to existing operators/triggers — no new platform primitive is required. There are **two items that need an explicit design decision/component** before it is truly \"seamless\" (cross-institution aggregation; rule-config encoding) and **three \"encode-it-this-way\" notes** (down from six after the `SIMPLIFICATION_REVIEW.md` trims closed G5/G6). All are called out below with resolutions. None is a blocker.\n\n---\n\n## 1. Entity → NOVA Edge schema mapping\n\nField types available: `string/text/integer/number/float/boolean/datetime/date/json/enum(enumValues)/uuid/phone/email/file/tags` + per-field `required/unique/indexed/default/references`. Enums → `enumValues`; FKs → `references`. *(Partitioning available but **not used in v1**.)* (Platform gotcha: use `datetime` not `date`.)\n\n| Canonical entity | NOVA Edge construct | Notes / field-type mapping | Status |\n|---|---|---|---|\n| `app_user` (+`is_mdt_member`), `role` | entities + `roles.json` | 3 roles: Clinician · HOD · Admin. **No `department`/`care_team`/`mdt_panel`** — role-based access; tenant is the boundary | ✅ aligned |\n| `patient` (hub) | canonical `patients` **extension** via PATCH | de-identified; enums for coverage/state/referral; **no `institution_id`** (tenant = institution) | ✅ aligned |\n| `pathology` (1:1) | entity, FK→patient | enums (gleason/isup/pi-rads/dre); text for cores | ✅ aligned |\n| comorbidity / family history | **15 boolean columns on `pathology`** | as in the workbook + chip-group UI; no separate table, no import transform | ✅ aligned |\n| `treatment_plan` (1:1) | entity | enums + dates | ✅ aligned |\n| `outcome` (1:1) | entity | enums + milestone dates | ✅ aligned |\n| `psa_reading` (dated) | entity, indexed on `(patient_code, psa_date)` | **no partitioning in v1** (unnecessary at this scale) | ✅ aligned |\n| `staging_assessment` (dated) | entity | enums (T/N/M/risk/ecog/castration) + `assessed_on` | ✅ aligned |\n| `imaging_study` (dated) | entity | `modality` enum + `result` enum + `study_date` | ✅ aligned |\n| `treatment_line` (dated) | entity | `line_type` enum; RT + CGHS fields on the RT line | ✅ aligned |\n| `supportive_care_event` (dated) | entity | bone/dexa/phq9/follow-up + `at` | ✅ aligned |\n| `journey_event` (dated) | entity | `event_type` enum | ✅ aligned |\n| `nudge` | entity | `rule_id`, `severity`, `current_status`, dates | ✅ aligned |\n| `nudge_event` | entity | lifecycle log (opened · acknowledged · resolved) for trend + audit | ✅ aligned |\n| `notification` / `discussion_entry` | entities | recipients (json), delivery status | ✅ aligned |\n| `document` | `file` field + attachment entity + object storage | S3/MinIO per `communication.json` | ✅ aligned |\n| `guideline_rule` | **config entity** | `version` + `signed_off_by/at` + `active` (G2) | ✅ aligned |\n| ~~`evidence_pack` / `guideline_pack`~~ | config entities | **Phase 2** (with AI Buddy) | ⏸ deferred |\n| ~~`encounter`~~ | — | **not in v1**; visit timing derives from follow-up dates | ⏸ deferred |\n| `audit_event` | platform `activity` + subscriptions | ensure full coverage (G7) | ✅ aligned |\n| **record-lock fields** (`locked`, `locked_at`, `unlocked_until`, `unlock_reason`, `created_by`) | columns on every entered entity | drive W10; `unlock` gated on role | ✅ aligned |\n| `sponsor_metric` | entity + scheduled `sql_exec` aggregation | de-identified, small-cell suppressed; exported to Zygo Data Cloud (G3) | ✅ aligned |\n| `patient_identity` *(only if identified model)* | isolated entity + `read_roles`/`context_mask` | audited reveal | ✅ aligned |\n\n---\n\n## 2. Workflow → NOVA Edge mechanism mapping\n\nTriggers: API run · entity `subscriptions` (on_create/update) · schema `policies` (cron) · webhook. Step types used: `create/upsert/query/sql_exec/branch/for_each/email/in_app_notification`. *(No `sse_publish`/`llm` in v1.)*\n\n| Workflow | Trigger | Steps used | Status |\n|---|---|---|---|\n| W1 onboarding | Add-patient API → `on_create` sub | `create` + notify workflow (W7) | ✅ aligned |\n| W2 workup/staging | save → `on_create` sub on staging/imaging | `upsert`(pathology) + `create`(dated) + fire W5 | ✅ aligned |\n| W3 PSA capture | save → `on_create` sub | `create`; scheduled mat-view refresh | ✅ aligned |\n| W4 treatment | save → `on_create` sub | `create`(line/supportive) + fire W5 | ✅ aligned |\n| **W5 care-gap engine** | `on_write` subs (staging/imaging/treatment/supportive) — **no cron in v1** (all 8 rules are state-based; W10/W11 *do* use cron) | `sql_exec` `INSERT…SELECT…WHERE <rule> AND NOT EXISTS(open)` + `sql_exec` auto-resolve `UPDATE` | ✅ aligned — see G2 (rule encoding) + G4 (current-state) |\n| W6 nudge lifecycle | Acknowledge API | `create`(nudge_event) + open W7 | ✅ aligned |\n| W7 MDT notify | from nudge/patient | `query`(users WHERE is_mdt_member) + `for_each` + `email` (SES) + `in_app_notification` + `create`(discussion_entry). *No `sse_publish`, no auto-task, no digest in v1.* | ✅ aligned |\n| W8 analytics | on-write + cron refresh | **materialized views** (RLS-scoped) + `reports` | ✅ aligned — see G1 (charts) + G3 (cross-tenant) |\n| **W10 record lock / unlock** | `policies` cron (hourly auto-lock + auto re-lock) + `unlock` API | `sql_exec` UPDATE (auto-lock) · `branch` role-gate (HOD) + `create`(audit_event) on unlock | ✅ aligned |\n| **W11 sponsor aggregation** | `policies` cron (nightly) | `sql_exec` INSERT…SELECT from de-identified mat-views + suppression `CASE` → `sponsor_metric` | ✅ aligned |\n| ~~W9 AI Buddy~~ | user opens | ADK `agent` + read tools + evidence packs | ⏸ **Phase 2** (absent from functional requirements) |\n\n---\n\n## 3. Current-state derivation — the key encoding note (G4)\n\n\"Current stage / line / castration = latest dated row\" is **cross-row**, which NOVA Edge **computed columns cannot do** (the `compute` DSL is string-composition only — no rollups). So current-state must be encoded as **either**:\n- a **materialized view** `current_state` (one row/patient with the latest values), refreshed on write/cron — best for dashboards & header badges; **or**\n- an **inline subquery** inside the care-gap engine's `sql_exec` (`… JOIN LATERAL (SELECT … ORDER BY assessed_on DESC LIMIT 1) …`) — best for the rules pass.\n\n**Resolution:** use both — a `current_state` mat-view for UI/analytics, and lateral subqueries inside W5 for evaluation. Do **not** model current-state as a stored/computed column. *(Spec §2/§5 already treat it as derived; this pins the platform encoding.)*\n\n---\n\n## 4. Gaps & resolutions\n\n| # | Gap | Why it matters | Resolution |\n|---|---|---|---|\n| **G1** | Chart renderers for **PSA line / percentile bands / Kaplan-Meier** | NOVA Edge chart subtype is a free string, but the concrete renderer lives in the frontend repo (`metadata-auto-ui`), unaudited | Confirm line/area exist; build KM as a custom renderer. Data/aggregation side is fully supported. **Frontend task, not a data-model gap.** |\n| **G2** | `guideline_rule` as **data-driven config** vs one `sql_exec` per rule | Clinical team wants to edit rules without code | Recommended: `guideline_rule` config holds **metadata** (rule_id, severity, next_step, inputs, version, sign-off, active); the engine workflow holds **one predicate step per rule (8)**, gated by `active`. Clinicians tune severity/wording/thresholds in config; changing the *logic shape* is a versioned workflow edit. (Fully dynamic predicate-from-config is possible via stored SQL fragments + `tables` allowlist, but adds risk — defer.) |\n| **G3** | **Cross-institution** de-identified reporting is **not native** (tenants are isolated schemas) | Sponsor/registry benchmarking spans hospitals | **Net-new component:** a cross-tenant **de-identified aggregation layer** (scheduled export of each tenant's de-identified cohort metrics → a registry store the sponsor reads). This is the one piece that isn't in-tenant config. Owner + cadence = open decision (`O-REP`). |\n| **G4** | Current-state = latest row (cross-row) | Header badges + rule inputs | Mat-view + lateral subquery (see §3). Not a computed column. |\n| ~~**G5**~~ | ~~Partitioning composite PK + lookback~~ | — | ✅ **CLOSED** — partitioning dropped from v1 (unnecessary at this scale). Gap was self-inflicted. |\n| ~~**G6**~~ | ~~flag columns → normalized rows import transform~~ | — | ✅ **CLOSED** — comorbidity/family stay as boolean columns. Transform no longer exists. |\n| **G7** | **Audit coverage** must be complete | R-AUTH-3; identity reveal | Cross-cutting `audit_event` subscription on all entities + explicit reveal audit on `patient_identity`. |\n\n**None blocks the build.** G3 is the only genuinely net-new *component*; the rest are encode-it-this-way notes or a frontend task.\n\n---\n\n## 5. Alignment checklist\n\n| Dimension | Status |\n|---|---|\n| Every entity → a NOVA Edge schema | 🟢 |\n| Field types / enums / FKs / partitioning expressible | 🟢 |\n| Tenancy = institution = one tenant schema | 🟢 |\n| Department/role scopes (`row_policies` + `$user.department`) | 🟢 |\n| De-identified analytics via RLS-scoped mat-views | 🟢 |\n| Care-gap engine via `sql_exec` + on-write subs (no cron) | 🟢 (encode per G2/G4) |\n| Nudge lifecycle + trend from `nudge_event` | 🟢 |\n| MDT notify via comms steps | 🟢 |\n| AI Buddy via bounded ADK agent | ⏸ Phase 2 |\n| Onboarding = provision tenant per institution + seed preset | 🟢 |\n| Record lock / HOD unlock (W10) | 🟢 |\n| In-tenant `sponsor_metric` aggregation (W11) | 🟢 |\n| Cross-institution de-identified rollup | 🟡 net-new component (G3) |\n| Clinical chart renderers (line/KM) | 🟡 frontend confirm (G1) |\n\n---\n\n## 6. What must exist before/around the preset build\n\n1. **Decide G2 encoding** (config metadata + per-rule predicate steps — recommended) so the clinical team's rule-governance need is met.\n2. **Scope G3** (cross-tenant de-identified aggregation layer) — owner, store, cadence; it is the sponsor surface too.\n3. **Confirm G1** (frontend line/KM renderers).\n4. Pin **G4** current-state as mat-view + lateral subquery in the schema/workflow design.\n5. Include **G7** audit subscription in the preset from day one. *(G5 and G6 are closed — see `SIMPLIFICATION_REVIEW.md`.)*\n\nEverything else is standard NOVA Edge configuration: fork `novahub_v2`, add the entities (§1), the workflows (§2), the mat-views (§5/W8), the ADK agent (W9), scopes + roles, and the theme.\n\n---\n\n*Reviewed against: `NOVA-EDGE-FEASIBILITY.md` (platform capability findings), the `novahub_v2`/`sakra` presets, and platform docs (workflow-reference, materialized-views, column-compute-derivations, partitioning, rbac). Companion: `PROSTACARE_FUNCTIONAL_LOGIC_SPEC.md`, `PROSTACARE_BUILD_SPEC_V1.md`.*\n"}, {"title": "Build Spec (v1)", "file": "PROSTACARE_BUILD_SPEC_V1.md", "md": "# ProstaCare — Canonical Schema & NOVA Edge Build Spec (v1, for internal approval)\n\n> **Who this is for:** the NOVA Edge platform / engineering team. **Clinicians do not need to read this document.**\n> The clinical content lives in **Functional & Logic Spec** and the **Patient Data Walkthrough**.\n\n\n**Audience:** ProstaCare product/clinical leads + the NOVA Edge (NOVAGE) platform team, for internal sign-off **before** preset build starts.\n**Derived from:** `ProstaCare_Schema_08072026_V2.xlsx` (the \"Platform Bible\" workbook — product narrative, 110-field dictionary, value lists, 46-widget dashboard inventory, care-gap tracker) + the prior discovery/feasibility docs in this folder (`FLOW-CLARITY-AND-OPEN-QUESTIONS.md`, `NOVA-EDGE-FEASIBILITY.md`, `PRODUCT-PRD.md`, `ProstaCare_Nudge_Logic_Handoff.md`).\n**Goal:** define the *canonical data model, tenancy/onboarding model, rules/analytics/intelligence layers, and NOVA Edge mapping* — structured so it is easy to build and manage, with the workbook as one entry surface that maps onto the canonical schema (not the system of record).\n\n---\n\n## 1. Framing — what changed, and the one principle\n\nThe workbook is a **platform bible first, data-entry pack second** (its own words). It commits the product to a registry + patient command-centre + care-gap engine + cohort analytics + governed AI (\"AI Buddy\"), with a **core promise**: *every cohort signal drillable to a patient; every patient gap an explainable next action.*\n\nThat promise is only structurally possible if the data model is **longitudinal, computed, and tenant-aware** — which the workbook itself is not (it is a flat, de-identified, single-institution snapshot). So this spec does three things the workbook does not:\n\n1. **Adds the tenancy/identity layer** (institution = tenant; users + roles inside it) so institutions and doctors can be onboarded.\n2. **Promotes snapshot columns to longitudinal event tiers** (staging, imaging, treatment lines, nudges) so restaging, sequential therapy, and nudge-trend history become expressible.\n3. **Makes every displayed number derived** (Tier 3), never typed — the workbook already flags this need in `Dashboard_Derived`/`Dashboard_Coverage`.\n\n**Guiding principle (carried from PRODUCT-PRD R-X-5):** snapshot storage where the domain is longitudinal is the root cause of the demo's known bugs. The canonical model fixes them structurally (see §5.5).\n\n---\n\n## 2. Terminology — tenancy model (updated): **tenant = institution**\n\n**Decision (confirmed): each onboarded institution is its own NOVA Edge tenant** (one Postgres schema per hospital). Therefore **no `institution_id` column is stored anywhere** — the tenant boundary *is* the institution, and every row already belongs to that institution. Inside a tenant there is **no department** — all clinical users see that institution's patients and access differs by **role** (Clinician · HOD · Admin).\n\n| Reporting need | How it works under tenant-per-institution |\n|---|---|\n| Cross-**doctor** cohort reporting (within a hospital) | **Native** — one schema per institution |\n| Cross-**institution** reporting (sponsor / registry / benchmarking) | A separate **de-identified aggregation layer above the tenants** — pushes de-identified cohort metrics up; matches \"sponsor sees de-identified aggregate only\" |\n| \"Each doctor/team isolated\" (within a hospital) | **Not required** — all clinicians share access; HOD is the privileged role |\n| Per-**doctor** dedicated tenant (internet SaaS, `O-DEP`) | **Explicitly not the model.** Confirmed: **one tenant per institution, with separation.** |\n\n> Net: cross-reporting splits into two — **within-institution** (native, in-tenant) and **cross-institution** (de-identified aggregation layer). The de-identified layer is also exactly the sponsor/pharma surface (§10), so it does double duty.\n\n---\n\n## 3. Foundational decisions (locked) + the one big open decision\n\n**Locked (from prior discovery):**\n- **Tenant = institution** (one schema per hospital); no `institution_id`, **no `department`**.\n- Clinical operational visibility = **tenant-wide for clinical roles**; **HOD = privileged** (unlock, notify-all-MDT, audit).\n- **Record lock:** edit window → auto-lock → HOD time-bound unlock.\n- Non-clinical / ops / quality / **pharma sponsor = de-identified aggregate only** (PHI firewall).\n- Care-gap rules = **config-owned, versioned, clinically signed-off**; 8 rules specified.\n\n**🔴 The one decision to settle before build — identity model:**\nThe V2 workbook is **fully de-identified** (`patient_code` is \"the only patient-level identifier permitted\"; age-at-diagnosis not DOB; no name/ABHA/Aadhaar). The earlier demo patient-file was **identified** (names, ABHA, Aadhaar, masked-with-reveal). These are two different products. Pick one:\n\n| Option | What it means | Consequence |\n|---|---|---|\n| **A. De-identified registry (recommended)** | ProstaCare stores **no PHI** — only `patient_code` + clinical data. Identity (name/ABHA) stays in the hospital HIS, linked externally by `patient_code`. | Massively simpler DPDP/consent; pharma firewall becomes near-trivial; matches V2 workbook. Bedside \"who is this\" needs the HIS. |\n| **B. Identified EMR-lite** | ProstaCare stores identifiers, masked-by-default + audited reveal. | Full bedside usability; heavy PHI/consent/audit burden; contradicts the V2 workbook. |\n| **C. De-identified core + optional identity module** | De-identified registry by default; an optional, separately-scoped `patient_identity` entity (name/ABHA) available only to in-scope clinical roles at an institution that needs it. | Best of both; slightly more design. **Fallback recommendation if B is wanted anywhere.** |\n\n**Recommendation: A (or C if any site needs bedside identification).** Everything below is written so that identifiers, if kept, live in **one** isolated `patient_identity` entity — the rest of the model stays de-identified regardless.\n\n---\n\n## 4. Canonical data model (three tiers + tenancy + cross-cutting)\n\nLegend for cardinality: **1:1** = one row per patient (current-state) · **1:N dated** = many dated rows per patient (longitudinal) · **derived** = computed, never typed.\n\n### 4.0 Tier 0 — Tenancy & identity (NEW; absent from workbook)\n> **Tenant = institution.** The institution is the tenant boundary, so there is **no `institution` entity and no `institution_id`**. **There is also no `department` entity** — access differs by **role**, not department; all clinical users see that institution's patients. The MDT panel is a **notification group, not an access boundary**.\n\n| Entity | Cardinality | Key fields | Notes |\n|---|---|---|---|\n| `app_user` | — | id, display_name, **email (login identity)**, specialty, role→, status | Clinician / HOD / Coordinator / Ops / Admin |\n| **record-lock fields** | on every entered entity | `created_at`, `created_by`, `last_edited_at`, `locked`, `locked_at`, `unlocked_until`, `unlock_reason` | Edit window → auto-lock → HOD time-bound unlock (functional spec §1.8 / W10) |\n| `role` | config | **Clinician · HOD (privileged) · Admin** *(+ Ops/Quality only if in-product de-identified dashboards are needed)* | Drives capability matrix (§10) |\n| MDT membership | **flag on `app_user`** | `is_mdt_member` (boolean) | Notify-all target. *No `mdt_panel` table* — MDT is a notification group, not an access boundary. |\n| Primary clinician | field on `patient` | `primary_clinician_id→` | Attribution, not restriction. *No `care_team_member` table in v1.* |\n| `patient_identity` *(only if §3-B/C)* | 1:1, isolated | patient_code→, name, abha, aadhaar_masked, phone | The **only** PHI table; column `read_roles`+`context_mask`; audited reveal |\n\n### 4.1 Tier 1 — Patient hub & current-state (1:1 per patient)\n| Entity | Source sheet/section | Key fields (from Field_Dictionary) |\n|---|---|---|\n| `patient` (hub) | Demographics_Entry + `diagnosis_date` moved here | patient_code (PK), primary_clinician_id→, registry_enrolment_date, age_at_diagnosis_years, language_preference, healthcare_coverage, referring_hospital_centre, referral_source, state, travel_distance_km, diagnosis_date *(no institution_id — tenant = institution)* |\n| `pathology` | Clinical_Entry · Presenting Complaint + DRE + Biopsy | primary_complaint, duration, ipss_score, bowel_rectal_symptoms, dre_findings, prostate_volume_cc, biopsy_date, biopsy_type, pi_rads_score, gleason_score, isup_grade_group, cores_positive_total, core_involvement_pct, perineural_invasion, ece_extracapsular_extension — **1:1** (re-biopsy → new row + journey event) |\n| comorbidity / family history | Clinical_Entry · comorbidity_1..9 + family_history_1..6 | **Kept as 15 boolean flag columns on `pathology`** (exactly as the workbook and the chip-group UI). *No `patient_condition` table* — the list is fixed and the cohort pivots are trivial SQL over booleans. |\n| `treatment_plan` | Treatment_Entry · Intent & MDT | treatment_intent, mdt_tumour_board_status, date_of_mdt_review, clinical_trial_eligibility, treatment_start_date — **1:1** header |\n| `outcome` | Outcomes_Entry | last_follow_up_date, best_response, psa_nadir_value, psa_nadir_date, psa_doubling_time_months, biochemical_recurrence_status/date, crpc_progression_status/date, rt_outcome_status — **1:1** (milestone dates inline) |\n\n### 4.2 Tier 2 — Longitudinal events/observations (1:N dated)\n| Entity | Source | Key fields | Why longitudinal |\n|---|---|---|---|\n| `psa_reading` | PSA_History (already correct) | psa_date, psa_ng_ml, free_psa_pct, psa_density, context_remarks | Trend/response curves; **partition on `psa_date`** |\n| `staging_assessment` **(NEW)** | Clinical_Entry · TNM Staging & Risk | **assessed_on**, clinical_t_stage, n_stage, m_stage, eau_risk_category, ecog_performance_status, castration_status | Restaging + HSPC→CRPC transition as dated facts; \"current stage\" = latest by `assessed_on` |\n| `imaging_study` **(NEW)** | Clinical_Entry · Imaging & Molecular | **study_date**, modality {mpMRI, bone_scan, psma_pet_ct, ct_ap, dexa, germline_somatic}, result | \"is PSMA done / is DEXA current\" is time-sensitive (feeds care-gap engine) |\n| `treatment_line` **(NEW)** | Treatment_Entry · ADT + Chemo + RT | line_type {ADT, anti_androgen, ARSI, chemo, RT}, agent, formulation_dose, start_date, end_date, status; + RT: rt_indication/status/modality, target_volume, dose_fractionation, rt_facility, planned_rt_start_date, rt_completion_date, cghs_preauth_status/request_date/approval_date; + testosterone_level, safety_side_effects | Expresses **sequential therapy** (ADT → progression → ARSI → chemo) the flat sheet can't |\n| `supportive_care_event` | Treatment_Entry · Bone Health & Supportive Care | **at**, bone_protection_therapy, calcium_vitamin_d, next_follow_up_psa_date, testosterone_monitoring, psychosocial_screening_phq9, nutritional_assessment | Dated so bone-protection start/stop has an audit trail (largest care gap) |\n| `journey_event` | Journey_Events (already correct) | event_type, event_date, event_notes | Human-readable milestone narrative (no longer the system of record for clinical state) |\n| `nudge` **(NEW)** | Care_Gap_Tracker (restructured) | nudge_id, patient_code→, rule_id, severity, current_status {open/logged/resolved/dismissed}, guideline_ref, opened_at, resolved_at | A gap is a lifecycle object, not a flag |\n| `nudge_event` **(NEW)** | — | nudge_id→, at, action {opened/viewed/acknowledged/routed_to_mdt/resolved}, actor→ | The event log that makes nudge-trend + closure audit computable (workbook flags this as impossible without it) |\n\n### 4.3 Tier 3 — Derived / analytics (computed, never typed)\nMaterialized, RLS-scoped; refresh on cron. Covers the whole `Home_Dashboard` + `Population_Dashboard` inventory (see §7) plus:\n- `current_stage` / `current_line` / `current_castration_status` (latest-row projections for header badges)\n- `protocol_score`, `record_completeness`, benchmark deltas (ARSI/PSMA/bone/MDT), gap counts & severity rollups\n- `nudge_trend` (opened/viewed/acted/resolved/net-active) from `nudge_event`\n- All 22 derived fields enumerated in the workbook's `Dashboard_Derived` tab\n\n### 4.4 Cross-cutting\n| Entity | Source | Purpose |\n|---|---|---|\n| `notification` / `discussion_entry` | Team modal + workflow | MDT notify + per-patient discussion log; sender, recipients, reason, body, delivery status, audit |\n| `document` | Rx upload workflow | Prescription/report blobs → secure object storage refs + metadata + audit |\n| `audit_event` | cross-cutting | Every view/edit/reveal/nudge-action/notification (R-AUTH-3) |\n| `guideline_rule` | config | The 8 care-gap rules as versioned, signed-off config (§6) |\n| ~~`evidence_pack` / `guideline_pack`~~ | config | **Deferred to Phase 2 with AI Buddy** (absent from the agreed functional requirements) |\n\n**Notifications & email (AWS SES).** Identity = **email** (users log in with their email ID). The MDT-notify workflow (functional spec W7) sends every configured notification via **AWS SES**: resolve recipients → in-app inbox item (+task) → **SES email** to `recipient.email` → store SES `messageId` + delivery status (sent/bounced/complaint/failed) on `Notification` → append discussion log. NOVA Edge encoding: the workflow `email` step is backed by an **SES integration** (verified sender domain; credentials in `system_integrations`); in-app via `in_app_notification` + `sse_publish`. SMS/WhatsApp are future channels behind the same `Notification` record. Triggers covered: care-gap→MDT, new patient, discuss-with-team, urgent escalation.\n\n---\n\n## 5. Sheet → entity migration map\n\n| Workbook sheet | Target entity(ies) | What moves / changes |\n|---|---|---|\n| `Demographics_Entry` | `patient` (hub) | Keep 1:1. Make `patient_code` a real PK with FK integrity. Move `diagnosis_date` here. Add `primary_clinician_id` FK. *(No institution/department FKs — tenant = institution.)* |\n| `Clinical_Entry` | **splits into** `pathology` (1:1, incl. comorbidity/family flags) + `staging_assessment` (1:N dated, **NEW**) + `imaging_study` (1:N dated, **NEW**) | The single sheet holding several lifecycles is decomposed by lifecycle. Staging & imaging become dated events. |\n| `PSA_History` | `psa_reading` | Structurally correct already; partition on date; **the Patient-File chart binds to this table** (closes the decoupled-chart bug). |\n| `Treatment_Entry` | `treatment_line` (1:N dated, **NEW**) + `treatment_plan` (1:1 header) + `supportive_care_event` (1:N dated) | One mashed row → dated therapy lines + a small current-state header + dated supportive care. |\n| `Outcomes_Entry` | `outcome` (1:1, milestone dates inline) | Keep 1:1; milestone dates already present. |\n| `Journey_Events` | `journey_event` | Keep. Role narrows to milestone narrative (staging/treatment now have their own history). Wire the \"Add to Timeline\" action. |\n| `Care_Gap_Tracker` | `nudge` + `nudge_event` (**NEW**) + derived read-model | Flag sheet → lifecycle. All counts/severity become **derived** over `nudge`. |\n| `Home_/Population_Dashboard`, `Dashboard_Derived`, `Dashboard_Coverage` | Tier-3 materialized views | Inventory → mat-view specs (§7). |\n| *(none)* | `app_user` (+`is_mdt_member`), `role`, `notification`/`discussion_entry`, `document`, `audit_event`, `guideline_rule`, `sponsor_metric` | Net-new — the workbook has no home for these (the signal it's an entry surface, not the system of record). *(No `institution`, `department`, `care_team`, `mdt_panel`, `patient_condition`, or `encounter` entities — see `SIMPLIFICATION_REVIEW.md`.)* |\n\n### 5.5 Bugs that close as a consequence of the migration\n| Demo bug (PRODUCT-PRD §6) | Root cause | Closes because |\n|---|---|---|\n| Decoupled PSA chart (§6.6) | chart read hardcoded points | chart binds to `psa_reading` |\n| Static-vs-computed KPI drift (§6.5) | hand-typed metrics | Tier-3 is derived-only (R-X-5) |\n| Nudge-trend needs history | one-row snapshot | `nudge_event` exists |\n| Restaging / HSPC→CRPC not expressible | staging overwrites | `staging_assessment` is dated |\n| Sequential therapy not expressible | one mashed treatment row | `treatment_line` is dated |\n\n---\n\n## 6. Care-gap rules engine (config-owned, 8 rules)\n\nThe 8 rules are fully specified (workbook `Care_Gap_Tracker` + `ProstaCare_Nudge_Logic_Handoff.md`). Each becomes one `guideline_rule` config row + a condition in a parameterized evaluation workflow. Inputs read from **current-state projections** of Tier-2 (latest staging/imaging/treatment/supportive-care).\n\n| rule_id | Condition (against current state) | Severity |\n|---|---|---|\n| bone_scan_missing | `bone_scan=Not done` AND risk ∈ {High, Very High, M1} | Urgent |\n| psma_missing | `psma_pet_ct=Not done` AND risk ∈ {High, Very High} | Urgent |\n| bone_protection_missing | `bone_protection_therapy=Not started` | Urgent |\n| dexa_missing | `dexa=Not done` | Warning |\n| genomics_missing | `germline_somatic=Not done` | Warning |\n| arsi_readiness | `castration=HSPC` AND risk ⊇ High AND `arsi=Not initiated` | Warning |\n| followup_psa_missing | `next_follow_up_psa_date` empty | Info |\n| psychosocial_prompt | `phq9` blank or Not done | Info |\n\n**Evaluation:** workflow `sql_exec` scan `INSERT…SELECT…WHERE <rule> AND NOT EXISTS(open nudge)` (idempotent) bound to (a) `on-write` subscriptions of staging/imaging/treatment/supportive entities and (b) a daily `policies` cron. **Auto-resolve** when the source condition clears (matches the demo semantic: acknowledge ≠ resolve). Rules are **versioned + clinically signed-off**; the sponsor never edits them (governance §8/§10).\n\n---\n\n## 7. Analytics & derived layer (dashboard inventory → mat-views)\n\nThe workbook's `Population_Dashboard` (36 widgets across Overview/Clinical/Treatment/Outcomes/Quality/Demographics) + `Home_Dashboard` (23 widgets) map to RLS-scoped materialized views. `Dashboard_Derived` (22 derived fields) and `Dashboard_Coverage` (covered/partial/not) are the authoritative derivation list. Highlights:\n\n- **Covered by the canonical model:** registration trends, age histogram, referral donut, travel bands, risk/coverage/stage mixes, Gleason/ISUP, comorbidity pivot, ADT/RT/ARSI landscapes, CGHS delay, time-to-treatment, outcome cards, KM survival, bone-health donut, completeness, MDT rate.\n- **Previously \"not representable\" — now solved by Tier-2:** **nudge-trend lifecycle** (via `nudge_event`), and per-user **recently-viewed** (via `audit_event`). The workbook explicitly listed these as impossible on snapshot rows.\n- **Drill-to-patient everywhere:** every widget resolves to the underlying `patient_code` set (the core product promise). For non-clinical/sponsor roles the drill lands on **de-identified/masked** rows (§10).\n- **Chart types:** NOVA Edge chart subtype is a free-form string (line/percentile-band/KM not precluded); confirm/extend the frontend renderers for the PSA line, percentile bands, and Kaplan-Meier (the one custom viz). See NOVA-EDGE-FEASIBILITY §7.1/G1.\n\n---\n\n## 8. Governed Intelligence — AI Buddy (⏸ **DEFERRED TO PHASE 2**)\n\n> **Scope decision:** AI Buddy appears **zero times** in `FUNCTIONAL_REQUIREMENTS.md`, `PRD.md`, or `SCOPE.md` — it exists only in the newer workbook. It is the single largest subsystem in this spec and is **not required for v1**. Ship registry + care-gap engine + dashboards first. The design below stands for Phase 2. *(`SIMPLIFICATION_REVIEW.md` T12.)*\n\nThe workbook's `Governed_Intelligence` tab defines a strict boundary: AI Buddy is **stepwise, evidence-anchored, and must not free-generate, invent gaps, claim autonomous decisions, or imply drug access the config denies.** Mapping to NOVA Edge:\n\n- **AI Buddy** → an ADK `agent` in `chat`/stepwise mode, tools limited to **read** entities + report tools + the care-gap engine; **no unbounded generation**.\n- **Brain = configured packs only:** `evidence_pack` / `guideline_pack` / access-rule config / retrospective aggregates — no external free-text.\n- **Four lenses** (pathway review, progression branch, access/affordability, trial/new-drug) → distinct tool-scoped prompts, each grounded in config + patient state.\n- **Guardrails:** `require_human_approval` on any write; `sanitize` on inputs; PII kept out of prompts via `context_mask` (moot under the de-identified model §3-A). Every AI step is audited.\n- **Governance/COI:** because a pharma sponsor may have commercial interest in flagged therapies, the evidence/guideline packs and the 8 rules are owned by an **independent clinical committee** with versioned sign-off; AI Buddy can only surface what those packs contain.\n\n---\n\n## 9. Multi-institution onboarding & provisioning\n\nSince the workbook has no tenancy layer, onboarding is net-new. Because **tenant = institution**, onboarding a hospital = provisioning its tenant, then setting up its users:\n\n```\nPlatform admin → PROVISION institution tenant (new schema, seed preset, theme)\nInstitution admin (in-tenant) → onboard app_users (clinicians / HOD / admin)\n      → assign role (Clinician · HOD · Admin) + set is_mdt_member\n      → (per patient) set primary_clinician\nPatient registry entry (Add New Patient) → appears in that institution's cohort\n```\nCross-institution rollup (sponsor/registry) reads the **de-identified aggregation layer** above tenants, never the tenants directly.\n\n- **Identity source (`O-ONB4`, open):** hospital SSO (Azure AD — NOVA Edge supports it) or platform-local accounts; confirm per institution.\n- **Onboarding roster (`O-ONB`, open):** no predefined doctor-team list exists in any doc — must be supplied per launch institution.\n- **Provisioning mechanism:** admin console (NOVA Edge `pages.json` + entity CRUD) for v1; bulk import / HIS-directory sync later.\n- **Patient onboarding:** created in ProstaCare (registry) OR synced from HIS (`O-S1`, open) — under the de-identified model, sync carries `patient_code` + clinical data only.\n\n---\n\n## 10. Access, privacy & the pharma firewall (NOVA Edge encoding)\n\n| Layer | Decision | NOVA Edge mechanism |\n|---|---|---|\n| Operational visibility | **Tenant-wide for clinical roles** (no department scoping); HOD is the privileged role | role grants only; the tenant *is* the boundary — no row-level scopes needed |\n| Record immutability | Edit window → auto-lock → **HOD-only, time-bound unlock** (reason required, audited) | lock fields + scheduled `auto_lock` workflow + `unlock` workflow gated on role |\n| Non-clinical / ops / sponsor | De-identified aggregate only | Exposed **only** to RLS-scoped, **de-identified** materialized views; no entity-row access |\n| Identifiers (if §3-B/C) | Masked-by-default + audited reveal | isolated `patient_identity`; column `read_roles` + `context_mask`; reveal → `audit_event` |\n| Rules/AI governance | Independent clinical sign-off; sponsor can't edit | `guideline_rule`/`evidence_pack` write-restricted to Admin+clinical-committee role |\n| Data residency / consent | **AWS Mumbai `ap-south-1`** (DPDP); THB-provided hosting/domain | consent basis per §3 decision (de-identified ⇒ lightest) |\n\nCapability × role matrix is in `FLOW-CLARITY-AND-OPEN-QUESTIONS.md §5` (straw-man, pending confirmation).\n\n---\n\n## 11. NOVA Edge build mapping & phasing\n\n**Preset deliverable** (`presets/prostate_cancer/`): `schemas.json` (all Tier-0/1/2 entities + partitioning on `psa_reading`), `workflows.json` (nudge evaluation + MDT notify + onboarding + outcome derivations), `tools.json`/`agents.json`/`agent-tools.json` (AI Buddy + evidence packs), `pages.json` + `ui/schema_ui.json` (Home, Patient List, Patient File detail, Population Dashboard, admin console), `mat_views.json` (Tier-3 + dashboard inventory), `reports.json`, `roles.json`, `config.json`, `app_theme.json` (Visual Language palette), `sample-data.json` (the workbook's de-identified sample rows).\n\n**Reuse:** fork `novahub_v2` (care-gap/clinical) for the entity+care-gap spine; `b2b_account` detail-page pattern for the Patient File; canonical `patients` extension for the hub.\n\n**Phasing:**\n| Phase | Scope | NOVA Edge |\n|---|---|---|\n| **P0 Foundation** | Tenancy + patient hub + Tier-1 current-state + de-identified access | schemas + scopes + roles + onboarding console |\n| **P1 Longitudinal** | PSA, staging, imaging, treatment-line, journey, supportive-care | Tier-2 entities + partitioning + current-state projections |\n| **P2 Care-gap engine** | 8 rules (**on-write only, no cron**) + nudge/nudge_event lifecycle + MDT notify (SES) | `guideline_rule` + evaluation workflow + notify workflow |\n| **P3 Analytics** | Home + Population dashboards, benchmarks, protocol score | mat-views + `pages.json`; confirm line/KM renderers (G1) |\n| **P4 Governed AI** *(Phase 2)* | AI Buddy bounded agent + evidence packs | ADK agent + packs + guardrails |\n| **P5 Integrations** | HIS/registry sync, FHIR read, (later) ABHA/ABDM | adapters/remote entities (net-new, see feasibility §4) |\n\n---\n\n## 12. Open decisions for NOVA Edge sign-off (the gate)\n\n**P0 — settle before P0 build:**\n1. **Identity model (§3):** de-identified registry (A) / identified (B) / de-identified + optional identity module (C). *Recommend A or C.*\n2. **`O-A1` multi-user vs single console** — the role-based access model implies multi-user; confirm.\n3. **`O-T*` roles & MDT (simplified)** — confirm roles = Clinician · HOD · Admin, MDT = `is_mdt_member` notify flag, no department, no care-team table.\n4. **`O-S1` patient source of truth** — created in ProstaCare vs synced from HIS (key = `patient_code`?).\n5. **`O-PH1/2/3` pharma** — confirm sponsor (NVS = Novartis?), data model (de-identified aggregate), and independent rule-governance/COI.\n6. **`O-TMPL1` disease scope** — prostate-only vs templatable core (recommend: prostate on a shared oncology core).\n\n**P1 — needed during build:**\n7. `O-ONB` onboarding roster + `O-ONB4` identity source (SSO vs local) per launch institution.\n8. `O-N*`/`O-CH*` nudge ownership, SLA/escalation, snooze; notification channels (in-app/email/…).\n9. Supportive-care & pathology cardinality: keep `pathology` 1:1 (re-biopsy rare) ✅ recommended; make `supportive_care` **dated** ✅ recommended (bone-protection audit).\n\n**P2 — refinement:**\n10. `O-REP*` reporting grain/destination + de-identified export cadence for the sponsor.\n11. `O-DOM*` domain/hosting/IP; chart-renderer scope (G1); FHIR/ABHA/ABDM connector timing (feasibility §4).\n\n---\n\n## 13. Why this is easier to build and manage\n\n- **One canonical schema, three tiers** — snapshot for current-state, dated events for history, derived for everything shown. No hand-typed metrics, no snapshot/longitudinal contradictions.\n- **The workbook stays useful** — as a de-identified *entry/seed surface* and the authoritative *field dictionary + value lists*, mapping cleanly onto the canonical entities (§5).\n- **Tenancy is explicit** — institutions/doctors onboard into org-units + scopes; cross-reporting native; PHI firewall structural.\n- **Rules & intelligence are config** — versioned, signed-off, sponsor-safe; the engine is data, not code.\n- **Everything traces to `patient_code`** — so the core promise (drill any signal to a patient, explain any gap) holds structurally.\n\n---\n\n*Authoritative sources: `ProstaCare_Schema_08072026_V2.xlsx` (Field_Dictionary, Value_Lists, dashboard inventory, Care_Gap_Tracker). Companion specs in this folder: `NOVA-EDGE-FEASIBILITY.md`, `FLOW-CLARITY-AND-OPEN-QUESTIONS.md`, `PRODUCT-PRD.md`, `ProstaCare_Nudge_Logic_Handoff.md`. This document is the consolidated build spec for NOVA Edge internal approval; the preset build begins once §12 P0 items are signed off.*\n"}, {"title": "Cross-Tenant Aggregation", "file": "CROSS_TENANT_AGGREGATION_SPEC.md", "md": "# ProstaCare — Cross-Tenant Data Aggregation Spec (Sponsor / Zygo Data Cloud)\n\n> **Who this is for:** clinical, business and legal teams. **No technical background needed.**\n> Any unfamiliar term (*tenant, derived, one-to-one, aggregate…*) is explained in the glossary at the top of\n> **`PROSTACARE_FUNCTIONAL_LOGIC_SPEC.md` §0 — Plain-English glossary**.\n\n\n**Purpose:** define how **de-identified summary data** from each institution tenant is aggregated across institutions for the **sponsor** (project funder — inferred **Novartis/NVS**, to confirm), via **Zygo Data Cloud**. This closes gap **G3** in `NOVAEDGE_ALIGNMENT_REVIEW.md` (cross-institution reporting is not native because tenant = institution) and is the surface referenced in `PROSTACARE_BUILD_SPEC_V1.md §10`.\n\n**Golden rule, in plain terms:** **the sponsor never sees a patient.** Only *summary counts and percentages* ever leave a hospital — no names, no patient codes, no free-text notes, no exact dates, and no figures so small they could identify someone. The sponsor looks at a separate reporting system (Zygo Data Cloud); they can never reach into a hospital's records.\n\n**Three terms used below:**\n- **Tenant** = one hospital's own separate, isolated copy of the system.\n- **Aggregate** = a count or percentage across many patients (e.g. *\"18 of 62 high-risk patients are on ARSI\"*), never one person's data.\n- **Small-cell suppression** = if a figure is based on too few patients, we hide it, because a very small group could accidentally identify an individual. *Example: if only 6 high-risk patients were seen in a month, that month's percentage is withheld.*\n\n---\n\n## 1. Architecture — the two-hop model\n\n```mermaid\nflowchart LR\n  subgraph T1[Institution A tenant]\n    A1[Patient + event data] --> A2[De-identified mat-views]\n    A2 --> A3[sponsor_metric table<br/>aggregated + small-cell suppressed]\n  end\n  subgraph T2[Institution B tenant]\n    B1[...] --> B2[...] --> B3[sponsor_metric table]\n  end\n  A3 --> P[Zygo Data Cloud pull pipeline]\n  B3 --> P\n  P --> X[Cross-tenant registry<br/>+ institution_code + network benchmarks]\n  X --> S[Sponsor dashboards / RWE]\n```\n\n- **Hop 1 — in-tenant aggregation (inside each institution):** a scheduled workflow rolls the de-identified mat-views into a single **`sponsor_metric`** table, applies **small-cell suppression**, and stamps the tenant's anonymised `institution_code`. Data stays in the tenant.\n- **Hop 2 — Zygo Data Cloud pull:** Data Cloud pulls each tenant's `sponsor_metric` on a cadence, **unions** them, computes **network-level benchmarks** (this institution vs the network), and serves the sponsor. Tenants remain isolated; only the aggregate table is exported.\n\n**Why in-tenant first:** it keeps the privacy boundary and suppression logic *inside* the tenant (governed, auditable), so nothing leaves until it is already de-identified and suppressed. Data Cloud only ever sees safe aggregates.\n\n---\n\n## 2. The summary table each hospital produces — `sponsor_metric`\n\nEach hospital builds **one simple summary table**. Every row is a single figure: *\"for this month, this measure, this patient group — how many out of how many.\"*\n\n| Column | Meaning | Example |\n|---|---|---|\n| `institution_code` | Anonymised institution id (governed) | `INST-017` |\n| `period_month` | Month bucket (never exact dates) | `2026-06` |\n| `metric_key` | The measure | `arsi_intensification_rate` |\n| `dim1_name` / `dim1_value` | Optional breakdown dimension | `risk_group` / `High` |\n| `dim2_name` / `dim2_value` | Optional 2nd dimension | `coverage` / `CGHS` |\n| `numerator` | Count meeting the measure | `18` |\n| `denominator` | Eligible population | `62` |\n| `patient_n` | Distinct patients in the cell | `62` |\n| `suppressed` | TRUE if `patient_n` < threshold → num/den nulled | `false` |\n| `computed_at` | Aggregation run timestamp | `2026-06-30` |\n\n**Small-cell suppression (the privacy safeguard):** if a figure is based on **fewer than 11 patients** (the threshold is set by governance), the numbers are withheld and the row is marked *suppressed*. This prevents anyone working backwards to an individual. It is applied **inside the hospital, before anything is sent** — so unsafe figures never leave.\n\n**🔧 For engineers:** `sponsor_metric` is a normal entity; a nightly scheduled workflow builds it from the de-identified summary views and applies the suppression rule. It never reads patient rows.\n\n---\n\n## 3. The data contract — what MAY be aggregated (and what may not)\n\n### 3.1 Allowed measures (`metric_key` catalogue)\nAll are counts/rates over month buckets, de-identified, suppressible.\n\n| Family | Example metric_keys | Dimensions allowed |\n|---|---|---|\n| **Cohort volume** | `patient_count`, `new_registrations` | risk_group, coverage, state, age_band |\n| **Risk & staging** | `risk_mix`, `stage_at_presentation`, `staging_completeness_rate` | risk_group, stage_group |\n| **Care gaps** | `open_gap_count`, `gap_rate` (by type: bone_scan/psma/bone_protection/dexa/genomics/arsi/followup/psychosocial) | gap_type, risk_group |\n| **Benchmarks** | `arsi_intensification_rate`, `psma_completion_rate`, `bone_protection_rate`, `mdt_review_rate` | risk_group |\n| **Treatment uptake** | `adt_rate`, `rt_completed_rate`, `arsi_rate`, `active_surveillance_rate` | risk_group, coverage |\n| **Access** | `cghs_delay_days_dist`, `time_to_treatment_days_dist` | coverage |\n| **Outcomes** | `psa_lt_0_2_at_12m_rate`, `bcr_at_24m_rate`, `crpc_progression_at_36m_rate` | risk_group, treatment_group |\n| **Protocol** | `protocol_adherence_score` | — |\n| **Demographics** | `coverage_mix`, `referral_source_mix`, `geography_mix` | — |\n\n### 3.2 Never exported (hard exclusions)\n- `patient_code` or any identifier; any `patient_identity` field (name/ABHA/Aadhaar/phone).\n- Free text: `safety_side_effects`, `context_remarks`, journey/discussion notes, documents.\n- **Exact dates** — only `period_month` buckets leave the tenant.\n- Any cell with `patient_n < THRESHOLD` (suppressed).\n- Row-level patient records of any kind — **only aggregates**.\n\n### 3.3 Governance\nThe `metric_key` catalogue (§3.1) is the **approved contract**: an independent clinical + DPO sign-off defines it; the sponsor receives only what is in it. Changes are versioned. Suppression threshold and `institution_code` naming (anonymised vs named) are governance decisions (§6).\n\n---\n\n## 4. Zygo Data Cloud — the pull pipeline (Hop 2)\n\n```mermaid\nflowchart TD\n  subgraph Tenant\n    M[sponsor_metric table] --> E{Export mechanism}\n  end\n  E -->|A: pull via export API| DC[Zygo Data Cloud ingest]\n  E -->|B: push to S3 landing zone| L[(S3 landing)] --> DC\n  DC --> U[Union all tenants + tag institution_code]\n  U --> BM[Network benchmarks<
