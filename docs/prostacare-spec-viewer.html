br/>institution vs network median]\n  BM --> W[Sponsor warehouse / dashboards / RWE feed]\n```\n\n- **Export mechanism (decision `O-AGG3`):**\n  - **A — pull:** Data Cloud calls a per-tenant **export endpoint** (reports/SQL over `sponsor_metric`) on a schedule.\n  - **B — push:** each tenant writes `sponsor_metric` to a **secure S3 landing zone** (per-tenant prefix) that Data Cloud ingests. *(Recommended — simplest, one-directional, auditable; reuses the AWS/S3 setup already in place.)*\n- **Cadence (`O-AGG4`):** in-tenant compute nightly; Data Cloud pull **weekly or monthly** (sponsor reporting cadence).\n- **Cross-tenant build:** Data Cloud unions tenant extracts, attaches `institution_code` + region, computes **network benchmarks** (each institution vs network median), and publishes the sponsor dataset. Data Cloud is the *only* place cross-institution data exists.\n\n---\n\n## 5. Privacy & compliance controls (summary)\n\n| Control | Where | Rule |\n|---|---|---|\n| De-identification | in-tenant | only aggregates; no PHI/identifiers ever in `sponsor_metric` |\n| Small-cell suppression | in-tenant | `patient_n < THRESHOLD` → nulled + `suppressed=true` |\n| Date generalisation | in-tenant | month buckets only |\n| Institution anonymisation | in-tenant / Data Cloud | `institution_code`, not hospital name (unless governance permits) |\n| Contract enforcement | governance | sponsor gets only the approved `metric_key` catalogue |\n| One-directional flow | pipeline | tenant → Data Cloud → sponsor; sponsor never touches a tenant |\n| Audit | both hops | every aggregation run + every export logged |\n| Data residency | both | **AWS Mumbai `ap-south-1`** (DPDP compliant); THB-provided infrastructure |\n\n---\n\n## 6. Open decisions (`O-AGG`)\n1. **`O-AGG1` metric catalogue** — confirm/extend §3.1; sign-off owner (clinical + DPO).\n2. **`O-AGG2` suppression threshold** — default 11; confirm.\n3. **`O-AGG3` export mechanism** — S3 push (recommended) vs pull API.\n4. **`O-AGG4` cadence** — nightly compute; weekly/monthly export.\n5. **`O-AGG5` institution identity** — anonymised `institution_code` vs named; who holds the code map.\n6. **`O-AGG6` sponsor confirmation** — confirm NVS = Novartis and the exact reporting deliverables (dashboards vs raw RWE feed).\n7. **`O-AGG7` consent/legal basis** — for aggregate secondary use (DPDP; ethics committee if applicable).\n\n---\n\n## 7. Build tasks\n- In-tenant: `sponsor_metric` entity + nightly aggregation workflow (reads de-identified mat-views, applies suppression, stamps `institution_code`).\n- Export: S3 landing writer (per-tenant prefix) **or** export endpoint.\n- Zygo Data Cloud: ingest + union + institution tagging + network-benchmark model + sponsor dashboards.\n- Governance: version the metric catalogue + suppression config; audit both hops.\n\n---\n\n*Companion: `NOVAEDGE_ALIGNMENT_REVIEW.md` (G3), `PROSTACARE_BUILD_SPEC_V1.md §10`, `TENANT_ONBOARDING_PLAN.md` (provisions the in-tenant aggregation as part of the preset).*\n"}, {"title": "Tenant Onboarding Plan", "file": "TENANT_ONBOARDING_PLAN.md", "md": "# ProstaCare — Tenant Onboarding Plan (Institution Provisioning)\n\n> **Who this is for:** clinical, business and legal teams. **No technical background needed.**\n> Any unfamiliar term (*tenant, derived, one-to-one, aggregate…*) is explained in the glossary at the top of\n> **`PROSTACARE_FUNCTIONAL_LOGIC_SPEC.md` §0 — Plain-English glossary**.\n\n\n**Purpose:** define how a new **institution** (= one tenant) is onboarded from a **golden preset blueprint** of schemas, workflows, rules, dashboards, and roles — so each hospital goes live in **1–2 days** with **config + user setup only, no code**.\n\n**In plain terms:** each hospital gets its **own separate, isolated copy of the system** (a \"tenant\"). Nothing about one hospital is visible to another. Everything clinical is identical across institutions (the golden preset); only institution-specific config and the user roster vary. Cross-institution reporting flows through Zygo Data Cloud (`CROSS_TENANT_AGGREGATION_SPEC.md`).\n\n---\n\n## 1. The golden preset blueprint — identical for every institution\n\n`presets/prostate_cancer/` is provisioned as-is into each new tenant. It contains:\n\n| Preset file | What it seeds (same for all institutions) |\n|---|---|\n| `schemas.json` | All entities — patient hub, pathology (incl. comorbidity/family flags), staging_assessment, imaging_study, treatment_line, supportive_care_event, psa_reading, outcome, journey_event, nudge + nudge_event, notification/discussion, document, guideline_rule, app_user (+`is_mdt_member`)/role, `sponsor_metric`. *(No department/care_team/mdt_panel/patient_condition/encounter; no partitioning.)* |\n| `workflows.json` | Care-gap engine (8 rules, **on-write**), MDT notify (SES), patient onboarding, **record auto-lock / HOD unlock**, outcome derivations, **nightly `sponsor_metric` aggregation** |\n| `guideline_rule` seed | The 8 versioned, signed-off care-gap rules |\n| `mat_views.json` | Current-state projections + Home/Population dashboards + de-identified sponsor views |\n| `pages.json` + `ui/schema_ui.json` | Home, Patient List, Patient File (detail), Population Dashboard, Admin console |\n| ~~`agents.json` + `evidence_pack`~~ | **AI Buddy — Phase 2** (not in the v1 preset) |\n| `roles.json` | **Clinician · HOD (privileged) · Admin** (Ops/Quality optional) |\n| `Value_Lists` / enums | All dropdown option sets (from the workbook) |\n| `app_theme.json` | ProstaCare palette (Visual Language) |\n\n**Key point:** because the clinical logic, rules, and dashboards are all in the blueprint, per-institution onboarding never touches schemas or workflows — it is **configuration + users only**.\n\n---\n\n## 2. What varies per institution (the intake)\n\nCollected **before** provisioning (intake form):\n\n| Item | Example | Used for |\n|---|---|---|\n| Institution profile | name, city, state, logo | `config.json`, theme (optional) |\n| `institution_code` (anonymised) | `INST-017` | cross-tenant aggregation |\n| **User roster** | clinicians/HOD/admin: name, specialty, role, email | `app_user` + role |\n| MDT members | subset of the roster | `is_mdt_member` — \"notify all MDT\" target |\n| Identity source | Azure AD SSO **or** platform-local accounts | auth setup |\n| Facility/enum overrides | local RT facilities, referring centres | dropdown localisation (optional) |\n| Governance sign-offs | identity model (de-identified vs identified), rule-pack version, aggregation contract | go-live gate |\n| Data load | start empty vs seed/migrate existing registry | initial cohort |\n\n---\n\n## 3. Onboarding runbook — 1–2 days\n\n```mermaid\nflowchart LR\n  D0[Day 0 · Intake & sign-off] --> D1[Day 1 · Provision + configure]\n  D1 --> D1b[Day 1 PM · Users + smoke test]\n  D1b --> D2[Day 2 · UAT + go-live]\n```\n\n### Day 0 (pre-work, async) — Intake & sign-off\n- Collect the §2 intake form; confirm governance sign-offs (identity model, rule pack, aggregation contract, suppression threshold).\n- Assign `institution_code`; confirm SSO details or local-account plan.\n- **Gate:** intake complete + sign-offs in hand.\n\n### Day 1 AM — Provision the tenant\n1. **Create the hospital's own copy of the system** (its tenant), with the standard record types and roles.\n2. **Load the standard ProstaCare blueprint** — all record types, the 8 care-gap rules, the dashboards and the branding. Identical at every hospital.\n3. Configure institution: `config.json` (name/branding), `institution_code`, facility/enum overrides.\n4. Wire aggregation: enable the nightly `sponsor_metric` job + S3 export prefix for this tenant.\n5. Configure auth: Azure AD SSO **or** email/local accounts. *(SES sender domain is already provisioned platform-wide — nothing per-tenant.)*\n- **Gate:** tenant up; preset seeded; login works.\n\n### Day 1 PM — Users & smoke test\n6. Onboard `app_user` roster → assign role (Clinician/HOD/Admin) + set `is_mdt_member`.\n7. Load initial data (empty, or seed/migrate existing registry).\n8. **Smoke test the golden path:** create a patient → enter staging/imaging/treatment → **8 nudges fire correctly** → acknowledge → **MDT notify** delivers → **dashboards populate** → **`sponsor_metric` row computes** (de-identified, suppressed).\n- **Gate:** end-to-end path green.\n\n### Day 2 — UAT & go-live\n9. Walkthrough with the clinical lead (roster review, roles, nudges, MDT flow, record lock/unlock, dashboards).\n10. Fix any config/roster tweaks; confirm access (role-based; HOD unlock; ops/sponsor de-identified).\n11. Confirm first aggregation export reaches Zygo Data Cloud.\n12. **Go-live**; handover admin console + support contact.\n- **Gate:** clinical sign-off → live.\n\n> Institutions with **existing data to migrate** or **custom SSO** may extend into a 2nd day; a greenfield site can complete in **~1 day**.\n\n---\n\n## 4. Onboarding checklist\n\n```\nINTAKE (Day 0)\n  [ ] Institution profile + logo\n  [ ] institution_code assigned\n  [ ] User roster (name/specialty/role/email)\n  [ ] MDT panel members\n  [ ] Identity source (SSO / local) confirmed\n  [ ] Facility/enum overrides (if any)\n  [ ] Governance sign-offs: identity model · rule pack · aggregation contract · suppression threshold\n\nPROVISION (Day 1)\n  [ ] Tenant bootstrapped\n  [ ] Golden preset seeded (schemas/workflows/rules/mat-views/dashboards)\n  [ ] config.json + institution_code + facilities set\n  [ ] sponsor_metric nightly job + S3 export prefix enabled\n  [ ] Auth (SSO/local) configured\n  [ ] Users onboarded (role + is_mdt_member)\n  [ ] Initial data loaded (empty / seeded / migrated)\n\nVERIFY (Day 1 PM – Day 2)\n  [ ] Smoke test: patient → nudges (8 rules) → MDT notify → dashboards → sponsor_metric\n  [ ] Access verified (role-based; de-identified for ops/sponsor)\n  [ ] Clinical-lead UAT walkthrough\n  [ ] First aggregation export reaches Zygo Data Cloud\n  [ ] Go-live + admin handover\n```\n\n---\n\n## 5. Why 1–2 days is realistic\n- **No build per institution** — schemas, workflows, the 8 rules, and dashboards are all in the golden preset; provisioning is a seed + config.\n- **Config, not code** — institution profile, facilities, users, roles, and the aggregation hook are all JSON/console settings.\n- **Repeatable and safe to re-run** — if a step is run twice, nothing breaks or duplicates. The runbook is a simple checklist.\n- **The only variable work** is the **user roster + SSO** and **optional data migration**, which is what can push a complex site toward the 2-day end.\n\n---\n\n## 6. Open decisions (`O-ONB`, extends `FLOW-CLARITY`)\n1. **Provisioning owner** — platform team provisions tenants; institution admin manages users thereafter?\n2. **Identity source per site** — Azure AD SSO vs platform-local (affects Day-1 auth step).\n3. **Data migration** — greenfield vs import existing registry (affects timeline).\n4. **Self-serve vs white-glove** — v1 is white-glove (admin-provisioned); self-serve is future (ties to `O-DEP`).\n5. **Enum localisation** — keep the national value-lists as-is, or localise facilities/referring-centres per site.\n\n---\n\n*Companion: `PROSTACARE_BUILD_SPEC_V1.md` (preset contents + phasing), `CROSS_TENANT_AGGREGATION_SPEC.md` (the aggregation the onboarding wires up), `FLOW-CLARITY-AND-OPEN-QUESTIONS.md` (O-ONB decisions).*\n"}, {"title": "Field Dictionary", "file": "FIELD_DICTIONARY.md", "md": "# ProstaCare Field Dictionary (workbook **V3 — proposed**)\n\n> **Who this is for:** clinical, business and legal teams. **No technical background needed.**\n> Any unfamiliar term is explained in the glossary at the top of `PROSTACARE_FUNCTIONAL_LOGIC_SPEC.md` §0.\n\n**How to read this table.** Each row is **one box on a screen**.\n\n| Column | What it tells you |\n|---|---|\n| **Status** | ✅ already agreed (v2) · 🆕 **Proposed** (new, awaiting your sign-off) · ✏️ *Amended* |\n| **Section** | Which part of the form the box sits in |\n| **Field Key** | The system's internal name — so clinical and technical teams refer to the same thing |\n| **Label** | What the clinician sees on screen |\n| **Control** | How you fill it in: free text, a date, a number, or a **dropdown** (a fixed list of allowed answers) |\n| **Type** | The kind of answer expected (`categorical` simply means *pick from the dropdown*) |\n| **UI Req** | Whether the screen insists on an answer |\n| **Allowed Options** | For dropdowns: the complete list of permitted answers |\n\n**🆕 Proposed fields** come from the prostate-cancer MDT care pathway — see `CLINICAL_PATHWAY_GAP_ANALYSIS.md`.\nThey are **not yet approved**: please confirm, amend or reject each. Source workbook: `ProstaCare_Schema_V3_proposed.xlsx` (the original V2 is unchanged).\n\n\n## Demographics_Entry\n\n| Status | Section | Field Key | Label | Control | Type | UI Req | Allowed Options / List |\n|---|---|---|---|---|---|---|---|\n| ✅ | Registry Linkage | `patient_code` | Unique Patient Code | text | text | No |  |\n| ✅ | Registry Linkage | `registry_enrolment_date` | Registry Enrolment Date | date | date | No | yyyy-mm-dd |\n| ✅ | De-identified Demographics | `age_at_diagnosis_years` | Age at Diagnosis (years) | number | whole number | No | Years |\n| ✅ | De-identified Demographics | `language_preference` | Language Preference | dropdown | categorical | No | Hindi  /  English  /  Tamil  /  Telugu  /  Bengali  /  Marathi  /  Kannada  /  Malayalam  /  Gujarati  /  Punjabi  /  Odia |\n| ✅ | Coverage & Access | `healthcare_coverage` | Healthcare Coverage | dropdown | categorical | Yes | PMJAY (Ayushman Bharat)  /  CGHS  /  ESIC  /  State Scheme (Rajya Bima / Aarogyasri)  /  Private Insurance  /  Self-pay |\n| ✅ | Coverage & Access | `referring_hospital_centre` | Referring Hospital / Centre | dropdown | categorical | No | AIIMS New Delhi  /  Tata Memorial Centre, Mumbai  /  CMC Vellore  /  PGIMER Chandigarh  /  RGCI Delhi  /  SGPGI Lucknow  /  Government General Hospital  /  Private Ur tegorical | No | LUTS (Lower urinary tract symptoms)  /  Haematuria  /  Bone pain / backache  /  Incidental PSA elevation  /  Asymptomatic screening  /  Urinary retention |\n| ✅ | Presenting Complaint | `duration` | Duration | text | text | No |  |\n| ✅ | Presenting Complaint | `ipss_score` | IPSS Score | dropdown | categorical | No | 0–7 (Mild)  /  8–19 (Moderate)  /  20–35 (Severe) |\n| ✅ | Presenting Complaint | `bowel_rectal_symptoms` | Bowel / Rectal Symptoms | dropdown | categorical | No | None  /  Constipation  /  Blood in stool  /  Tenesmus |\n| ✅ | Digital Rectal Examination (DRE) | `dre_findings` | DRE Findings | single-select chip group | categorical | Yes | Normal  /  Enlarged (BPH)  /  Nodule – unilateral  /  Nodule – bilateral  /  Induration / fixity  /  Seminal vesicle ext. |\n| ✅ | Digital Rectal Examination (DRE) | `prostate_volume_cc` | Prostate Volume (TRUS / MRI cc) | text | decimal number | No | cc |\n| ✅ | Biopsy Details | `biopsy_date` | Biopsy Date | date | date | No | yyyy-mm-dd |\n| ✅ | Biopsy Details | `biopsy_type` | Biopsy Type | dropdown | categorical | No | 12-core TRUS biopsy  /  MRI-targeted / Fusion biopsy  /  Cognitive targeted  /  Transperineal biopsy  /  TURP chips |\n| ✅ | Biopsy Details | `pi_rads_score` | PI-RADS Score (mpMRI) | dropdown | categorical | No | PI-RADS 1  /  PI-RADS 2  /  PI-RADS 3  /  PI-RADS 4  /  PI-RADS 5  /  Not done |\n| ✅ | Biopsy Details | `gleason_score` | Gleason Score | dropdown | categorical | No | 3+3=6  /  3+4=7  /  4+3=7  /  4+4=8  /  4+5=9  /  5+4=9  /  5+5=10 |\n| ✅ | Biopsy Details | `isup_grade_group` | ISUP Grade Group | dropdown | categorical | No | Grade 1 (3+3)  /  Grade 2 (3+4)  /  Grade 3 (4+3)  /  Grade 4 (4+4)  /  Grade 5 (≥4+5) |\n| ✅ | Biopsy Details | `cores_positive_total` | Cores Positive / Total | text | text | No |  |\n| ✅ | Biopsy Details | `core_involvement_pct` | % Core Involvement | text | decimal number | No | % |\n| ✅ | Biopsy Details | `perineural_invasion` | Perineural In m 1000 mg + Vit D3 OD |\n| `testosteroneMonitoring` | Not checked this cycle · Castrate confirmed (<50 ng/dL) · Non-castrate — action needed |\n| `psychosocialScreening` | Not done · Minimal (0–4) · Mild (5–9) · Moderate (10–14) · Severe (≥15) — refer |\n| `nutritionalAssessment` | Not done · Normal · At risk — dietitian referral made · Malnourished |\n| `bestResponse` | Not yet assessable · PSA response · Stable disease · Biochemical recurrence · Radiological progression · Clinical progression |\n| `biochemicalRecurrenceStatus` | Not assessed · No recurrence documented · Biochemical recurrence |\n| `crpcProgressionStatus` | No CRPC progression documented · Progressed to CRPC · Suspected progression - workup pending |\n| `rtOutcomeStatus` | Not yet assessed · Complete biochemical response · Partial biochemical response · Stable disease · Biochemical recurrence · Progressive disease |\n| `eventType` | Outpatient Visit · Lab / PSA · Imaging · Biopsy / Procedure · Treatment Initiation · Treatment Change · Hospital Admission · MDT Review · Adverse Event · Palliative Referral |\n| `religion` | Hindu · Muslim · Christian · Sikh · Buddhist · Jain · Other · Prefer not to say |\n| `maritalStatus` | Married · Unmarried · Widowed · Divorced / Separated |\n| `educationLevel` | No formal education · Primary · Secondary · Higher secondary · Graduate · Post-graduate |\n| `occupation` | Agriculture · Labour · Service / Salaried · Business / Self-employed · Retired · Unemployed · Other |\n| `tobaccoUse` | Never · Former · Current |\n| `imagingResponse` | Not assessed · Complete response · Partial response · Stable disease · Progressive disease |\n| `surgeryType` | None · Radical prostatectomy — open · Radical prostatectomy — laparoscopic · Radical prostatectomy — robotic · Bilateral orchidectomy · TURP (channel) |\n| `radioligandTherapy` | Not indicated · Lu-177 PSMA (Pluvicto) · Radium-223 (Xofigo) |\n| `vitalStatus` | Alive · Died · Lost to follow-up |\n| `causeOfDeath` | Prostate cancer · Other cancer · Cardiovascular · Infection · Other · Unknown |\n| `labTestName` | PSA · Testosterone · Haemoglobin (CBC) · WBC (CBC) · Platelets (CBC) · Creatinine (RFT) · Urea (RFT) · ALT (LFT) · AST (LFT) · Bilirubin (LFT) · Alkaline Phosphatase (ALP) |\n| `ctcaeGrade` | Grade 1 — Mild · Grade 2 — Moderate · Grade 3 — Severe · Grade 4 — Life-threatening · Grade 5 — Death |\n| `aeActionTaken` | None · Dose reduced · Treatment interrupted · Treatment discontinued · Hospitalisation · Concomitant medication |\n| `relatedTreatment` | ADT · ARPI / ARSI · Chemotherapy · Radiotherapy · Radioligand therapy · Surgery · Other / Unknown |\n| `boneEventType` | Pathological fracture · Spinal cord compression · Radiation to bone · Surgery to bone · Hypercalcaemia |\n| `qolInstrument` | EQ-5D-5L · FACT-P · EORTC QLQ-C30 |\n| `healthcareContactType` | Hospitalisation · Emergency (ER) visit · Day-care admission |\n| `referralService` | Dietician · Physiotherapy · Psychology · Social work · Genetic counselling · Palliative care · Nursing |\n| `referralStatus` | Referred · Seen · Declined · Pending |\n"}, {"title": "Types · Enums · Derived", "file": "DATA_TYPES_ENUMS_AND_DERIVED_FIELDS.md", "md": "# ProstaCare — Data Types, Enum Closure & Derived-Field Formulas\n\n**Purpose (in plain terms):** two checks, so the clinical team can sign off with confidence.\n1. **Is every question in the data-entry pack complete?** — does each field have a defined answer type, and does every dropdown have its full list of allowed answers? *(Yes — see §1–§2.)*\n2. **Is every automatically-calculated number clearly defined?** — for each figure the system works out on your behalf, exactly how is it calculated? *(§3.)*\n\nChecked automatically against the workbook `ProstaCare_Schema_08072026_V2.xlsx`, so this is verified, not assumed.\n\n> **A note on wording:** an *\"enum\"* just means **a dropdown with a fixed list of allowed answers**. *\"Derived\"* means **the system calculates it — nobody types it.** *\"Band\"* means **a grouping range**, e.g. ages 65–69.\n\n---\n\n## 1. Every field has a defined answer type ✅\n\n| Data type | Fields |\n|---|---|\n| `categorical` (enum) | 67 |\n| `date` | 18 |\n| `text` | 12 |\n| `decimal number` | 8 |\n| `whole number` | 2 |\n| `file` | 1 |\n| **Total** | **108** |\n\n**Fields with no data type: 0.** Every field is typed.\n\n**Platform mapping (NOVA Edge):** `categorical → enum(enumValues)` · `date → datetime` *(platform gotcha: never `date`)* · `decimal → number` · `whole → integer` · `text → string/text` · `file → file` + attachment entity.\n\n---\n\n## 2. Every dropdown has its complete list of answers ✅\n\n| Check | Result |\n|---|---|\n| Categorical/dropdown fields with **no options** | **0** |\n| Option sets that **don't match any Value_List** | **0** |\n| Value_Lists defined but **never used** (orphans) | **0** |\n| **Value lists matched** | **53 / 53** |\n\n### 2.1 The exact words the care-gap rules depend on — all present ✅\nThe rules look for specific answers word-for-word (e.g. *\"Not done\"*). If one of those answers were spelled differently in the dropdown, **the rule would never fire and the gap would never be flagged** — a silent safety failure. We checked all of them:\n\n| Enum list | Value the rules depend on | ✓ |\n|---|---|---|\n| `boneScanSpect` · `psmaPetCt` · `dexaBoneDensity` · `germlineSomaticTesting` · `psychosocialScreening` | `Not done` | ✅ |\n| `boneProtectionTherapy` | `Not started` · `Not indicated` | ✅ |\n| `arsiIntensification` | `Not initiated` | ✅ |\n| `castrationStatus` | `Hormone-sensitive (HSPC)` · `Castration-resistant (CRPC)` · `Not on ADT` | ✅ |\n| `eauRiskCategory` | `High` · `Very High / Locally Advanced` · `M1 – Metastatic HSPC` | ✅ |\n| `mdtStatus` | `Not applicable` | ✅ |\n\n### 2.2 ⚠ Two findings that need a decision\n\n**F1 — Use explicit enum IN-lists, never substring matching.**\nThe demo evaluated risk with JavaScript `includes(\"High\")`. That substring **also matches `Very High / Locally Advanced`** — which happens to be desired for rules 1/2, but is fragile and would silently break if an enum value changed. The production rules must use explicit sets:\n```\nrisk_high_plus     = ('High', 'Very High / Locally Advanced', 'M1 – Metastatic HSPC')   -- rule 1\nrisk_high_veryhigh = ('High', 'Very High / Locally Advanced')                            -- rule 2\nrisk_arsi          = ('High', 'Very High / Locally Advanced')  -- rule 6: confirm if M1 included\n```\n\n**F2 — The risk enum has no `M1 – Metastatic CRPC`.**\nFull list: `Low · Intermediate – Favourable · Intermediate – Unfavourable · High · Very High / Locally Advanced · M1 – Metastatic HSPC`.\nA metastatic patient who progresses to castration-resistance keeps a risk label that reads **\"HSPC\"**, while `castration_status` correctly says CRPC.\n❓ **Clinical decision:** add `M1 – Metastatic CRPC` to the risk enum, or treat `castration_status` as the sole source of truth for castration state? *(Recommendation: the latter — risk category is a staging construct; castration state is a separate axis. But confirm.)*\n\n---\n\n## 3. Every automatically-calculated figure, and how it is worked out\n\nThe workbook names **22** derived fields but only describes them in prose (\"bucket into configured bands\") — **the band edges were never defined**. Below: the explicit formula for each, with **proposed band edges recovered from the demo dashboard**, marked for clinical confirmation.\n\nEach table has a **plain-English** column (what it means clinically) and a **precise definition** column (what engineers implement). `current(X)` simply means *\"the most recent dated entry of X for this patient\"*.\n\n### 3.1 Today's status — read from the most recent entry\n*(these drive the patient header and feed the care-gap rules)*\n| Figure | In plain English | Precise definition |\n|---|---|---|\n| Current risk category | The risk from the **latest staging assessment** | `current(staging_assessment).eau_risk_category` |\n| Current castration status | HSPC or CRPC, from the **latest staging assessment** | `current(staging_assessment).castration_status` |\n| Current treatment | The therapy line currently marked **Active** | `current(treatment_line WHERE status='Active')` |\n| Current bone protection | From the **latest supportive-care entry** | `current(supportive_care_event).bone_protection_therapy` |\n| Latest PSA | The **most recent** PSA result | `current(psa_reading).psa_ng_ml` |\n| Is a scan done? | The **latest result** for that scan — and if **no entry exists at all**, it counts as **\"Not done\"** | `current(imaging_study WHERE modality=m).result` else `'Not done'` |\n\n### 3.2 Figures calculated for one patient\n| Figure | In plain English | Precise definition |\n|---|---|---|\n| Time on ADT | Months from the ADT start date until it stopped (or until today if ongoing) | `DATEDIFF(month, treatment_line[ADT].start_date, COALESCE(end_date, today))` |\n| Time to treatment | Days from **diagnosis** to the **first active treatment** | `treatment_start_date − diagnosis_date` |\n| CGHS approval delay | Days from the pre-auth request to approval (or to today if still pending) | `COALESCE(cghs_approval_date, today) − cghs_request_date`; only when pre-auth is required |\n| Time to PSA nadir | Months from starting treatment to the lowest PSA | `DATEDIFF(month, treatment_start_date, psa_nadir_date)`; `'Not reached'` if no nadir yet |\n| Has treatment started? | Yes, once a treatment start date exists | `treatment_start_date IS NOT NULL` |\n| Is RT complete? | Yes, if RT status says Completed **or** a completion date exists | `rt_status='Completed' OR rt_completion_date IS NOT NULL` |\n| Visit status | *Upcoming* if the next PSA date is in the future; *Missed/Overdue* if it has passed; otherwise show the last visit | based on `next_follow_up_psa_date` / `last_follow_up_date` — this is why we need **no separate Visit record** |\n| PSA at diagnosis | The PSA reading taken around the time of diagnosis | ⚠️ **the selection rule is not yet defined — see §4 (F4)** |\n\n### 3.3 Tidying answers into groups for reporting\n| Derived | Formula |\n|---|---|\n| `risk_group` | identity map over `eau_risk_category` (6 values) — **no collapsing** |\n| `ecog_band` | `'0 – Fully active'→0 · '1 – …'→1 · '2 – …'→2 · '3 – …'→3 · '4 – …'→4` |\n| `stage_at_presentation` | bucket `(clinical_t_stage, n_stage, m_stage)` → `cT1–2 N0M0 · cT3a · cT3b · cT4 · N1 · M1a · M1b · M1c` |\n| `comorbidity_mask` | one-hot over the 9 boolean flags; **pairs** = all 2-combinations present |\n| `response_group` | `RT+ADT+ARSI` / `RT+ADT` / `ADT alone` / `Active surveillance` from `treatment_line` types present |\n| `bone_gap_category` | `no bone Rx` / `no DEXA` / `no Ca+VitD` / `protected (on zoledronate/denosumab)` |\n| `period_month` | `to_char(date, 'YYYY-MM')` — the only date granularity that leaves a tenant |\n\n### 3.4 Grouping ranges (\"bands\") — **we propose these; please confirm**\nThe workbook says *\"bucket into configured bands\"* but never says what the ranges are. These are recovered from the demo dashboard:\n| Derived bucket | Proposed bands (recovered from the demo) | Confirm |\n|---|---|---|\n| `age_band` | 40-44 · 45-49 · 50-54 · 55-59 · 60-64 · 65-69 · 70-74 · 75-79 · 80+ | ☐ |\n| `psa_at_dx_band` | 0-4 · 4-10 · 10-20 · 20-50 · 50-100 · >100 ng/mL | ☐ |\n| `psa_density_band` | <0.1 · 0.1-0.2 · 0.2-0.4 · 0.4-0.6 · 0.6-0.8 · >0.8 | ☐ |\n| `free_psa_band` | <7% · 7-10% · 10-15% · 15-20% · >20% | ☐ |\n| `adt_duration_band` | <3m · 3-6m · 6-12m · 12-24m · 24-48m · >48m | ☐ |\n| `time_to_treatment_band` | <14d · 14-30d · 30-60d · 60-90d · >90d | ☐ |\n| `cghs_delay_band` | <14d · 14-30d · 30-60d · 60-90d · 90-120d · >120d | ☐ |\n| `nadir_time_band` | 1-2m · 2-3m · 3-4m · 4-6m · 6-9m · >9m · **Not reached** | ☐ |\n| `psadt_band` | <3m · 3-6m · 6-12m · 12-24m · 24-48m · >48m | ☐ |\n| `travel_distance_band` | <50km · 50-200km · 200-500km · 500-1000km · >1000km | ☐ |\n| `psa_response_band` | PSA<0.2 · 0.2-1 · 1-4 · 4-10 · >10 ng/mL | ☐ |\n| KM / response timepoints | Baseline · 1m · 3m · 6m · 9m · 12m · 18m · 24m *(KM: 0-48m by 6)* | ☐ |\n\n> ⚠️ Two demo arrays were ambiguous (`nadir_time_band` vs `psadt_band`). The mapping above is our best reading — **please confirm which band set belongs to which metric.**\n\n### 3.5 Department-level figures (across all patients)\n| Derived | Formula |\n|---|---|\n| `open_gap_count` | `COUNT(nudge WHERE current_status='open') GROUP BY severity` |\n| `gap_rate(type)` | `open nudges of rule_id / eligible denominator for that rule` |\n| benchmark rates | `arsi_intensification_rate = ARSI-initiated ÷ (HSPC ∧ risk≥High)`; likewise `psma_completion_rate`, `bone_protection_rate` (÷ on-ADT), `mdt_review_rate` |\n| `protocol_adherence_score` | weighted mean of the 10 protocol axes (MDT, staging, PSMA, RT dose, ADT duration, bone Rx, genetics, PSA monitoring, ARSI intensity, psych screen) |\n| `completeness_score` | `present required fields ÷ total required fields`, **per field group** (groups = the `Field_Dictionary` sections) |\n| `nudge_trend` | `COUNT(nudge_event) GROUP BY action('opened','acknowledged','resolved'), period_month` · `net_active = opened − resolved` (cumulative) |\n| `km_bcr_free_survival` | Kaplan-Meier over `outcome.biochemical_recurrence_date − treatment_start_date`, stratified by `risk_group` |\n| `registrations_per_month` | `COUNT(patient) GROUP BY period_month(registry_enrolment_date)` |\n\n### 3.6 The only thing the sponsor ever receives\n```\nsponsor_metric(institution_code, period_month, metric_key, dim1, dim2,\n               numerator, denominator, patient_n, suppressed)\n\nsuppressed = (patient_n < THRESHOLD)          -- default 11\nIF suppressed THEN numerator = NULL, denominator = NULL\n```\n\n---\n\n## 4. Five questions we need the clinical team to answer\n\n| # | Item | Why |\n|---|---|---|\n| **F1** | Confirm the risk **IN-lists** per rule (esp. does rule 6 ARSI include `M1 – Metastatic HSPC`?) | prevents silent rule mis-fire |\n| **F2** | Add `M1 – Metastatic CRPC` to the risk enum, or rely on `castration_status`? | a CRPC patient currently carries an \"HSPC\" risk label |\n| **F3** | Confirm all **band edges** in §3.4 (and the `nadir_time_band` vs `psadt_band` mapping) | the workbook never defined them |\n| **F4** | `diagnostic_psa` selection rule — *\"earliest PSA within N days of `diagnosis_date`\"*? What is N? Or add a `context_remarks` marker? | drives the PSA-at-diagnosis histogram + heatmap |\n| **F5** | `completeness_score` — which fields count as **required** per group? (`Field_Dictionary` marks `UI Required` on only 4 fields) | otherwise completeness is arbitrary |\n\n---\n\n*Audited against `ProstaCare_Schema_08072026_V2.xlsx` (`Field_Dictionary`, `Value_Lists`, `Dashboard_Derived`). Companion: `PROSTACARE_FUNCTIONAL_LOGIC_SPEC.md` §5, `FIELD_DICTIONARY.md`.*\n"}, {"title": "Flow Clarity & Open Questions", "file": "FLOW-CLARITY-AND-OPEN-QUESTIONS.md", "md": "# ProstaCare — Flow Clarity, Boundaries & Open Questions (Pre-Build Discovery)\n\n> **Who this is for:** clinical, business and legal teams. **No technical background needed.**\n> Any unfamiliar term (*tenant, derived, one-to-one, aggregate…*) is explained in the glossary at the top of\n> **`PROSTACARE_FUNCTIONAL_LOGIC_SPEC.md` §0 — Plain-English glossary**.\n\n\n**Status: BLOCKING gate before any NOVA Edge preset work.**\nWe will not start the `prostate_cancer` preset until the team model, data boundaries, permission boundaries, and end-to-end flows are signed off by the business/clinical team.\n\n**Purpose.** The repo demo and the requirement docs (`PRD.md`, `FUNCTIONAL_REQUIREMENTS.md`, `SCOPE.md`, `ProstaCare_Nudge_Logic_Handoff.md`) describe a **single-user prototype**. They do not define the multi-user reality the real product needs. This document (a) maps every end-to-end flow, (b) marks exactly where each flow hits an **undefined boundary**, (c) lists the **blocking questions** for the business team, and (d) proposes a **straw-man default** for each so the business team can react/confirm rather than design from scratch.\n\n---\n\n## 1. Headline — what we actually have vs what we need\n\n| Area | What the demo / docs define | What is undefined (and blocks the build) |\n|---|---|---|\n| **Users** | One persona: HOD, always logged in | Are clinicians, MDT members, coordinators, ops real **logins**? Is this multi-user at all? |\n| **\"Team\"** | A hardcoded 5-name MDT directory used as notify targets | What *is* a team? Global vs per-facility vs per-patient? Who manages membership? Team = MDT = tumour board, or distinct? |\n| **Accessing the team** | \"Send to a member\" / \"send to all MDT\" (one-directional) | How does the **inbound** side work — does a member log in, get an inbox, act, reply? Is discussion two-way? |\n| **Patient visibility (data boundary)** | HOD sees the whole department (filters 8 of 10 by department) | Who sees which patients? Own-panel vs department vs care-team vs shared? Is there patient \"ownership\"? |\n| **Permissions (action boundary)** | Everything is open (single user) | Who can edit which sections, resolve nudges, register patients, send to all-MDT, configure rules, see identified analytics? |\n| **Nudge lifecycle** | Rules fire; \"acknowledge\" logs but never resolves | Who **owns** a nudge? Who can resolve/dismiss? SLA/escalation? Snooze? |\n| **Source of truth** | Patients are local sample records | Are patients **created** in ProstaCare or **synced** from HIS/registry? What's the match key (UHID/ABHA)? |\n| **Org / tenancy** | Single site (AIIMS) | One hospital or a multi-site network? One department or Urology + Radiation Oncology as separate units? |\n\n**Bottom line:** the demo answers \"what screens exist,\" not \"who can do what to whose data, and how the team actually collaborates.\" Those are exactly the things a NOVA Edge preset has to encode (entities, scopes, roles, workflows) — so they must be resolved first.\n\n### Decisions log (live)\n| ID | Decision | Status |\n|---|---|---|\n| O-TEN | **Tenant = institution** (one schema per hospital; no `institution_id`). Within-institution cross-doctor/dept reporting is native; cross-institution = de-identified aggregation layer above tenants. *(Supersedes the earlier \"single shared tenant\" note.)* | ✅ DECIDED (updated) |\n| O-DEP | **Deployment = one tenant per institution, with separation.** Per-doctor SaaS tenant explicitly **not** the model. | ✅ DECIDED |\n| O-ONB | Predefined doctor-teams to onboard? **None found in docs/scope** | ⬜ OPEN (P0) |\n| O-ACC (A) | **Simplified (supersedes department-scoping):** **no `department` entity**; all clinical roles see the institution's patients (tenant is the boundary); **HOD = privileged role** (unlock, notify-all-MDT, audit). MDT panel = notification group, not access. | ✅ DECIDED (updated) |\n| O-LOCK | **Record edit window → auto-lock → HOD time-bound unlock** (defaults 48 h / 24 h, reason required, audited). Append-only tiers need no unlock to continue care. | ✅ DECIDED (durations to confirm) |\n| O-CARD | Every model is **entered on a named screen or derived** (no orphan layers); 1:1 vs 1:N marked per model (one treatment *plan*, many treatment *lines*); duplicates blocked by unique keys | ✅ DECIDED |\n| O-ACC (B) | Non-clinical / ops / quality / **pharma sponsor = de-identified aggregate only** (PHI firewall) | ✅ DECIDED |\n| O-ACC (C) | Identifiers **masked-by-default + audited reveal** | ✅ DECIDED |\n| O-A1 | Multi-user vs single console | ⬜ OPEN (P0) |\n| O-T1/T2 | \"Team\" model + care-team vs tumour-board | ⬜ OPEN (P0) |\n| O-S1 | Patients created here vs synced from HIS (match key) | ⬜ OPEN (P0) |\n| O-TMPL1 | Single-disease vs templatable multi-disease core | ⬜ OPEN (P0) |\n| O-PH1/2/3 | Pharma role (NVS=Novartis?), data model, rule governance/COI | ⬜ OPEN (P0) |\n| O-CH | Notification channels = **in-app inbox + email via AWS SES** (login identity = email); SMS/WhatsApp future | ✅ DECIDED |\n| O-N* | Nudge ownership + SLA/escalation + snooze | ⬜ OPEN (P1) |\n| O-AGG | Cross-tenant aggregation via Zygo Data Cloud (de-identified `sponsor_metric` → pull → sponsor) | 🟡 SPEC'D — see `CROSS_TENANT_AGGREGATION_SPEC.md` |\n| O-REP* | Reporting grain & destination | ⬜ OPEN (P1) |\n| O-DOM | **AWS Mumbai (`ap-south-1`)** residency; **THB provides** domain, hosting, infrastructure. **SES already provisioned** (verified domain + production access). | ✅ DECIDED |\n\n---\n\n## 2. Actors — intended vs defined\n\nPRD §3 names six user types but the demo implements only the first as a real session:\n\n| Actor (PRD §3) | In the demo? | Needs definition |\n|---|---|---|\n| Urologist | ❌ (only HOD persona) | Own-panel? Edit which sections? |\n| Radiation oncologist | ❌ | RT-plan authorship? MDT role? |\n| Medical oncologist | ❌ | Systemic-therapy/ARSI authorship? |\n| MDT coordinator | ❌ | Triage nudges? Manage tumour-board? Assign actions? |\n| Clinical ops / quality | ❌ | Identified or aggregate-only access? |\n| Demo stakeholder | ✅ (HOD login) | — |\n| **MDT directory members** (5 clinicians) | ⚠️ as *notify targets only*, not users | Are these the same people as the actors above, with logins? |\n\n**Open question O-A1:** Is ProstaCare **multi-user** (each clinician logs in, has a panel and an inbox), or a **single-coordinator console** (one user drives everything, \"team\" is just a notify list)? *This single answer reshapes the entire data/permission model.*\n**Straw-man:** Multi-user. Each clinician has a login, a patient scope, and an inbox; \"send to team\" creates real items others act on.\n\n---\n\n## 3. The \"Team\" concept — deep dive (the core of the question)\n\nThe demo's \"team\" is a static array of 5 clinicians (Radiation Oncology, Medical Oncology, Onco-radiology, Nuclear Medicine, Nurse Specialist). It is used **only** as the recipient list for a notification. There is no membership management, no per-patient team, no inbound participation. We need the business team to pick a model:\n\n| Candidate model | What it means | Implication |\n|---|---|---|\n| **(a) One global department MDT** | A fixed roster for the whole unit; every patient's \"team\" is this panel | Simplest; \"team\" = a config list; notify = broadcast to the panel |\n| **(b) Per-facility MDT** | Each hospital/site has its own MDT roster | Needs org-unit model; team scoped to facility |\n| **(c) Per-patient care team** | Each patient has a specific set of involved clinicians (treating urologist + assigned RT onc + …) | Needs `care_team_member` per patient; visibility can follow team membership |\n| **(d) Named tumour boards** | A patient is *presented to* one or more tumour-board sessions; membership per board | Needs `tumour_board` + `board_session` + presentation flow |\n\n**Open questions:**\n- **O-T1:** Which model (a/b/c/d) — or a combination (e.g. a global MDT panel **plus** a per-patient treating clinician)?\n- **O-T2:** Are \"care team\" (who manages this patient day-to-day) and \"tumour board / MDT\" (who reviews the case formally) **the same concept or two different things**? Clinically they usually differ.\n- **O-T3:** Who **manages team membership** — an admin, the HOD, or self-serve? Does it change over time (and do we keep history)?\n- **O-T4:** Can a patient belong to **more than one** team/board? Can a clinician belong to multiple teams?\n- **O-T5:** Are **referring / external** clinicians part of the team (read-only? notified?) or out of scope?\n- **O-T6:** Does \"send to all MDT\" mean *this patient's* team, or the *whole department* MDT?\n\n**Straw-man:** (a)+(c) hybrid — a **global department MDT panel** (config roster, the default \"all MDT\" target) **plus** a per-patient **treating clinician** and an optional small **care team**. Tumour-board = the MDT panel reviewing a case (a review event), distinct from the care team. Membership managed by an admin/coordinator, with history retained.\n\n---\n\n## 4. Data boundary — patient visibility (who sees whom)\n\nThe demo shows the HOD seeing the whole department and filtering two out-of-department patients. That's the *only* signal. Real visibility must be a rule.\n\n| Candidate visibility model | Who sees a patient |\n|---|---|\n| **Department-wide** | Any clinician in the department sees all department patients (≈ demo) |\n| **Own-panel** | A clinician sees only patients where they are the treating/owning clinician |\n| **Care-team** | A clinician sees a patient only if they're on that patient's care team / tumour board |\n| **Role-tiered** | Clinicians see identified records in scope; ops/quality see **aggregate/de-identified** cohort with drill to limited fields |\n\n**Open questions:**\n- **O-D1:** What is the default visibility — department-wide, own-panel, or care-team? (The HOD likely sees all; what about a treating urologist or a nuclear-medicine member?)\n- **O-D2:** Is there a notion of **patient ownership / primary clinician**, and how is it assigned (at registration? by coordinator? by referral)?\n- **O-D3:** Is **department** the hard boundary (as the demo implies), and how is \"department\" defined when Urology and Radiation Oncology are combined?\n- **O-D4:** Do **ops/quality** users get identified patient data or aggregate-only? (PHI-minimisation matters for sign-off.)\n- **O-D5:** Is ProstaCare ever **launched from a hospital EMR for one patient** (single-patient caged session, like the platform's Bayanaty pattern)? If yes, that's a distinct, code-level visibility mode.\n\n**Straw-man:** Default **department-wide** read for clinical roles (matches the HOD-centric demo and tumour-board reality), **own-panel emphasis** on the home screen (\"my patients\" first), **aggregate-first** for ops/quality with drill limited to clinically necessary fields, and **no external single-patient launch** in v1 (revisit if an EMR-embed is required).\n\n---\n\n## 5. Permission boundary — capability × role (all UNKNOWN today)\n\nNothing in the demo restricts actions (one user does everything). We need a capability matrix. Below is our **straw-man** — every cell needs business confirmation.\n\n| Capability | HOD | Treating clinician | MDT member | Coordinator | Ops/Quality | Admin |\n|---|:--:|:--:|:--:|:--:|:--:|:--:|\n| View patient (in scope) | ✅ | ✅ | ✅ (care-team) | ✅ | aggregate | ✅ |\n| Edit demographics/IDs | ✅ | ✅ | — | ✅ | — | ✅ |\n| Edit **clinical** (PSA/staging/biopsy) | ✅ | ✅ | 🔸 own-specialty | — | — | ✅ |\n| Edit **treatment** (ADT/RT/ARSI) | ✅ | ✅ | 🔸 own-specialty | — | — | ✅ |\n| Resolve / dismiss a nudge | ✅ | ✅ | 🔸 | 🔸 | — | ✅ |\n| Send to a member | ✅ | ✅ | ✅ | ✅ | — | ✅ |\n| Send to **all MDT** | ✅ | ✅ | 🔸 | ✅ | — | ✅ |\n| Register a patient | ✅ | ✅ | — | ✅ | — | ✅ |\n| Upload Rx/documents | ✅ | ✅ | 🔸 | ✅ | — | ✅ |\n| View population analytics (identified) | ✅ | 🔸 own-panel | — | ✅ | aggregate | ✅ |\n| Configure guideline rules | — | — | — | — | — | ✅ (+ clinical sign-off) |\n| Manage team / directory / facilities | — | — | — | 🔸 | — | ✅ |\n\n✅ full · 🔸 limited/conditional · — none\n\n**Open questions:**\n- **O-P1:** Is record editing **section-gated by specialty** (e.g. only Radiation Oncology edits the RT plan), or can any clinician in scope edit anything?\n- **O-P2:** Who may **resolve/dismiss** a nudge — only the responsible role, or anyone in scope? Does dismissal require a reason (audited)?\n- **O-P3:** Should \"send to **all MDT**\" be restricted (it's high-noise) — e.g. HOD/coordinator only?\n- **O-P4:** Who configures **guideline rules**, and what is the **clinical sign-off** workflow before a rule goes live?\n\n---\n\n## 6. End-to-end flow map (with boundary + clarity status)\n\nLegend: 🟢 clear · 🟡 partial · 🔴 blocked (needs business answer).\n\n| # | Flow | Actor(s) | What the demo shows | Boundary question | Status |\n|---|---|---|---|---|---|\n| 1 | Login & landing | any | One HOD login | Roles? Per-role home screen? (O-A1) | 🔴 |\n| 2 | Cohort review | HOD/ops | Whole-department KPIs | Whose cohort? Identified vs aggregate? (O-D4) | 🟡 |\n| 3 | \"My panel\" review | treating clinician | — (absent) | Does own-panel view exist? (O-A1, O-D2) | 🔴 |\n| 4 | Open patient file | clinician | Anyone opens anyone | Visibility rule (O-D1) | 🔴 |\n| 5 | Edit record | clinician | All sections editable | Section gating by specialty? (O-P1) | 🔴 |\n| 6 | Nudge generation | system | 8 rules fire (well-specified) | Who **owns** the nudge? | 🟡 |\n| 7 | Act on / resolve nudge | clinician | \"Acknowledge\" logs, never resolves | Who resolves/dismisses? SLA? Snooze? (O-P2, O-N1..3) | 🔴 |\n| 8 | **Access / notify the team** | clinician | Send to member / all (one-way) | Team model + recipient scope (O-T1, O-T6) | 🔴 |\n| 9 | MDT member **receives & responds** | MDT member | — (no inbound side) | Inbox? Act-from-notification? Reply? (O-A1, O-N4) | 🔴 |\n| 10 | Discussion thread | team | Per-patient log (one-way) | One-way log vs threaded conversation? | 🔴 |\n| 11 | New patient onboarding | clinician/coord | Modal create + notify preview | Created here vs synced from HIS? Match key? Who may register? (O-S1..3) | 🔴 |\n| 12 | Rx / document upload | clinician/staff | Browser-local upload | Who uploads? Retention/access? (O-P, future) | 🟡 |\n| 13 | Population analytics | ops/HOD | 6 dashboards + drilldown | Identified vs aggregate per role; whose cohort (O-D4) | 🟡 |\n| 14 | Guideline reference + rule governance | clinician/admin | Static reference content | Who owns/approves/versions rules? (O-P4, O-G1) | 🔴 |\n| 15 | External single-patient launch | external EMR | — | Does an EMR-embed/caged session exist? (O-D5) | 🔴 |\n\n**Read-out:** the *clinical record* flows (4–6, 12, 13) are mostly understood; the **collaboration, identity, and boundary** flows (1, 3, 7–11, 14, 15) — i.e. everything that makes it a *team product* — are blocked.\n\n---\n\n## 7. Blockers — questions to pose to the business team (prioritised)\n\n**P0 — cannot model entities/scopes/roles without these:**\n1. **O-A1** Multi-user or single-console? (Do clinicians/MDT members log in and act, or is \"team\" just a notify list?)\n2. **O-T1/O-T2** What is a \"team\"? Global department MDT vs per-facility vs per-patient care team vs named tumour boards — and is care-team distinct from tumour-board?\n3. **O-D1/O-D2** Default patient visibility (department / own-panel / care-team) and is there a primary-clinician/ownership concept?\n4. **O-S1** Source of truth: are patients **created** in ProstaCare or **synced** from a hospital HIS/registry? If synced, match key (UHID/ABHA) and which fields are read-only?\n5. **O-O1** Org/tenancy: single hospital or multi-site network? Is \"Urology & Radiation Oncology\" one unit or two?\n\n**P1 — shapes the flows and screens:**\n6. **O-T3/O-T4** Who manages team membership; can a patient be on multiple teams/boards; history retained?\n7. **O-N1** Nudge ownership: when a nudge fires, who is responsible (treating clinician / relevant specialist / coordinator)?\n8. **O-N2/O-N3** Resolve/dismiss rules, dismissal reason+audit, **SLA/escalation** for unactioned urgent nudges, and **snooze**?\n9. **O-N4** Notification channel (email / in-app inbox / SMS / WhatsApp) and whether a recipient can **act/reply from** the notification (does it create a task for them)?\n10. **O-P1/O-P3** Section-level edit gating by specialty; restrict \"send to all MDT\"?\n\n**P2 — governance & refinement:**\n11. **O-P4/O-G1** Who owns/approves/versions the guideline rules (clinical governance), global vs per-facility?\n12. **O-D4** Identified vs aggregate analytics access for ops/quality (PHI minimisation).\n13. **O-D5** Any external single-patient EMR-launch (caged session) requirement?\n14. **O-H1** Are NCCN/benchmark targets configurable, and who sets them?\n\n---\n\n## 8. Our straw-man \"to-be\" model (for the business team to react to)\n\nSo the discussion starts from a position, not a blank page, here is what we would build **unless told otherwise** (each maps to a blocker above):\n\n- **Multi-user**, role-based: HOD, Treating Clinician, MDT Member, Coordinator, Ops/Quality, Admin.\n- **Team = a global department MDT panel** (config roster, default \"all-MDT\" target) **+ a per-patient treating clinician** and optional small **care team**. **Tumour-board review** is an *event* where the MDT reviews a case (distinct from care team).\n- **Visibility:** department-wide read for clinical roles, \"my patients\" emphasised on the home screen; ops/quality **aggregate-first**.\n- **Patients synced from HIS/registry** as source of truth (ABHA/UHID match), ProstaCare authoritative for the oncology overlay (nudges, MDT, journey); manual registration allowed as fallback.\n- **Nudge ownership** = the patient's treating clinician, with coordinator visibility; **resolve** when the source field changes (auto) or via explicit dismiss-with-reason; **urgent nudges escalate** to HOD/coordinator after an SLA.\n- **Notifications** = in-app inbox + email; a notification **creates an actionable item** in the recipient's inbox; discussion is a **threaded** per-patient log.\n- **Rules** authored as config (`guideline_rule`), **versioned with clinical sign-off**, admin-managed.\n- **Single hospital, single department** in v1; org-unit model ready for multi-site later. No external EMR-embed in v1.\n\n---\n\n## 9. Round-2 dimensions (tenancy, templates, reporting, channels, pharma, domain)\n\nThese were raised after the first pass and several are **P0** — they change the entity/tenancy model itself.\n\n### 9.1 Tenancy & isolation model — `O-TEN` ✅ DECIDED: SINGLE TENANT\n**Decision (confirmed):** a **single tenant** for the whole product, chosen because **cross-reporting across doctors/departments is a core need**. On NOVA Edge this is one Postgres schema, so cohort analytics span all users natively — no cross-tenant aggregation layer required.\n\n**Key consequence — single-tenant ≠ open access.** The privacy boundary is enforced *inside* the tenant by two independent mechanisms, so cross-reporting and least-privilege coexist:\n- **Operational reads** (identified patient records) → **row-level scopes** (`row_policies`/`scopes`) per user / role / team, plus **field-level** `read_roles` for sensitive columns.\n- **Reporting reads** (cohort) → **RLS-scoped materialized views**, which can be authored **de-identified** so ops / quality / sponsor users see aggregates with no PHI.\n\n➡️ The remaining live decision is **§9.1a — where we draw the access-boundary lines** (below).\n\n### 9.1a Data access boundary inside the single tenant — `O-ACC` ✅ DECIDED\n**Decisions (confirmed):**\n- **(A) Operational/clinical visibility = Department/team-scoped.** A clinical user sees identified patients in their department/team; HOD/coordinator roles may be granted tenant-wide. Cross-department insight comes from the de-identified reporting layer, not raw record access.\n- **(B) Non-clinical / ops / quality / pharma sponsor = De-identified aggregate only.** Hard firewall from PHI — cohort stats + drill to masked rows. (Satisfies DPDP least-privilege and removes sponsor conflict-of-interest risk.)\n- **(C) Identifiers masked-by-default** (name, ABHA/Aadhaar, phone) with **audited reveal** for in-scope clinical users.\n\n➡️ NOVA Edge encoding: department/team `row_policies` + role grants for HOD/coordinator; column `read_roles`/`context_mask` for identifiers; **de-identified, RLS-scoped materialized views** as the only surface exposed to ops/quality/sponsor roles.\n\n_Original option analysis retained below for the record:_\n\n**(A) Operational/clinical visibility — who sees which *identified* patients:**\n| Option | Who sees a patient (identified) | Trade-off |\n|---|---|---|\n| **Tenant-wide clinical** | Every clinical user sees all patients | Simplest, max collaboration (≈ demo HOD view); weakest PHI least-privilege |\n| **Department/team-scoped** | Clinical user sees patients in their dept/team | Balanced; cross-dept still served via de-identified reporting layer |\n| **Own-panel + care-team** | Clinician sees own patients + those whose care-team/tumour-board they're on | Tightest PHI control; needs care-team membership upkeep |\n\n**(B) Reporting/non-clinical boundary — what ops / quality / sponsor see:**\n| Option | What they see |\n|---|---|\n| **De-identified aggregate only** (recommended) | Cohort stats + drill to **masked** rows; hard firewall from PHI |\n| Identified in scope | Full records within their scope (only if a clinical/governance need is proven) |\n\n- **O-ACC1:** Operational default = tenant-wide / department-scoped / own-panel? (Can differ by role — e.g. HOD tenant-wide, treating clinician own-panel-first.)\n- **O-ACC2:** Confirm non-clinical/sponsor users are **de-identified aggregate only** (the firewall), regardless of (A).\n- **O-ACC3:** Field-level masking — which columns are always masked unless explicitly revealed (names, ABHA/Aadhaar, phone), and is every reveal audited?\n- **Straw-man:** Role-tiered — **clinical roles get broad (tenant-wide/department) identified access** for collaboration + cross-reporting, with the *ability* to tighten to own-panel via scopes; **all non-clinical/sponsor access is de-identified aggregate**; identifiers masked-by-default with audited reveal.\n\n### 9.1b Deployment / go-to-market model — `O-DEP` (P0, OPEN — revisits O-TEN)\nSeparate from *isolation*, this is *how the product is sold/run*. A second model is on the table: a **public-internet SaaS where each doctor (or doctor + team) self-onboards into their own dedicated tenant** — i.e. the \"per-doctor tenant\" / \"tenant-C\" option — rather than one institutional deployment.\n\n| Model | Shape | Cross-reporting | Onboarding |\n|---|---|---|---|\n| **Institutional single tenant** (current decision) | One shared tenant for an institution; doctors = scopes | ✅ Native (one schema) | Admin provisions doctors/teams |\n| **Per-doctor SaaS tenant** (`O-DEP`, internet) | Each doctor/team gets a dedicated isolated tenant; self-serve sign-up | ❌ Not native — needs a **separate de-identified registry/aggregation layer above tenants** to report across doctors | Self-onboarding flow + per-tenant bootstrap |\n\n- **O-DEP1:** Is the target an **institutional deployment** (single tenant) **or** an **internet SaaS with a dedicated tenant per doctor/team** — or **both** (institutional now, SaaS later)?\n- **O-DEP2:** If per-doctor tenants are in scope, cross-reporting requires a **registry aggregation layer** (de-identified) above the tenants. Is that layer in scope, and who owns it (us / sponsor / network)?\n- **O-DEP3:** Self-serve sign-up implies public auth, billing, per-tenant provisioning/bootstrap, and tenant-level data-isolation guarantees — confirm these are wanted.\n- **Tension to resolve:** the current **single-tenant decision (O-TEN)** is optimised for cross-reporting; a per-doctor-tenant SaaS is optimised for isolation/self-serve and **breaks native cross-reporting**. The only way to have both is single-tenant-with-scopes **or** per-doctor-tenants **plus** a registry layer. The business must pick the primary model.\n- **Straw-man:** Institutional single tenant for v1 (matches O-TEN); design the schema/scoping so a future per-doctor-tenant SaaS + de-identified registry layer remains possible, but do **not** build the SaaS multi-tenant control plane in v1.\n\n### 9.2 Template / framework variation — `O-TMPL` (P0/P1)\n- **O-TMPL1 (single vs multi-disease):** Is this **only prostate cancer**, or the **first of several disease frameworks** (breast, lung, …)? \"Template variation per framework\" suggests a reusable platform, which changes how we model the core.\n- **O-TMPL2 (per-department):** Do **Urology / Radiation Onc / Medical Onc** need different record templates, nudge sets, and dashboards — or one shared template with role views?\n- **O-TMPL3 (overlay strategy):** If multi-disease: a **shared clinical core + disease-specific overlay**, or fully separate builds?\n- **Straw-man:** Prostate first, but **schema designed as shared clinical core + disease overlay** so other cancers template later. Per-department differences handled as **role/department-scoped layouts + tagged nudge-rule subsets**, not separate schemas. (NOVA Edge supports this via per-role `ui/schema_ui.json` layouts + per-vertical presets.)\n\n### 9.3 Reporting & data-structure expectations — `O-REP` (P1)\n\"How should data be structured to be usable for end-user reporting/queries?\" — needs the analytics contract defined up front, because it dictates the grain we model at.\n- **O-REP1 (grain):** Which reporting grains are needed — patient, encounter/visit, **treatment-line**, **nudge-event**, lab-observation?\n- **O-REP2 (destination):** In-product dashboards only, or must data **export to a warehouse / BI (Power BI/Tableau)** or to the pharma sponsor?\n- **O-REP3 (questions):** Confirm/extend the KPI list the model must answer (the 347-cohort dashboards are the starting set: protocol adherence, care-gap closure, time-to-treatment, outcomes/survival).\n- **O-REP4 (identified vs de-identified + cadence):** Per audience, and refresh real-time vs daily/periodic?\n- **O-REP5 (longitudinal):** Confirm PSA series / treatment timelines / survival need time-series + event modeling.\n- **Straw-man:** Model **fine-grained event/observation tables** (PSA, staging, treatment-line, nudge-event) so any rollup is possible → curated **RLS-scoped materialized views** for the known dashboards → a **de-identified export feed** for pharma/BI; daily refresh.\n\n### 9.4 Communication channels for nudges — `O-CH` (P1)\n- **O-CH1:** Are nudges **portal-only (in-app alerts)**, or also **email / SMS / WhatsApp**?\n- **O-CH2:** Inbound — does a notified member get an **inbox item / email they can act on**, and does it create a **task** for them?\n- **O-CH3:** **Digest vs real-time** (e.g. daily care-gap digest per clinician + immediate for urgent)?\n- **O-CH4:** Any **patient-facing** communication (reminders), or clinician-only?\n- **Straw-man:** In-app inbox primary; **email digest** for clinicians + immediate email for urgent; **clinician-only** (no patient-facing) in v1; WhatsApp later. (All are config workflow comms steps in NOVA Edge; channel choice drives the provider integration.)\n\n### 9.5 Pharma role, data access & governance — `O-PH` (P0, sensitive) ⚠️\n**Context we must confirm:** the demo watermark says *\"THB Sample Prostate Ca Screens prepared for **NVS** Team.\"* We infer **NVS = Novartis** (its stock ticker) — i.e. a **pharma sponsor/audience**. The care gaps the product foregrounds (**ARSI intensification, PSMA PET-CT, bone protection**) are areas of direct pharma commercial interest. This must be clarified because it drives **data governance, consent, and access boundaries**, and a potential **conflict-of-interest** concern.\n- **O-PH1:** Is pharma (Novartis?) the **sponsor/funder**, a **data consumer**, both, or neither? What's the commercial model?\n- **O-PH2:** What data does pharma receive — **none / aggregate de-identified / patient-level de-identified (RWE) / identified (consent-only)**?\n- **O-PH3 (governance/COI):** If a sponsor has commercial interest in a recommended therapy, what **independent clinical governance + versioned sign-off** ensures nudges are **guideline-driven, not promotional**? *(Essential for clinician trust and compliance.)*\n- **O-PH4 (consent/legal):** Consent basis for any secondary (pharma/research) use — India **DPDP Act**, ICMR, ethics-committee approval?\n- **O-PH5 (firewall):** Is there a hard separation between the **identified care-delivery** product and any **pharma-facing analytics/RWE** layer?\n- **Straw-man:** Pharma receives **de-identified aggregate** care-gap/cohort reporting only, via a **separate registry/RWE layer** with its own consent basis; clinical nudge rules governed by an **independent clinical committee** (versioned sign-off); **hard firewall** between identified care data and pharma outputs. **Flag for legal/ethics review before build.**\n\n### 9.6 Domain, hosting, data residency & ownership — `O-DOM` (P2)\n- **O-DOM1:** Product **domain/URL** — decided? Is domain procurement/ownership **our scope** or the client's?\n- **O-DOM2:** **Hosting/deployment** ownership (our managed NOVA Edge vs client infra vs cloud) and **India data-residency** requirement?\n- **O-DOM3:** **Data & IP ownership** — hospital, pharma sponsor, or us?\n- **Straw-man:** Client/sponsor owns domain + data; we host NOVA Edge in an **India region**; IP/ownership pinned in the contract.\n\n### 9.7 Onboarding cohort — predefined doctor-teams? — `O-ONB` (P0, OPEN)\n**Finding (checked):** no predefined set of doctor-teams or institutions to onboard exists in the docs or scope. The only \"team\" anywhere is the demo's **single illustrative directory** — Dr. Anand Sharma (HOD) + 5 MDT members (Radiation Onc, Medical Onc, Onco-radiology, Nuclear Medicine, Nurse Specialist), one department (\"Urology & Radiation Oncology\"), AIIMS — plus a few sample treating-doctor names inside patient records. `SCOPE.md` mentions an \"Admin console for team directory\" only as a **future** capability; it lists no actual roster. So we have **no clarity** on who is onboarded at launch.\n\n- **O-ONB1:** Is there a **predefined list of doctor-teams / departments / institutions** to onboard at launch, or is onboarding open/admin-driven over time?\n- **O-ONB2:** If predefined — please provide the roster (names, specialty, department, email/identity source) so we can seed roles, team membership, and scopes.\n- **O-ONB3:** What is the **onboarding mechanism** — admin-provisioned, bulk import, HIS/HR-directory sync, or self-serve (links to O-DEP3)?\n- **O-ONB4:** What is the **identity source** for clinician logins — hospital SSO (Azure AD), email/OTP, or platform-local accounts?\n- **O-ONB5:** How are clinicians **mapped to departments/teams and patient scopes** at onboarding (drives the O-ACC department/team boundary)?\n- **Straw-man:** A small **predefined pilot roster** (one department, one institution) is admin-provisioned for v1, identity via hospital SSO if available else platform-local; team membership and department scope set at onboarding. Confirm the actual roster.\n\n### 9.8 Round-2 additions to the gate\nNew **P0** (join §7's P0 list — preset cannot start without them): **O-TEN1/O-TEN2** (tenancy/isolation), **O-TMPL1** (single vs multi-disease), **O-PH1/O-PH2/O-PH3** (pharma role, data access, governance).\nNew **P1:** O-TMPL2, O-REP1/O-REP2, O-CH1/O-CH2. New **P2:** O-DOM1–3, O-REP4, O-CH3/O-CH4.\n\n---\n\n## 10. Process — how we get to sign-off\n\n1. **Review this doc with the business/clinical team**; get the P0/P1 answers (a 60–90 min working session would clear most).\n2. We update this doc with confirmed decisions → it becomes the **agreed flow + boundary spec**.\n3. We then produce **\"our version\"**: the to-be end-to-end flows (swimlane diagrams per role) + the entity/scope/role model — for **sign-off**.\n4. **Only then** do we start the NOVA Edge `prostate_cancer` preset, encoding the signed-off model (entities + `scopes`/`row_policies` + `roles` + nudge `guideline_rule` workflow + MDT/notify flows).\n\n> **Gate:** no preset work begins until §7 P0 (and ideally P1) are answered and §8 is confirmed or amended.\n\n---\n\n*Companion docs: `PRODUCT-PRD.md` / `FEATURE-PRD.md` / `FLOW-PRD.md` (intended product), `NOVA-EDGE-FEASIBILITY.md` (platform mapping), and the upstream `PRD.md` / `FUNCTIONAL_REQUIREMENTS.md` / `SCOPE.md` / `ProstaCare_Nudge_Logic_Handoff.md` (demo requirements). This doc is the discovery gate that must close before the preset build.*\n"}]</script>
<script>
 const DOCS = JSON.parse(document.getElementById('payload').textContent);
 mermaid.initialize({startOnLoad:false, theme:'base', securityLevel:'loose',
   themeVariables:{primaryColor:'#EAF4FF',primaryBorderColor:'#2E92FF',primaryTextColor:'#1D4F91',lineColor:'#2E92FF',fontFamily:'DM Sans, sans-serif'}});
 const tabs=document.getElementById('tabs'), main=document.getElementById('main');
 DOCS.forEach((d,i)=>{
   const b=document.createElement('button'); b.textContent=d.title; b.onclick=()=>show(i);
   if(i===0)b.classList.add('active'); tabs.appendChild(b);
   const sec=document.createElement('section'); sec.className='doc md'; sec.id='doc-'+i;
   sec.style.display=i===0?'block':'none'; sec.innerHTML=marked.parse(d.md); main.appendChild(sec);
 });
 function renderMermaidIn(sec){
   sec.querySelectorAll('code.language-mermaid').forEach(code=>{
     const pre=code.closest('pre')||code; const div=document.createElement('div');
     div.className='mermaid'; div.textContent=code.textContent; pre.replaceWith(div);
   });
   try{ mermaid.run({nodes:sec.querySelectorAll('.mermaid')}); }catch(e){ console.error(e); }
 }
 const rendered=new Set();
 function show(i){
   DOCS.forEach((_,j)=>document.getElementById('doc-'+j).style.display=j===i?'block':'none');
   [...tabs.children].forEach((b,j)=>b.classList.toggle('active',j===i));
   if(!rendered.has(i)){rendered.add(i);renderMermaidIn(document.getElementById('doc-'+i));}
   window.scrollTo(0,0);
 }
 rendered.add(0); renderMermaidIn(document.getElementById('doc-0'));
</script>
